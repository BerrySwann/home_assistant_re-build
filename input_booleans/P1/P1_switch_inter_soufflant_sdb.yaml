# ╭──────────────────────────────────────────────────────────────────────────╮
# │ SWITCH TEMPLATE : INTERRUPTEUR VIRTUEL SOUFFLANT SDB (PÔLE 1)           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Crée switch.inter_soufflant_salle_de_bain en miroir de l'input_boolean.
# Permet le contrôle depuis le dashboard ET depuis les automatisations.
#
# ## 🧮 SOURCE :
# - input_boolean.inter_soufflant_salle_de_bain (piloté par IKEA RODRET via MQTT)
#
# ## 🖥️ TABLEAU DE BORD : L1C3 Commandes Clim

- switch:

    # ┌─────────────────────────────────────┐
    # │ 8. SDB                              │
    # └─────────────────────────────────────┘

    # --- inter_soufflant_salle_de_bain ---
    - name: "Inter Soufflant SdB"
      unique_id: inter_soufflant_salle_de_bain
      icon: >
        {% if is_state('input_boolean.inter_soufflant_salle_de_bain', 'on') %}
          mdi:radiator
        {% else %}
          mdi:radiator-off
        {% endif %}
      state: "{{ is_state('input_boolean.inter_soufflant_salle_de_bain', 'on') }}"
      turn_on:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.inter_soufflant_salle_de_bain
      turn_off:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.inter_soufflant_salle_de_bain
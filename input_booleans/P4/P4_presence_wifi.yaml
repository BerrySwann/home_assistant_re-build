# ╭──────────────────────────────────────────────────────────────────╮
# │ INPUT_BOOLEAN : PÔLE 4 — PRÉSENCE & DÉTECTION Wi-Fi             │
# ╰──────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Déclare les interrupteurs virtuels de présence du Pôle 4.
# Chaque booléen reflète l'état de connexion Wi-Fi d'un occupant
# (ON = connecté au réseau local = présent à la maison).
#
# ## 🧮 SOURCES :
# - Écrits par les automations P4 (détection BSSID/SSID via device_tracker
#   ou ping) déclarées dans templates/P4_groupe_presence/
# - Fichiers sources :
#   → 01_phones_wifi_cellular_card_autom.yaml
#   → 02_logique_wifi_cellular.yaml
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces booléens sont des flags logiques, pas des device_tracker natifs.
# - Ne pas les forcer manuellement : ils sont gérés exclusivement
#   par les automations de présence.
# - En cas d'absence Wi-Fi temporaire (appel, couloir), prévoir un délai
#   dans l'automation avant de basculer à OFF pour éviter les faux positifs.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L4C1 Freebox Pop : affichage statut connexion (via template P4)

# ┌─────────────────────────────────────┐
# │ PRÉSENCE                            │
# └─────────────────────────────────────┘

# --- eric_at_home ---
eric_at_home:
  name: "Eric à la maison (Wi-Fi)"
  initial: off
  icon: mdi:wifi

# --- mamour_at_home ---
mamour_at_home:
  name: "Mamour à la maison (Wi-Fi)"
  initial: off
  icon: mdi:wifi


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ CONFIGURATION PRINCIPALE                                                 │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Point d'entrée principal de Home Assistant. Charge tous les modules via
# !include / !include_dir_merge_list / !include_dir_merge_named.
# Contient aussi : SmartIR climate (3 clims), recorder MariaDB, panel_custom,
# powercalc (puissance virtuelle des lampes/relai SONOFF).
#
# ## 🧮 CALCUL & SOURCES :
# - sensor       : !include_dir_merge_list sensors/        (liste de capteurs)
# - template     : !include_dir_merge_list templates/      (templates Jinja2)
# - utility_meter: !include_dir_merge_named utility_meter/ (compteurs nommés)
# - command_line : !include_dir_merge_list command_line/   (cmds shell→sensors)
# - shell_command: !include shell_command.yaml
# - camera       : DÉSACTIVÉ (obsolète — supprimé de la config active)
# - input_button : !include input_button.yaml
# - group        : !include groups.yaml
# - sql          : !include sql.yaml
# - automation   : !include automations.yaml
# - script       : !include scripts.yaml
# - scene        : !include scenes.yaml
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ne jamais supprimer default_config (charge les intégrations de base HA).
# - recorder doit référencer mariadb_url via secrets.yaml (jamais en clair).
# - SmartIR device_code : 1108 (Bureau + Chambre) / 1082 (Salon) — spécifique
#   au modèle de clim. Changer ce code casse le contrôle IR de la clim.
# - !include_dir_merge_named impose que chaque fichier YAML retourne un dict
#   (pas une liste) → utility_meter uniquement.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Non applicable — fichier système racine. Charge toutes les vignettes
#   indirectement via les includes vers sensors/, templates/, utility_meter/.

# --- default_config ---
# Loads default set of integrations. Do not remove.
default_config:

# --- frontend ---
# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# --- automations_scripts_scenes ---
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ Pour Button Outils Dev dans la barre latérale                            │
# ╰──────────────────────────────────────────────────────────────────────────╯
# --- panel_custom ---
# Pour Button Outils Dev
panel_custom:
  - name: developer-tools-sidebar
    sidebar_title: Outils Dev
    sidebar_icon: mdi:hammer-wrench
    url_path: developer-tools/yaml
    module_url: /api/hassio/app/entrypoint.js
    embed_iframe: true

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ Pour powercalc (puissance virtuel des lampes et du relai SONOFF)         │
# ╰──────────────────────────────────────────────────────────────────────────╯
# --- powercalc ---
powercalc:

mobile_app:

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ INCLUDES                                                                 │
# ╰──────────────────────────────────────────────────────────────────────────╯

# --- sensor ---
sensor: !include_dir_merge_list sensors/
#sensor: !include sensors.yaml

# --- template ---
template: !include_dir_merge_list templates/
#template: !include templates.yaml

# --- utility_meter ---
utility_meter: !include_dir_merge_named utility_meter/
#utility_meter: !include utility_meter.yaml

# --- command_line ---
command_line: !include_dir_merge_list command_line/
#command_line: !include command_line.yaml

# --- shell_command ---
shell_command: !include shell_command.yaml
#shell_command: !include_dir_merge_list shell_command/

# --- camera (DÉSACTIVÉ — obsolète) ---               # "[L95] modif"
#camera: !include camera.yaml
#camera: !include_dir_merge_list camera/

# --- input_button ---
input_button: !include input_button.yaml
#input_button: !include_dir_merge_list input_button/

#renvoi au fichier groupe
group: !include groups.yaml

#renvoi au fichier sql.yaml
sql: !include sql.yaml

#renvoi au fichier input_select.yaml
input_select: !include input_select.yaml

# --- input_booleans ---
#renvoi au fichier input_booleans.yaml
input_boolean: !include_dir_merge_named input_booleans/

# --- input_booleans ---
#renvoi au fichier input_number.yaml
input_number: !include_dir_merge_named input_number/

# --- input_datetime.yaml ---
#renvoi au fichier input_datetime.yaml
input_datetime: !include input_datetime.yaml

# ╭──────────────────────────────────────────────────────────────────────────╮
# | Zone NOTIFY                                                              |
# ╰──────────────────────────────────────────────────────────────────────────╯
notify:
# diag_conso_elec.txt
  - platform: file
    name: diag_log_file
    filename: diag_conso_elec.txt

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ BASE DE DONNEE MARIADB                                                   │
# ╰──────────────────────────────────────────────────────────────────────────╯

# --- recorder ---
recorder:
  db_url: !secret mariadb_url
  purge_keep_days: 7
  auto_purge: true
  auto_repack: true
  exclude:
    domains:
      - update
      - persistent_notification
      - sun
      - input_text
    event_types:
      - call_service
    entity_globs:
      - sensor.127_0_0_1*
      - sensor.*linkquality
      - sensor.*last_seen
      - sensor.date*
      - sensor.time*

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ CLIMATISATION SMARTIR                                                    │
# ╰──────────────────────────────────────────────────────────────────────────╯

climate:
  # --- clim_bureau_rm4_mini ---
  - platform: smartir
    name: Clim Bureau RM4-Mini
    unique_id: clim_bureau_rm4_mini
    device_code: 1108
    controller_data: remote.clim_bureau
    temperature_sensor: sensor.th_bureau_temperature
    humidity_sensor: sensor.th_bureau_humidity

  # --- clim_chambre_rm4_mini ---
  - platform: smartir
    name: Clim Chambre RM4-Mini
    unique_id: clim_chambre_rm4_mini
    device_code: 1108
    controller_data: remote.clim_chambre
    temperature_sensor: sensor.th_chambre_temperature
    humidity_sensor: sensor.th_chambre_humidity

  # --- clim_salon_rm4_mini ---
  - platform: smartir
    name: Clim Salon RM4-Mini
    unique_id: clim_salon_rm4_mini
    device_code: 1082
    controller_data: remote.clim_salon
    temperature_sensor: sensor.th_salon_temperature
    humidity_sensor: sensor.th_salon_humidity

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ HTTP://                                                                  │
# ╰──────────────────────────────────────────────────────────────────────────╯
http:
  use_x_forwarded_for: true
  trusted_proxies:
    # --- Proxy locaux & Add-ons (Tailscale / Cloudflared) ---
    - 127.0.0.1       # Toujours bon à avoir pour le local
    - 172.30.33.0/24  # C'est l'IP de l'Add-on Tailscale en interne
    - 172.30.0.0/16   # Tous les autres add-ons / ingress / tunnels

    # --- Réseau de la maison ---
    - 192.168.1.0/24  # Ton LAN local (Vence)

  # --- Sécurité (Bannissement IP) ---
  ip_ban_enabled: true         # Protège l'accès à HA
  login_attempts_threshold: 3  # Seuil de tentatives avant bannissement

# annotations_log:
# - [L95] camera: !include camera.yaml → commenté (obsolète, causait une erreur au démarrage).
# - [L16] En-tête documentation mis à jour : camera marqué DÉSACTIVÉ.

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ RPI_FAN RASPBERRY PI4                                                    │
# ╰──────────────────────────────────────────────────────────────────────────╯
fan:
  - platform: rpi_gpio_pwm
    fans:
      - name: RPI Cooling Fan
        unique_id: rpi_cooling_fan
        pin: 14

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ SHELL COMMAND : BACKUP GITHUB (RE-BUILD)                                 │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Expose 3 commandes shell appelables depuis HA (via automation ou bouton)
# pour exécuter le script de sauvegarde Git de la config Home Assistant.
# Inclus via : shell_command: !include shell_command.yaml (configuration.yaml)
#
# ## 🧮 CALCUL & SOURCES :
# - Script appelé : /config/.scripts/ha_git_backup.sh
# - Log append    : /config/.logs/ha_git_backup.log (>> = non écrasé)
# - git_backup_push         → appel sans argument (commit auto, horaire/daily)
# - git_backup_push_manual  → argument "Manuel" → message commit personnalisé
# - git_backup_push_weekly  → argument "weekly" → tag ISO hebdomadaire créé
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - HA ne retourne PAS le statut de succès/échec d'un shell_command.
#   Toujours vérifier /config/.logs/ha_git_backup.log pour confirmer.
# - Le script doit être exécutable : chmod +x /config/.scripts/ha_git_backup.sh
# - bash -lc est requis pour charger le PATH complet (git accessible).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Pas de vignette directe — déclenché par input_button.yaml (L5C3 système)

# --- git_backup_push ---
git_backup_push: >-
  bash -lc '/config/.scripts/ha_git_backup.sh >> /config/.logs/ha_git_backup.log 2>&1'

# --- git_backup_push_manual ---
git_backup_push_manual: >-
  bash -lc '/config/.scripts/ha_git_backup.sh "Manuel" >> /config/.logs/ha_git_backup.log 2>&1'

# --- git_backup_push_weekly ---
git_backup_push_weekly: >-
  bash -lc '/config/.scripts/ha_git_backup.sh weekly >> /config/.logs/ha_git_backup.log 2>&1'

  bash -lc '/config/.scripts/audit_yaml.sh >> /config/.logs/audit_yaml.log 2>&1'

  bash -lc '/config/.scripts/audit_atma.sh >> /config/.logs/audit_atma.log 2>&1'

  bash -lc '/config/.scripts/audit_full.sh >> /config/.logs/audit_full.log 2>&1'


# --- audit_md5 ---
audit_md5: >-
  bash -lc 'bash /config/.scripts/audit_md5.sh >> /config/.logs/md5_audit_$(date +%Y-%m-%d).txt 2>&1'


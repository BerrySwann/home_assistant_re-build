# ╭──────────────────────────────────────────────────────────────────────────╮
# │ COMMAND LINE : LECTURE LOGS AUDIT MD5 (YAML · ATMA · FULL)              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# 3 sensors qui lisent les 5 dernières lignes de chaque log d'audit.
# Alimentent les cartes journal sur la page Système (L5C3).
#
# ## 🧮 CALCUL & SOURCES :
# Sources : /config/.logs/audit_yaml.log · audit_atma.log · audit_full.log
# Générés par : shell_command.audit_yaml · audit_atma · audit_full
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - scan_interval: 30 → rafraîchi 30s après l'appel du bouton
# - Si le log n'existe pas encore → sensor retourne '—'
# - Format obligatoire : - sensor: (merge_list)
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# L5C3 Système — carte "Journal Audit GitHub"

# --- audit_yaml_journal ---
- sensor:
    name: "Audit Yaml Journal"
    unique_id: audit_yaml_journal
    command: >-
      bash -lc 'python3 -c "import json,os; f=\"/config/.logs/audit_yaml.log\"; lines=open(f).readlines() if os.path.exists(f) else []; k=[l.strip() for l in lines]; print(json.dumps({\"text\":chr(10).join(k[-5:]) or \"-\"}))" 2>/dev/null || echo "{\"text\":\"-\"}"'
    scan_interval: 30
    value_template: 'OK'
    json_attributes:
      - text

# --- audit_atma_journal ---
- sensor:
    name: "Audit Atma Journal"
    unique_id: audit_atma_journal
    command: >-
      bash -lc 'python3 -c "import json,os; f=\"/config/.logs/audit_atma.log\"; lines=open(f).readlines() if os.path.exists(f) else []; k=[l.strip() for l in lines]; print(json.dumps({\"text\":chr(10).join(k[-5:]) or \"-\"}))" 2>/dev/null || echo "{\"text\":\"-\"}"'
    scan_interval: 30

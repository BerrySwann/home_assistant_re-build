# --- audit_full_journal ---
- sensor:
    name: "Audit Full Journal"
    unique_id: audit_full_journal
    command: >-
      bash -lc 'python3 -c "import json,os; f=\"/config/.logs/audit_full.log\"; lines=open(f).readlines() if os.path.exists(f) else []; k=[l.strip() for l in lines]; print(json.dumps({\"text\":chr(10).join(k[-5:]) or \"-\"}))" 2>/dev/null || echo "{\"text\":\"-\"}"'
    scan_interval: 30
    value_template: 'OK'
    json_attributes:
      - text


- sensor:
    name: "Speedtest CLI Data"
    unique_id: speedtest_cli_data
    # 1. On corrige le chemin double
    command: "/config/speedtest/speedtest --format=json --accept-license --accept-gdpr"
    # 2. On ajoute le temps additionnel (très important !)
    command_timeout: 60
    value_template: >
      {% if value_json is defined and value_json.ping is defined %}
        {{ value_json.ping.latency | round(1) }}
      {% else %}
        Indisponible
      {% endif %}
    unit_of_measurement: "ms"
    json_attributes:
      - ping
      - download
      - upload
      - server
      - result
      - isp
    scan_interval: 900
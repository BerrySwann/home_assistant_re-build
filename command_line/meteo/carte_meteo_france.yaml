# ╭──────────────────────────────────────────────────────────────────────────╮
# │ COMMAND_LINE : MÉTÉO FRANCE — TÉLÉCHARGEMENT IMAGES VIGILANCE (J0 / J1) │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Télécharge les images de vigilance Météo France (aujourd'hui J0 et demain J1)
# via l'API officielle DPVigilance v1 et les sauvegarde en PNG local.
# Ces PNG sont ensuite lus par camera.yaml (local_file) pour affichage.
# Inclus via : command_line: !include_dir_merge_list command_line/ (configuration.yaml)
#
# ## 🧮 CALCUL & SOURCES :
# - 2 sensors command_line : today (J0) + tomorrow (J1)
# - scan_interval: 14400 (toutes les 4h)
# - API : https://public-api.meteofrance.fr/public/DPVigilance/v1/vignettenationale-J/encours
# - Réponse base64 → décodée → sauvegardée en PNG dans /config/www/weather/
# - Retry : boucle 5 tentatives (sleep 1s entre chaque). Si échec → fallback nodata.png
# - value_template: "{{ value }}" → retourne "on" (succès) ou "unavailable" (échec)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - api_key JWT hardcodée dans le fichier (expiration : 2027-06-22 selon exp JWT).
#   Surveiller l'expiration et renouveler sur portail-api.meteofrance.fr si besoin.
# - Le fichier fallback /config/www/weather/meteo_france_alerte_nodata.png DOIT
#   exister sinon le cp -f échouera silencieusement.
# - scan_interval trop court = quota API dépassé (60 req/min max selon le JWT).
# - L'automation ID 1771872569647 force une MAJ au démarrage HA (homeassistant.update_entity).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Sert à la remontée d'info pour la vignette : [L1C1 Météo — Pop-up #ALERT]

# --- meteo_france_alertes_image_today ---
- sensor:
    name: "Météo France alertes image today"
    unique_id: meteo_france_alertes_image_today
    scan_interval: 14400
    command_timeout: 15
    command: |-
      api_key="eyJ4NXQiOiJZV0kxTTJZNE1qWTNOemsyTkRZeU5XTTRPV014TXpjek1UVmhNbU14T1RSa09ETXlOVEE0Tnc9PSIsImtpZCI6ImdhdGV3YXlfY2VydGlmaWNhdGVfYWxpYXMiLCJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9..X8GXHD_RsrJ6Ysj7IRI_ElRO3V8vDUHbqBNIB0AvkQGRyL0oD-2xbRBWssNklI947zz9UZaOzooQEXH9hXaJpUBQVrWur-XBF0WtQCvh0WmshZVZuQfsCRuEIs0S_m8iVLzbszkvHlaXV8mVdg0zsA9w7ta5Qo7goW6ctddufK6haempJrytZwIuiQnchIbr9pXUH88MxvwmdsRZWHFtV3SWXA7XUSFZLtvfK-ukt8jGqStbXh7_8u8IEM71p6uT6P7OF2F3l-p4TzUJcCWe1n9NrjK3_tq1Ri8H63Q2BR84UdYJOPO4A1vR_YiJIYm3MuWDdkx55JrF6JgavvZCKA==";
      i=0;
      while true; do
        today=$(curl -s -X GET "https://public-api.meteofrance.fr/public/DPVigilance/v1/vignettenationale-J/encours" -H "accept: */*" -H "apikey: $api_key" | base64 -w 0);
        i=$((i+1));
        if [ ${#today} -gt 10000 ];
        then
          echo "$today" | base64 -d > ./www/weather/meteo_france_alerte_today.png;
          echo on;
          break;
        elif [ "$i" -eq 5 ];
        then
          cp -f "./www/weather/meteo_france_alerte_nodata.png" "./www/weather/meteo_france_alerte_today.png";
          echo unavailable;
          break;
        fi
        sleep 1;
      done
    value_template: "{{ value }}"


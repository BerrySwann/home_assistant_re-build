# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. SENSORS : INTÉGRATION kWh — ÉCLAIRAGE PAR ZONE (9 ZONES)         │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs d'intégration Riemann calculant l'énergie totale cumulée (kWh)
# pour chaque zone d'éclairage (pièce ou groupe transversal). Sont les sources
# primaires pour les utility_meter P3_UM_AMHQ_2_ZONE.yaml.
# Sources intermédiaires : les sensors de puissance par zone (P3_POWER_2_TOTAL_MULTI_ZONE).
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : ∫ [zone]_puissance (W) dt → kWh (méthode left)
# - Sources : sensor.eclairage_[zone]_puissance (P3_POWER_2_TOTAL_MULTI_ZONE.yaml)
# - 7 zones pièces : Entrée (1x), Salon (5x), Cuisine (1x), Couloir (1x),
#   Bureau (5x), SDB (2x), Chambre (4x)
# - 2 zones transversales : Appart 3x (E+Cu+Co), Appart 2x (E+Co)
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | [calculé]      | sensor.eclairage_*_kwh_unite (P3_kWh_1_UNITE)      | eclairage_*_kwh_zone (×7 zones)                    | P3_UM_AMHQ_2_ZONE.yaml / P3_kWh_3_TOTAL.yaml → L2C3 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Dépendance en chaîne : P3_POWER_2_TOTAL_MULTI_ZONE → ce fichier → P3_UM_AMHQ_2_ZONE.
#   Si sensor.eclairage_[zone]_puissance est indisponible, le kWh sera faux.
# - Les zones transversales (appart_2, appart_3) ne comptent PAS indépendamment
#   du total — elles se recoupent avec les zones pièces physiques.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (source des UM P3 par zone)

  # ╭──────────────────────────────────────────────────────────────────────╮

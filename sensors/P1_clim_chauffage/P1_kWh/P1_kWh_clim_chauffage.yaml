# ╭──────────────────────────────────────────────────────────────────────────╮
# │ CAPTEUR : INTÉGRATION KWH — RADIATEUR CUISINE (RIEMANN P1)               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Intégration Riemann pour le radiateur cuisine (Shelly 1PM Gen 4).
# Convertit la puissance instantanée (W) en énergie cumulative (kWh).
# Nécessaire car le firmware Shelly Gen 4 marque currentSummDelivered
# comme UNREPORTABLE_ATTRIBUTE — le kWh natif Zigbee est inaccessible.
#
# ## 🧮 CALCUL & SOURCES :
# sensor.radiateur_elec_cuisine_power (W) → intégration Riemann (left) → kWh
# Méthode left : utilise la valeur de puissance du début de l'intervalle.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL              | CAPTEUR BRUT (source)                    | CE FICHIER (unique_id)                         | AVAL                                        |
# |:----------------------|:-----------------------------------------|:-----------------------------------------------|:--------------------------------------------|
# | Shelly 1PM Gen4 (Z2M) | sensor.radiateur_elec_cuisine_power      | radiateur_elec_cuisine_energie_totale_kwh      | P1_UM_AMHQ.yaml → P1_AVG / P1_TOTAL → L2C2 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Bug firmware Shelly 1PM Gen 4 (S4SW-001P16EU) : UNREPORTABLE_ATTRIBUTE
#   sur seMetering/currentSummDelivered → kWh natif Z2M inutilisable.
# - Fix firmware identifié : 20250819-150402/ga0def2d (shellyRPCBugFixed)
#   → dès que le fix est disponible via Z2M OTA, supprimer ce fichier
#   et restaurer source directe dans P1_UM_AMHQ.yaml.
# - Les autres équipements P1 (NOUS plugs, clims) utilisent leur kWh natif
#   directement — ce fichier est une exception Shelly uniquement.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Via P1_UM_AMHQ.yaml → L2C2 (Conso Énergie Clim / Radiateur / Soufflant)

# ┌─────────────────────────────────┐
# │ 5. CUISINE                       │
# └─────────────────────────────────┘

# --- radiateur_elec_cuisine_energie_totale_kwh ---
- platform: integration
  source: sensor.radiateur_elec_cuisine_power
  name: "Radiateur Elec Cuisine Energie Totale kWh"
  unique_id: radiateur_elec_cuisine_energie_totale_kwh
  method: left


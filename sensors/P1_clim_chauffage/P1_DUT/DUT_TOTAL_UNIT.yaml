# ╭──────────────────────────────────────────────────────────────────────────╮
# │ P1. SENSORS — DURÉE D'UTILISATION TOTALE [DUT] CHAUFFAGE & CLIM         │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs history_stats mesurant le temps de fonctionnement quotidien (DUT)
# des 6 équipements P1. Remise à zéro à minuit chaque jour.
# Unité : heures (type: time).
#
# ## 🧮 CALCUL & SOURCES :
# - Salon / Cuisine / Bureau / Chambre : surveille sensor.*_power_status → state "on"
#   (source : templates/P1_clim_chauffage/ui_dashboard/ui_dashboard.yaml)
# - SdB Soufflant   : surveille sensor.sdb_soufflant_etat → state "Heat"
# - SdB Sèche-Serv. : surveille sensor.sdb_seche_serviette_etat → state "Heat"
#   (sources : templates/P1_clim_chauffage/ui_dashboard/ui_dashboard.yaml)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les capteurs *_power_status (Salon/Cuisine/Bureau/Chambre) sont des status
#   textuels ("on" / "off") — bien utiliser state: "on" (pas "On").
# - Les capteurs SdB utilisent l'état du mode clim ("Heat") → sensible à la casse.
# - Ce fichier produit : sensor.dut_clim_salon, sensor.dut_radiateur_cuisine,
#   sensor.dut_clim_bureau, sensor.dut_sdb_soufflant,
#   sensor.dut_sdb_seche_serviettes, sensor.dut_clim_chambre
# - sensor.dut_sdb_total (somme soufflant + sèche-serv.) est un capteur template
#   → à définir dans templates/P1_clim_chauffage/P1_TOTAL/P1_DUT_TOTAL.yaml
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Sert à la vignette L2C2 (Conso Énergie Clim / Radiateur / Soufflant)
# - Sert aux graphes apexcharts "D.U.T. & Performance" par pièce (page energie-clim)

# ┌───────────────────────────────────┐
# │ 4. SALON                          │
# └───────────────────────────────────┘

# --- dut_clim_salon ---
- platform: history_stats
  name: "DUT Clim Salon"
  unique_id: dut_clim_salon
  entity_id: sensor.salon_power_status
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0) }}"
  end: "{{ now() }}"


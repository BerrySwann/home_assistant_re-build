# ╭──────────────────────────────────────────────────────────────────────────╮
# │ MÉTÉO [M_03]. SENSORS : API REST BLITZORTUNG — GÉOLOCALISATION FOUDRE    │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteur REST interrogeant l'API Nominatim (OpenStreetMap) pour obtenir
# le nom de la localité la plus proche de la dernière frappe de foudre
# détectée par Blitzortung. Rafraîchissement toutes les 3600 secondes (1h)
# pour éviter la surcharge de l'API publique Nominatim.
#
# ## 🧮 CALCUL & SOURCES :
# - API : Nominatim reverse geocoding (openstreetmap.org)
# - Coordonnées source : attributs lat/lon de sensor.maison_lightning_distance
# - URL template : https://nominatim.openstreetmap.org/reverse?format=geocodejson&lat={lat}&lon={lon}
# - Valeur retournée : nombre de features (entier, indicator de succès)
# - Attributs : features[] (objet GeoJSON complet pour parsing en template)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - scan_interval: 3600 obligatoire — Nominatim interdit les requêtes fréquentes
#   (limite usage équitable : max 1 req/s, mais 1/h recommandé pour HA).
# - Si lat/lon sont 'None' (aucune frappe récente), l'URL sera invalide.
#   Prévoir une garde | default(0) dans les templates qui consomment ce sensor.
# - Ce sensor seul ne suffit pas : les templates M_03_meteo_blitzortung.yaml
#   l'exploitent pour afficher la localité de la dernière frappe.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L1C1 Météo (section foudre Blitzortung, localité de la dernière frappe)

# --- blitzortung_lightning_localisation ---
  - platform: rest
    name: "Blitzortung Lightning Localisation"
    unique_id: blitzortung_lightning_localisation
    scan_interval: 3600
    resource_template: >-
      {%- set lat = state_attr('sensor.maison_lightning_distance', 'lat') -%}
      {%- set lon = state_attr('sensor.maison_lightning_distance', 'lon') -%}
      https://nominatim.openstreetmap.org/reverse?format=geocodejson&lat={{lat}}&lon={{lon}}
    value_template: '{{ value_json.features | length }}'
    json_attributes:
      - features

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. SENSORS : STATISTIQUES MIN/MAX/MOY — PUISSANCE APPART TEMPS RÉEL │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs de statistiques calculant la consommation minimale, maximale et
# moyenne sur la puissance temps réel de l'appartement. Période glissante
# de 24h pour min/max et 1h pour la moyenne. Ces capteurs permettent de suivre
# les extrêmes de consommation et la tendance horaire.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.general_electric_appart_power (puissance instantanée W).  # "[L12] modif : ecojoko_consommation_temps_reel → general_electric_appart_power"
# - Conso Mini  : min sur 24h (value_min, échantillon ≥ 6).
# - Conso Maxi  : max sur 24h (value_max, échantillon ≥ 6).
# - Conso Moy 1h: moyenne sur 1h (mean, précision 1 décimale).
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces capteurs opèrent sur la PUISSANCE (W), pas sur l'énergie (kWh).
#   Ne pas les utiliser comme sources pour un utility_meter.
# - La moyenne 1h peut être indisponible pendant les 60 premières minutes
#   après le démarrage de HA (pas assez d'échantillons).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (suivi temps réel min/max/moy).

# --- genelec_appart_conso_mini_24h ---
- platform: statistics
  name: "Conso Mini"
  unique_id: genelec_appart_conso_mini_24h
  entity_id: sensor.general_electric_appart_power                          # "[L31] modif"
  state_characteristic: value_min
  max_age:
    hours: 24

# --- genelec_appart_conso_maxi_24h ---
- platform: statistics
  name: "Conso Maxi"
  unique_id: genelec_appart_conso_maxi_24h
  entity_id: sensor.general_electric_appart_power                          # "[L40] modif"
  state_characteristic: value_max
  max_age:
    hours: 24

# --- genelec_appart_conso_moyenne_1h ---
- platform: statistics
  name: "Conso Moyenne 1h"
  unique_id: genelec_appart_conso_moyenne_1h
  entity_id: sensor.general_electric_appart_power                          # "[L49] modif"
  state_characteristic: mean
  precision: 1
  max_age:
    hours: 1

# annotations_log:
# - [L12] modif : source ecojoko_consommation_temps_reel → general_electric_appart_power
# - [L31] modif : entity_id ecojoko_consommation_temps_reel → general_electric_appart_power
# - [L40] modif : entity_id ecojoko_consommation_temps_reel → general_electric_appart_power
# - [L49] modif : entity_id ecojoko_consommation_temps_reel → general_electric_appart_power

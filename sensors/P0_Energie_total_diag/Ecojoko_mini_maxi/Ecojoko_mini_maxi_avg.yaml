# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. SENSORS : STATISTIQUES MIN/MAX/MOY — ECOJOKO TEMPS RÉEL         │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs de statistiques calculant la consommation minimale, maximale et
# moyenne sur la puissance temps réel fournie par Ecojoko. Période glissante
# de 24h pour min/max et 1h pour la moyenne. Ces capteurs permettent de suivre
# les extremes de consommation et la tendance horaire.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.ecojoko_consommation_temps_reel (puissance instantanée W).
# - Conso Mini  : min sur 24h (value_min, échantillon ≥ 6).
# - Conso Maxi  : max sur 24h (value_max, échantillon ≥ 6).
# - Conso Moy 1h: moyenne sur 1h (mean, précision 1 décimale).
# - Correction : ancienne source était kWh cumulatif → corrigé en W instantané.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces capteurs opèrent sur la PUISSANCE (W), pas sur l'énergie (kWh).
#   Ne pas les utiliser comme sources pour un utility_meter.
# - La moyenne 1h peut être indisponible pendant les 60 premières minutes
#   après le démarrage de HA (pas assez d'échantillons).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (suivi temps réel min/max/moy).

- platform: statistics
  name: "Ecojoko Conso Mini 24h"
  unique_id: ecojoko_conso_mini_24h
  entity_id: sensor.ecojoko_consommation_temps_reel
  state_characteristic: value_min
  sampling_size: 6
  max_age:
    hours: 24

- platform: statistics
  name: "Ecojoko Conso Maxi 24h"
  unique_id: ecojoko_conso_maxi_24h
  entity_id: sensor.ecojoko_consommation_temps_reel
  state_characteristic: value_max
  sampling_size: 6
  max_age:
    hours: 24


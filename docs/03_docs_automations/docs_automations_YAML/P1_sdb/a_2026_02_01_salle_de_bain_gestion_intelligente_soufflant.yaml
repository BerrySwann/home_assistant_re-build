id: '1774803407558'
alias: A - 2026/02/01 - SALLE DE BAIN - GESTION INTELLIGENTE SOUFFLANT
description: 'Cycle complet : Démarrage, Régulation, et Auto-off 60 min avec refroidissement'
triggers:
- alias: CHANGEMENT ÉTAT INTERRUPTEUR
  trigger: state
  entity_id: switch.inter_soufflant_salle_de_bain
  id: inter_change
- alias: TEMPÉRATURE > 23°C
  trigger: numeric_state
  entity_id: sensor.th_salle_de_bain_temperature
  above: 22.9
  for: 00:01:00
  id: temp_high
- alias: TEMPÉRATURE < 22°C
  trigger: numeric_state
  entity_id: sensor.th_salle_de_bain_temperature
  below: 21.9
  id: temp_low
- alias: SÉCURITÉ AUTO-OFF 60 MIN
  trigger: state
  entity_id: switch.inter_soufflant_salle_de_bain
  to: 'on'
  for: 01:00:00
  id: auto_off
actions:
- alias: ROUTAGE DES ACTIONS PAR TRIGGER
  choose:
  - alias: CAS ALLUMAGE INTER
    conditions:
    - condition: trigger
      id: inter_change
    - condition: state
      entity_id: switch.inter_soufflant_salle_de_bain
      state: 'on'
    - condition: numeric_state
      entity_id: sensor.th_salle_de_bain_temperature
      below: 25
    sequence:
    - action: switch.turn_on
      target:
        entity_id: switch.prise_soufflant_salle_de_bain_nous
    - delay: 00:00:01
    - action: remote.send_command
      target:
        entity_id: remote.soufflant_sdb
      data:
        command: on_off
        device: radiateur_sdb
    - delay: '00:00:00.8'
    - choose:
      - alias: DÉMARRAGE 2000W (< 21°C)
        conditions:
        - condition: numeric_state
          entity_id: sensor.th_salle_de_bain_temperature
          below: 21
        sequence:
        - action: remote.send_command
          target:
            entity_id: remote.soufflant_sdb
          data:
            command: 1000w
            device: radiateur_sdb
            num_repeats: 2
            delay_secs: 0.8
        - action: input_select.select_option
          target:
            entity_id: input_select.etat_resistance_soufflant_sdb
          data:
            option: 2000W
      default:
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb
        data:
          command: 1000w
          device: radiateur_sdb
      - action: input_select.select_option
        target:
          entity_id: input_select.etat_resistance_soufflant_sdb
        data:
          option: 1000W
    - delay: '00:00:00.8'
    - action: remote.send_command
      target:
        entity_id: remote.soufflant_sdb
      data:
        command: swing
        device: radiateur_sdb
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.soufflant_salle_de_bain
      data:
        hvac_mode: heat
  - alias: CAS TEMPÉRATURE > 23°C
    conditions:
    - condition: trigger
      id: temp_high
    - condition: state
      entity_id: switch.inter_soufflant_salle_de_bain
      state: 'on'
    - condition: not
      conditions:
      - condition: state
        entity_id: input_select.etat_resistance_soufflant_sdb
        state: 0W
    sequence:
    - variables:
        current_power: '{{ states(''input_select.etat_resistance_soufflant_sdb'')
          }}'
        ir_repeats: '{{ 2 if current_power == ''1000W'' else 1 }}'
    - action: remote.send_command
      target:
        entity_id: remote.soufflant_sdb
      data:
        command: 1000w
        device: radiateur_sdb
        num_repeats: '{{ ir_repeats }}'
        delay_secs: 0.8
    - action: input_select.select_option
      target:
        entity_id: input_select.etat_resistance_soufflant_sdb
      data:
        option: 0W
  - alias: CAS TEMPÉRATURE < 22°C
    conditions:
    - condition: trigger
      id: temp_low
    - condition: state
      entity_id: switch.inter_soufflant_salle_de_bain
      state: 'on'
    - condition: state
      entity_id: input_select.etat_resistance_soufflant_sdb
      state: 0W
    sequence:
    - action: remote.send_command
      target:
        entity_id: remote.soufflant_sdb
      data:
        command: 1000w
        device: radiateur_sdb
    - action: input_select.select_option
      target:
        entity_id: input_select.etat_resistance_soufflant_sdb
      data:
        option: 1000W
  - alias: CAS EXTINCTION (MANUELLE OU AUTO)
    conditions:
    - or:
      - and:
        - condition: trigger
          id: inter_change
        - condition: state
          entity_id: switch.inter_soufflant_salle_de_bain
          state: 'off'
      - condition: trigger
        id: auto_off
    sequence:
    - if:
      - condition: trigger
        id: auto_off
      then:
      - action: switch.turn_off
        target:
          entity_id: switch.inter_soufflant_salle_de_bain
    - action: remote.send_command
      target:
        entity_id: remote.soufflant_sdb
      data:
        command: on_off
        device: radiateur_sdb
    - delay: 00:01:00
    - action: climate.set_hvac_mode
      target:
        entity_id: climate.soufflant_salle_de_bain
      data:
        hvac_mode: 'off'
    - action: switch.turn_off
      target:
        entity_id: switch.prise_soufflant_salle_de_bain_nous
    - action: input_select.select_option
      target:
        entity_id: input_select.etat_resistance_soufflant_sdb
      data:
        option: 0W
mode: queued
max: 3

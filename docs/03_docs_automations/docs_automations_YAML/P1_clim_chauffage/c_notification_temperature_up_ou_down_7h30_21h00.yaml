id: '1775243646439'
alias: (C) Notification température Up ou Down de (7h30 -> 21h00)
description: 'Envoie le message personnalisé de clim si le texte change, OU au réveil
  à 07h30.

  '
triggers:
- alias: 'DÉCLENCHEUR : CAPTEUR TEMPÉRATURE'
  trigger: state
  entity_id: sensor.th_balcon_nord_temperature
- alias: 'DÉCLENCHEUR : HORAIRE FIXE 07H30'
  trigger: time
  at: 07:30:00
conditions: []
actions:
- alias: 'CONDITION : PÉRIODE DIURNE'
  condition: time
  after: 07:30:00
  before: '21:00:00'
- alias: 'ACTION : PAUSE 2 SECONDES'
  delay: 00:00:02
- alias: 'LOGIQUE : VÉRIFICATION CAPTEURS'
  if:
  - condition: template
    value_template: "{{ states('sensor.message_clim_personnalise_7h30_21h00') in
      ['unknown', 'unavailable'] or\n   states('sensor.mamour_wi_fi_connection')
      in ['unknown', 'unavailable'] or\n   states('sensor.eric_wi_fi_connection')
      in ['unknown', 'unavailable'] or\n   states('sensor.th_balcon_nord_temperature')
      in ['unknown', 'unavailable'] }}\n"
  then:
  - alias: 'ACTION : NOTIF ERREUR (MAX 15 CAR)'
    action: notify.mobile_app_eric
    data:
      title: '[ANJ] Erreur Capteurs'
      message: 'Un capteur (Temperature, Wifi ou Message) est indisponible. Verifiez
        les entites. # "[L...] modif" (Retrait des accents problématiques si nécessaire
        pour ASCII pur)'
  else:
  - alias: 'ACTION : NOTIF TENDANCE (MAX 15 CAR)'
    action: notify.mobile_app_eric
    data:
      title: '[Automa. Notif. Jrs]'
      message: '{{ states(''sensor.message_clim_personnalise_7h30_21h00'') }}'
mode: queued

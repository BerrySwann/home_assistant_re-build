id: '1766771294543'
alias: (B - 0) 2026-01-02 Automatisation CLIM NUIT (21h00 <-> 07h30)
description: '[VERSION OPTIMISÉE NUIT] Pilotage des clims basé sur la présence.  Calcul des variables au début et sécurité hvac_mode incluse.'
triggers:
- alias: 'SYSTEM : REDÉMARRAGE HOME ASSISTANT'
  trigger: homeassistant
  event: start
  id: force_run
- alias: 'HORAIRE : DÉMARRAGE 21H00'
  trigger: time
  at: '21:00:00'
  id: force_run
- alias: 'RÉSEAU : CHANGEMENT WIFI <-> CELLULAR'
  trigger: state
  entity_id:
  - sensor.mamour_network_type
  - sensor.eric_network_type
  id: force_run
- alias: 'PRISES : CHANGEMENT ÉTAT ON/OFF'
  trigger: state
  entity_id:
  - switch.clim_salon_nous
  - switch.clim_bureau_nous
  - switch.clim_chambre_nous
  id: force_run
- alias: 'FENÊTRES : OUVERTURE (COUPURE URGENCE)'
  trigger: state
  entity_id:
  - binary_sensor.contact_fenetre_salon_sonoff_contact
  - binary_sensor.contact_fenetre_cuisine_sonoff_contact
  - binary_sensor.contact_fenetre_bureau_sonoff_contact
  - binary_sensor.contact_fenetre_chambre_sonoff_contact
  from: 'off'
  to: 'on'
  id: window_open
- alias: 'FENÊTRES : FERMETURE (RÉTABLISSEMENT)'
  trigger: state
  entity_id:
  - binary_sensor.contact_fenetre_salon_sonoff_contact
  - binary_sensor.contact_fenetre_cuisine_sonoff_contact
  - binary_sensor.contact_fenetre_bureau_sonoff_contact
  - binary_sensor.contact_fenetre_chambre_sonoff_contact
  from: 'on'
  to: 'off'
  id: window_close
- alias: 'ENVIRONNEMENT : MISE À JOUR TEMPÉRATURES OU MODE'
  trigger: state
  entity_id:
  - sensor.th_balcon_nord_temperature
  - sensor.temperature_cible
  - sensor.mode_ete_hiver
  - sensor.temperature_confort_nuit
  id: sensor_update
conditions:
- alias: 'SÉCURITÉ : EXÉCUTION UNIQUEMENT EN PÉRIODE NOCTURNE'
  condition: time
  after: '21:00:00'
  before: 07:30:00
actions:
- alias: 'SÉCURITÉ : ATTENTE INITIALISATION DE TOUS LES CAPTEURS'
  wait_template: "{{ \n  states('sensor.mode_ete_hiver') not in ['unknown', 'unavailable']\
    \ and\n  states('sensor.groupe') not in ['unknown', 'unavailable'] and\n\
    \  states('sensor.temperature_cible') not in ['unknown', 'unavailable'] and\n\
    \  states('sensor.temperature_eco_hiver_corrige') not in ['unknown', 'unavailable']\
    \ and\n  states('sensor.temperature_corrige_mamour_hivers') not in ['unknown',\
    \ 'unavailable'] and\n  states('sensor.temperature_corrige_eric_hivers') not in\
    \ ['unknown', 'unavailable']\n}}\n"
  timeout: 00:00:30
  continue_on_timeout: true
- alias: 'LOGIQUE : VÉRIFICATION DU TIMEOUT'
  choose:
  - alias: 'CAS : ÉCHEC DE L''ATTENTE (TIMEOUT)'
    conditions:
    - alias: 'VÉRIFICATION : LE DÉLAI EST DÉPASSÉ'
      condition: template
      value_template: '{{ not wait.completed }}'
    sequence:
    - alias: 'NOTIF : ALERTE CAPTEURS INDISPONIBLES'
      action: notify.mobile_app_eric
      data:
        title: 'SYSTÈME CLIM : ERREUR ⚠️'
        message: 'L''automatisation a été stoppée.  Capteurs indisponibles après 30s
          de démarrage. Mode: {{ states(''sensor.mode_ete_hiver'') }} Groupe: {{ states(''sensor.groupe'')
          }}

          '
    - stop: 'Fin de l''exécution : Capteurs non prêts.'
- alias: 'INIT : CALCUL GLOBAL DES VARIABLES'
  variables:
    mode_saison: '{% set m = states(''sensor.mode_ete_hiver'') %} {% if m in [''heat'',
      ''cool'', ''fan_only''] %} {{ m | trim }} {% else %} off {% endif %}

      '
    groupe_presence: '{{ states(''sensor.groupe'') }}'
    fenetres_ouvertes: "{{ expand('binary_sensor.contact_fenetre_salon_sonoff_contact',\n\
      \          'binary_sensor.contact_fenetre_cuisine_sonoff_contact',\n       \
      \   'binary_sensor.contact_fenetre_bureau_sonoff_contact',\n          'binary_sensor.contact_fenetre_chambre_sonoff_contact')\n\
      \   | selectattr('state', 'eq', 'on') | list | count > 0 }}\n"
    temp_eco_c: '{{ states(''sensor.temperature_eco_hiver_corrige'') | float(17) }}'
    temp_cible: '{{ states(''sensor.temperature_cible'') | float(0) }}'
    temp_nuit: '{{ states(''sensor.temperature_confort_nuit'') | float(18) }}'
    t_salon_target: '{% if ''groupe_1'' in groupe_presence %} {{ temp_eco_c if mode_saison
      == ''heat'' else temp_cible }} {% else %} {{ temp_nuit }} {% endif %}

      '
    t_bureau_target: '{% if ''groupe_1'' in groupe_presence %} {{ temp_eco_c if mode_saison
      == ''heat'' else temp_cible }} {% else %} {{ temp_nuit }} {% endif %}

      '
    t_chambre_target: '{% if ''groupe_1'' in groupe_presence %} {{ temp_eco_c if mode_saison
      == ''heat'' else temp_cible }} {% else %} {{ temp_nuit }} {% endif %}

      '
- alias: 'LOGIQUE : SÉCURITÉ FENÊTRES VS GESTION STANDARD'
  choose:
  - alias: 'CAS URGENCE : FENÊTRE OUVERTE DÉTECTÉE'
    conditions:
    - condition: template
      value_template: '{{ fenetres_ouvertes }}'
    sequence:
    - alias: 'ACTION : ARRÊT FORCÉ DES UNITÉS CLIM'
      action: climate.set_hvac_mode
      target:
        entity_id:
        - climate.clim_salon_rm4_mini
        - climate.clim_bureau_rm4_mini
        - climate.clim_chambre_rm4_mini
      data:
        hvac_mode: 'off'
    - alias: 'NOTIF : ALERTE DÉTAILLÉE FENÊTRES'
      action: notify.mobile_app_eric
      data:
        title: CLIM NUIT COUPÉE ⚠️
        message: "{% set fenetres = [\n  'binary_sensor.contact_fenetre_salon_sonoff_contact',\n\
          \  'binary_sensor.contact_fenetre_cuisine_sonoff_contact',\n  'binary_sensor.contact_fenetre_bureau_sonoff_contact',\n\
          \  'binary_sensor.contact_fenetre_chambre_sonoff_contact'\n] %} {% set ouverts\
          \ = expand(*fenetres) | selectattr('state', 'eq', 'on') | list %} {% set\
          \ messages = namespace(list=[]) %} {% if ouverts | length > 0 %}\n  {% for\
          \ fenetre in ouverts %}\n    {% set nom_complet = fenetre.name | string\
          \ %}\n    {% set piece = nom_complet | regex_findall_index(find='fenetre\
          \ (.+)', index=0, ignorecase=True) | regex_replace(find=' \\(IKEA\\).*',\
          \ replace='', ignorecase=True) | trim | lower %}\n    {% set art = 'du'\
          \ if piece in ['bureau', 'salon'] else 'de la' %}\n    {% set messages.list\
          \ = messages.list + [\"La fenêtre \" ~ art ~ \" \" ~ piece | upper ~ \"\
          \ est ouverte\"] %}\n  {% endfor %}\n  {{ messages.list | join('\\n') }}\n\
          {% else %}\n  Une fenêtre est ouverte (Détection générique).\n{% endif %}\n"
  default:
  - alias: 'ACTION : ENVOI PARALLÈLE DES COMMANDES NUIT'
    parallel:
    - alias: LOGIQUE SALON
      choose:
      - alias: 'VÉRIFICATION : SÉCURITÉ SALON'
        conditions:
        - condition: state
          entity_id: switch.clim_salon_nous
          state: 'on'
        - condition: state
          entity_id: input_boolean.clim_salon_arret_securise_en_cours
          state: 'off'
        sequence:
        - alias: 'COMMANDE : RÉGLAGE SALON'
          action: climate.set_temperature
          target:
            entity_id: climate.clim_salon_rm4_mini
          data:
            hvac_mode: "{% if trigger is defined and trigger.id == 'sensor_update'\
              \ and is_state('climate.clim_salon_rm4_mini', 'off') %}\n  off\n{% else\
              \ %}\n  {{ mode_saison }}\n{% endif %}"
            temperature: '{{ t_salon_target }}'
    - alias: LOGIQUE BUREAU
      choose:
      - alias: 'VÉRIFICATION : SÉCURITÉ BUREAU'
        conditions:
        - condition: state
          entity_id: switch.clim_bureau_nous
          state: 'on'
        - condition: state
          entity_id: input_boolean.clim_bureau_arret_securise_en_cours
          state: 'off'
        sequence:
        - alias: 'COMMANDE : RÉGLAGE BUREAU'
          action: climate.set_temperature
          target:
            entity_id: climate.clim_bureau_rm4_mini
          data:
            hvac_mode: "{% if trigger is defined and trigger.id == 'sensor_update'\
              \ and is_state('climate.clim_bureau_rm4_mini', 'off') %}\n  off\n{%\
              \ else %}\n  {{ mode_saison }}\n{% endif %}"
            temperature: '{{ t_bureau_target }}'
    - alias: LOGIQUE CHAMBRE
      choose:
      - alias: 'VÉRIFICATION : SÉCURITÉ CHAMBRE'
        conditions:
        - condition: state
          entity_id: switch.clim_chambre_nous
          state: 'on'
        - condition: state
          entity_id: input_boolean.clim_chambre_arret_securise_en_cours
          state: 'off'
        sequence:
        - alias: 'COMMANDE : RÉGLAGE CHAMBRE'
          action: climate.set_temperature
          target:
            entity_id: climate.clim_chambre_rm4_mini
          data:
            hvac_mode: "{% if trigger is defined and trigger.id == 'sensor_update'\
              \ and is_state('climate.clim_chambre_rm4_mini', 'off') %}\n  off\n{%\
              \ else %}\n  {{ mode_saison }}\n{% endif %}"
            temperature: '{{ t_chambre_target }}'
        - alias: 'COMMANDE : VENTILATION AUTO CHAMBRE'
          action: climate.set_fan_mode
          target:
            entity_id: climate.clim_chambre_rm4_mini
          data:
            fan_mode: auto
  - alias: 'PAUSE : SÉCURITÉ RÉCEPTION'
    delay: 00:00:02
  - alias: 'NOTIF : RÉSUMÉ ÉTAT NUIT'
    action: notify.mobile_app_eric
    data:
      title: '[AN] {{ states(''sensor.presence'') }}'
      message: "{%- if 'groupe_1' in groupe_presence and mode_saison == 'heat' %}\n\
        \  [éCO HEAT]\n  Les 3 Clims : {{ temp_eco_c }}° (Absent)\n{% else %}\n  Mode\
        \ : {{ mode_saison | upper }} (NUIT)\n  Salon: {{ t_salon_target }}°\n  Bureau:\
        \ {{ t_bureau_target }}°\n  Chambre: {{ t_chambre_target }}°\n{% endif %}\n"
mode: queued
id: '1775243679316'
alias: (D) Notification température Up ou Down de (21h00 -> 7h30)
description: 'Envoie le message personnalisé de clim si le texte change, OU au début
  de la nuit à 21h00.

  '
triggers:
- alias: 'DÉCLENCHEUR : CAPTEUR TEMPÉRATURE'
  trigger: state
  entity_id: sensor.th_balcon_nord_temperature
- alias: 'DÉCLENCHEUR : HORAIRE FIXE 21H00'
  trigger: time
  at: '21:00:00'
conditions: []
actions:
- alias: 'CONDITION : PÉRIODE NOCTURNE'
  condition: time
  after: '21:00:00'
  before: 07:30:00
- alias: 'ACTION : PAUSE 2 SECONDES'
  delay: 00:00:02
- alias: 'LOGIQUE : VÉRIFICATION CAPTEURS'
  if:
  - condition: template
    value_template: "{{ states('sensor.message_clim_personnalise_21h00_7h30') in
      ['unknown', 'unavailable'] or\n   states('sensor.mamour_wi_fi_connection')
      in ['unknown', 'unavailable'] or\n   states('sensor.eric_wi_fi_connection')
      in ['unknown', 'unavailable'] or\n   states('sensor.th_balcon_nord_temperature')
      in ['unknown', 'unavailable'] }}\n"
  then:
  - alias: 'ACTION : NOTIF ERREUR (MAX 15 CAR)'
    action: notify.mobile_app_eric
    data:
      title: '[ANN] Erreur Capteurs'
      message: 'Erreur: Un capteur TENDANCE est indisponible! Verifiez les dependances.
        # "[L...] modif"'
  else:
  - alias: 'ACTION : NOTIF TENDANCE (MAX 15 CAR)'
    action: notify.mobile_app_eric
    data:
      title: '[Automa. Notif. Nuit]'
      message: '{{ states(''sensor.message_clim_personnalise_21h00_7h30'') }}'
mode: queued

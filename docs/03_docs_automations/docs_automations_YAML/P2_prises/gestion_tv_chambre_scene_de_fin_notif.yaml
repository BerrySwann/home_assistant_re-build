id: '1775330762844'
alias: 'Gestion TV Chambre : Scène de Fin + Notif'
description: 'Éteint les lumières et notifie, mais laisse la prise ON pour le suivi
  conso  lorsqu''une veille est détectée.

  '
triggers:
- id: bouton_mqtt
  trigger: mqtt
  topic: zigbee2mqtt2/Poussoir TV (IKEA TRADFRI)/action
- id: extinction_conso
  trigger: numeric_state
  entity_id: sensor.prise_tv_chambre_nous_power
  below: 20
  for:
    minutes: 2
actions:
- choose:
  - alias: 'ALLUMAGE : Bouton ON'
    conditions:
    - condition: template
      value_template: "{{ trigger.id == 'bouton_mqtt' and trigger.payload == 'on' }}" # [L1] payload_json → payload (topic /action = string directe)
    - condition: state                                                                  # [L2] garde-fou : évite double-allumage
      entity_id: switch.prise_tv_chambre_nous
      state: "off"
    sequence:
    - action: light.turn_on
      target:
        entity_id: light.hue_smart_eco_tv_chambre
    - action: switch.turn_on
      target:
        entity_id: switch.prise_tv_chambre_nous
  - alias: 'EXTINCTION AMBIANCE : Bouton OFF ou Veille (< 20W)'
    conditions:
    - or:
      - condition: template
        value_template: "{{ trigger.id == 'bouton_mqtt' and trigger.payload == 'off' }}" # [L3] payload_json → payload
      - condition: trigger
        id: extinction_conso
    sequence:
    - action: light.turn_off
      target:
        entity_id: light.hue_smart_eco_tv_chambre
    - action: notify.mobile_app_eric
      data:
        title: Veille détectée
        message: Prise TV [OFF]
        data:
          icon: mdi:eye-outline
          tag: notif_tv_chambre
mode: single # [L4] parallel → single

alias: "ECO. PRISES DINAMIQUE -> By-Présence/Groupe"
description: >
  Pilotage des prises selon le groupe de présence (G1 à G4).
  La liste des prises et leurs groupes est externalisée dans :
  templates/P2_prise/P2_eco_prises_config.yaml
  Ajouter une prise = 1 entrée dans ce fichier + recharger templates.
mode: queued

triggers:
  - trigger: state
    entity_id: sensor.groupe
    id: groupe_change
    alias: DÉCLENCHEUR — Changement de groupe

actions:
  - alias: VARIABLES — Groupe actif + liste des prises (source externe)
    variables:
      g: "{{ states('sensor.groupe') }}"
      prises: "{{ state_attr('sensor.eco_prises_config', 'prises') | from_json }}"  # "[modif] + from_json — attribut sérialisé en tojson dans la config"

  - alias: ACTION — ON/OFF chaque prise selon groupe
    repeat:
      for_each: "{{ prises }}"
      sequence:
        - choose:
            - conditions: "{{ g in repeat.item.groupes }}"
              sequence:
                - action: homeassistant.turn_on
                  target:
                    entity_id: "{{ repeat.item.entity }}"
          default:
            - action: homeassistant.turn_off
              target:
                entity_id: "{{ repeat.item.entity }}"

  - alias: ACTION — Notification résumé prises
    action: notify.mobile_app_eric
    data:
      title: "ECO PRISES: {{ g | upper }}"
      message: >
        {% set count_on = namespace(value=0) %}
        {% for p in prises %}
          {% if states(p.entity) == 'on' %}
            {% set count_on.value = count_on.value + 1 %}
          {% endif %}
        {% endfor %}
        [{{ count_on.value }}/{{ prises | count }}] prises ON

# annotations_log:
# [refacto] liste prises externalisée → sensor.eco_prises_config (P2_eco_prises_config.yaml)
# [refacto] N variables → 1 variable 'prises' lue depuis state_attr
# [refacto] N actions → repeat:for_each + homeassistant.turn_on/off (domain-agnostic)
# [refacto] notif : [X/N] prises ON — total visible
# [supprimé] variable pc_active (jamais utilisée dans les actions)
# [2026-05-10 modif] prises: + from_json — attribut sérialisé tojson dans sensor.eco_prises_config

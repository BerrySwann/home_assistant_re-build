id: '1766772095341'
alias: (G) (CLIM) Automatisation Arrêt Clim Notification
description: 'Notification quand une clim est coupée manuellement, seulement si fenêtres fermées et prises actives.\n'
triggers:
- trigger: state
  entity_id:
  - climate.clim_salon_rm4_mini
  - climate.clim_bureau_rm4_mini
  - climate.clim_chambre_rm4_mini
  to: 'off'
conditions:
- condition: state
  entity_id: switch.clim_salon_nous
  state: 'on'
- condition: state
  entity_id: switch.clim_bureau_nous
  state: 'on'
- condition: state
  entity_id: switch.clim_chambre_nous
  state: 'on'
- condition: state
  entity_id: binary_sensor.contact_fenetre_salon_sonoff_contact
  state: 'off'
- condition: state
  entity_id: binary_sensor.contact_fenetre_cuisine_sonoff_contact
  state: 'off'
- condition: state
  entity_id: binary_sensor.contact_fenetre_bureau_sonoff_contact
  state: 'off'
- condition: state
  entity_id: binary_sensor.contact_fenetre_chambre_sonoff_contact
  state: 'off'
actions:
- action: notify.mobile_app_eric
  data:
    title: ARRÊT CLIM
    message: "{% set pieces = {\n  'climate.clim_salon_rm4_mini': 'du Salon',\n  'climate.clim_bureau_rm4_mini':\
      \ 'du Bureau',\n  'climate.clim_chambre_rm4_mini': 'de la Chambre'\n} %} La\
      \ clim. {{ pieces.get(trigger.entity_id, 'inconnue') }} a été coupée.\n"
mode: queued
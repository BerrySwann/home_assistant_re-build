alias: "[P3-Salon] Bouton IKEA SOMRIG — ON/OFF Lumière Salon"
description: >
  Pilotage de input_boolean.inter_lumiere_salon via le bouton IKEA SOMRIG (2 touches).
  Topic MQTT : zigbee2mqtt/Inter (SOMRIG)/action
  1_short_release -> input_boolean.turn_on | 2_short_release -> input_boolean.turn_off
triggers:
  - trigger: mqtt
    options:
      topic: zigbee2mqtt/Inter (SOMRIG)/action
conditions: []
actions:
  - choose:
      - alias: "1_SHORT_RELEASE — ON"
        conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action == '1_short_release' }}"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.inter_lumiere_salon
            data: {}
      - alias: "2_SHORT_RELEASE — OFF"
        conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action == '2_short_release' }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.inter_lumiere_salon
            data: {}
mode: restart

id: '1776624322644'
alias: VEILLE GITHUB — Nouvelle release détectée
description: 'Surveille les flux Feedreader GitHub (HA core + HACS + cartes HACS).
  Envoie une notif Telegram à chaque nouvelle release. Double notif si le titre
  contient un breaking change / deprecation.

  '
triggers:
- event_type: feedreader_entry_added
  alias: DÉCLENCHEUR — Nouvelle entrée Feedreader
  trigger: event
conditions: []
actions:
- alias: VARIABLES — Extraire titre + lien + source
  variables:
    titre: '{{ trigger.event.data.title | default(''Sans titre'') }}'
    lien: '{{ trigger.event.data.link | default('''') }}'
    source: '{{ trigger.event.data.feed_url | default('''') }}'
    est_breaking: '{{ (''breaking'' in titre | lower) or (''deprecated'' in titre
      | lower) or (''removed'' in titre | lower) or (''breaking'' in (trigger.event.data.summary
      | default('''') | lower)) or (''deprecated'' in (trigger.event.data.summary
      | default('''') | lower)) }}

      '
- alias: ACTION — Notif standard (toutes releases)
  data:
    title: RELEASE GITHUB
    message: '{{ source.split(''github.com/'')[1].split(''/releases'')[0] if ''github.com''
      in source else source }} >> {{ titre[:80] }} Lien: {{ lien }}

      '
  action: notify.mobile_app_eric
- alias: CONDITION — Breaking change détecté ?
  if:
  - condition: template
    value_template: '{{ est_breaking }}'
  then:
  - alias: ACTION — Notif alerte breaking change
    data:
      title: '! BREAKING CHANGE !'
      message: '[ATTENTION] {{ source.split(''github.com/'')[1].split(''/releases'')[0]
        if ''github.com'' in source else source }} >> {{ titre[:80] }} Verifie avant
        de mettre a jour ! Lien: {{ lien }}

        '
    action: notify.mobile_app_eric
mode: queued
max: 10

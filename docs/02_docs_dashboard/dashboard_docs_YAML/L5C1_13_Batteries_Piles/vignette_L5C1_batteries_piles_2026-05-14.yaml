          return entity && entity.state && parseInt(entity.state) <= upperBound && parseInt(entity.state) > lowerBound;
        }).length;
      }
      function getStyledCount(count) {
        if (count > 0) {
          return `<span style="color: #FFA500;">${count}</span>`;
        }
        return count;
      }
      var hue50_25   = getStyledCount(countBatteriesInRange('group.hue_devices',   24, 49)); // "[L141] modif: lo 26→24, up 50→49"
      var ikea50_25  = getStyledCount(countBatteriesInRange('group.ikea_devices',  24, 49)); // "[L142] modif: lo 26→24, up 50→49"
      var sonoff50_25 = getStyledCount(countBatteriesInRange('group.sonoff_devices',24, 49)); // "[L143] modif: lo 26→24, up 50→49"
      return `
      <div>
        <div>${hue50_25}</div>
        <div>${ikea50_25}</div>
        <div>${sonoff50_25}</div>
      </div>
      `;
    ]]]
  25_0_battery: |
    [[[
      function countBatteriesInRange(groupName, lowerBound, upperBound) {
        var group = states[groupName];
        if (!group) return 0;
        return group.attributes.entity_id.filter(entityId => {

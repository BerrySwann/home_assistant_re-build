        return count;
      }
      var hue25_0   = getStyledCount(countBatteriesInRange('group.hue_devices',   -1, 24)); // "[L161] modif: lo 0→-1, up 25→24"
      var ikea25_0  = getStyledCount(countBatteriesInRange('group.ikea_devices',  -1, 24)); // "[L162] modif: lo 0→-1, up 25→24"
      var sonoff25_0 = getStyledCount(countBatteriesInRange('group.sonoff_devices',-1, 24)); // "[L163] modif: lo 0→-1, up 25→24"
      return `
      <div>
        <div>${hue25_0}</div>
        <div>${ikea25_0}</div>
        <div>${sonoff25_0}</div>
      </div>
      `;
    ]]]
  espace_fin: |
    [[[
      return '----------------------------------------';
    ]]]

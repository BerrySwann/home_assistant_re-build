type: custom:button-card
tap_action:
  action: navigate
  navigation_path: /dashboard-tablette/air-quality
styles:
  card:
    - aspect-ratio: 1/1
    - border-radius: 10px
    - background: transparent
    - border-width: 3px
    - border-color: white
    - border-style: double
    - color: white
    - font-size: 11px
    - line-height: 1.2
  grid:
    - grid-template-areas: |
        "titre titre titre"
        "espace_debut espace_debut espace_debut"
        "piece_pm25_salon type_pm25_salon value_pm25_salon"
        "piece_pm25_bureau type_pm25_bureau value_pm25_bureau"
        "piece_pm25_chambre type_pm25_chambre value_pm25_chambre"
        "piece_tcov_salon type_tcov_salon value_tcov_salon"
        "piece_tcov_bureau type_tcov_bureau value_tcov_bureau"
        "piece_tcov_chambre type_tcov_chambre value_tcov_chambre"
        "espace_fin espace_fin espace_fin"
    - grid-template-columns: 1fr 1fr 1fr
    - grid-template-rows: auto
    - margin-top: 4.5px
  custom_fields:
    titre:
      - grid-area: title
      - justify-self: center
      - text-align: center
      - font-weight: bold
    espace_debut:
      - grid-area: espace_debut
      - height: 10px
    piece_pm25_salon:
      - text-align: center
      - justify-self: start
      - margin-left: 4px
    piece_pm25_bureau:
      - justify-self: start
      - margin-left: 4px
    piece_pm25_chambre:
      - text-align: center
      - justify-self: start
      - margin-left: 4px
    piece_tcov_salon:
      - text-align: center
      - justify-self: start
      - margin-left: 4px
    piece_tcov_bureau:
      - text-align: center
      - justify-self: start
      - margin-left: 4px
    piece_tcov_chambre:
      - text-align: center
      - justify-self: start
      - margin-left: 4px
    type_pm25_salon:
      - text-align: center
      - justify-self: start
      - margin-left: 6px
    type_pm25_bureau:
      - text-align: center
      - justify-self: start
      - margin-left: 6px
    type_pm25_chambre:
      - text-align: center
      - justify-self: start
      - margin-left: 6px
    type_tcov_salon:
      - text-align: center
      - justify-self: start
      - margin-left: 7px
    type_tcov_bureau:
      - text-align: center
      - justify-self: start
      - margin-left: 7px
    type_tcov_chambre:
      - text-align: center
      - justify-self: start
      - margin-left: 7px
    value_pm25_salon:
      - text-align: center
      - justify-self: end
      - margin-right: 8px
    value_pm25_bureau:
      - text-align: center
      - justify-self: end
      - margin-right: 8px
    value_pm25_chambre:
      - text-align: center
      - justify-self: end
      - margin-right: 8px
    value_tcov_salon:
      - text-align: center
      - justify-self: end
      - margin-right: 14px
    value_tcov_bureau:
      - text-align: center
      - justify-self: end
      - margin-right: 15px
    value_tcov_chambre:
      - text-align: center
      - justify-self: end
      - margin-right: 14px
    espace_fin:
      - grid-area: espace_fin
      - height: 10px
custom_fields:
  titre: |
    [[[
      return 'Qualité de l\'Air ambiant';
    ]]]
  espace_debut: |
    [[[
      return ' ';
    ]]]
  piece_pm25_salon: |
    [[[
      var state = states['sensor.qualite_air_salon_ikea_pm25'];
      var pm25Value = state ? state.state : 'unavailable';
      var color = (pm25Value == 'unknown' || pm25Value == 'unavailable' || pm25Value === '') ? '#808080' :
                  (parseFloat(pm25Value) > 35 ? 'rgb(244,67,54)' :
                   parseFloat(pm25Value) > 11 ? 'orange' : 'white');
      return '<span style="color: ' + color + ';">Salon</span>';
    ]]]
  piece_pm25_bureau: |
    [[[
      var state = states['sensor.qualite_air_bureau_ikea_pm25'];

type: grid
cards:
- type: heading
  icon: mdi:virus-outline
  heading: AIR QUALITY
  heading_style: title
  badges: []
  tap_action:
    action: navigate
    navigation_path: /dashboard-tablette/0
  layout_options:
    grid_columns: full
    grid_rows: 1
- type: custom:bubble-card
  card_type: separator
  name: SALON
  icon: mdi:sofa
  rows: 2
  styles: |-
    .bubble-line {
      background: var(--primary-text-color);
      opacity: 1;
    }
  card_layout: normal
- type: custom:streamline-card
  template: pm25_ring-tile
  variables:
    card_name: PM2.5 du Salon
    entity: sensor.qualite_air_salon_ikea_pm25
    marker2: sensor.pm2_5_salon_moy_24h
  grid_options:
    columns: 6
    rows: auto
- type: custom:streamline-card
  template: cov_ring-tile
  variables:
    card_name: tCOV du Salon
    entity: sensor.tcov_salon_ppb
    marker2: sensor.tcov_salon_moy_24h
  grid_options:
    columns: 6
    rows: auto
- type: custom:bubble-card
  card_type: button
  button_type: state
  entity: sensor.qualite_air_salon_ikea_pm25
  name: Graph. PM2.5 Salon
  icon: mdi:open-in-new
  show_state: true
  tap_action:
    action: navigate
    navigation_path: "#spm25"
  styles: |
    .bubble-card, .bubble-button-background {
      background: transparent !important;
      border: none !important; box-shadow: none !important;
    }
  grid_options:
    columns: 6
    rows: auto
  show_attribute: false
  show_icon: true
  button_action:
    tap_action:
      action: navigate
      navigation_path: "#spm25"
  card_mod:
    style: |
      ha-card {
        margin-top:-30px;
      }
- type: custom:bubble-card
  card_type: button
  button_type: state
  entity: sensor.tcov_salon_ppb
  name: Graph. tCOV Salon

  card_mod:
    style: |
      ha-card {
        margin-top:-30px;
      }
- type: custom:bubble-card
  card_type: pop-up
  hash: "#spm25"
  show_header: true
  force_icon: false
  show_state: false
  show_last_changed: false
  show_attribute: false
  button_type: name
  name: Air Quality SALON
  icon: mdi:air-filter
  show_icon: true
  show_name: true
  card_layout: normal
  hide_backdrop: false
  close_on_click: false
  bg_opacity: "0"
  cards:
  - type: custom:streamline-card
    template: pm25
    variables:
      entity_sensor: sensor.qualite_air_salon_ikea_pm25
      mean_24h_entity: sensor.pm2_5_salon_moy_24h

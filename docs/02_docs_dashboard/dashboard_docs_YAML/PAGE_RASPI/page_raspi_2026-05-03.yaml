  - type: custom:stack-in-card
    mode: vertical
    cards:
      - type: custom:uptime-card
        entity: binary_sensor.rpi_power_status
        title_template: Raspberry Pi4 Power
        ok: "off"
        ko: "on"
        bar:
          amount: 48
          round: 1
          height: 30
        hours_to_show: 48
        init:
          animation: raise
        color:
          ko: rgb(250, 0, 1)
          ok: green
        title_adaptive_color: false
        icon_adaptive_color: false
        tooltip_adaptive_color: true
        status_adaptive_color: true
        show:
          header: true
          title: false
          icon: false
          timeline: true
          footer: true
          average: true
        tooltip:
          hour48: true
          animation: true
        alias:
          ok: Raspberry Pi4 Power - OK
          ko: Raspberry Pi4 Power - Danger
        tap_action:
          action: more-info
        alignment:
          icon_first: false
          status: center
          tooltip_first: true
          header: spaced
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: 16.75% 16.75% 16.75% 16.75% 16.75% 16.75%
      grid-template-rows: 100%
      grid-template-areas: |
        "zone1 zone2 zone3 zone4 zone5 zone6"

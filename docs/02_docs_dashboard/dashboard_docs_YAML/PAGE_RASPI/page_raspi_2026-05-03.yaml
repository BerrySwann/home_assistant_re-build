                icon: mdi:cpu-64-bit
                color: rgb(68, 115, 158)
                height: 40px
                min: "0"
                max: "100"
                target: "75"
            animation:
              state: "on"
            positions:
              icon: inside
              indicator: inside
            entity_row: true
            card_mod:
              style: |
                ha-card {
                  font-weight: bold;
                  font-size:12px;
                  margin-top: 0px;
                  margin-left: 0px;
                  margin-right: 0px;
                  background: none;
                  --mdc-icon-size: 30px;
                  --paper-item-icon-color: white;
                  color: white !important;
                }
                bar-card-currentbar, bar-card-backgroundbar {
                  border: none !important;
                  box-shadow: none !important;
                }
    layout_options:
      grid_columns: 2
      grid_rows: 1

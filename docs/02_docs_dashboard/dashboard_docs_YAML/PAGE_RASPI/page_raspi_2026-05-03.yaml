type: grid
cards:
  - type: custom:stack-in-card
    mode: vertical
    cards:
      - type: picture
        image: /local/images/RPi4B3.png
  - type: custom:stack-in-card
    mode: vertical
    cards:
      - type: custom:stack-in-card
        mode: horizontal
        cards:
          - type: custom:mushroom-template-card
            primary: "IP Int. / Ext.:"
            secondary: " "
            icon: mdi:ip
            icon_color: white
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
          - type: custom:mushroom-template-card
            primary: "{{ states(\"sensor.local_ip\") }}"
            secondary: " "
            icon: mdi:ip-network
            icon_color: white
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.myip') }}"
            secondary: ""
            icon: mdi:wan
            icon_color: white
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }
      - type: custom:stack-in-card
        mode: horizontal
        cards:
          - type: custom:mushroom-template-card
            primary: "Uptime:"
            secondary: " "
            icon: mdi:clock-outline
            icon_color: white
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
          - type: custom:mushroom-template-card
            primary: " "
            secondary: >-
              {% set uptime = (now()|as_timestamp -
              states('sensor.system_monitor_dernier_demarrage')|as_timestamp) %}
              {% set jours = (uptime / 86400) | int(0) %} {%- if jours > 0 -%}
              {{ jours }}d {{ (uptime - (jours * 86400)) | int(0) |
              timestamp_custom('%Hh %Mm', false) }} {%- else -%} {{ uptime |
              int(0) | timestamp_custom('%Hh %Mm', false) }} {%- endif -%}
            icon: mdi:clock-start
            icon_color: white
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    margin-left: -79px;
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }
      - type: custom:stack-in-card
        mode: horizontal
        cards:
          - type: custom:mushroom-template-card
            entity: fan.rpi_cooling_fan
            primary: RPI Fan
            secondary: " "
            icon: mdi:fan
            icon_color: white
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    --icon-size: 30px;
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    {% if is_state('fan.rpi_cooling_fan', 'on') %}
                      --icon-color: green;
                    {% else %}
                      --icon-color: red;
                    {% endif %}
                  }
                .: |
                  ha-state-icon {
                    {% if is_state('fan.rpi_cooling_fan', 'on') %}
                    animation: rotation 2s linear infinite;
                    {% else %}
                    animation: none;
                    {% endif %}
                  }
                  @keyframes rotation {
                    0% {transform: rotate(0deg);}
                    100% {transform: rotate(359deg);}
                  }
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
          - type: custom:mushroom-template-card
            entity: fan.rpi_cooling_fan
            primary: " "
            secondary: >-
              {% if is_state('fan.rpi_cooling_fan', 'on') %} Allumé {% else %}
              Éteint {% endif %}
            icon: >-
              {% if is_state('fan.rpi_cooling_fan', 'on') %} mdi:toggle-switch
              {% else %} mdi:toggle-switch-off {% endif %}
            icon_color: >-
              {% if is_state('fan.rpi_cooling_fan', 'on') %} green {% else %}
              red {% endif %}
            tap_action:
              action: toggle
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
          - type: custom:mushroom-template-card
            primary: " "
            secondary: "{{ state_attr('fan.rpi_cooling_fan', 'percentage') }} %"
            icon: >-
              {% if is_state('fan.rpi_cooling_fan', 'on') %} mdi:fan {% else %}
              mdi:fan-off {% endif %}
            icon_color: >-
              {% if is_state('fan.rpi_cooling_fan', 'on') %} green {% else %}
              red {% endif %}
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
        }
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: separator
        name: ""
        rows: 2
        styles: |-
          .bubble-line {
          background: var(--primary-text-color);
          opacity: 1;
          }

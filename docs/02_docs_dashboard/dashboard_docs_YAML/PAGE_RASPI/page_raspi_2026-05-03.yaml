      - type: custom:button-card
        fill_container: true
        view_layout:
          grid-area: zone1
        name: Lent
        icon: mdi:fan
        label: 30%
        show_label: true
        tap_action:
          action: call-service
          service: fan.set_percentage
          service_data:
            entity_id: fan.rpi_cooling_fan
            percentage: 30
        styles:
          grid:
            - grid-template-areas: "\"i\" \"n\" \"l\""
            - grid-template-rows: min-content min-content 1fr
          card:
            - aspect-ratio: 1/1.5
            - background-color: rgb(255,255,255)
          icon:
            - color: |
                [[[
                  if (states['fan.rpi_cooling_fan'].state == "off")
                    return "rgb(255,0,0)";
                  if (states['fan.rpi_cooling_fan'].attributes.percentage == 30)
                    return "lightblue";
                  else
                    return "rgb(128,128,128)";
                ]]]
            - width: 70%
            - animation: |
                [[[
                  if (states['fan.rpi_cooling_fan'].state == "off")
                    return "none";
                  if (states['fan.rpi_cooling_fan'].attributes.percentage == 30)
                    return "rotating 3s linear infinite";
                ]]]

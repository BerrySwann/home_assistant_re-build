# card_lave_vaisselle_home_2026-06-13.yaml
# Lave-vaisselle (mushroom-entity-card animée) — HOME page
# Visible si : sensor.prise_lave_vaisselle_nous_power > 50 W
# Animation : dishwasher-swash (oscillation scale+rotate 1.5s) si puissance > 5W
# Source puissance : NOUS SP via Z2M (P2_prise)
# Tap : toggle

type: custom:mushroom-entity-card
entity: sensor.prise_lave_vaisselle_nous_power
tap_action:
  action: toggle
icon: mdi:dishwasher
icon_color: blue
name: Lave-vaisselle
card_mod:
  style:
    mushroom-shape-icon$: |
      .shape {
        {% set use_number      = true %}
        {% set number_entity   = 'sensor.prise_lave_vaisselle_nous_power' %}
        {% set number_operator = '>' %}
        {% set threshold       = 5.0 %}
        {% if use_number %}
          {% set num = states(number_entity) | float(0) %}
          {% if number_operator == '>' %}
            {% set trigger_active = (num > threshold) %}
          {% elif number_operator == '<' %}
            {% set trigger_active = (num < threshold) %}
          {% elif number_operator == '=' %}
            {% set trigger_active = (num == threshold) %}
          {% elif number_operator == '>=' %}
            {% set trigger_active = (num >= threshold) %}
          {% elif number_operator == '<=' %}
            {% set trigger_active = (num <= threshold) %}
          {% else %}
            {% set trigger_active = false %}
          {% endif %}
        {% else %}
          {% set state_entity = 'switch.plug_6_local' %}
          {% set active_value = 'on' %}
          {% set trigger_active = (states(state_entity) == active_value) %}
        {% endif %}
        {% if trigger_active %}
          --shape-animation: dishwasher-swash 1.5s ease-in-out infinite;
          opacity: 1;
        {% else %}
          --shape-animation: none;
          opacity: 0.8;
        {% endif %}
        transform-origin: 50% 55%;
      }
      @keyframes dishwasher-swash {
        0% {
          transform: scale(1) rotate(0deg);
          box-shadow: 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.8), 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.3);
          filter: blur(0);
        }
        25% {
          transform: scale(1.03) rotate(10deg);
          box-shadow: 0 0 10px 3px rgba(var(--rgb-{{ config.icon_color }}), 0.9), 0 0 18px 8px rgba(var(--rgb-{{ config.icon_color }}), 0.3);
          filter: blur(0.4px);
        }
        50% {
          transform: scale(0.98) rotate(-15deg);
          box-shadow: 0 0 14px 6px rgba(var(--rgb-{{ config.icon_color }}), 0.7), 0 0 26px 12px rgba(var(--rgb-{{ config.icon_color }}), 0.2);
          filter: blur(0.6px);
        }
        75% {
          transform: scale(1.04) rotate(15deg);
          box-shadow: 0 0 10px 3px rgba(var(--rgb-{{ config.icon_color }}), 0.9), 0 0 18px 8px rgba(var(--rgb-{{ config.icon_color }}), 0.3);
          filter: blur(0.4px);
        }
        100% {
          transform: scale(1) rotate(0deg);
          box-shadow: 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.0), 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.0);
          filter: blur(0);
        }
      }
    .: |
      mushroom-shape-icon {
        --icon-size: 65px;
        display: flex;
        margin: -18px 0 10px -20px !important;
        padding-right: 10px;
      }
      ha-card {
        clip-path: inset(0 0 0 0 round var(--ha-card-border-radius, 12px));
        background: none !important;
        box-shadow: none !important;
        border: none !important;
      }
grid_options:
  columns: 6
  rows: 2
visibility:
  - condition: numeric_state
    entity: sensor.prise_lave_vaisselle_nous_power
    above: 50

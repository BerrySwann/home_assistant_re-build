# card_detecteur_fuite_home_2026-06-13.yaml
# Détecteur de fuite sous évier cuisine — HOME page (mushroom-entity-card)
# Visible si : binary_sensor.detecteur_de_fuite_ikea_water_leak = on | unavailable | unknown
# Layout : vertical, pleine largeur (columns: 12)
# Aucune action tap/hold/double_tap
# Entité : IKEA Vallhorn Water Sensor via Z2M

type: custom:mushroom-entity-card
entity: binary_sensor.detecteur_de_fuite_ikea_water_leak
name: Détecteur de fuite sous évier cuisine
fill_container: true
primary_info: name
hold_action:
  action: none
double_tap_action:
  action: none
tap_action:
  action: none
grid_options:
  columns: 12
  rows: 2
visibility:
  - condition: state
    entity: binary_sensor.detecteur_de_fuite_ikea_water_leak
    state: "on"
  - condition: state
    entity: binary_sensor.detecteur_de_fuite_ikea_water_leak
    state: unavailable
  - condition: state
    entity: binary_sensor.detecteur_de_fuite_ikea_water_leak
    state: unknown
layout: vertical
card_mod:
  style: |
    ha-card {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
    }

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │           VIGNETTE L4C2 — MINI-PC (NUC) + PROXMOX VM HOMEASSISTANT          │
# ╰──────────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Carte de monitoring complet du Mini-PC Intel NUC hébergeant HA sous Proxmox.
# Deux vues complémentaires :
#   - System Monitor = vue hôte invité (guest, intérieur VM)
#   - Proxmox VE     = vue hyperviseur (niveau VM, extérieur VM)
#
# ## ⚠️ CORRECTIONS APPORTÉES vs version 2026-05-10 :
#   - RAM max corrigé : 16384/16348 MiB → 8192 MiB (VM allouée = 8 Go)
#   - Disque corrigé  : max 524 GiB → 32 GiB (disque VM = 32 Go, pas le SSD 512Go)
#   - Entité disque   : sensor.system_monitor_utilisation_du_disque (%) →
#                       sensor.system_monitor_espace_utilise (GiB) pour cohérence
#   - Seuils popup disque  : 7500/10000 → 20/28 GiB
#   - Seuils popup mémoire : 14000/15000 → 6144/7168 MiB
#   - Titre popup mémoire  : "MEMOIRE (16Go)" → "MEMOIRE (8 Go)"
#   - Ajout section statut VM Proxmox (CPU%, Mem%, Network, Status)
#   - Ajout barres PVE CPU% + PVE Mem% (vue hyperviseur)
#   - Ajout série PVE dans popup #speed (dual view)
#   - Ajout sensor.proxmox_carte_mere dans popup #temp
#
# ## ⚠️ ENTITY IDs PROXMOX VM — À VÉRIFIER DANS HA
# Les entités marquées [PVE] dépendent du nom du nœud + ID de la VM HomeAssistant.
# Aller dans : Paramètres > Appareils & Services > Proxmox VE > VM HomeAssistant
# Et remplacer les entity_id [PVE] par les vrais identifiants affichés dans HA.
#
# Entités [PVE] utilisées (noms les plus courants — à adapter) :
#   binary_sensor.homeassistant_running           → Statut VM (on/off)
#   sensor.homeassistant_cpu_usage                → CPU VM % (vue hyperviseur)
#   sensor.homeassistant_memory_usage_percentage  → Mémoire VM % (vue hyperviseur)
#   sensor.homeassistant_memory_used              → Mémoire VM GiB utilisée
#   sensor.homeassistant_network_in               → Trafic réseau entrant cumulatif (GiB)
#   sensor.homeassistant_network_out              → Trafic réseau sortant cumulatif (GiB)
#
# ## 🖥️ TABLEAU DE BORD : L4C2 Mini PC (NUC)
# ─────────────────────────────────────────────────────────────────────────────

type: grid
cards:
  - type: heading
    icon: phu:intel-nuc
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1
    heading: Mini - P.C.

  - type: vertical-stack
    cards:

      # ── IMAGE + IP + UPTIME ──────────────────────────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: picture
            image: /local/images/mini pc.png
            card_mod:
              style: |
                ha-card {
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                }

          - type: custom:stack-in-card
            mode: horizontal
            cards:
              - type: custom:mushroom-template-card
                primary: "IP Int. / Ext.:"
                secondary: " "
                icon: mdi:ip
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.local_ip') }}"
                secondary: " "
                icon: mdi:ip-network
                icon_color: white
                tap_action:
                  action: navigate
                  navigation_path: "#temp"
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        margin-left: 0px;
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.ip_externe') }}"
                secondary: ""
                icon: mdi:wan
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        margin-left: -20px;
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
            card_mod:
              style: |
                ha-card {
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                }

          - type: custom:stack-in-card
            mode: horizontal
            cards:
              - type: custom:mushroom-template-card
                primary: "Uptime:"
                secondary: " "
                icon: mdi:clock-outline
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
              - type: custom:mushroom-template-card
                primary: >-
                  {% set uptime = (now()|as_timestamp -
                  states('sensor.system_monitor_dernier_demarrage')|as_timestamp)
                  %} {% set jours = (uptime / 86400) | int(0) %} {%- if jours >
                  0 -%} {{ jours }}d {{ (uptime - (jours * 86400)) | int(0) |
                  timestamp_custom('%Hh %Mm', false) }} {%- else -%} {{ uptime |
                  int(0) | timestamp_custom('%Hh %Mm', false) }} {%- endif -%}
                secondary: ""
                icon: mdi:clock-start
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        margin-left: -100px;
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
            card_mod:
              style: |
                ha-card {
                  margin-top: -15px;
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                }
        card_mod:
          style: |
            ha-card {
              margin-top: -15px;
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }

      # ── PROXMOX VM — STATUT + RÉSEAU CUMULATIF ──────────────────────────────
      # ⚠️ entity_id [PVE] à vérifier (voir entête du fichier)
      - type: custom:stack-in-card
        mode: horizontal
        cards:
          - type: custom:mushroom-template-card
            primary: >-
              VM HA :
              {% if is_state('binary_sensor.homeassistant_running', 'on') %}
                En cours
              {% else %}
                Arrêtée
              {% endif %}
            secondary: "Proxmox VE"
            icon: >-
              {% if is_state('binary_sensor.homeassistant_running', 'on') %}
                mdi:server-network
              {% else %}
                mdi:server-network-off
              {% endif %}
            icon_color: >-
              {% if is_state('binary_sensor.homeassistant_running', 'on') %}
                green
              {% else %}
                red
              {% endif %}
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
          - type: custom:mushroom-template-card
            primary: >-
              Mem: {{ states('sensor.homeassistant_memory_used') | round(1) }} GiB
            secondary: >-
              Net ↓{{ states('sensor.homeassistant_network_in') | round(2) }}
              ↑{{ states('sensor.homeassistant_network_out') | round(2) }} GiB
            icon: mdi:server
            icon_color: cyan
            tap_action:
              action: none
            card_mod:
              style:
                mushroom-shape-icon$: |
                  .shape {
                    border: 2px rgba(255,255,255,0.5) outset;
                    --shape-color: rgba(0,0,0,1.0) !important;
                    --icon-size: 30px;
                  }
                .: |
                  ha-card {
                    background: none !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }

      # ── PROXMOX VM — CPU % + MEM % (vue hyperviseur) ────────────────────────
      # ⚠️ entity_id [PVE] à vérifier (voir entête du fichier)
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entities:
                  - entity: sensor.homeassistant_cpu_usage  # [PVE] ⚠️ À VÉRIFIER
                    name: PVE CPU %
                    icon: mdi:server
                    color: rgb(149,117,205)
                    height: 40px
                    min: 0
                    max: 100
                    target: 80
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                severity:
                  - color: rgb(149,117,205)
                    from: 0
                    to: 74
                  - color: rgb(255,193,7)
                    from: 75
                    to: 89
                  - color: rgb(244,67,54)
                    from: 90
                    to: 100
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
              - type: custom:bar-card
                entities:
                  - entity: sensor.homeassistant_memory_usage_percentage  # [PVE] ⚠️ À VÉRIFIER
                    name: PVE Mem %
                    icon: mdi:memory
                    color: rgb(149,117,205)
                    height: 40px
                    min: 0
                    max: 100
                    target: 75
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                severity:
                  - color: rgb(149,117,205)
                    from: 0
                    to: 74
                  - color: rgb(255,193,7)
                    from: 75
                    to: 89
                  - color: rgb(244,67,54)
                    from: 90
                    to: 100
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }

      # ── CPU USED (System Monitor) + CPU TEMP (Proxmox) ──────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entities:
                  - entity: sensor.system_monitor_utilisation_du_processeur
                    name: CPU USED
                    icon: mdi:cpu-64-bit
                    color: rgb(68,115,158)
                    height: 40px
                    min: 0
                    max: 100
                    target: 82
                animation:
                  state: "off"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                tap_action:
                  action: none
                hold_action:
                  action: none
                double_tap_action:
                  action: none
                severity:
                  - color: rgb(68,115,158)
                    from: 0
                    to: 74
                  - color: rgb(255,193,7)
                    from: 75
                    to: 79
                  - color: rgb(244,67,54)
                    from: 90
                    to: 100
                card_mod:
                  style: >
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
              - type: custom:bar-card
                entities:
                  - entity: sensor.proxmox_cpu_package
                    name: CPU Temp.
                    icon: mdi:thermometer
                    color: rgb(255,193,7)
                    height: 40px
                    min: 0
                    max: 100
                    target: 75
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                tap_action:
                  action: none
                hold_action:
                  action: none
                double_tap_action:
                  action: none
                severity:
                  - color: rgb(255,193,7)
                    from: 0
                    to: 64
                  - color: rgb(255,152,1)
                    from: 65
                    to: 74
                  - color: rgb(244,67,54)
                    from: 75
                    to: 100
                card_mod:
                  style: >
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white !important;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
        card_mod:
          style: >
            ha-card { background: none !important; box-shadow: none !important;
            border: none !important; }

      # ── MÉMOIRE (8 GiB) — % + USED + FREE ──────────────────────────────────
      # [CORRIGÉ] max: 16384 → 8192 MiB (VM allouée = 8 Go)
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                tap_action:
                  action: navigate
                  navigation_path: "#memory"
                double_tap_action:
                  action: none
                hold_action:
                  action: none
                entities:
                  - entity: sensor.system_monitor_utilisation_de_la_memoire
                    name: Mem.
                    icon: mdi:memory
                    color: rgb(81,140,67)
                    height: 40px
                    min: 0
                    max: 100
                    target: 65
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                severity:
                  - color: rgb(81,140,67)
                    from: 0
                    to: 74
                  - color: rgb(255,152,1)
                    from: 75
                    to: 79
                  - color: rgb(244,67,54)
                    from: 80
                    to: 100
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      background: none !important;
                      border: none !important;
                      box-shadow: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
              - type: custom:bar-card
                tap_action:
                  action: navigate
                  navigation_path: "#memory"
                double_tap_action:
                  action: none
                hold_action:
                  action: none
                entities:
                  - entity: sensor.system_monitor_memoire_utilisee
                    name: USED
                    color: rgb(244,67,54)
                    height: 40px
                    min: 0
                    max: 8192   # [CORRIGÉ] 16384 → 8192 MiB
                    target: 6144
                animation:
                  state: "on"
                positions:
                  icon: "off"
                  indicator: inside
                entity_row: true
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      background: none !important;
                      border: none !important;
                      box-shadow: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
              - type: custom:bar-card
                tap_action:
                  action: navigate
                  navigation_path: "#memory"
                double_tap_action:
                  action: none
                hold_action:
                  action: none
                entities:
                  - entity: sensor.system_monitor_memoire_libre
                    name: FREE
                    color: rgb(68,115,158)
                    height: 40px
                    min: 0
                    max: 8192   # [CORRIGÉ] 16384 → 8192 MiB
                    target: 2048
                animation:
                  state: "on"
                positions:
                  icon: "off"
                  indicator: inside
                entity_row: true
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      background: none !important;
                      border: none !important;
                      box-shadow: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }

      # ── DISQUE VM (32 GiB) — USED + FREE ────────────────────────────────────
      # [CORRIGÉ] entité GiB réelle + max 32 (pas 524) + FREE ajouté
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                tap_action:
                  action: navigate
                  navigation_path: "#disk"
                entities:
                  - entity: sensor.system_monitor_espace_utilise  # [CORRIGÉ] → GiB
                    name: Disque VM 32Go        # [CORRIGÉ] pas "SSD SATA 512Go"
                    icon: mdi:harddisk
                    color: rgb(142,142,142)
                    height: 40px
                    min: 0
                    max: 32     # [CORRIGÉ] 524 → 32 GiB (disque VM Proxmox)
                    target: 28
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                severity:
                  - color: rgb(81,140,67)
                    from: 0
                    to: 19
                  - color: rgb(255,152,1)
                    from: 20
                    to: 27
                  - color: rgb(244,67,54)
                    from: 28
                    to: 32
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
              - type: custom:bar-card
                tap_action:
                  action: navigate
                  navigation_path: "#disk"
                entities:
                  - entity: sensor.system_monitor_espace_libre
                    name: FREE
                    color: rgb(68,115,158)
                    height: 40px
                    min: 0
                    max: 32
                    target: 4
                animation:
                  state: "on"
                positions:
                  icon: "off"
                  indicator: inside
                entity_row: true
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      background: none !important;
                      border: none !important;
                      box-shadow: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }

      # ── RÉSEAU TEMPS RÉEL (System Monitor) ──────────────────────────────────
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entities:
                  - entity: sensor.system_monitor_debit_du_reseau_entrant_via_enp6s18
                    name: Download
                    icon: mdi:download
                    color: rgb(81,140,67)
                    height: 40px
                    min: 0
                    max: 130
                    target: 20
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
              - type: custom:bar-card
                entities:
                  - entity: sensor.system_monitor_debit_du_reseau_sortant_via_enp6s18
                    name: Upload
                    icon: mdi:upload
                    color: rgb(244,67,54)
                    height: 40px
                    min: 0
                    max: 130
                    target: 20
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                card_mod:
                  style: |
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    }
                    bar-card-currentbar { border: none !important; box-shadow: none !important; }
                    bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }

      # ── RING CPU + MINI-GRAPH ────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: custom:ring-tile
            icon_tap_action:
              action: navigate
              navigation_path: "#speed"
            entity: sensor.system_monitor_utilisation_du_processeur
            name: Utilisation CPU
            ring_entity: sensor.system_monitor_utilisation_du_processeur
            ring_type: open
            ring_size: 3
            scale: ticks_with_labels
            middle_element: value_with_unit
            bottom_element: name
            colorize_icon: true
            indicator: dot
            min: 0
            max: 100
            max_decimals: 0
            colour:
              "0": ha_green
              "69": ha_green
              "70": ha_orange
              "79": ha_orange
              "80": ha_red
              "100": ha_red
            card_mod:
              style: |
                ha-card {
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                  cursor: pointer;

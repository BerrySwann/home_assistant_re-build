  # ═══════════════════════════════════════════════════════════════════════════
  # POPUPS BUBBLE-CARD
  # ═══════════════════════════════════════════════════════════════════════════

  # ── POPUP #speed — CPU Utilisation (dual view SM + PVE) ─────────────────────
  - type: custom:bubble-card
    card_type: pop-up
    hash: "#speed"
    show_header: true
    force_icon: false
    show_state: false
    show_last_changed: false
    show_attribute: false
    button_type: name
    name: Utilisation du CPU
    icon: mdi:cpu-64-bit
    show_icon: true
    show_name: true
    card_layout: normal
    hide_backdrop: false
    close_on_click: false
    bg_opacity: "0"
    cards:
      - type: custom:apexcharts-card
        experimental:
          color_threshold: true
          brush: true
        graph_span: 24h
        cache: true
        span:
          offset: +1m
        now:
          show: true
          color: "#F44336"
          label: Now
        header:
          show: true
          title: " "
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 320px
            toolbar:
              show: true
          legend:
            show: false
          tooltip:
            shared: true
            intersect: false
        all_series_config:
          show:
            legend_value: false
            extremas: true
        yaxis:
          - id: Use
            min: 0
            max: ~30
            decimals: 0
            opposite: true
            apex_config:
              tickAmount: 5
        series:
          - entity: sensor.system_monitor_utilisation_du_processeur
            name: "SM Instantané"
            yaxis_id: Use
            type: area
            curve: stepline
            stroke_width: 1
            opacity: 0.3
            fill_raw: last
            color: rgb(68,115,158)
            color_threshold:
              - value: 0
                color: rgb(68,115,158)
              - value: 65
                color: "#FFC107"
              - value: 85
                color: "#F44336"
          - entity: sensor.homeassistant_cpu_usage  # [PVE] ⚠️ À VÉRIFIER
            name: "PVE Instantané"
            yaxis_id: Use
            type: area
            curve: stepline
            stroke_width: 1
            opacity: 0.2
            fill_raw: last
            color: rgb(149,117,205)
            color_threshold:
              - value: 0
                color: rgb(149,117,205)
              - value: 65
                color: "#FFC107"
              - value: 85
                color: "#F44336"
          - entity: sensor.system_monitor_utilisation_du_processeur
            name: "Moy.(24h)"
            yaxis_id: Use
            type: line
            curve: smooth
            stroke_dash: 5
            stroke_width: 2.5
            color: red
            group_by:
              func: avg
              duration: 1h
          - entity: sensor.system_monitor_utilisation_du_processeur
            name: "Moy.(730hrs)"
            color: "#FF5252"
            fill_raw: last
            group_by:
              func: avg

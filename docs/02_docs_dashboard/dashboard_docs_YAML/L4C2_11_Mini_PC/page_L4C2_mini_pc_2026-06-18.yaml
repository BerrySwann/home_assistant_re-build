type: grid
cards:
  - type: heading
    icon: phu:intel-nuc
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1
    heading: Mini - P.C.
  - type: vertical-stack
    cards:
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: picture
            image: /local/images/mini pc.png
            card_mod:
              style: |
                ha-card {
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                  }
          - type: custom:stack-in-card
            mode: horizontal
            cards:
              - type: custom:mushroom-template-card
                primary: "IP Int. / Ext.:"
                secondary: " "
                icon: mdi:ip
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.local_ip') }}"
                secondary: " "
                icon: mdi:ip-network
                icon_color: white
                tap_action:
                  action: navigate
                  navigation_path: "#temp"
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        margin-left: 0px;
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.ip_externe') }}"
                secondary: ""
                icon: mdi:wan
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        margin-left: -20px;
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
            card_mod:
              style: |
                ha-card {
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                }
          - type: custom:stack-in-card
            mode: horizontal
            cards:
              - type: custom:mushroom-template-card
                primary: "Uptime:"
                secondary: " "
                icon: mdi:clock-outline
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
              - type: custom:mushroom-template-card
                primary: >-
                  {% set uptime = states('sensor.pve_uptime') | float(0) %} {%
                  set jours = (uptime / 24) | int(0) %} {% set heures = (uptime
                  % 24) | int(0) %} {% set minutes = ((uptime % 1) * 60) |
                  int(0) %} {%- if jours > 0 -%} {{ jours }}d {{
                  "%02d"|format(heures) }}h {{ "%02d"|format(minutes) }}m {%-
                  else -%} {{ "%02d"|format(heures) }}h {{
                  "%02d"|format(minutes) }}m {%- endif -%}
                secondary: ""
                icon: mdi:clock-start
                icon_color: white
                tap_action:
                  action: none
                card_mod:
                  style:
                    mushroom-shape-icon$: |
                      .shape {
                        border: 2px rgba(255,255,255,0.5) outset;
                        --shape-color: rgba(0,0,0,1.0) !important;
                        --icon-size: 30px;
                      }
                    .: |
                      ha-card {
                        margin-left: -100px;
                        background: none !important;
                        box-shadow: none !important;
                        border: none !important;
                      }
            card_mod:
              style: |
                ha-card {
                  margin-top: -15px;
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                }
        card_mod:
          style: |
            ha-card {
              margin-top: -15px;
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entities:
                  - entity: sensor.pve_utilisation_du_processeur
                    name: CPU USED
                    icon: mdi:cpu-64-bit
                    color: rgb(68,115,158)
                    height: 40px
                    min: 0
                    max: 100
                    target: 82
                animation:
                  state: "off"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                decimal: 2
                tap_action:
                  action: none
                hold_action:
                  action: none
                double_tap_action:
                  action: none
                severity:
                  - color: rgb(68,115,158)
                    from: 0
                    to: 74
                  - color: rgb(255,193,7)
                    from: 75
                    to: 79
                  - color: rgb(244,67,54)
                    from: 90
                    to: 100
                card_mod:
                  style: >
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    } bar-card-currentbar { border: none !important; box-shadow:
                    none !important; } bar-card-backgroundbar { border: none
                    !important; box-shadow: none !important; }
              - type: custom:bar-card
                entities:
                  - entity: sensor.proxmox_cpu_package
                    name: CPU Temp.
                    icon: mdi:thermometer
                    color: rgb(255,193,7)
                    height: 40px
                    min: 0
                    max: 100
                    target: 75
                animation:
                  state: "on"
                positions:
                  icon: inside
                  indicator: inside
                entity_row: true
                tap_action:
                  action: none
                hold_action:
                  action: none
                double_tap_action:
                  action: none
                severity:
                  - color: rgb(255,193,7)
                    from: 0
                    to: 64
                  - color: rgb(255,152,1)
                    from: 65
                    to: 74
                  - color: rgb(244,67,54)
                    from: 75
                    to: 100
                card_mod:
                  style: >
                    ha-card {
                      font-size: 12px;
                      font-weight: bold;
                      --mdc-icon-size: 30px;
                      --paper-item-icon-color: white !important;
                      border: none !important;
                      box-shadow: none !important;
                      background: none !important;
                    } bar-card-currentbar { border: none !important; box-shadow:
                    none !important; } bar-card-backgroundbar { border: none
                    !important; box-shadow: none !important; }
        card_mod:
          style: >
            ha-card { background: none !important; box-shadow: none !important;
            border: none !important; }

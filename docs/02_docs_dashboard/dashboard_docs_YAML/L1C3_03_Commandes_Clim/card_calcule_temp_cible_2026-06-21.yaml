                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_ete_corrige') | int(0) }}°C (éCO Cool){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_ete_corrige') | int(0) }}°C (éCO Cool){% endif %}
              {% else %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}

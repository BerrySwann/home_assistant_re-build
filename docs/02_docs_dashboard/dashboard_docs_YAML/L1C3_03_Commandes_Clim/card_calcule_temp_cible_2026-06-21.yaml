            text_only: true

# annotations_log:
# - Entités obsolètes corrigées : temperature_confort_jour_jour → _jour / _jour_nuit → _nuit
#   / corrige_*_hivers → corrige_* (sans suffixe)
# - G1 cool : temperature_cible → temperature_eco_ete_corrige (JOUR + NUIT)
# - G2 bureau : temperature_cible → ECO (hiver_corrige / ete_corrige selon mode)
# - G2 salon : temperature_confort_jour → temperature_corrige_mamour
# - G2 chambre : temperature_cible → temperature_corrige_chambre
# - G3 salon : temperature_cible → temperature_corrige_eric (heat + cool)
# - G3 bureau : temperature_confort_jour → temperature_corrige_eric
# - G3 chambre : temperature_cible → temperature_corrige_chambre
# - G4 salon : temperature_confort_jour → temperature_corrige_mamour
# - G4 bureau : temperature_confort_jour → temperature_corrige_eric
# - G4 chambre : temperature_cible → temperature_corrige_chambre
# - NUIT G≠1 cool salon/bureau : temperature_cible → temperature_confort_nuit
# - Résumé base éCO : conditionnel mode cool → temperature_eco_ete / heat → temperature_eco_hiver

              state: "on"
            - condition: state
              entity: sensor.groupe
              state_not: groupe_1
          card:
            type: markdown
            content: >
              **{{ states('sensor.presence') }} (21h ⟷ 7h30)** {% if
              is_state('sensor.mode_ete_hiver', 'heat') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_confort_nuit') | int(0) }}°C (Heat){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_confort_nuit') | int(0) }}°C (Heat){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_confort_nuit') | int(0) }}°C (Heat){% endif %}
              {% elif is_state('sensor.mode_ete_hiver', 'cool') %}

calcule_temp_cible:
    card:
      type: vertical-stack
      cards:
        - type: markdown
          content: >
            **<<< CALCUL DE LA TEMPERATURE CIBLE >>>**
            {% set temp_ext = states('sensor.th_balcon_nord_temperature') | float(-999) %}
            {% set consigne_de_base = states('sensor.consigne_de_base') | int(0) %}
            {% set mode = states('sensor.mode_ete_hiver') %}
            {% set temp_eco = states('sensor.temperature_eco_hiver') | int(0) %}
            {% set temp_eco_c = states('sensor.temperature_eco_hiver_corrige') | int(0) %}
            {% set temp_eco_ec = states('sensor.temperature_eco_ete_corrige') | int(0) %}
            {% set temp_hg =states('sensor.temperature_hors_gel_hiver') | int(0) %}
            {% set temp_diff = states('sensor.temperature_differentielle') | int(0) %}
            {% set delta_1 = states('sensor.delta_1') | int(0) %}
            {% set delta_2 = states('sensor.delta_2') | int(0) %}
            {% set delta_5 = states('sensor.delta_5') | int(0) %}
            {% set delta_7 = states('sensor.delta_7') | int(0) %}
            {% set temp_cible = states('sensor.temperature_cible') | int(0) %}
            {% set temp_confort = states('sensor.temperature_confort_jour') | int(0) %}
            {% set temp_confort_n = states('sensor.temperature_confort_nuit') | int(0) %}
            {% set tcm = states('sensor.temperature_corrige_mamour') | float(0) %}
            {% set tce = states('sensor.temperature_corrige_eric') | float(0) %}
            {% set tcc = states('sensor.temperature_corrige_chambre') | float(0) %}
            **Température Extérieure: {{ temp_ext | round(2) }}°C**

              **Résumé des valeurs actuel :**
            {% if temp_ext < 10 %}
                - Calcul T°cible si T°Ext. ≤ 10°C [ {{ consigne_de_base }} + {{ delta_2 }} = {{ (consigne_de_base + delta_2) | round(0) }}°C ]
                - Température cible [ {{ temp_cible | round(0) }}°C ]
                - Calcul T°Diff. si T°Ext. ≤ 10°C [ {{ temp_diff }} + {{ delta_2 }} = {{ (temp_diff + delta_2) | round(0) }}°C ]
                - Température confort [ {{ temp_confort | round(0) }}°C ]
                - Température confort de nuit [ {{ temp_confort_n | round(0) }}°C ] (21h <-> 7h30)
                - Calcul T°éCO si T°Ext. ≤ 10°C [ {{ temp_eco }} + {{ delta_1 }} = {{ (temp_eco + delta_1) | round(0) }}°C ]
                - Température éCO corrigé: {{ temp_eco_c }}°C (éCO. si absents)
            {% elif temp_ext < 12 %}
                - Calcul T°cible si T°Ext. ≤ 12°C [ {{ consigne_de_base }} + {{ delta_1 }} = {{ (consigne_de_base + delta_1) | round(0) }}°C ]
                - Température cible [ {{ temp_cible | round(0) }}°C ]
                - Calcul T°Diff. si T°Ext. ≤ 12°C [ {{ temp_diff }} + {{ delta_1 }} = {{ (temp_diff + delta_1) | round(0) }}°C ]
                - Température confort [ {{ temp_confort | round(0) }}°C ]
                - Température confort de nuit [ {{ temp_confort_n | round(0) }}°C ] (21h <-> 7h30)
                - Température éCO. : {{ temp_eco_c | round(0) }}°C -> (éCO. si absents)
            {% elif temp_ext > 40 %}
                - Calcul T°cible si T°Ext. ≥ 40°C [ {{ temp_ext | round(0) }} - {{ delta_7 }} = {{ (temp_ext - delta_7) | round(0) }}°C ]
                - Température cible [ {{ temp_cible | round(0) }}°C ]
                - Température confort [ {{ temp_confort | round(0) }}°C ]
            {% elif temp_ext > 32 %}
                - Calcul T°cible si T°Ext. ≥ 32°C [ {{ temp_ext | round(0) }} - {{ delta_5 }} = {{ (temp_ext - delta_5) | round(0) }}°C ]
                - Température cible [ {{ temp_cible | round(0) }}°C ]
                - Température confort [ {{ temp_confort | round(0) }}°C ]
            {% else %}
                - Température cible [ {{ temp_cible | round(0) }}°C ]
                - Température confort [ {{ temp_confort | round(0) }}°C ]
            {% if mode == "heat" %}
                - Température confort de nuit [ {{ temp_confort_n | round(0) }}°C ] (21h <-> 7h30)  {% endif %}
            {% if temp_ext < 17 %}
                - Température éCO. : {{ temp_eco_c | round(0) }}°C -> (éCO. si absents) {% endif %} {% endif %}

              **Résumé des valeurs de base :**

                - Consigne de Base : {{consigne_de_base }}°C
                - Température Cible : {{ temp_cible | round(0) }}°C
                - Température différentielle : {{ temp_diff | round(0) }}°C -> (Confort)
                {% if mode == 'cool' %}- Température éCO. été : {{ states('sensor.temperature_eco_ete') | int(0) }}°C -> (éCO. si absents){% else %}- Température éCO. hiver : {{ temp_eco | round(0) }}°C -> (éCO. si absents){% endif %}
            **DELTA: {{ states('sensor.temperature_delta_affichage') | default('N/A') }}**

              **MODE: {{ states('sensor.mode_ete_hiver') | upper | default('N/A') }}**
              **Groupe = {{ states('sensor.groupe') | default('N/A') }} - Presence = {{ states('sensor.presence')  | default('N/A') }}**
          card_mod:
            style: |
              ha-card {
                border: none !important;
                box-shadow: none !important;
                background: transparent;
              }
        - type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.est_jour_7h30_21h
              state: "on"
            - condition: state
              entity: sensor.groupe
              state: groupe_1
          card:
            type: markdown
            content: >
              **{{ states('sensor.presence') }} (7h30 ⟷ 21h)** {% if
              is_state('sensor.mode_ete_hiver', 'heat') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_hiver_corrige') | int(0) }}°C (éCO Heat){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_hiver_corrige') | int(0) }}°C (éCO Heat){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_hiver_corrige') | int(0) }}°C (éCO Heat){% endif %}
              {% elif is_state('sensor.mode_ete_hiver', 'cool') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_ete_corrige') | int(0) }}°C (éCO Cool){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_ete_corrige') | int(0) }}°C (éCO Cool){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_ete_corrige') | int(0) }}°C (éCO Cool){% endif %}
              {% else %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}Fan Only{% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}Fan Only{% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}Fan Only{% endif %}
              {% endif %}
            text_only: true
        - type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.est_jour_7h30_21h
              state: "on"
            - condition: state
              entity: sensor.groupe
              state: groupe_2
          card:
            type: markdown
            content: >
              **{{ states('sensor.presence') }} (7h30 ⟷ 21h)** {% if
              is_state('sensor.mode_ete_hiver', 'heat') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_mamour') | int(0) }}°C (Heat){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_hiver_corrige') | int(0) }}°C (éCO Heat){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_chambre') | int(0) }}°C (Heat){% endif %}
              {% elif is_state('sensor.mode_ete_hiver', 'cool') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_mamour') | int(0) }}°C (Cool){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_ete_corrige') | int(0) }}°C (éCO Cool){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_chambre') | int(0) }}°C (Cool){% endif %}
              {% else %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
              {% endif %}
            text_only: true
        - type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.est_jour_7h30_21h
              state: "on"
            - condition: state
              entity: sensor.groupe
              state: groupe_3
          card:
            type: markdown
            content: >
              **{{ states('sensor.presence') }} (7h30 ⟷ 21h)** {% if
              is_state('sensor.mode_ete_hiver', 'heat') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_eric') | int(0) }}°C (Heat){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_eric') | int(0) }}°C (Heat){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_chambre') | int(0) }}°C (Heat){% endif %}
              {% elif is_state('sensor.mode_ete_hiver', 'cool') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_eric') | int(0) }}°C (Cool){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_eric') | int(0) }}°C (Cool){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_chambre') | int(0) }}°C (Cool){% endif %}
              {% else %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
              {% endif %}
            text_only: true
        - type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.est_jour_7h30_21h
              state: "on"
            - condition: state
              entity: sensor.groupe
              state: groupe_4
          card:
            type: markdown
            content: |
              **{{ states('sensor.presence') }} (7h30 ⟷ 21h)**
              {% if is_state('sensor.mode_ete_hiver', 'heat') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_mamour') | int(0) }}°C (Heat){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_eric') | int(0) }}°C (Heat){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_chambre') | int(0) }}°C (Heat){% endif %}
              {% elif is_state('sensor.mode_ete_hiver', 'cool') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_mamour') | int(0) }}°C (Cool){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_eric') | int(0) }}°C (Cool){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_corrige_chambre') | int(0) }}°C (Cool){% endif %}
              {% else %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.mode_ete_hiver') }}{% endif %}
              {% endif %}
            text_only: true
        - type: conditional
          conditions:
            - condition: state
              entity: binary_sensor.est_nuit_21h_7h30
              state: "on"
            - condition: state
              entity: sensor.groupe
              state: groupe_1
          card:
            type: markdown
            content: >
              **{{ states('sensor.presence') }} (21h ⟷ 7h30)** {% if
              is_state('sensor.mode_ete_hiver', 'heat') %}
                - Climatiseur Salon   : {% if is_state('switch.clim_salon_nous',   'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_hiver_corrige') | int(0) }}°C (éCO Heat){% endif %}
                - Climatiseur Bureau  : {% if is_state('switch.clim_bureau_nous',  'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_hiver_corrige') | int(0) }}°C (éCO Heat){% endif %}
                - Climatiseur Chambre : {% if is_state('switch.clim_chambre_nous', 'off') %}[OFF]{% else %}{{ states('sensor.temperature_eco_hiver_corrige') | int(0) }}°C (éCO Heat){% endif %}
              {% elif is_state('sensor.mode_ete_hiver', 'cool') %}

type: grid
cards:
  - type: heading
    icon: mdi:desktop-tower-monitor
    heading: CLIM. DU BUREAU
    heading_style: title
    badges:
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.th_bureau_temperature
        name:
          type: area
        color: green
        state_content:
          - name
          - state
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/clim
    layout_options:
      grid_columns: full
      grid_rows: 1
  - card_mod:
      style: |
        ha-card {
          border: none !important;
          box-shadow: none !important;
          background: none !important;
          margin: 0;
          padding: 0;
        }
    clock_size: large
    time_zone: Europe/Paris
    time_format: "24"
    show_seconds: true
    type: clock
    grid_options:
      columns: full
      rows: 2
  - include:
      - person
      - person.eric
      - climate.clim_bureau_rm4_mini
    exclude: []
    discover_existing: true
    title: Planificateur Clim. Bureau
    show_header_toggle: true
    display_options:
      primary_info: default
      secondary_info:
        - relative-time
        - days
        - time
        - additional-tasks
    sort_by:
      - state
      - relative-time
    customize: {}
    tags:
      - Jours de la semaine
      - Week-End
    exclude_tags: []
    type: custom:scheduler-card
    grid_options:
      columns: 24
      rows: auto
    card_mod:
      style: |
        ha-card {
          border: none !important;
          box-shadow: none !important;
          background: none !important;
          margin: 0;
          padding: 0;
        }
  - type: vertical-stack
    cards:
      - type: markdown
        content: |
          # Clim du Bureau Semaine

          **Jours de la semaine :** {{ state_attr('switch.schedule_clim_du_bureau_week', 'weekdays') | join(', ') }}
        text_only: true
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
              margin: 0;
              padding: 0;
            }
      - type: entities
        entities:
          - entity: switch.schedule_clim_du_bureau_week
            name: Programmation Climatisation Bureau Semaine
        show_header_toggle: false
        state_color: true
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
              margin: 0;
              padding: 0;
            }
      - type: markdown
        content: |
          {% set entity_id = 'switch.schedule_clim_du_bureau_week' %}
          {% set timeslots = state_attr(entity_id, 'timeslots') %}
          {% set actions = state_attr(entity_id, 'actions') %}
          **Créneaux horaires et actions :**
          {% for i in range(timeslots | length) %}
          {% set action = actions[i] %}
          {% if action.service == 'climate.turn_off' or action.data is not defined or action.data.temperature is not defined %}
          - **{{ timeslots[i] }}** -> Off -> Mode: Off
          {% else %}
          - **{{ timeslots[i] }}** -> {{ action.data.temperature }}°C -> Mode: {{ action.data.hvac_mode }}
          {% endif %}
          {% endfor %}
        text_only: true
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
              margin: 0;
              padding: 0;
            }
      - type: markdown
        content: >
          {% set entity_id = 'switch.schedule_clim_du_bureau_week' %}
          {% set current_slot = state_attr(entity_id, 'current_slot') %}
          {% set next_slot = state_attr(entity_id, 'next_slot') %}
          {% set next_trigger = state_attr(entity_id, 'next_trigger') %}
          {% set timeslots = state_attr(entity_id, 'timeslots') %}
          {% set actions = state_attr(entity_id, 'actions') %}

          **Créneau actuel :**
          {% if current_slot is not none %}{% set ca = actions[current_slot] %}{% if ca.service == 'climate.turn_off' or ca.data is not defined or ca.data.temperature is not defined %}{{ timeslots[current_slot] }} -> Off -> Mode: Off{% else %}{{ timeslots[current_slot] }} -> {{ ca.data.temperature }}°C -> Mode: {{ ca.data.hvac_mode }}{% endif %}{% else %}{% if next_trigger is not none %}Off -> jusqu'au : {{ next_trigger | as_timestamp | timestamp_custom('%d/%m/%Y à %H:%M') }}{% else %}Non défini{% endif %}{% endif %}

          **Prochain créneau :**
          {% if next_slot is not none %}{% set na = actions[next_slot] %}{% if na.service == 'climate.turn_off' or na.data is not defined or na.data.temperature is not defined %}{{ timeslots[next_slot] }} -> Off -> Mode: Off{% else %}{{ timeslots[next_slot] }} -> {{ na.data.temperature }}°C -> Mode: {{ na.data.hvac_mode }}{% endif %}{% else %}Non défini{% endif %}

          **Prochain déclenchement :**
          {% if next_trigger is not none %}à {{ next_trigger | as_timestamp | timestamp_custom('%H:%M') }}{% else %}Non défini{% endif %}
        text_only: true
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
              margin: 0;
              padding: 0;
            }
  - type: vertical-stack
    cards:
      - type: markdown
        content: |
          # Clim du Bureau Week-End

          **Jours de la semaine :** {{ state_attr('switch.schedule_clim_du_bureau_week_end', 'weekdays') | join(', ') }}
        text_only: true
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      - type: entities
        entities:
          - entity: switch.schedule_clim_du_bureau_week_end
            name: Programmation Climatisation Bureau Week-end
        state_color: true
        show_header_toggle: false
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
              margin: 0;
              padding: 0;
            }
      - type: markdown
        content: |
          {% set entity_id = 'switch.schedule_clim_du_bureau_week_end' %}
          {% set timeslots = state_attr(entity_id, 'timeslots') %}
          {% set actions = state_attr(entity_id, 'actions') %}
          **Créneaux horaires et actions :**
          {% for i in range(timeslots | length) %}
          {% set action = actions[i] %}
          {% if action.service == 'climate.turn_off' or action.data is not defined or action.data.temperature is not defined %}
          - **{{ timeslots[i] }}** -> Off -> Mode: Off
          {% else %}
          - **{{ timeslots[i] }}** -> {{ action.data.temperature }}°C -> Mode: {{ action.data.hvac_mode }}
          {% endif %}
          {% endfor %}
        text_only: true
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
      - type: markdown
        content: >
          {% set entity_id = 'switch.schedule_clim_du_bureau_week_end' %}
          {% set current_slot = state_attr(entity_id, 'current_slot') %}
          {% set next_slot = state_attr(entity_id, 'next_slot') %}
          {% set next_trigger = state_attr(entity_id, 'next_trigger') %}
          {% set timeslots = state_attr(entity_id, 'timeslots') %}
          {% set actions = state_attr(entity_id, 'actions') %}

          **Créneau actuel :**
          {% if current_slot is not none %}{% set ca = actions[current_slot] %}{% if ca.service == 'climate.turn_off' or ca.data is not defined or ca.data.temperature is not defined %}{{ timeslots[current_slot] }} -> Off -> Mode: Off{% else %}{{ timeslots[current_slot] }} -> {{ ca.data.temperature }}°C -> Mode: {{ ca.data.hvac_mode }}{% endif %}{% else %}{% if next_trigger is not none %}Off -> jusqu'au : {{ next_trigger | as_timestamp | timestamp_custom('%d/%m/%Y à %H:%M') }}{% else %}Non défini{% endif %}{% endif %}

          **Prochain créneau :**
          {% if next_slot is not none %}{% set na = actions[next_slot] %}{% if na.service == 'climate.turn_off' or na.data is not defined or na.data.temperature is not defined %}{{ timeslots[next_slot] }} -> Off -> Mode: Off{% else %}{{ timeslots[next_slot] }} -> {{ na.data.temperature }}°C -> Mode: {{ na.data.hvac_mode }}{% endif %}{% else %}Non défini{% endif %}

          **Prochain déclenchement :**
          {% if next_trigger is not none %}le {{ next_trigger | as_timestamp | timestamp_custom('%d/%m/%y') }} à {{ next_trigger | as_timestamp | timestamp_custom('%H:%M') }}{% else %}Non défini{% endif %}
        text_only: true
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }
column_span: 2

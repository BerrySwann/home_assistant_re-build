                  ]]]
                styles:
                  grid:
                    - grid-template-areas: "\"i n n cardupload\" \"i s s cardupload\""
                    - grid-template-columns: 0.6fr 1fr 1.6fr 1fr;
                    - grid-template-rows: repeat(2, 50%);
                    - gap: 0px 0px;
                  card:
                    - padding: 0px
                    - height: 100%
                    - width: 100%
                  icon:

  - type: heading
    icon: mdi:home-assistant
    heading: H.A. ADD-ON
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1
  - type: vertical-stack
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-update-card
            entity: update.home_assistant_core_update
            show_buttons_control: false
            icon_type: entity-picture
            layout: horizontal
            secondary_info: none
            name: Home Assistant Core
            card_mod:
              style: |
                ha-card {
                    --card-primary-line-height: 2.5rem;
                    --card-primary-font-size: 1.7rem;
                    --card-primary-font-weight: normal;
                    border: none !important;
                    box-shadow: none !important;
                    background: rgba(0,0,0,0);
                    margin-top: 1rem;
                 }
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:web
                icon_color: blue
                content: Release Changelog
                tap_action:
                  action: url
                  url_path: https://www.home-assistant.io/latest-release-notes/
              - type: entity
                entity: sensor.home_assistant_core_cpu_percent
                icon_color: blue
              - type: entity
                entity: sensor.home_assistant_core_memory_percent
                icon_color: orange
      - type: vertical-stack
        cards:
          - type: custom:mushroom-update-card
            entity: update.home_assistant_supervisor_update
            show_buttons_control: false
            icon_type: entity-picture
            layout: horizontal
            secondary_info: none
            name: Home Assistant Supervisor
            card_mod:
              style: |
                ha-card {
                    --card-primary-line-height: 2.5rem;
                    --card-primary-font-size: 1.7rem;
                    --card-primary-font-weight: normal;
                    border: none !important;
                    box-shadow: none !important;
                    background: rgba(0,0,0,0);
                    margin-top: 1.2rem;
                 }
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:web
                icon_color: blue
                content: Release Changelog
                tap_action:
                  action: url
                  url_path: https://github.com/home-assistant/supervisor/releases/latest
              - type: entity
                entity: sensor.home_assistant_supervisor_cpu_percent
                icon_color: blue
              - type: entity
                entity: sensor.home_assistant_supervisor_memory_percent
                icon_color: orange

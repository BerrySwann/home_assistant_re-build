type: grid
cards:
  - type: heading
    icon: mdi:home-assistant
    heading: H.A. UPDATE
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1
  - type: vertical-stack
    cards:
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        card_mod:
          style: |
            ha-card {
              pointer-events: none;
            }
        styles:
          grid:
            - grid-template-areas: "\"card1 card2 card3\""
            - grid-template-columns: 1fr 0.63fr 0.1fr
            - grid-template-rows: 1fr
          card:
            - margin-top: 1.5rem
            - padding: 5px 0px 5px 10px
            - background: rgba(0,0,0,0)
          custom_fields:
            card1:
              - width: 90%
            card2:
              - align-self: top
              - height: 100%
        custom_fields:
          card1:
            card:
              type: custom:mushroom-title-card
              title: Addons updates
              alignment: start
              card_mod:
                style: |
                  .header {
                    padding: 0px !important;
                  }
                  .header div {
                    margin: 0px !important
                  }
          card2:
            card:
              type: markdown
              content: >-
                {% set
                rejet=['update.home_assistant_core_update','update.home_assistant_operating_system_update','update.home_assistant_supervisor_update']
                %}  {% set
                maj=integration_entities('hassio')|select('search','update.')|select('is_state','on')|reject('in',rejet)|list|count|int(2)
                %}  {% set
                total=integration_entities('hassio')|select('search','update.')|reject('in',rejet)|list|count|int(2)
                %}  {% if maj == 0 %} <ha-alert alert-type="success"
                title="{{maj}} MàJ sur {{total}}" > {% elif maj == 1 %}
                <ha-alert alert-type="warning" title="{{maj}} MàJ sur {{total}}"
                > {% elif maj > 1 %} <ha-alert alert-type="warning"
                title="{{maj}} Màj sur {{total}}" ></ha-alert> {% else %} {%
                endif %}
              card_mod:
                style: |
                  :host {
                    --ha-card-margin: 0px;
                    --ha-card-background: #00000000 !important;
                    --ha-card-border-color: #00000000 !important;
                    }
                  ha-markdown.no-header {
                    padding: 0px !important;
                    margin: 0px !important;
                    margin-right: 3em !important;
                    margin-left: -3em !important;
                  }
                  ha-card {
                    font-size: 1rem;
                    --mdc-icon-size: 1.3rem;
                   }
      - type: custom:auto-entities
        card:
          type: vertical-stack
        card_param: cards
        filter:
          include:
            - domain: update
              state: "on"
              options:
                type: custom:button-card
                show_name: true
                show_icon: true
                show_state: true
                show_entity_picture: true
                variables:
                  sensor: |
                    [[[
                      let name = Object.values(entity)
                     return name[0]
                      ]]]
                name: |
                  [[[
                    return entity.attributes.friendly_name.replace('Home Assistant','HA').replace('Update','')
                  ]]]
                state_display: |
                  [[[ if(entity.state== "on")
                   return 'v' + entity.attributes.installed_version +' - v' + entity.attributes.latest_version
                  else if(entity.state== "off")
                   return helpers.localize(entity) +' - v'+ entity.attributes.installed_version
                  else
                   return "instal - "+entity.attributes.in_progress+"%"
                  ]]]
                styles:
                  grid:
                    - grid-template-areas: "\"i n n cardupload\" \"i s s cardupload\""
                    - grid-template-columns: 0.6fr 1fr 1.6fr 1fr;
                    - grid-template-rows: repeat(2, 50%);
                    - gap: 0px 0px;
                  card:
                    - padding: 0px
                    - height: 100%
                    - width: 100%
                  icon:
                    - align-self: center
                    - left: 25%
                    - width: 55%
                  name:
                    - justify-self: start
                    - font-size: 0.9em
                    - font-weight: 450
                    - padding-top: 8px
                  state:
                    - justify-self: start
                    - font-size: 0.75em
                    - padding-bottom: 0.7em
                custom_fields:
                  cardupload:
                    card:
                      show_icon: true
                      type: custom:button-card
                      icon: |
                        [[[
                         if(entity.state == "off")
                         return ""
                         if(entity.attributes.in_progress == false)
                         return 'mdi:upload-circle'
                         else return 'mdi:rotate-right'
                        ]]]
                      styles:
                        card:
                          - background: none
                          - border: none
                        icon:
                          - animation: |
                              [[[
                               if(entity.attributes.in_progress == false)
                                return ''
                               else return 'rotating 1s linear infinite'
                              ]]]
                          - color: |
                              [[[
                               if(entity.state == 'on' & entity.attributes.in_progress != false)
                               return 'green'
                               else return 'rgba(85,252,252, 1)'
                              ]]]
                          - left: 17%
                      tap_action:
                        action: perform-action
                        perform_action: update.install
                        target:
                          entity_id: "[[[return variables.sensor]]]"
          exclude:
            - name: Home*
            - integration: hacs
            - integration: mqtt
          card_param: cards
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        card_mod:
          style: |
            ha-card {
              pointer-events: none;
            }
        styles:
          grid:
            - grid-template-areas: "\"card1 card2 card3\""
            - grid-template-columns: 1fr 0.63fr 0.1fr
            - grid-template-rows: 1fr
          card:
            - padding: 5px 0px 5px 10px
            - background: rgba(0,0,0,0)
          custom_fields:
            card1:
              - width: 90%
            card2:
              - align-self: top
              - height: 100%
        custom_fields:
          card1:
            card:
              type: custom:mushroom-title-card
              title: HACS updates
              alignment: start
              card_mod:
                style: |
                  .header {
                    padding: 0px !important;
                  }
                  .header div {
                    margin: 0px !important
                  }
          card2:
            card:
              type: markdown
              content: >-
                {% set
                maj=integration_entities('hacs')|select('search','update.')|select('is_state','on')|reject('in','update.hacs_update')|list|count|int(2)
                %}  {% set
                total=integration_entities('hacs')|select('search','update.')|reject('in','update.hacs_update')|list|count|int(2)
                %}  {% if maj == 0 %} <ha-alert alert-type="success"
                title="{{maj}} MàJ sur {{total}}" > {% elif maj == 1 %}
                <ha-alert alert-type="warning" title="{{maj}} MàJ sur {{total}}"
                > {% elif maj > 1 %} <ha-alert alert-type="warning"
                title="{{maj}}  màj sur {{total}}" ></ha-alert> {% else %} {%
                endif %}
              card_mod:
                style: |
                  :host {
                    --ha-card-margin: 0px;
                    --ha-card-background: #00000000 !important;
                    --ha-card-border-color: #00000000 !important;
                    }
                  ha-markdown.no-header {
                    padding: 0px !important;
                    margin: 0px !important;
                    margin-right: 3em !important;
                    margin-left: -3em !important;
                  }
                  ha-card {
                    font-size: 1rem;
                    --mdc-icon-size: 1.3rem;
                   }
      - type: markdown
        content: >-
          {% set maj = states.update |
          selectattr('attributes.release_summary','defined') |
          selectattr('attributes.release_summary','eq','<ha-alert
          alert-type=\'error\'>Restart of Home Assistant required</ha-alert>')
          |map(attribute='name') |list %}
          {% set maj_count = maj|count|int(2) %}
          {% if maj_count >= 1 %} <ha-alert alert-type="error"
          title="{{maj_count}} intégrations nécessitent un redémarrage">
          <hr>
          <ul>{% for i in maj%}
          <li>{{i}}</li>
          {% endfor%}</ul>
          {% else %}
          {% endif %}</ha-alert>
        card_mod:
          style: |
            :host {
              --ha-card-margin: 0px;
              --ha-card-background: #00000000 !important;
              --ha-card-border-color: #00000000 !important;
              }
            ha-markdown.no-header {
              padding: 4rem !important;
              padding-top: 0rem !important;
              padding-bottom: 0rem !important;
            }
      - type: custom:auto-entities
        card:
          type: vertical-stack
        card_param: cards
        filter:
          include:
            - domain: update
              state: "on"
              integration: hacs
              options:
                type: custom:button-card
                show_name: true
                show_icon: true
                show_state: true
                show_entity_picture: true
                variables:
                  url: |
                    [[[
                      return entity.attributes.release_url
                    ]]]
                  sensor: |
                    [[[
                      let name = Object.values(entity)
                     return name[0]
                      ]]]
                name: |
                  [[[
                    return entity.attributes.friendly_name.replace('update','')
                  ]]]
                state_display: >
                  [[[
                  if(entity.state== "on" & entity.attributes.in_progress ==
                  false)
                     return  entity.attributes.installed_version +' - ' + entity.attributes.latest_version
                  else if(entity.state== "off")
                   return helpers.localize(entity) +' - '+ entity.attributes.installed_version
                  else
                    return "instal - "+entity.attributes.in_progress+"%"
                  ]]]
                styles:
                  grid:
                    - grid-template-areas: "\"i n n cardupload\" \"i s cardurl cardupload\""
                    - grid-template-columns: 1fr 1fr 1fr 1.5fr;
                    - grid-template-rows: repeat(2, 50%);
                    - gap: 0px 0px;
                  card:
                    - padding: 0px
                    - height: 100%
                    - width: 100%
                  icon:
                    - align-self: center
                    - left: 25%
                    - width: 55%
                  name:
                    - justify-self: start
                    - font-size: 0.9em
                    - font-weight: 450
                    - padding-top: 8px
                  state:
                    - justify-self: start
                    - font-size: 0.75em
                    - padding-bottom: 0.7em
                    - padding-right: 8rem
                  custom_fields:
                    cardurl:
                      - justify-self: center
                      - margin-bottom: 0.7em
                      - margin-left: 2rem
                      - margin-right: "-2rem"
                custom_fields:
                  cardurl:
                    card:
                      type: custom:button-card
                      show_icon: false
                      name: |
                        [[[
                         if (variables.url == null)return ""
                         else
                          {return '<a style="color:white" href="'+[variables.url]+'">'+[variables.url.substr(8,18).toLowerCase()]+'</a>'}
                         endif
                        ]]]
                      tap_action:
                        action: url
                        url_path: |
                          [[[
                           return variables.url
                          ]]]
                      styles:
                        card:
                          - background: rgba(100,150,255,0.5)
                          - width: 13rem
                          - box-sizing: border-box
                          - padding: 0px
                        name:
                          - font-size: 1.2rem
                          - font-weight: bold
                          - font-style: italic
                  cardupload:
                    card:
                      show_icon: true
                      type: custom:button-card
                      icon: |
                        [[[
                         if(entity.state == "off")
                         return ""
                         if(entity.attributes.in_progress == false)
                         return 'mdi:upload-circle'
                         else return 'mdi:rotate-right'
                        ]]]
                      styles:
                        card:
                          - background: none
                          - border: none
                        icon:
                          - animation: |
                              [[[
                               if(entity.attributes.in_progress == false)
                                return ''
                               else return 'rotating 1s linear infinite'
                              ]]]
                          - color: |
                              [[[
                               if(entity.state == 'on' & entity.attributes.in_progress != false)
                               return 'green'
                               else return 'rgba(85,252,252, 1)'
                              ]]]
                          - left: 18%
                          - width: 40%
                      tap_action:
                        action: perform-action
                        perform_action: update.install
                        target:
                          entity_id: "[[[return variables.sensor]]]"
          exclude:
            - entity_id: update.hacs_update
          card_param: cards
        sort:
          method: friendly_name
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        card_mod:
          style: |
            ha-card {
              pointer-events: none;
            }
        styles:
          grid:
            - grid-template-areas: "\"card1 card2 card3\""
            - grid-template-columns: 1fr 0.63fr 0.1fr
            - grid-template-rows: 1fr
          card:
            - padding: 5px 0px 5px 10px
            - background: rgba(0,0,0,0)
          custom_fields:
            card1:
              - width: 90%
            card2:
              - align-self: top
              - height: 100%
        custom_fields:
          card1:
            card:
              type: custom:mushroom-title-card
              title: ZigBee2MQTT
              alignment: start
              card_mod:
                style: |
                  .header {
                    padding: 0px !important;
                  }
                  .header div {
                    margin: 0px !important
                  }
          card2:
            card:
              type: markdown
              content: >-
                {% set
                maj=integration_entities('mqtt')|select('search','update.')|select('is_state','on')|list|count|int(2)
                %}  {% set
                total=integration_entities('mqtt')|select('search','update.')|list|count|int(2)
                %}  {% if maj == 0 %} <ha-alert alert-type="success"
                title="{{maj}} MàJ sur {{total}}" > {% elif maj == 1 %}
                <ha-alert alert-type="warning" title="{{maj}} Màj sur {{total}}"
                > {% elif maj > 1 %} <ha-alert alert-type="warning"
                title="{{maj}} mises a jour sur {{total}}" ></ha-alert> {% else
                %} {% endif %}
              card_mod:
                style: |
                  :host {
                    --ha-card-margin: 0px;
                    --ha-card-background: #00000000 !important;
                    --ha-card-border-color: #00000000 !important;
                    }
                  ha-markdown.no-header {
                    padding: 0px !important;
                    margin: 0px !important;
                    margin-right: 3em !important;
                    margin-left: -3em !important;
                  }
                  ha-card {
                    font-size: 1rem;
                    --mdc-icon-size: 1.3rem;
                   }

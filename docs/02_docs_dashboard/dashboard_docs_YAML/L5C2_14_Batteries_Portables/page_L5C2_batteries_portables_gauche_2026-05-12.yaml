type: grid
cards:
  - type: heading
    icon: mdi:cellphone-nfc
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1
    heading: Xiaomi POCO X7 Pro
  - type: conditional
    conditions:
      - entity: sensor.eric_battery_level
        state_not: unavailable
      - entity: sensor.eric_battery_level
        state_not: unknown
    card:
      type: vertical-stack
      cards:
        - type: custom:streamline-card
          template: portable
          variables:
            entity: sensor.eric_battery_level
        - type: entities
          entities:
            - entity: sensor.eric_battery_level
            - entity: sensor.eric_battery_state
              name: Battery state
            - entity: sensor.eric_charger_type
              name: Charger type
              secondary_info: none
            - entity: sensor.eric_battery_health
            - entity: sensor.eric_battery_temperature
            - entity: sensor.eric_network_type
            - entity: sensor.eric_wi_fi_connection
          state_color: true
          show_header_toggle: true
          card_mod:
            style: |
              ha-card {
                background: none !important;
                box-shadow: none !important;
                border: none !important;
              }

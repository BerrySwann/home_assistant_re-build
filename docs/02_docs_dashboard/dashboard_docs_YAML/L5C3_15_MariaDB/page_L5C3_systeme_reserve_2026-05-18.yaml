title: Système — Réserve MariaDB/Z2M/HA
path: /dashboard-tablette/reserve
icon: mdi:database-check
layout:
  max_columns: 3

cards:
  # ┌──────────────────────────────────────────────────────┐
  # │ TITRE — RÉSERVE SYSTÈME
  # └──────────────────────────────────────────────────────┘
  - type: custom:button-card
    name: Réserve Système
    icon: mdi:database-check
    size: 15%
    styles:
      card:
        - background: rgba(0,0,0,0.15)
        - padding: 15px
        - border-radius: 15px
      name:
        - font-size: 24px
        - font-weight: bold
        - color: white
      icon:
        - color: gold

  # ┌────────────────────────────────────────────────────┐
  # │ HOME ASSISTANT — CPU / MÉMOIRE / DISQUE
  # └────────────────────────────────────────────────────┘
  - type: custom:stack-in-card
    mode: vertical
    cards:
      - type: custom:button-card
        name: HOME ASSISTANT
        icon: mdi:home-assistant
        size: 10%
        styles:
          card:
            - background: rgba(33, 150, 243, 0.15)
            - padding: 8px
            - border-radius: 8px
            - border-left: 3px solid rgb(33, 150, 243)
          name:
            - color: white
            - font-weight: bold
            - font-size: 14px
          icon:
            - color: rgb(33, 150, 243)
      - type: horizontal-stack
        cards:
          - type: custom:bar-card
            entities:
              - entity: sensor.homeassistant_utilisation_du_processeur
                name: CPU USED
                icon: mdi:cpu-64-bit
                color: rgb(68,115,158)
                height: 40px
                min: 0
                max: 100
                target: 82
            animation:
              state: "off"
            positions:
              icon: inside
              indicator: inside
            entity_row: true
            tap_action:
              action: none
            severity:
              - color: rgb(68,115,158)
                from: 0
                to: 74
              - color: rgb(255,193,7)
                from: 75
                to: 79
              - color: rgb(244,67,54)
                from: 90
                to: 100
            card_mod:
              style: >
                ha-card {
                  font-size: 12px;
                  font-weight: bold;
                  --mdc-icon-size: 30px;
                  --paper-item-icon-color: white;
                  border: none !important;
                  box-shadow: none !important;
                  background: none !important;
                }
                bar-card-currentbar { border: none !important; box-shadow: none !important; }
                bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
          - type: custom:bar-card
            entities:
              - entity: sensor.homeassistant_uptime
                name: Uptime
                icon: mdi:clock-outline
                color: rgb(255,193,7)
                height: 40px
                min: 0
                max: 168
                target: 150
            animation:
              state: "on"
            positions:
              icon: inside
              indicator: inside
            entity_row: true
            severity:
              - color: rgb(255,193,7)
                from: 0
                to: 120
              - color: rgb(76,175,80)
                from: 120
                to: 168
            card_mod:
              style: >
                ha-card {
                  font-size: 12px;
                  font-weight: bold;
                  --mdc-icon-size: 30px;
                  --paper-item-icon-color: white !important;
                  border: none !important;
                  box-shadow: none !important;
                  background: none !important;
                }
                bar-card-currentbar { border: none !important; box-shadow: none !important; }
                bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
      - type: horizontal-stack
        cards:
          - type: custom:bar-card
            entities:
              - entity: sensor.homeassistant_memory_usage_percentage
                name: Mémoire %
                icon: mdi:memory
                color: rgb(81,140,67)
                height: 40px
                min: 0
                max: 100
                target: 65
            animation:
              state: "on"
            positions:
              icon: inside
              indicator: inside
            entity_row: true
            severity:
              - color: rgb(81,140,67)
                from: 0
                to: 74
              - color: rgb(255,152,1)
                from: 75
                to: 79
              - color: rgb(244,67,54)
                from: 80
                to: 100
            card_mod:
              style: |
                ha-card {
                  font-size: 12px;
                  font-weight: bold;
                  --mdc-icon-size: 30px;
                  --paper-item-icon-color: white;
                  background: none !important;
                  border: none !important;
                  box-shadow: none !important;
                }
                bar-card-currentbar { border: none !important; box-shadow: none !important; }
                bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
          - type: custom:bar-card
            entities:
              - entity: sensor.homeassistant_utilisation_de_la_memoire
                name: Utilisée
                icon: mdi:swap-horizontal
                color: rgb(244,67,54)
                height: 40px
                min: 0
                max: 8.0
                target: 6
            animation:
              state: "on"
            positions:
              icon: inside
              indicator: inside
            entity_row: true
            card_mod:
              style: |
                ha-card {
                  font-size: 12px;
                  font-weight: bold;
                  background: none !important;
                  border: none !important;
                  box-shadow: none !important;
                }
                bar-card-currentbar { border: none !important; box-shadow: none !important; }
                bar-card-backgroundbar { border: none !important; box-shadow: none !important; }
    card_mod:
      style: |
        ha-card { background: none !important; box-shadow: none !important; border: none !important; }


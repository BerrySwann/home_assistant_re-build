type: custom:button-card
entity: sensor.taille_db_home_assistant
name: Taille DB MariaDB
icon: mdi:database
size: 40%
tap_action:
  action: navigate
  navigation_path: /dashboard-tablette/reserve

custom_fields:
  gauche: |
    [[[
      const val = parseFloat(entity.state);
      const unit = "MB";
      const size = 35;
      const name = "MariaDB";

      return `
        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
          <div style="font-size: 24px; font-weight: bold; color: white;">${val.toFixed(0)}<span style="font-size: 14px;"> ${unit}</span></div>
          <div style="font-size: 13px; color: rgba(255,255,255,0.7);">${name}</div>
        </div>
      `;
    ]]]

styles:
  card:
    - background: rgba(0, 0, 0, 0.3)
    - border-radius: 12px
    - padding: 10px
    - border: none
    - box-shadow: none
  name:
    - display: none
  icon:
    - display: none
  state:
    - display: none

card_mod:
  style: |
    ha-card {
      border: none !important;
      box-shadow: none !important;
    }

inner_card:
  type: custom:flex-horseshoe-card
  entity: sensor.taille_db_home_assistant
  min: 0
  max: 4000
  unit: MB
  stroke_width: 15
  gaps: 5

  color_stops:
    0: '#0f9d58'
    1800: '#fdd835'
    2500: '#ff9800'
    3500: '#ff6b6b'
    4000: '#f44336'

  horseshoe_style: 'flex-horseshoe--bottom-quarter'

  card_layout: 'custom:flex-horseshoe-card'
  flex_direction: column
  justify_content: center
  align_items: center
  padding: 0px 15px 10px 15px

  horseshoe_state:
    - id: 0
      entity_index: 0
      xpos: 50
      ypos: 20
      icon:
        id: 0
        entity_index: 0
        xpos: 50
        ypos: 20
        size: 10
        styles:
          - color: white;
          - opacity: 0.95;
        icon: mdi:database

  card_mod:
    style: |
      ha-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : ÉCLAIRAGE — AMHQ PAR ZONE / PIÈCE                │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant la consommation par zone/pièce (somme de
# toutes les ampoules d'une pièce) en 4 cycles AMHQ. 9 zones × 4 cycles = 36 compteurs.
# Zones : Salon (5x), Appart_3 (Entrée+Cuisine+Couloir), Cuisine (1x),
#         Appart_2 (Entrée+Couloir), Bureau (5x), SDB (2x), Chambre (4x),
#         Entrée (1x), Couloir (1x).
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : sensor.eclairage_[zone]_energy (capteurs somme calculés
#   dans sensors/P3_eclairage/P3_kWh_2_ZONE.yaml via templates P3_POWER_2_TOTAL_MULTI_ZONE.yaml).
# - Zones APPART regroupent plusieurs pièces — ne pas confondre avec les zones individuelles.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL   | CAPTEUR BRUT (source)                             | CE FICHIER (unique_id)                    | AVAL                           |
# |:-----------|:--------------------------------------------------|:------------------------------------------|:-------------------------------|
# | [calculé]  | sensor.eclairage_*_energy (×9 zones)  | *_annuel/mensuel/hebdomadaire/quotidien_um | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Zones APPART : regroupent plusieurs pièces physiques (entrée+couloir ou +cuisine).
#   Ne pas créer de doublons avec les zones par pièce individuelle.
# - Suffixe _um (sans _kwh_) : convention uniforme depuis refactoring 2026-04-25.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (vue par pièce/zone)

# ┌───────────────────────────────────┐
# │     ZONE 4. (5x) SALON            │
# └───────────────────────────────────┘

# --- eclairage_salon_5_annuel_um ---

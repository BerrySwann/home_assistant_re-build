# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : ÉCLAIRAGE — AMHQ PAR AMPOULE (UNITÉ)             │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant la consommation de chaque ampoule Hue
# individuellement en 4 cycles AMHQ. Couvre 7 pièces : Entrée (1x), Salon (5x),
# Cuisine (1x), Couloir (1x), Bureau (5x), SDB (2x), Chambre (4x).
# Total : 19 ampoules × 4 cycles = 76 compteurs.
#
# ## 🧮 CALCUL & SOURCES :
# - Toutes les sources : sensor.[ampoule]_energy (firmware direct — kWh cumulatif).
# - Riemann (_energie_totale_kwh) supprimé — plus de platform: integration.
# - PowerCalc (ambiance/color) exposait déjà _energy nativement — inchangé.
# - White/Play utilisaient _energie_totale_kwh (Riemann) → migrés vers _energy.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL          | CAPTEUR BRUT (source)                     | CE FICHIER (unique_id)                             | AVAL                            |
# |:------------------|:------------------------------------------|:---------------------------------------------------|:--------------------------------|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_entree_energy       | hue_white_lamp_entree_{annuel|mensuel|hebdo|quot}  | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_table_energy        | hue_white_lamp_table_{annuel|mensuel|hebdo|quot}   | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | PowerCalc         | sensor.hue_ambiance_lamp_salon_1_energy   | hue_ambiance_lamp_salon_1_*_um                     | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | PowerCalc         | sensor.hue_ambiance_lamp_salon_2_energy   | hue_ambiance_lamp_salon_2_*_um                     | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | PowerCalc         | sensor.hue_ambiance_lamp_salon_3_energy   | hue_ambiance_lamp_salon_3_*_um                     | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | PowerCalc         | sensor.hue_color_candle_salon_1_energy    | hue_color_candle_salon_1_*_um                      | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_cuisine_energy      | hue_white_lamp_cuisine_{annuel|mensuel|hebdo|quot} | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_couloir_energy      | hue_white_lamp_couloir_{annuel|mensuel|hebdo|quot} | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_play_1_pc_bureau_energy        | hue_play_1_pc_bureau_*_um                          | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_play_2_pc_bureau_energy        | hue_play_2_pc_bureau_*_um                          | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_play_3_pc_bureau_energy        | hue_play_3_pc_bureau_*_um                          | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_bureau_1_energy     | hue_white_lamp_bureau_1_*_um                       | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_bureau_2_energy     | hue_white_lamp_bureau_2_*_um                       | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Sonoff (Z2M)      | sensor.relais_lumiere_sdb_sonoff_energy   | relais_lumiere_sdb_sonoff_*_um                     | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.lampe_salle_de_bain_hue_energy     | lampe_salle_de_bain_hue_*_um                       | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_chambre_1_energy    | hue_white_lamp_chambre_1_*_um                      | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | Hue Bridge (Z2M)  | sensor.hue_white_lamp_chambre_2_energy    | hue_white_lamp_chambre_2_*_um                      | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | PowerCalc         | sensor.hue_color_candle_chambre_gege_energy| hue_color_candle_chambre_gege_*_um                | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
# | PowerCalc         | sensor.hue_color_candle_chambre_eric_energy| hue_color_candle_chambre_eric_*_um                | P3_AVG_AMHQ_1_UNITE.yaml → L2C3|
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Toutes les sources sont _energy (total_increasing, kWh cumulatif).
# - Ne jamais pointer sur _energie_totale_kwh (Riemann supprimé).
# - | float(0) dans les templates sources absorbe les unavailable nocturnes.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (détail par ampoule via P3_AVG_AMHQ_1_UNITE)


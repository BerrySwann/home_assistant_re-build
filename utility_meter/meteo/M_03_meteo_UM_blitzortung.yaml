# ╭──────────────────────────────────────────────────────────────────────────╮
# │ MÉTÉO. UTILITY METER : BLITZORTUNG — COMPTAGE ÉCLAIRS AMHQ               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant le nombre d'impacts de foudre détectés par
# Blitzortung en 4 cycles temporels (Annuel, Mensuel, Hebdomadaire, Quotidien).
# Permet de suivre l'activité orageuse sur des périodes glissantes.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.maison_lightning_counter (intégration Blitzortung, compteur
#   d'impacts dans un rayon défini autour de Vence 06140).
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# Ce sont des compteurs d'événements (nombre d'éclairs), pas des kWh. Ne pas
# mélanger avec les sensors de localisation ou de distance (M_03_meteo_templates_blitzortung.yaml).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L1C1 Météo (section foudre/Blitzortung)

# --- eclair_annuel ---
eclair_annuel:
    name: "Éclairs Annuel"
    source: sensor.maison_lightning_counter
    cycle: yearly

# --- eclair_mensuel ---
eclair_mensuel:
    name: "Éclairs Mensuel"
    source: sensor.maison_lightning_counter
    cycle: monthly

# --- eclair_hebdomadaire ---
eclair_hebdomadaire:
    name: "Éclairs Hebdomadaire"
    source: sensor.maison_lightning_counter
    cycle: weekly

# --- eclair_quotidien ---
eclair_quotidien:
    name: "Éclairs Quotidien"
    source: sensor.maison_lightning_counter
    cycle: daily

# --- eclair_horaire ---
eclair_horaire:
    name: "Éclairs Horaire"
    source: sensor.maison_lightning_counter
    cycle: hourly


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 2. UTILITY METER AMHQ : MINI PC (BUREAU) — ÉNERGIE Wh               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs périodiques (Annuel / Mensuel / Hebdo / Quotidien) pour le Mini PC.
# Unité trackée : Wh (source Riemann en Wh, pas kWh).
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensors/P2_prise/P2_Wh_mini_pc.yaml → sensor.prise_mini_pc_ikea_energie_totale_wh
#   (Riemann integration depuis prise_mini_pc_ikea_power, méthode left, sans unit_prefix: k)
# - Remise à zéro : Quotidien = minuit / Hebdo = lundi / Mensuel = 1er / Annuel = 1er jan
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Source en Wh (pas kWh) → les valeurs UM sont en Wh.
# - Les entités sont nommées _wh_um (pas _kwh_um) pour refléter l'unité réelle.
# - Le fichier AVG utilise conso / h (Wh ÷ h = W) — pas conso * 1000 / h.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Alimente L4C2 Mini PC (pop-up #conso) via AVG → streamline-card

# ┌─────────────────────────────────────┐
# │ 7. BUREAU                           │
# └─────────────────────────────────────┘

# --- prise_mini_pc_ikea_annuel_wh_um ---
prise_mini_pc_ikea_annuel_wh_um:
  source: sensor.prise_mini_pc_ikea_energie_totale_wh
  name: "Prise Mini PC IKEA Annuel Wh UM"
  unique_id: prise_mini_pc_ikea_annuel_wh_um
  cycle: yearly

# --- prise_mini_pc_ikea_mensuel_wh_um ---
prise_mini_pc_ikea_mensuel_wh_um:
  source: sensor.prise_mini_pc_ikea_energie_totale_wh
  name: "Prise Mini PC IKEA Mensuel Wh UM"
  unique_id: prise_mini_pc_ikea_mensuel_wh_um
  cycle: monthly

# --- prise_mini_pc_ikea_hebdomadaire_wh_um ---
prise_mini_pc_ikea_hebdomadaire_wh_um:
  source: sensor.prise_mini_pc_ikea_energie_totale_wh
  name: "Prise Mini PC IKEA Hebdomadaire Wh UM"
  unique_id: prise_mini_pc_ikea_hebdomadaire_wh_um
  cycle: weekly

# --- prise_mini_pc_ikea_quotidien_wh_um ---
prise_mini_pc_ikea_quotidien_wh_um:
  source: sensor.prise_mini_pc_ikea_energie_totale_wh
  name: "Prise Mini PC IKEA Quotidien Wh UM"
  unique_id: prise_mini_pc_ikea_quotidien_wh_um
  cycle: daily

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ UTILITY METER : PÔLE 2. PRISES (DÉCOUPAGE AMHQ)                          │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Découpage des compteurs d'énergie (kWh) des prises physiques en 
# 4 cycles temporels : Annuel, Mensuel, Hebdomadaire, Quotidien.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : Entités d'intégration de Riemann (_energie_totale_kwh) du Pôle 2.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces entités se remettent à zéro automatiquement à la fin de leur cycle.
# - L'attribut 'last_period' conserve la valeur exacte du cycle précédent.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Alimente la vignette : L2C3 Commandes Éco et les graphiques de suivi.


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 2. UTILITY METER : VEILLES GLOBALES — AMHQ                          │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Découpage des compteurs d'énergie globaux des veilles (Standby) en
# 4 cycles temporels : Annuel, Mensuel, Hebdomadaire, Quotidien (AMHQ).
#
# ## 🧮 CALCUL & SOURCES :
# - Source unique : sensor.all_standby_energy (Riemann — exception maintenue).
# - all_standby est un sensor template (somme de puissances) → pas de firmware _energy natif.
#   Riemann est le seul chemin possible pour ce cas.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL   | CAPTEUR BRUT (source)                         | CE FICHIER (unique_id)                    | AVAL                          |
# |:-----------|:----------------------------------------------|:------------------------------------------|:------------------------------|
# | [calculé]  | sensor.all_standby_energy         | all_standby_*_um                          | P2_AVG_AMHQ_veilles.yaml → L2C1 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Riemann conservé intentionnellement : sensor.all_standby est un template, pas un device physique.
# - Suffixe _um (sans _kwh_) : convention uniforme depuis refactoring 2026-04-25.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale.

# --- all_standby_annuel_um ---
all_standby_annuel_um:
  source: sensor.all_standby_energy
  name: "All Standby Annuel UM"
  unique_id: all_standby_annuel_um
  cycle: yearly

# --- all_standby_mensuel_um ---
all_standby_mensuel_um:
  source: sensor.all_standby_energy
  name: "All Standby Mensuel UM"
  unique_id: all_standby_mensuel_um
  cycle: monthly

# --- all_standby_hebdomadaire_um ---
all_standby_hebdomadaire_um:
  source: sensor.all_standby_energy
  name: "All Standby Hebdomadaire UM"
  unique_id: all_standby_hebdomadaire_um
  cycle: weekly

# --- all_standby_quotidien_um ---
all_standby_quotidien_um:
  source: sensor.all_standby_energy
  name: "All Standby Quotidien UM"
  unique_id: all_standby_quotidien_um
  cycle: daily

# annotations_log:

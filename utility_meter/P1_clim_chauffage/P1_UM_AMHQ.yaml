# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1 — UTILITY METER AMHQ : CHAUFFAGE & CLIMATISATION                 │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs périodiques (Annuel / Mensuel / Hebdo / Quotidien) pour les 6
# équipements du Pôle 1 : 3 clims, 1 radiateur cuisine, 1 soufflant SDB,
# 1 sèche-serviette SDB.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : sensors/P1_clim_chauffage/P1_kWh.yaml → sensor.*_energie_totale_kwh
#   (Riemann integration depuis *_power, méthode left)
# - Chaque source = énergie cumulée depuis création du capteur Riemann
# - Remise à zéro : Quotidien = minuit / Hebdo = lundi / Mensuel = 1er / Annuel = 1er jan
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les sources pointent désormais sur les capteurs Riemann *_energie_totale_kwh
#   et NON plus sur les sensor.*_nous_energy natifs des prises NOUS.
# - Ne pas confondre les outputs UM (sensor.*_quotidien_kwh_um, etc.) avec les sources.
# - Si HA redémarre en milieu de période, la RAZ reste sur le cycle configuré.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Alimente la vignette L2C2 (Conso Énergie Clim / Radiateur / Soufflant)

# ┌─────────────────────────────────────┐
# │ 4. SALON                            │
# └─────────────────────────────────────┘

# --- clim_salon ---
clim_salon_annuel_kwh_um:
  source: sensor.clim_salon_energie_totale_kwh        # [L1] modif — était: sensor.clim_salon_nous_energy
  cycle: yearly

clim_salon_mensuel_kwh_um:
  source: sensor.clim_salon_energie_totale_kwh        # [L1] modif
  cycle: monthly

clim_salon_hebdomadaire_kwh_um:
  source: sensor.clim_salon_energie_totale_kwh        # [L1] modif
  cycle: weekly

clim_salon_quotidien_kwh_um:
  source: sensor.clim_salon_energie_totale_kwh        # [L1] modif
  cycle: daily


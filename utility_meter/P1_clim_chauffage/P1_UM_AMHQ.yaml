# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1 — UTILITY METER AMHQ : CHAUFFAGE & CLIMATISATION                  │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs périodiques (Annuel / Mensuel / Hebdo / Quotidien) pour les 6
# équipements du Pôle 1 : 3 clims, 1 radiateur cuisine, 1 soufflant SDB,
# 1 sèche-serviette SDB. 6 équipements × 4 cycles = 24 compteurs.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : firmware direct NOUS (Z2M) — sensor.*_nous_energy (kWh natif)
# - Remise à zéro : Quotidien = minuit / Hebdo = lundi / Mensuel = 1er / Annuel = 1er jan
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL             | CAPTEUR BRUT (source)                                    | CE FICHIER (unique_id)              | AVAL                                |
# |:---------------------|:---------------------------------------------------------|:------------------------------------|:------------------------------------|
# | NOUS plug (Z2M)      | sensor.clim_salon_nous_energy                            | clim_salon_*_um                     | P1_AVG.yaml / P1_TOTAL_AMHQ → L2C2 |
# | NOUS plug (Z2M)      | sensor.radiateur_elec_cuisine_energy                     | radiateur_elec_cuisine_*_um         | P1_AVG.yaml / P1_TOTAL_AMHQ → L2C2 |
# | NOUS plug (Z2M)      | sensor.clim_bureau_nous_energy                           | clim_bureau_*_um                    | P1_AVG.yaml / P1_TOTAL_AMHQ → L2C2 |
# | NOUS plug (Z2M)      | sensor.prise_soufflant_salle_de_bain_nous_energy         | soufflant_sdb_*_um                  | P1_AVG.yaml / P1_TOTAL_AMHQ → L2C2 |
# | NOUS plug (Z2M)      | sensor.prise_seche_serviette_salle_de_bain_nous_energy   | seche_serviette_sdb_*_um            | P1_AVG.yaml / P1_TOTAL_AMHQ → L2C2 |
# | NOUS plug (Z2M)      | sensor.clim_chambre_nous_energy                          | clim_chambre_*_um                   | P1_AVG.yaml / P1_TOTAL_AMHQ → L2C2 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Sources firmware direct (kWh natif NOUS Z2M) — Riemann supprimé.
# - P1_kWh_clim_chauffage.yaml (Riemann) désormais OBSOLÈTE pour ces UM.
# - Suffixe _um (sans _kwh_) : convention uniforme depuis refactoring 2026-04-25.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Alimente la vignette L2C2 (Conso Énergie Clim / Radiateur / Soufflant)

# ┌───────────────────────────────────┐
# │ 4. SALON                          │
# └───────────────────────────────────┘

# --- clim_salon_annuel_um ---

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. UTILITY METER : ÉNERGIE APPART — COÛT AMHQ (TOTAL)               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant la consommation totale de l'appartement
# en 4 cycles temporels (Quotidien, Hebdomadaire, Mensuel, Annuel — AMHQ).
# Source unique : sensor.general_electric_appart_energy (sans split HP/HC).
# Pour le split HP/HC, voir : 03_UM_genelec_appart_HPHC_AMHQ.yaml
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.general_electric_appart_energy (kWh cumulatif total).
# - Les cycles UM accumulent ces valeurs sur la période définie.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Source Ecojoko remplacée par sensor.general_electric_appart_energy.
# - Ces UM fournissent le kWh total (HP+HC confondus) — utilisés par les
#   templates AVG (03_AVG_genelec_appart.yaml) pour la puissance de croisière.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (puissance de croisière AMHQ)

# ─── QUOTIDIEN ────────────────────────────────────────────────────────────────

# --- genelec_appart_quotidien_um ---
genelec_appart_quotidien_um:
  source: sensor.general_electric_appart_energy
  name: "Genelec Appart Quotidien UM"
  unique_id: genelec_appart_quotidien_um
  cycle: daily

# ─── HEBDOMADAIRE ────────────────────────────────────────────────────────────

# --- genelec_appart_hebdomadaire_um ---
genelec_appart_hebdomadaire_um:
  source: sensor.general_electric_appart_energy
  name: "Genelec Appart Hebdomadaire UM"
  unique_id: genelec_appart_hebdomadaire_um
  cycle: weekly

# ─── MENSUEL ─────────────────────────────────────────────────────────────────

# --- genelec_appart_mensuel_um ---
genelec_appart_mensuel_um:
  source: sensor.general_electric_appart_energy
  name: "Genelec Appart Mensuel UM"
  unique_id: genelec_appart_mensuel_um
  cycle: monthly

# ─── ANNUEL ──────────────────────────────────────────────────────────────────

# --- genelec_appart_annuel_um ---
genelec_appart_annuel_um:
  source: sensor.general_electric_appart_energy
  name: "Genelec Appart Annuel UM"
  unique_id: genelec_appart_annuel_um
  cycle: yearly


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 2. UTILITY METER AMHQ : MINI PC (BUREAU) — ÉNERGIE Wh               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs périodiques (Annuel / Mensuel / Hebdo / Quotidien) pour le Mini PC.
# Unité : Wh (faible consommation — précision Wh préférable à kWh).
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.prise_mini_pc_ikea_energy (énergie native IKEA Z2M — Wh)
# - Remise à zéro : Quotidien = minuit / Hebdo = lundi / Mensuel = 1er / Annuel = 1er jan
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL    | CAPTEUR BRUT (source)             | CE FICHIER (unique_id)                       | AVAL                          |
# |:------------|:----------------------------------|:---------------------------------------------|:------------------------------|
# | IKEA (Z2M)  | sensor.prise_mini_pc_ikea_energy  | prise_mini_pc_ikea_*_{annuel|...|quotidien}_wh_um | P2_AVG_AMHQ_mini_pc.yaml → L4C2 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Unité = Wh → P2_AVG_AMHQ_mini_pc.yaml utilise conso / h (pas × 1000).
# - P2_Wh_mini_pc.yaml (Riemann) → obsolète, à supprimer de TREE_CORRIGE.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Vignette L4C2 Mini PC (pop-up #conso via AVG → streamline-card)

# ┌───────────────────────────────────┐
# │ 7. BUREAU                         │
# └───────────────────────────────────┘

# --- prise_mini_pc_ikea_annuel_wh_um ---
prise_mini_pc_ikea_annuel_wh_um:
  source: sensor.prise_mini_pc_ikea_energy
  name: "Prise Mini PC IKEA Annuel Wh UM"
  unique_id: prise_mini_pc_ikea_annuel_wh_um
  cycle: yearly

# --- prise_mini_pc_ikea_mensuel_wh_um ---
prise_mini_pc_ikea_mensuel_wh_um:
  source: sensor.prise_mini_pc_ikea_energy
  name: "Prise Mini PC IKEA Mensuel Wh UM"
  unique_id: prise_mini_pc_ikea_mensuel_wh_um
  cycle: monthly

# --- prise_mini_pc_ikea_hebdomadaire_wh_um ---
prise_mini_pc_ikea_hebdomadaire_wh_um:
  source: sensor.prise_mini_pc_ikea_energy
  name: "Prise Mini PC IKEA Hebdomadaire Wh UM"
  unique_id: prise_mini_pc_ikea_hebdomadaire_wh_um
  cycle: weekly

# --- prise_mini_pc_ikea_quotidien_wh_um ---
prise_mini_pc_ikea_quotidien_wh_um:
  source: sensor.prise_mini_pc_ikea_energy
  name: "Prise Mini PC IKEA Quotidien Wh UM"
  unique_id: prise_mini_pc_ikea_quotidien_wh_um
  cycle: daily


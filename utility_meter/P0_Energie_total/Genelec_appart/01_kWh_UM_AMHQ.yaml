# - [AJOUT] genelec_appart_quotidien_kwh_um (cycle daily manquant) — requis par 03_AVG_genelec_appart.yaml
# - [L29,37,45,53] name: "Réseau *" → "Genelec Appart * UM" (conformité convention)
# - [L27,34,41] source inchangée : sensor.genelec_appart_totale_kwh
# - [SUPPRIMÉ] ecojoko_hp/hc_reseau_*_kwh_um (source Ecojoko remplacée)

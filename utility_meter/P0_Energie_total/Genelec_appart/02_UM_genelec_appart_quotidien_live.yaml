# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. UTILITY METER : ÉNERGIE APPART — QUOTIDIEN LIVE (J-0 / J-1)      │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteur Utility Meter en cycle daily pour la consommation totale de
# l'appartement. Fournit la valeur du jour en cours (state) et automatiquement
# la valeur J-1 via l'attribut natif 'last_period'.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.general_electric_appart_energy (kWh cumulatif total).    # "[modif] : ecojoko_consommation_reseau → general_electric_appart_energy / HP+HC supprimés"
# - Reset automatique à minuit. Attribut 'last_period' = kWh du jour précédent
#   (natif HA, pas besoin de sensor supplémentaire).
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# J-2 à J-7 ne sont PAS fournis par cet UM — ils sont gérés par l'intégration
# MEData (Linky). Ne pas utiliser 'state' pour les calculs J-1 (utiliser
# 'last_period'). HP/HC supprimés : source Ecojoko remplacée par compteur global.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (coût quotidien J0, valeur J1 via last_period)

# --- genelec_appart_quotidien_um ---
# J-0 live (state) | J-1 automatique (attribut last_period)
genelec_appart_quotidien_um:                                                     # "[L25] modif : suppression wrapper '- sensor:' + correction indentation (format !include_dir_merge_named)"
  source: sensor.general_electric_appart_energy
  name: "Genelec Appart Quotidien UM"                                            # "[L28] modif : 'Réseau Quotidien UM' → 'Genelec Appart Quotidien UM' (préfixe obligatoire)"
  unique_id: genelec_appart_quotidien_um
  cycle: daily


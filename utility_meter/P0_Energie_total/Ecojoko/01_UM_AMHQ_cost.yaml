# --- ecojoko_hc_reseau_mensuel_um ---
ecojoko_hc_reseau_mensuel_um:
  source: sensor.ecojoko_consommation_hc_reseau
  name: "Ecojoko HC Réseau Mensuel UM"
  unique_id: ecojoko_hc_reseau_mensuel_um
  cycle: monthly


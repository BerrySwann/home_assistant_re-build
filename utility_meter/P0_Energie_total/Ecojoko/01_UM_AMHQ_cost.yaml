# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. UTILITY METER : ECOJOKO — COÛT AMHQ (TOTAL / HP / HC)            │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant la consommation Ecojoko réseau en 3 cycles
# temporels (Mensuel, Hebdomadaire, Annuel) pour Total, Heures Pleines et Heures
# Creuses. Ces UM permettent le calcul du coût mensuel/annuel en multipliant par
# le tarif TTC.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : sensor.ecojoko_consommation_reseau / sensor.ecojoko_consommation_hp_reseau
#   / sensor.ecojoko_consommation_hc_reseau (capteurs daily reset minuit).
# - Les cycles UM accumulent ces valeurs daily sur la période (mensuel, hebdo, annuel).
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# Les sources sont des capteurs DAILY (reset minuit), pas des cumulatifs globaux.
# Sans cet UM monthly, le coût mensuel = coût du jour en cours seulement (bug ~0.45€).
# Ne pas confondre avec les sensors globaux Linky.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (ring-tiles coûts HP/HC, pie charts)

# ─── MENSUEL ─────────────────────────────────────────────────────────────────

# --- ecojoko_reseau_mensuel_um ---
ecojoko_reseau_mensuel_um:
  source: sensor.ecojoko_consommation_reseau
  name: "Ecojoko Réseau Mensuel UM"
  unique_id: ecojoko_reseau_mensuel_um
  cycle: monthly

# --- ecojoko_hp_reseau_mensuel_um ---
ecojoko_hp_reseau_mensuel_um:
  source: sensor.ecojoko_consommation_hp_reseau
  name: "Ecojoko HP Réseau Mensuel UM"

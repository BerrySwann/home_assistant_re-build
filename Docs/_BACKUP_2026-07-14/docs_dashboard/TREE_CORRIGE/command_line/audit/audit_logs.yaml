# ╭──────────────────────────────────────────────────────────────────────────╮
# │ COMMAND LINE : LECTURE LOG AUDIT MD5                                     │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensor qui lit les 25 dernières lignes du rapport MD5 le plus récent.
# Alimente la carte journal audit sur la page Système (L5C3).
#
# ## 🧮 CALCUL & SOURCES :
# Source : /config/.logs/md5_audit_YYYY-MM-DD.txt
# Généré par : shell_command.audit_md5 → .scripts/audit_md5.sh
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL     | CAPTEUR BRUT (source)                  | CE FICHIER (unique_id) | AVAL         |
# |:-------------|:---------------------------------------|:-----------------------|:-------------|
# | [calculé]    | /config/.logs/md5_audit_YYYY-MM-DD.txt | audit_md5_journal      | L5C3 Système |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - glob prend le fichier le plus récent (tri alphabétique = tri date YYYY-MM-DD)
# - scan_interval: 30 → rafraîchi ~30s après l'appel du bouton
# - Si aucun log n'existe encore → retourne '-'
# - python3 doit être SUR UNE SEULE LIGNE dans le >- YAML (multiligne = erreur parser)
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# L5C3 Système — carte "Journal Audit MD5"

# --- audit_md5_journal ---
- sensor:
    name: "Audit MD5 Journal"
    unique_id: audit_md5_journal
    command: >-
      bash -lc 'python3 -c "import json,os,glob; files=sorted(glob.glob(\"/config/.logs/md5_audit_*.txt\")); f=files[-1] if files else None; lines=open(f).readlines()[-25:] if f else []; k=[l.rstrip() for l in lines]; print(json.dumps({\"text\":chr(10).join(k) or \"—\"}))" 2>/dev/null || echo "{\"text\":\"—\"}"'
    scan_interval: 30
    value_template: 'OK'
    json_attributes:
      - text


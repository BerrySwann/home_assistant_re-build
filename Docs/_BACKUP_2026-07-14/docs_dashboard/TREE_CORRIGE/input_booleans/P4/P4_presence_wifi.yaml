# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 4. INPUT BOOLEAN : PRÉSENCE — SUBSTITUTS & SURCHARGES WIFI          │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Interrupteurs de présence manuelle permettant de surcharger la détection
# automatique Wi-Fi/cellulaire. Utiles quand le téléphone n'est pas connecté
# au Wi-Fi maison mais la personne est physiquement présente (invité, téléphone
# éteint, réseau en dérangement).
# Complète la logique de sensor.groupe (groupe_1=Absent → groupe_4=Tous présents).
#
# ## 🧮 CALCUL & SOURCES :
# - mode_absence_force :
#   Forcer manuellement le mode Absent (groupe_1) quelle que soit la détection Wi-Fi.
#   Utilisé lors de longues absences ou en mode vacances.
#   Doit être remis à 'off' au retour.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Si mode_absence_force est 'on', les automations de clim basculeront en éco.
# - À documenter dans les automations A0/B0 si intégration future souhaitée.
# - Actuellement : helper déclaré, intégration automation à venir.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - WIFI_PRESENCE (Page Home — vignette présence Wi-Fi)

# --- mode_absence_force ---
mode_absence_force:
  name: "Mode Absence Forcé"
  icon: mdi:home-export-outline

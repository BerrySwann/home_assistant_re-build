# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1. INPUT BOOLEAN : ARRÊT SÉCURISÉ CLIM (×3)                         │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Drapeaux booléens indiquant qu'un arrêt de sécurité est en cours sur une clim.
# Activés par l'automation G_arret_clim_notif.yaml ou I_debug_force_mode.yaml
# quand une clim passe en mode 'off' de façon non planifiée.
# Permettent d'éviter les boucles de relance automatique pendant la séquence
# d'arrêt sécurisé.
#
# ## 🧮 CALCUL & SOURCES :
# - Écrit par : automations P1 clim (A0, B0, I_debug_force_mode)
# - Lu par    : automation A0_clim_jour et B0_clim_nuit (condition "arret en cours")
# - Logique   : si 'on' → la clim ne sera pas rallumée par l'automation principale
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces booleans doivent être remis à 'off' en fin de séquence d'arrêt.
# - Ne pas confondre avec switch.clim_*_nous (alimentation physique).
# - Nommage intentionnel : *_arret_securise_en_cours (état transitoire).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Non affiché directement — usage interne automation uniquement.

# --- clim_salon_arret_securise_en_cours ---
clim_salon_arret_securise_en_cours:
  name: "Clim Salon Arrêt Sécurisé en Cours"
  icon: mdi:shield-alert

# --- clim_bureau_arret_securise_en_cours ---
clim_bureau_arret_securise_en_cours:
  name: "Clim Bureau Arrêt Sécurisé en Cours"
  icon: mdi:shield-alert

# --- clim_chambre_arret_securise_en_cours ---
clim_chambre_arret_securise_en_cours:
  name: "Clim Chambre Arrêt Sécurisé en Cours"
  icon: mdi:shield-alert

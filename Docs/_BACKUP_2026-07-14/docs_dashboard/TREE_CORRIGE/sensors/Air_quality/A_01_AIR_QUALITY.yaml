# ╭──────────────────────────────────────────────────────────────────────────╮
# │ [ A ] SENSORS : QUALITÉ DE L'AIR — MOYENNES 24H (PM2.5 + TCOV × 3)       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Six capteurs statistiques calculant la moyenne glissante sur 24h des valeurs
# brutes PM2.5 et tCOV (VOC index) pour les 3 pièces équipées IKEA Vindstyrka.
# Ces moyennes servent de marqueurs de référence (marker2) sur les ring-tile
# de la page /air-quality.
#
# ## 🧮 CALCUL & SOURCES :
# - Platform      : statistics / state_characteristic: mean / max_age: 24h
# - Source PM2.5  : sensor.qualite_air_*_ikea_pm25 (IKEA Vindstyrka Zigbee)
# - Source tCOV   : sensor.qualite_air_*_ikea_voc_index (IKEA Vindstyrka Zigbee)
# - Pièces        : Salon, Bureau, Chambre
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | Capteur PM2.5/tCOV (Z2M) | sensor.salon_pm25 / sensor.salon_tcov              | salon_pm25_mean_24h / salon_tvoc_ppb_mean_24h      | A_01_AIR_QUALITY.yaml (templates) → L6C1 |
# | Capteur PM2.5/tCOV (Z2M) | sensor.bureau_pm25 / sensor.bureau_tcov            | bureau_pm25_mean_24h / bureau_tvoc_ppb_mean_24h    | A_01_AIR_QUALITY.yaml (templates) → L6C1 |
# | Capteur PM2.5/tCOV (Z2M) | sensor.chambre_pm25 / sensor.chambre_tcov          | chambre_pm25_mean_24h / chambre_tvoc_ppb_mean_24h  | A_01_AIR_QUALITY.yaml (templates) → L6C1 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - La moyenne 24h se recalcule en continu (fenêtre glissante, pas reset minuit).
# - Si le capteur IKEA est indisponible, la stat retourne "unavailable".
# - Ne pas confondre avec voc_index (0-500) et pm25 (µg/m³) : unités distinctes.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L6C1 : Qualité de l'air intérieur (marker2 des ring-tile PM2.5 + tCOV)

# --- pm2_5_salon_moy_24h ---
- platform: statistics
  name: "PM2.5 Salon (moy 24h)"
  unique_id: pm2_5_salon_moy_24h
  entity_id: sensor.qualite_air_salon_ikea_pm25
  state_characteristic: mean
  max_age:
    hours: 24
  precision: 1

# --- tcov_salon_moy_24h ---
- platform: statistics
  name: "tCOV Salon (moy 24h)"
  unique_id: tcov_salon_moy_24h
  entity_id: sensor.qualite_air_salon_ikea_voc_index
  state_characteristic: mean
  max_age:
    hours: 24
  precision: 1


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ INPUT DATETIME — HORODATAGES PERSISTANTS                                 │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Helpers datetime persistants. Stockent un horodatage qui survit aux
# redémarrages de HA. Inclus via : input_datetime: !include input_datetime.yaml
#
# ## 🧮 CALCUL & SOURCES :
# - dernier_eclair : écrit par automation meteo/maj_temps_foudre.yaml
#   via action input_datetime.set_datetime quand sensor.maison_lightning_counter
#   change d'état (nouvel impact Blitzortung détecté).
# - Lecture : templates/meteo/M_03_meteo_blitzortung.yaml
#   → {% set last = states('input_datetime.dernier_eclair') %}
#   → calcul diff j/h/m depuis le dernier impact.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - has_date: true + has_time: true obligatoire → le template utilise
#   (now() - last_dt).total_seconds() qui nécessite la partie heure.
# - Si l'entité est absente au démarrage, l'automation ne peut pas écrire
#   et le template retourne 'unknown' → garder ce fichier chargé en permanence.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L1C1 Météo (section Blitzortung — "Dernier impact il y a X h Y min")

# --- dernier_eclair ---
dernier_eclair:
  name: "Dernier Eclair"
  has_date: true
  has_time: true
  icon: mdi:lightning-bolt

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ UTILITAIRES. TEMPLATES : CYCLE JOUR/NUIT — 7h30-21h / 21h-7h30           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Deux capteurs binaires définissant les périodes Jour et Nuit du logement,
# indépendamment du cycle solaire. Ces capteurs servent de référence pour les
# automatisations (notifications, éclairage, stores, clim) qui doivent
# s'adapter au rythme d'activité du foyer.
# Créé par Eric (BerrySwann) le 2026-03-11.
#
# ## 🧮 CALCUL & SOURCES :
# - Jour  : actif de 07h30 à 21h00 (today_at() pour comparaison optimisée).
# - Nuit  : actif de 21h00 à 07h30.
# - Utilise today_at() pour éviter les boucles infinies dans les templates HA.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces capteurs sont INDÉPENDANTS du soleil (lever/coucher). Pour les
#   automatisations liées au soleil, utiliser sun.sun directement.
# - Ne pas modifier les heures sans mettre à jour TOUTES les automatisations
#   qui référencent ces capteurs (stores, éclairage, notifications).
# - Groupe : "Cycles d'activité du foyer indépendants du cycle solaire".
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Utilisé en condition dans de nombreuses automatisations (non visible directement).

- binary_sensor:
  # --- est_jour ---
  - name: "Est Jour (7h30-21h)"
    unique_id: est_jour_7h30_21h
    state: >
      {{ today_at("07:30") <= now() < today_at("21:00") }}

  # --- est_nuit ---
  - name: "Est Nuit (21h-7h30)"
    unique_id: est_nuit_21h_7h30
    state: >
      {{ not (today_at("07:30") <= now() < today_at("21:00")) }}


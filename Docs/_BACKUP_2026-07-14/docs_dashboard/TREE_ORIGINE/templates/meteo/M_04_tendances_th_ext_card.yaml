# ╭──────────────────────────────────────────────────────────────────────────╮
# │ MÉTÉO. TEMPLATE : TENDANCES T°/HUMIDITÉ BALCON NORD (BALCON NORD TREND)  │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template calculant la tendance (increasing / stable / decreasing)
# de la température et de l'humidité extérieure sur le balcon Nord. Les
# résultats alimentent les icônes de flèche directionnelle (↑ ↓ →) dans
# la vignette Températures et le pop-up #exterieur.
#
# ## 🧮 CALCUL & SOURCES :
# - sensor.th_balcon_nord_temperature : T° actuelle (sonde SONOFF balcon)
# - sensor.th_balcon_nord_humidity : Humidité actuelle (sonde SONOFF balcon)
# - input_number.th_balcon_nord_temperature_previous : T° précédente stockée
# - input_number.th_balcon_nord_humidity_previous : Humidité précédente stockée
# - Logique : current > previous → increasing / < → decreasing / = → stable
# - Les input_number sont mis à jour par une automation externe (périodique).
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - La tendance dépend de la fréquence de MàJ des input_number_previous.
#   Si l'automation de snapshot est trop fréquente (<5min), la tendance
#   oscillera. Recommandé : snapshot toutes les 30min.
# - Le balcon Nord est exposé à la dépression VMC de la SDB — légère
#   influence possible sur les mesures d'humidité en hiver.
# - Les valeurs sont arrondies à 2 décimales pour éviter les oscillations
#   dues au bruit de mesure (fluctuations de ±0.01°C).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L1C2 Températures (icônes flèche ↑↓→ dans la vignette et pop-up #exterieur)

- sensor:
    # ┌───────────────────────────────────────────────────────────────────┐
    # │ 10. AUTRE : LOGIQUE TENDANCES (BALCON NORD)                     │
    # └───────────────────────────────────────────────────────────────────┘

    # Tendance Température (balcon nord)
    # --- th_balcon_nord_temperature_trend ---
    - name: "th balcon nord temperature trend"
      unique_id: th_balcon_nord_temperature_trend
      state: >
        {% set current = states('sensor.th_balcon_nord_temperature') | float(0) | round(2) %}
        {% set previous = states('input_number.th_balcon_nord_temperature_previous') | float(0) | round(2) %}
        {% if current > previous %}
          increasing
        {% elif current < previous %}
          decreasing
        {% else %}
          stable
        {% endif %}

    # Tendance Humidité (balcon nord)
    # --- th_balcon_nord_humidity_trend ---
    - name: "th balcon nord humidity trend"
      unique_id: th_balcon_nord_humidity_trend
      state: >
        {% set current = states('sensor.th_balcon_nord_humidity') | float(0) | round(2) %}
        {% set previous = states('input_number.th_balcon_nord_humidity_previous') | float(0) | round(2) %}
        {% if current > previous %}
          increasing
        {% elif current < previous %}
          decreasing
        {% else %}
          stable
        {% endif %}

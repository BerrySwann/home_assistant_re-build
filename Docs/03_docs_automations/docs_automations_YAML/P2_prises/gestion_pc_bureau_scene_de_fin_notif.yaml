id: '1775245732227'
alias: 'Gestion PC bureau : Scène de Fin + Notif'
description: 'Éteint la prise du PC et notifie, mais laisse la prise ON pour le
  suivi conso  lorsqu''une veille est détectée.

  '
triggers:
- id: bouton_mqtt
  trigger: mqtt
  topic: zigbee2mqtt2/Poussoir (IKEA TRADFRI)/action
- id: extinction_conso
  trigger: numeric_state
  entity_id: sensor.prise_bureau_pc_ikea_power
  below: 40
  for:
    minutes: 2
actions:
- choose:
  - alias: 'ALLUMAGE : Bouton ON'
    conditions:
    - or:
      - condition: template
        value_template: '{{ trigger.id == ''bouton_mqtt'' and trigger.payload_json.action
          == ''on'' }}'
      - condition: trigger
        id: bouton_mqtt
    sequence:
    - action: light.turn_on
      target:
        entity_id: light.hue_smart_eco_pc_bureau
      data: {}
    - action: light.turn_on
      target:
        entity_id: light.hue_smart_eco_pc_bureau
      data: {}
  - alias: 'EXTINCTION PRISE PC: Bouton OFF ou Veille (< 80W)'
    conditions:
    - or:
      - condition: template
        value_template: '{{ trigger.id == ''bouton_mqtt'' and trigger.payload_json.action
          == ''off'' }}'
      - condition: trigger
        id: extinction_conso
    sequence:
    - action: light.turn_off
      target:
        entity_id: light.hue_smart_eco_pc_bureau
    - action: notify.mobile_app_eric
      data:
        title: Veille détectée
        message: PC Bureau [OFF]
        data:
          icon: mdi:eye-outline
          tag: notif_pc_bureau
mode: parallel

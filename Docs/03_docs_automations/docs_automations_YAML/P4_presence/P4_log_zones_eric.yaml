alias: "[P4] Eric — Log Zones"
description: Enregistre chaque changement de zone dans /config/.logs/zone_eric.txt
triggers:
  - alias: CHANGEMENT ZONE ERIC
    entity_id: device_tracker.poco
    not_from:
      - unavailable
      - unknown
    not_to:
      - unavailable
      - unknown
    trigger: state
conditions: []
actions:
  - variables:
      log_to: "{{ states('device_tracker.poco') }}"
      log_from: >-
        {% if trigger.from_state is defined and trigger.from_state is not none %}
          {{ trigger.from_state.state }}
        {% else %}
          n/a
        {% endif %}
  - condition: template
    value_template: "{{ log_to not in ['unavailable', 'unknown', ''] }}"
  - alias: ÉCRITURE LOG ZONE
    action: notify.send_message
    target:
      entity_id: notify.zone_eric
    data:
      message: >-
        {{ now().strftime('%Y-%m-%d %H:%M:%S') }} | {{ log_from }} → {{ log_to }}
mode: queued
max: 10

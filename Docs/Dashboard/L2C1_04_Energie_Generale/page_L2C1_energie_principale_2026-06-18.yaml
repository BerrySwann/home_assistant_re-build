# Page Principale L2C1 — Navigation: /dashboard-tablette/energie
# Sauvegardé: 2026-06-18

type: grid
columns: 1
square: false
cards:
  - type: vertical-stack
    cards:
      - type: heading
        icon: mdi:home-lightning-bolt
        heading: Énergie Générale
        heading_style: title
        badges:
          - type: entity
            entity: sensor.general_electric_appart_power
            show_state: true
            show_icon: true
            name: Réel
            color: green
            state_content:
              - name
              - state
          - type: entity
            entity: sensor.genelec_appart_conso_mini_24h
            show_state: true
            show_icon: true
            name: Mini 24h
            color: blue
            state_content:
              - name
              - state
          - type: entity
            entity: sensor.genelec_appart_conso_maxi_24h
            show_state: true
            show_icon: true
            name: Maxi 24h
            color: red
            state_content:
              - name
              - state
  - type: custom:tabbed-card
    styles:
      "--mdc-theme-primary": white
      "--mdc-tab-text-label-color-default": rgba(255, 255, 255, 0.25)
    tabs:
      - attributes:
          label: JOURNALIER
          icon: mdi:calendar-today
        card:
          type: vertical-stack
          cards:
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_conso_mini_24h
                  name: Mini
                  icon: mdi:arrow-down-circle
                  color: green
                  severity:
                    - from: 0
                      to: 2
                      color: green
                    - from: 2
                      to: 4
                      color: orange
                    - from: 4
                      to: 100
                      color: red
                  units: kWh
                  max: 30
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_quotidien_um
                  name: Réel J
                  icon: mdi:lightning-bolt-circle
                  color: "#03a9f4"
                  severity:
                    - from: 0
                      to: 8
                      color: green
                    - from: 8
                      to: 15
                      color: orange
                    - from: 15
                      to: 100
                      color: red
                  units: kWh
                  max: 30
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_conso_maxi_24h
                  name: Maxi
                  icon: mdi:arrow-up-circle
                  color: red
                  severity:
                    - from: 0
                      to: 2
                      color: green
                    - from: 2
                      to: 4
                      color: orange
                    - from: 4
                      to: 100
                      color: red
                  units: kWh
                  max: 30
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_cout_total_quotidien
                  name: Coût Total J
                  icon: mdi:currency-eur
                  color: "#fdd835"
                  units: "€"
                  max: 5
                  severity:
                    - from: 0
                      to: 2
                      color: green
                    - from: 2
                      to: 3.5
                      color: orange
                    - from: 3.5
                      to: 10
                      color: red
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_cout_hp_quotidien
                  name: Coût HP J
                  icon: mdi:weather-sunny
                  color: orange
                  units: "€"
                  max: 5
                  severity:
                    - from: 0
                      to: 2
                      color: green
                    - from: 2
                      to: 3.5
                      color: orange
                    - from: 3.5
                      to: 10
                      color: red
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_cout_hc_quotidien
                  name: Coût HC J
                  icon: mdi:weather-night
                  color: blue
                  units: "€"
                  max: 5
                  severity:
                    - from: 0
                      to: 2
                      color: green
                    - from: 2
                      to: 3.5
                      color: orange
                    - from: 3.5
                      to: 10
                      color: red
            - type: custom:bar-card
              title: "Analyse de Précision — Linky vs Nodon"
              title_position: top
              entities:
                - entity: sensor.general_electric_appart_energy
                  name: "Nodon (temps réel)"
                  icon: mdi:current-ac
                  color: "#03a9f4"
                - entity: sensor.linky_25481620821301_consumption_history
                  name: "Linky (J-1)"
                  icon: mdi:meter-electric
                  color: "#ff9800"
              height: 38
              unit_of_measurement: kWh
              card_mod:
                style: |
                  ha-card { background: none !important; }
            - type: custom:apexcharts-card
              graph_span: 24h
              cache: false
              update_interval: 5m
              apex_config:
                chart:
                  height: 250px
                  stacked: true
              header:
                show: true
                title: Évolution Conso 24h (par poste)
                show_states: false
              all_series_config:
                group_by: { func: mean, duration: 30m }
                stroke_width: 0
                fill_raw: last
                type: area
                show: { legend_value: false }
              series:
                - { entity: sensor.total_poste_chauffage_puissance, name: Chauffage, color: "#ff5722" }
                - { entity: sensor.total_poste_multimedia_puissance, name: Multimédia, color: "#2196f3" }
                - { entity: sensor.total_poste_cuisine_puissance, name: Cuisine, color: "#9c27b0" }
                - { entity: sensor.total_poste_froid_puissance, name: Froid, color: "#00bcd4" }
                - { entity: sensor.total_poste_hygiene_puissance, name: Hygiène, color: "#009688" }
                - { entity: sensor.eclairage_total_group_puissance_tpl, name: Lumière, color: "#fdd835" }
                - { entity: sensor.total_poste_autre_puissance, name: Autres, color: "#9e9e9e" }
              card_mod:
                style: |
                  ha-card { background: none !important; box-shadow: none !important; border: none !important; }
            - type: custom:apexcharts-card
              chart_type: pie
              apex_config:
                chart:
                  height: 300px
              header:
                show: true
                title: "Répartition HP / HC du Jour"
                show_states: true
                colorize_states: true
              all_series_config:
                show: { legend_value: true }
              series:
                - entity: sensor.genelec_appart_hphc_quotidien_um_hp
                  name: Heures Pleines
                  color: "#ff9800"
                - entity: sensor.genelec_appart_hphc_quotidien_um_hc
                  name: Heures Creuses
                  color: "#2196f3"
              card_mod:
                style: |
                  ha-card { background: none !important; box-shadow: none !important; border: none !important; }
            - type: custom:button-card
              name: Rentabilité HC
              entity: sensor.genelec_appart_ratio_hc_quotidien
              icon: mdi:percent-circle
              show_state: true
              styles:
                card:
                  - background: transparent
                  - border: "1px solid rgba(255,255,255,0.2)"
              state_display: |
                [[[
                  const val = parseFloat(states['sensor.genelec_appart_ratio_hc_quotidien']?.state) || 0;
                  let color = val >= 40 ? 'lightgreen' : val >= 25 ? '#FFA500' : 'rgb(244,67,54)';
                  return `<span style="color:${color}; font-size:20px; font-weight:bold;">${val.toFixed(1)}% HC</span>`;
                ]]]
            - type: custom:auto-entities
              card:
                type: custom:apexcharts-card
                chart_type: donut
                apex_config:
                  chart:
                    height: 400px
                header:
                  show: true
                  title: Répartition Postes Journalier
                  show_states: true
                  colorize_states: true
                all_series_config:
                  show: { legend_value: true }
                card_mod:
                  style: |
                    ha-card { background: none !important; box-shadow: none !important; border: none !important; }
              entities:
                - entity: sensor.diag_poste_chauffage_quotidien
                  name: Chauffage
                  color: "#ff5722"
                - entity: sensor.diag_poste_multimedia_quotidien
                  name: Multimédia
                  color: "#2196f3"
                - entity: sensor.diag_poste_cuisine_quotidien
                  name: Cuisine
                  color: "#9c27b0"
                - entity: sensor.diag_poste_froid_quotidien
                  name: Froid
                  color: "#00bcd4"
                - entity: sensor.diag_poste_hygiene_quotidien
                  name: Hygiène
                  color: "#009688"
                - entity: sensor.diag_poste_eclairage_quotidien
                  name: Lumière
                  color: "#fdd835"
                - entity: sensor.diag_poste_autre_quotidien
                  name: Autres
                  color: "#9e9e9e"
      - attributes:
          label: HEBDOMADAIRE
          icon: mdi:calendar-week
        card:
          type: vertical-stack
          cards:
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_hebdomadaire_um
                  name: Conso Hebdo
                  icon: mdi:calendar-week
                  color: "#03a9f4"
                  units: kWh
                  max: 200
                  severity:
                    - from: 0
                      to: 60
                      color: green
                    - from: 60
                      to: 100
                      color: orange
                    - from: 100
                      to: 300
                      color: red
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_avg_watts_quotidien
                  name: Moy. Watts/J
                  icon: mdi:gauge
                  color: "#fdd835"
                  units: W
                  max: 3000
                  severity:
                    - from: 0
                      to: 1000
                      color: green
                    - from: 1000
                      to: 2000
                      color: orange
                    - from: 2000
                      to: 10000
                      color: red
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_ratio_hc_hebdomadaire
                  name: Ratio HC %
                  icon: mdi:percent
                  color: "#4caf50"
                  units: "%"
                  max: 100
                  severity:
                    - from: 0
                      to: 25
                      color: red
                    - from: 25
                      to: 40
                      color: orange
                    - from: 40
                      to: 100
                      color: green
            - type: custom:apexcharts-card
              chart_type: donut
              apex_config:
                chart:
                  height: 400px
              header:
                show: true
                title: Répartition Postes Hebdomadaire
                show_states: true
                colorize_states: true
              all_series_config:
                show: { legend_value: true }
              series:
                - { entity: sensor.diag_poste_chauffage_hebdomadaire, name: Chauffage, color: "#ff5722" }
                - { entity: sensor.diag_poste_multimedia_hebdomadaire, name: Multimédia, color: "#2196f3" }
                - { entity: sensor.diag_poste_cuisine_hebdomadaire, name: Cuisine, color: "#9c27b0" }
                - { entity: sensor.diag_poste_froid_hebdomadaire, name: Froid, color: "#00bcd4" }
                - { entity: sensor.diag_poste_hygiene_hebdomadaire, name: Hygiène, color: "#009688" }
                - { entity: sensor.diag_poste_eclairage_hebdomadaire, name: Lumière, color: "#fdd835" }
                - { entity: sensor.diag_poste_autre_hebdomadaire, name: Autres, color: "#9e9e9e" }
              card_mod:
                style: |
                  ha-card { background: none !important; box-shadow: none !important; border: none !important; }
            - type: custom:apexcharts-card
              chart_type: pie
              apex_config:
                chart:
                  height: 300px
              header:
                show: true
                title: "HP / HC Semaine"
                show_states: true
                colorize_states: true
              series:
                - { entity: sensor.genelec_appart_hphc_hebdo_um_hp, name: "Heures Pleines", color: "#ff9800" }
                - { entity: sensor.genelec_appart_hphc_hebdo_um_hc, name: "Heures Creuses", color: "#2196f3" }
              card_mod:
                style: |
                  ha-card { background: none !important; box-shadow: none !important; border: none !important; }
      - attributes:
          label: MENSUEL
          icon: mdi:calendar-month
        card:
          type: vertical-stack
          cards:
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_mensuel_um
                  name: Conso Mensuel
                  icon: mdi:calendar-month
                  color: "#03a9f4"
                  units: kWh
                  max: 700
                  severity:
                    - from: 0
                      to: 250
                      color: green
                    - from: 250
                      to: 450
                      color: orange
                    - from: 450
                      to: 1000
                      color: red
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_avg_watts_mensuel
                  name: Moy. Watts/J
                  icon: mdi:gauge
                  color: "#fdd835"
                  units: W
                  max: 3000
                  severity:
                    - from: 0
                      to: 1000
                      color: green
                    - from: 1000
                      to: 2000
                      color: orange
                    - from: 2000
                      to: 10000
                      color: red
                - type: custom:ring-tile
                  entity: sensor.genelec_appart_ratio_hc_mensuel
                  name: Ratio HC %
                  icon: mdi:percent
                  color: "#4caf50"
                  units: "%"
                  max: 100
                  severity:
                    - from: 0
                      to: 25
                      color: red
                    - from: 25
                      to: 40
                      color: orange
                    - from: 40
                      to: 100
                      color: green
            - type: custom:apexcharts-card
              chart_type: donut
              apex_config:
                chart:
                  height: 400px
              header:
                show: true
                title: Répartition Postes Mensuel
                show_states: true
                colorize_states: true
              all_series_config:
                show: { legend_value: true }
              series:
                - { entity: sensor.diag_poste_chauffage_mensuel, name: Chauffage, color: "#ff5722" }
                - { entity: sensor.diag_poste_multimedia_mensuel, name: Multimédia, color: "#2196f3" }
                - { entity: sensor.diag_poste_cuisine_mensuel, name: Cuisine, color: "#9c27b0" }
                - { entity: sensor.diag_poste_froid_mensuel, name: Froid, color: "#00bcd4" }
                - { entity: sensor.diag_poste_hygiene_mensuel, name: Hygiène, color: "#009688" }
                - { entity: sensor.diag_poste_eclairage_mensuel, name: Lumière, color: "#fdd835" }
                - { entity: sensor.diag_poste_autre_mensuel, name: Autres, color: "#9e9e9e" }
              card_mod:
                style: |
                  ha-card { background: none !important; box-shadow: none !important; border: none !important; }
            - type: custom:apexcharts-card
              chart_type: pie
              apex_config:
                chart:
                  height: 300px
              header:
                show: true
                title: "HP / HC Mois"
                show_states: true
                colorize_states: true
              series:
                - { entity: sensor.genelec_appart_hphc_mensuel_um_hp, name: "Heures Pleines", color: "#ff9800" }
                - { entity: sensor.genelec_appart_hphc_mensuel_um_hc, name: "Heures Creuses", color: "#2196f3" }
              card_mod:
                style: |
                  ha-card { background: none !important; box-shadow: none !important; border: none !important; }
            - type: custom:content-card-linky
              showCurrentMonthRatio: true
              showWeekRatio: true
              showYearRatio: true
            - type: custom:flex-table-card
              title: "Historique Linky (J-1 à J-7)"
              strict: true
              columns:
                - name: Date
                  data: attributes
                  modify: x.date
                - name: kWh
                  data: attributes
                  modify: x.value
                - name: HC (kWh)
                  data: attributes
                  modify: x.value_off_peak
                - name: HP (kWh)
                  data: attributes
                  modify: x.value_peak
              entities:
                - sensor.linky_25481620821301_consumption_history

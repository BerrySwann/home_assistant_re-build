page 3 Mensuel

type: grid
cards:
  - type: heading
    icon: mdi:transmission-tower
    heading: ENERGIE MENSUEL (Start Month)
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/energie
    layout_options:
      grid_columns: full
      grid_rows: 1
  - type: custom:apexcharts-card
    chart_type: donut
    cache: true
    apex_config:
      chart:
        height: 580px
    header:
      show: true
      title: Conso. mensuel (kWh)
      show_states: true
      colorize_states: true
    all_series_config:
      show:
        legend_value: false
        extremas: false
    show:
      loading: true
      last_updated: false
    series:
      - entity: sensor.prise_box_internet_ikea_mensuel_um
        name: Box (+)
        color: rgb(183, 183, 183)
      - entity: sensor.prise_horloge_ikea_mensuel_um
        name: Horloge (+)
        color: rgb(220, 220, 220)
      - entity: sensor.prise_pc_s_gege_ikea_mensuel_um
        name: PCg
        color: rgb(174, 68, 90)
      - entity: sensor.prise_salon_chargeur_nous_mensuel_um
        name: Chargeurs (+)
        color: rgb(196, 75, 97)
      - entity: sensor.prise_tv_salon_ikea_mensuel_um
        name: TV Salon
        color: rgb(215, 95, 115)
      - entity: sensor.prise_four_micro_ondes_nous_mensuel_um
        name: Four M-O (+)
        color: rgb(98, 78, 136)
      - entity: sensor.prise_petit_dejeune_nous_mensuel_um
        name: P'tit Dej. (+)
        color: rgb(118, 93, 160)
      - entity: sensor.prise_lave_linge_nous_mensuel_um
        name: Linge
        color: rgb(137, 103, 179)
      - entity: sensor.prise_lave_vaisselle_nous_mensuel_um
        name: Vaisselle
        color: rgb(129, 116, 180)
      - entity: sensor.prise_airfryer_ninja_nous_mensuel_um
        name: Airfryer (+)
        color: rgb(142, 122, 181)
      - entity: sensor.four_et_plaque_de_cuisson_mensuel_um
        name: Four & Plq Cui.
        color: rgb(162, 148, 249)
      - entity: sensor.prise_frigo_cuisine_nous_mensuel_um
        name: frigo
        color: rgb(19, 160, 255)
      - entity: sensor.prise_congelateur_cuisine_nous_mensuel_um
        name: congél.
        color: rgb(0, 255, 255)
      - entity: sensor.prise_bureau_pc_ikea_mensuel_um
        name: PCe
        color: rgb(255, 165, 0)
      - entity: sensor.prise_bureau_fer_a_repasser_nous_mensuel_um
        name: FàR (+)
        color: rgb(255, 183, 51)
      - entity: sensor.prise_tete_de_lit_chambre_mensuel_um
        name: Têtes L. (+)
        color: rgb(75, 130, 85)
      - entity: sensor.prise_tv_chambre_nous_mensuel_um
        name: TV (+)
        color: rgb(105, 155, 110)
      - entity: sensor.all_standby_mensuel_um
        name: Veilles
        color: rgb(109, 76, 65)
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
        }
  - type: heading
    icon: phu:rooms-hallway
    heading: Entrée
    heading_style: title
  - type: custom:streamline-card
    template: conso_mensuelle_appareil
    variables:
      title: Box Internet (Hue)
      energy_entity: sensor.prise_box_internet_ikea_mensuel_um
      color: rgb(183, 183, 183)
      avg_monthly_entity: sensor.box_internet_avg_watts_mensuel

# Page L2C2 — Énergie Clim / Radiateur / Soufflant
# Navigation: /dashboard-tablette/energie-clim
# Sauvegardé: 2026-06-18

type: grid
cards:
  - type: heading
    icon: mdi:transmission-tower
    heading: ENERGIE (C)LIM / (R)ADIATEUR
    heading_style: title
    badges:
      - type: entity
        show_state: true
        show_icon: false
        entity: sensor.temperature_delta_affichage
        tap_action:
          action: navigate
          navigation_path: "#tendances"
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/home
    layout_options:
      grid_columns: full
      grid_rows: 1
  - type: conditional
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity: sensor.salon_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.cuisine_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.bureau_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.sdb_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.sdb_seche_serviettes_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.chambre_power_status_affichage
            state_not: "off"
    card:
      type: custom:stack-in-card
      mode: vertical
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:mod-card
              card_mod:
                style:
                  .: |
                    :host {
                      --text-divider-color: white;
                      --text-divider-line-size: 5px;
                    }
              card:
                type: custom:text-divider-row
                text: Consomation TOTAL Climatisations & Radiateurs
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
          }
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            entity: sensor.dut_clim_salon
            content: |
              Salon: {% set t = states(entity) | float(0) %}
              {% set h = t | int %}{% set m = ((t - h) * 60) | int %}
              {{ h }}h{{ '{:02d}'.format(m) }}
            icon: |-
              {% if is_state('sensor.ete_hiver', 'Été') %}
                mdi:snowflake
              {% else %}
                mdi:fire
              {% endif %}
            icon_color: >-
              {% if is_state('sensor.ete_hiver', 'Été') %} #03a9f4 {% else %}
              #ff9800 {% endif %}
            card_mod:
              style: |
                ha-card {
                  border: none !important;
                  box-shadow: none !important;
                  background: transparent;
                }
          - type: template
            entity: sensor.dut_radiateur_cuisine
            content: |
              Cuisine: {% set t = states(entity) | float(0) %}
              {% set h = t | int %}{% set m = ((t - h) * 60) | int %}
              {{ h }}h{{ '{:02d}'.format(m) }}
            icon: mdi:radiator
            icon_color: "#f44336"
            card_mod:
              style: |
                ha-card {
                  border: none !important;
                  box-shadow: none !important;
                  background: transparent;
                }
          - type: template
            entity: sensor.dut_clim_bureau
            content: |
              Bureau: {% set t = states(entity) | float(0) %}
              {% set h = t | int %}{% set m = ((t - h) * 60) | int %}
              {{ h }}h{{ '{:02d}'.format(m) }}
            icon: |-
              {% if is_state('sensor.ete_hiver', 'Été') %}
                mdi:snowflake
              {% else %}
                mdi:fire
              {% endif %}
            icon_color: >-
              {% if is_state('sensor.ete_hiver', 'Été') %} #03a9f4 {% else %}
              #ff9800 {% endif %}
            card_mod:
              style: |
                ha-card {
                  border: none !important;
                  box-shadow: none !important;
                  background: transparent;
                }
          - type: template
            entity: sensor.dut_clim_chambre
            content: |
              Chambre: {% set t = states(entity) | float(0) %}
              {% set h = t | int %}{% set m = ((t - h) * 60) | int %}
              {{ h }}h{{ '{:02d}'.format(m) }}
            icon: |-
              {% if is_state('sensor.ete_hiver', 'Été') %}
                mdi:snowflake
              {% else %}
                mdi:fire
              {% endif %}
            icon_color: >-
              {% if is_state('sensor.ete_hiver', 'Été') %} #03a9f4 {% else %}
              #ff9800 {% endif %}
            card_mod:
              style: |
                ha-card {
                  border: none !important;
                  box-shadow: none !important;
                  background: transparent;
                }
  - type: custom:mushroom-chips-card
    chips:
      - type: conditional
        conditions:
          - entity: sensor.salon_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:air-conditioner
          icon_color: |-
            {% if is_state('sensor.clim_salon_etat', 'Cool') %} #87CEEB
            {% elif is_state('sensor.clim_salon_etat', 'Heat') %} #ff6100
            {% elif is_state('sensor.clim_salon_etat', 'Fan') %} #40E0D0
            {% else %} #FF0000 {% endif %}
          content: "Salon: {{ states('sensor.clim_salon_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.cuisine_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: |-
            {% if is_state('sensor.radiateur_cuisine_etat', 'Heat') %} #ff6100
            {% else %} #FF0000 {% endif %}
          content: "Cuisine: {{ states('sensor.radiateur_cuisine_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.bureau_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:air-conditioner
          icon_color: |-
            {% if is_state('sensor.clim_bureau_etat', 'Cool') %} #87CEEB
            {% elif is_state('sensor.clim_bureau_etat', 'Heat') %} #ff6100
            {% elif is_state('sensor.clim_bureau_etat', 'Fan') %} #40E0D0
            {% else %} #FF0000 {% endif %}
          content: "Bureau: {{ states('sensor.clim_bureau_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.sdb_soufflant_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:heat-wave
          icon_color: |-
            {% if is_state('sensor.sdb_soufflant_etat', 'Heat') %} #ff6100
            {% else %} #FF0000 {% endif %}
          content: "SdB Soufflant: {{ states('sensor.sdb_soufflant_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.sdb_seche_serviette_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: |-
            {% if is_state('sensor.sdb_seche_serviette_etat', 'Heat') %} #ff6100
            {% else %} #FF0000 {% endif %}
          content: "SdB Serviette: {{ states('sensor.sdb_seche_serviette_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.chambre_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:air-conditioner
          icon_color: |-
            {% if is_state('sensor.clim_chambre_etat', 'Cool') %} #87CEEB
            {% elif is_state('sensor.clim_chambre_etat', 'Heat') %} #ff6100
            {% elif is_state('sensor.clim_chambre_etat', 'Fan') %} #40E0D0
            {% else %} #FF0000 {% endif %}
          content: "Chambre: {{ states('sensor.clim_chambre_etat') }}"
          tap_action:
            action: none
    alignment: center
  - type: vertical-stack
    cards:
      - type: custom:auto-entities
        card:
          type: custom:bar-card
          icon: mdi:lightning-bolt-outline
          title_position: inside
          height: 38
          positions:
            icon: inside
            indicator: inside
            name: inside
            value: inside
          show_icon: true
          align: split
          columns: "1"
          unit_of_measurement: W
          severity:
            - color: gainsboro
              from: 0
              to: 5
            - color: rgb(102, 255, 102)
              from: 5
              to: 49
            - color: rgb(0, 102, 0)
              from: 50
              to: 249
            - color: orange
              from: 250
              to: 499
            - color: darkorange
              from: 500
              to: 749
            - color: red
              from: 750
              to: 999
            - color: darkred
              from: 1000
              to: 6000
          card_mod:
            style: |
              :host {
                --ha-card-border-color: none !important;
                --card-background-color: none !important;
                }
              ha-card {
                border: none !important;
                box-shadow: none !important;
                background: none !important;
                font-weight: bold;
                --mdc-icon-size: 25px;
                --paper-item-icon-color: white;
              }
              bar-card-currentbar, bar-card-backgroundbar {
                height: 6px !important;
                margin-top: 35px;
              }
        filter:
          include:
            - options: {}
              entity_id: sensor.conso_clim_rad_total
        sort:
          numeric: true
          reverse: true
          ip: false
          ignore_case: false
          method: state
          show_empty: false
          entity_row: true
        visibility:
          - condition: numeric_state
            entity: sensor.conso_clim_rad_total
            above: 0.1
  - type: conditional
    conditions: []
    card:
      type: custom:stack-in-card
      mode: vertical
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:mod-card
              card_mod:
                style:
                  .: |
                    :host {
                      --text-divider-color: white;
                      --text-divider-line-size: 5px;
                    }
              card:
                type: custom:text-divider-row
                text: Consomation Total Journalière
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
          }
  - type: custom:apexcharts-card
    chart_type: donut
    cache: true
    span:
      start: day
    apex_config:
      chart:
        height: 600px
    header:
      show: true
      title: Conso. journalière (Start Day)
      show_states: true
      colorize_states: true
    all_series_config:
      show:
        legend_value: false
        extremas: false
    show:
      loading: true
      last_updated: false
    series:
      - entity: sensor.clim_salon_quotidien_um
        name: SALON (C)
        color: rgb(174,68,90)
        float_precision: 2
      - entity: sensor.radiateur_elec_cuisine_quotidien_um
        name: CUISINE (R)
        color: rgb(168, 136, 181)
        float_precision: 2
      - entity: sensor.clim_bureau_quotidien_um
        name: BUREAU (C)
        color: orange
        float_precision: 2
      - entity: sensor.soufflant_sdb_quotidien_um
        name: Souff. SdB (R)
        color: magenta
        float_precision: 2
      - entity: sensor.seche_serviette_sdb_quotidien_um
        name: Sèche-Serv. SdB (R)
        color: purple
        float_precision: 2
      - entity: sensor.clim_chambre_quotidien_um
        name: CHAMBRE (C)
        color: rgb(30,81,40)
        float_precision: 2
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
          font-size: 11px;
        }
  - type: conditional
    conditions: []
    card:
      type: custom:stack-in-card
      mode: vertical
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:mod-card
              card_mod:
                style:
                  .: |
                    :host {
                      --text-divider-color: white;
                      --text-divider-line-size: 5px;
                    }
              card:
                type: custom:text-divider-row
                text: Consomation Total Mensuel
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
          }
  - type: custom:apexcharts-card
    chart_type: donut
    cache: true
    span:
      start: month
    apex_config:
      chart:
        height: 500px
    header:
      show: true
      title: Conso. mensuel (Start Month)
      show_states: true
      colorize_states: true
    all_series_config:
      show:
        legend_value: false
        extremas: false
    show:
      loading: true
      last_updated: false
    series:
      - entity: sensor.clim_salon_mensuel_um
        name: SALON (C)
        color: rgb(174,68,90)
        float_precision: 2
      - entity: sensor.radiateur_elec_cuisine_mensuel_um
        name: CUISINE (R)
        color: rgb(168, 136, 181)
        float_precision: 2
      - entity: sensor.clim_bureau_mensuel_um
        name: BUREAU (C)
        color: orange
        float_precision: 2
      - entity: sensor.soufflant_sdb_mensuel_um
        name: Souff. SdB (R)
        color: magenta
        float_precision: 2
      - entity: sensor.seche_serviette_sdb_mensuel_um
        name: Sèche-Serv. SdB (R)
        color: purple
        float_precision: 2
      - entity: sensor.clim_chambre_mensuel_um
        name: CHAMBRE (C)
        color: rgb(30,81,40)
        float_precision: 2
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
          font-size: 11px;
        }
  - type: conditional
    conditions: []
    card:
      type: custom:stack-in-card
      mode: vertical
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:mod-card
              card_mod:
                style:
                  .: |
                    :host {
                      --text-divider-color: white;
                      --text-divider-line-size: 5px;
                    }
              card:
                type: custom:text-divider-row
                text: Tendance
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
          }
  - type: heading
    icon: mdi:thermometer-lines
    heading_style: title
    badges: []
    layout_options:
      grid_columns: full
      grid_rows: 1
    heading: Tendances
    tap_action:
      action: none
  - type: horizontal-stack
    cards:
      - type: custom:vertical-stack-in-card
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.th_balcon_nord_temperature
            icon: >
              {% if is_state('sensor.th_balcon_nord_temperature_trend',
              'increasing') %}
                mdi:arrow-top-right-thick
              {% elif is_state('sensor.th_balcon_nord_temperature_trend',
              'decreasing') %}
                mdi:arrow-bottom-right-thick
              {% else %}
                mdi:arrow-right-thick
              {% endif %}
            icon_color: >
              {% if is_state('sensor.th_balcon_nord_temperature_trend',
              'increasing') %}
                red
              {% elif is_state('sensor.th_balcon_nord_temperature_trend',
              'decreasing') %}
                blue
              {% else %}
                #df6366
              {% endif %}
            primary: ""
            secondary: "{{ states('sensor.th_balcon_nord_temperature') }}°C"
            layout: horizontal
            tap_action:
              action: none
            hold_action:
              action: none
            card_mod:
              style: |
                ha-card {
                  background-color: transparent !important;
                  border: none !important;
                }
                mushroom-state-info$: |
                  .primary {
                    font-size: 12px !important;
                    color: lightgrey !important;
                    position: relative;
                    bottom: 5px;
                    left: 5px;
                    overflow: visible !important;
                    white-space: normal !important;
                  }
                  .secondary {
                    font-size: 19px !important;
                    position: relative;
                    overflow: visible !important;
                    top: 0px;
                    left: 5px;
                  }
                mushroom-shape-icon$: |
                  .shape {
                    position: relative;
                    left: 0px;
                    top: 0px;
                  }
                .: |
                  :host {
                    --mush-icon-size: 50px;
                  }
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.th_balcon_nord_temperature
                name: Température
                color: "#df6366"
            height: 200
            hours_to_show: 24
            decimals: 1
            points_per_hour: 6
            line_width: 2
            font_size: 80
            hour24: true
            animate: true
            show:
              labels: true
              name: false
              icon: false
              state: false
              legend: false
              extrema: true
              fill: fade
              points: false
            card_mod:
              style: |
                ha-card {
                  background: none !important;
                  box-shadow: none !important;
                  border: none !important;
                }
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
          height: 228px;
          margin-left: auto;
          margin-right: auto;
        }
  - type: custom:apexcharts-card
    graph_span: 24h
    cache: true
    span:
      start: day
      offset: "-0h"
    apex_config:
      chart:
        height: 400px
    now:
      show: true
      color: darkred
      label: Now
    header:
      show: true
      title: " "
      show_states: true
      colorize_states: true
    yaxis:
      - id: temperature
        min: ~5
        max: ~32
        decimals: 2
        apex_config:
          tickAmount: 10
      - id: conso_clim
        min: ~150
        max: auto
        opposite: true
        decimals: 2
        apex_config:
          tickAmount: 10
    all_series_config:
      group_by:
        func: last
        duration: 60m
      show:
        legend_value: false
    series:
      - entity: sensor.temperature_moyenne_interieure
        name: "T̅ Appart."
        yaxis_id: temperature
        stroke_width: 4
        fill_raw: last
        color: orange
        show:
          extremas: true
      - entity: sensor.th_balcon_nord_temperature
        name: "T° Bal.Nrd"
        yaxis_id: temperature
        stroke_width: 4
        fill_raw: last
        color: green
        show:
          extremas: true
      - entity: sensor.conso_clim_rad_total
        name: Conso. Instan.
        yaxis_id: conso_clim
        type: column
        opacity: 0.6
        fill_raw: last
        color: rgb(68,115,158)
        unit: W
        group_by:
          func: max
          duration: 1h
          start_with_last: true
      - entity: sensor.conso_clim_rad_total_quotidien
        name: Conso. Total
        color: rgb(68,115,158)
        unit: kWh
        show:
          in_brush: false
          in_chart: false
      - entity: sensor.clim_rad_total_avg_watts_quotidien
        name: Moy.depuis Minuit
        yaxis_id: conso_clim
        type: line
        stroke_width: 2
        color: "#F44336"
        unit: W
        show:
          in_brush: false
          in_chart: true
          extremas: true
      - entity: sensor.conso_clim_rad_total_mensuel
        name: Mois en cours
        color: red
        show:
          in_brush: false
          in_chart: false
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
          font-size: 12px;
        }
  - type: custom:apexcharts-card
    experimental:
      color_threshold: true
    graph_span: 24h
    cache: true
    span:
      start: day
      offset: +0m
    apex_config:
      chart:
        height: 340px
    now:
      show: true
      color: "#f44336"
      label: V
    header:
      show: true
      title: D.U.T. Pièces vs Performance Totale
      show_states: true
      colorize_states: true
    yaxis:
      - id: temp
        max: ~15
        decimals: 0
        opposite: false
      - id: hours
        min: 0
        max: 6
        decimals: 0
        opposite: true
        apex_config:
          tickAmount: 12
    all_series_config:
      curve: smooth
      show:
        legend_value: false
        extremas: true
    series:
      - entity: sensor.th_balcon_nord_temperature
        yaxis_id: temp
        name: Temp. Ext.
        extend_to: now
        fill_raw: last
        type: area
        opacity: 0.2
        color: "#44739e"
        stroke_width: 1
      - entity: sensor.dut_clim_salon
        name: Salon
        extend_to: now
        fill_raw: last
        yaxis_id: hours
        color: rgb(174,68,90)
        stroke_width: 3
      - entity: sensor.dut_radiateur_cuisine
        name: Cuisine
        extend_to: now
        fill_raw: last
        yaxis_id: hours
        color: rgb(168, 136, 181)
        stroke_width: 3
      - entity: sensor.dut_clim_bureau
        name: Bureau
        extend_to: now
        fill_raw: last
        yaxis_id: hours
        color: orange
        stroke_width: 3
      - entity: sensor.dut_sdb_total
        name: SdB
        yaxis_id: hours
        color: magenta
        stroke_width: 3
      - entity: sensor.dut_clim_chambre
        name: Chambre
        extend_to: now
        fill_raw: last
        yaxis_id: hours
        color: rgb(30,81,40)
        stroke_width: 3
    card_mod:
      style: |
        ha-card {
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
        }
  - type: conditional
    conditions: []
    card:
      type: custom:stack-in-card
      mode: vertical
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:mod-card
              card_mod:
                style:
                  .: |
                    :host {
                      --text-divider-color: white;
                      --text-divider-line-size: 5px;
                    }
              card:
                type: custom:text-divider-row
                text: SALON
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
          }
  - type: heading
    icon: mdi:sofa
    heading_style: title
    badges:
      - type: entity
        show_state: true
        show_icon: true
        entity: climate.clim_salon_rm4_mini
        color: state
        tap_action:
          action: more-info
        icon: mdi:thermometer
        state_content:
          - name
          - temperature
        name: "Réglé à"
      - type: entity
        show_state: true
        show_icon: true
        entity: sensor.th_salon_temperature
        color: green
        state_content:
          - name
          - state
        name: Salon
    layout_options:
      grid_columns: full
      grid_rows: 1
    heading: SALON
    card_mod:
      style: |
        ha-card {
          border: none !important;
          box-shadow: none !important;
          background: none !important;
          margin: -22px 0px 0px 0px;
        }
  - type: custom:bubble-card
    card_type: climate
    entity: climate.clim_salon_rm4_mini
    state_color: true
    icon: mdi:air-conditioner
    show_icon: true
    show_name: true

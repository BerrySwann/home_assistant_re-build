# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PAGE L1C3 — COMMANDES CLIM (version 2026-07-08)                          │
# ╰──────────────────────────────────────────────────────────────────────────╯
# Changements vs 2026-05-22 (migration RM4 → NodOn chambre) :
# - Thermostat chambre : climate.clim_chambre_nodon
# - Badge chambre : binary_sensor.clim_chambre_nodon_en_ligne (remplace remote.clim_chambre — availability Z2M)
# - ⚠️ CONNU : fan_modes du thermostat chambre encore ceux du RM4 (breeze/powerful/level1-5)
#   → à remplacer par les modes NodOn réels : auto, low, medium, high
type: grid
cards:
  - type: heading
    icon: mdi:sun-snowflake
    heading: CLIM.  / RADIATEUR
    heading_style: title
    badges:
      - type: entity
        show_state: true
        show_icon: false
        entity: sensor.temperature_delta_affichage
        tap_action:
          action: navigate
          navigation_path: "#calcul"
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1
  - type: conditional
    conditions:
      - condition: or
        conditions:
          - condition: state
            entity: sensor.salon_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.cuisine_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.bureau_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.sdb_power_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.sdb_seche_serviette_status_affichage
            state_not: "off"
          - condition: state
            entity: sensor.chambre_power_status_affichage
            state_not: "off"
    card:
      type: custom:stack-in-card
      mode: vertical
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:mod-card
              card_mod:
                style:
                  .: |
                    :host {
                      --text-divider-color: white;
                      --text-divider-line-size: 5px;
                    }
              card:
                type: custom:text-divider-row
                text: Consomation TOTAL Climatisations & Radiateurs
      card_mod:
        style: |
          ha-card {
            border: none !important;
            box-shadow: none !important;
            background: none !important;
          }
  - type: custom:mushroom-chips-card
    chips:
      - type: conditional
        conditions:
          - entity: sensor.salon_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:air-conditioner
          icon_color: |-
            {% if is_state('sensor.clim_salon_etat', 'Cool') %} #87CEEB
            {% elif is_state('sensor.clim_salon_etat', 'Heat') %} #ff6100
            {% elif is_state('sensor.clim_salon_etat', 'Fan') %} #40E0D0
            {% else %} #FF0000 {% endif %}
          content: "Salon: {{ states('sensor.clim_salon_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.cuisine_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: |-
            {% if is_state('sensor.radiateur_cuisine_etat', 'Heat') %} #ff6100
            {% else %} #FF0000 {% endif %}
          content: "Cuisine: {{ states('sensor.radiateur_cuisine_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.bureau_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:air-conditioner
          icon_color: |-
            {% if is_state('sensor.clim_bureau_etat', 'Cool') %} #87CEEB
            {% elif is_state('sensor.clim_bureau_etat', 'Heat') %} #ff6100
            {% elif is_state('sensor.clim_bureau_etat', 'Fan') %} #40E0D0
            {% else %} #FF0000 {% endif %}
          content: "Bureau: {{ states('sensor.clim_bureau_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.sdb_soufflant_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:heat-wave
          icon_color: |-
            {% if is_state('sensor.sdb_soufflant_etat', 'Heat') %} #ff6100
            {% else %} #FF0000 {% endif %}
          content: "SdB Soufflant: {{ states('sensor.sdb_soufflant_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.sdb_seche_serviette_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:heating-coil
          icon_color: |-
            {% if is_state('sensor.sdb_seche_serviette_etat', 'Heat') %} #ff6100
            {% else %} #FF0000 {% endif %}
          content: "SdB Serviette: {{ states('sensor.sdb_seche_serviette_etat') }}"
          tap_action:
            action: none
      - type: conditional
        conditions:
          - entity: sensor.chambre_power_status
            state_not: "off"
        chip:
          type: template
          icon: mdi:air-conditioner
          icon_color: |-
            {% if is_state('sensor.clim_chambre_etat', 'Cool') %} #87CEEB
            {% elif is_state('sensor.clim_chambre_etat', 'Heat') %} #ff6100
            {% elif is_state('sensor.clim_chambre_etat', 'Fan') %} #40E0D0
            {% else %} #FF0000 {% endif %}
          content: "Chambre: {{ states('sensor.clim_chambre_etat') }}"
          tap_action:
            action: none
    alignment: center
  - type: vertical-stack
    cards:
      - type: custom:auto-entities
        card:
          type: custom:bar-card
          icon: mdi:lightning-bolt-outline
          title_position: inside
          height: 38
          positions:
            icon: inside
            indicator: inside
            name: inside
            value: inside
          show_icon: true
          align: split
          columns: "1"
          unit_of_measurement: W
          severity:
            - color: gainsboro
              from: 0
              to: 5
            - color: rgb(102, 255, 102)
              from: 5
              to: 49
            - color: rgb(0, 102, 0)
              from: 50
              to: 249
            - color: orange
              from: 250
              to: 499
            - color: darkorange
              from: 500
              to: 749
            - color: red
              from: 750
              to: 999
            - color: darkred
              from: 1000
              to: 6000
          card_mod:
            style: |
              :host {
                --ha-card-border-color: none !important;
                --card-background-color: none !important;
                }
              ha-card {
                border: none !important;
                box-shadow: none !important;
                background: none !important;
                font-weight: bold;
                --mdc-icon-size: 25px;
                --paper-item-icon-color: white;
              }
              bar-card-currentbar, bar-card-backgroundbar {
                height: 6px !important;
                margin-top: 35px;
              }
        filter:
          include:
            - options: {}
              entity_id: sensor.conso_clim_rad_total
        sort:
          numeric: true
          reverse: true
          ip: false
          ignore_case: false
          method: state
          show_empty: false
          entity_row: true
    visibility:
      - condition: numeric_state
        entity: sensor.conso_clim_rad_total
        above: 0.1
  - card_mod:

              - type: custom:entity-progress-card-template
                name: >
                  {% set sunrise = as_datetime(states('sensor.sun_next_rising'))
                  %} {% set sunset =
                  as_datetime(states('sensor.sun_next_setting')) %} {% set
                  now_time = now() %} {% if sunrise and sunset %}
                    {% if sunrise < sunset %}
                      Levé du soleil à {{ sunrise.timestamp() | timestamp_custom('%H:%M', true) }}
                    {% else %}
                      Couché du soleil à {{ sunset.timestamp() | timestamp_custom('%H:%M', true) }}
                    {% endif %}
                  {% else %}
                    Suninformation not available
                  {% endif %}
                entity: sun.sun
                bar_color: |
                  {% if states('sun.sun') == 'below_horizon' %}
                    lightgray
                  {% else %}
                    orange
                  {% endif %}
                color: |
                  {% if states('sun.sun') == 'below_horizon' %}
                    none
                  {% else %}
                    orange
                  {% endif %}
                secondary: >
                  {% set sunrise = as_datetime(states('sensor.sun_next_rising'))
                  %} {% set sunset =
                  as_datetime(states('sensor.sun_next_setting')) %} {% set
                  now_time = now() %} {% if sunrise and sunset %}
                    {% if sunrise < sunset %}
                      {% set next_event = sunrise %}
                      {% set last_event = sunrise - timedelta(days=1) %}
                    {% else %}
                      {% set next_event = sunset %}
                      {% set last_event = sunset - timedelta(days=1) %}
                    {% endif %}
                    {% set delta = next_event - now_time %}
                    {% set total_seconds = delta.total_seconds() %}
                    {% if total_seconds > 1 %}
                      {% set days = (total_seconds // 86400) | int %}
                      {% set hours = (total_seconds % 86400) // 3600 %}
                      {% set minutes = (total_seconds % 3600) // 60 %}
                      {% set seconds = (total_seconds % 60) %}
                      dans
                      {% if days > 0 %}
                        {{ days }}d
                      {% endif %}
                      {{ '%02d:%02d:%02d' | format(hours | int, minutes | int, seconds | int) }}
                    {% else %}
                      maintenant
                    {% endif %}
                  {% else %}
                    --:--:--
                  {% endif %}
                percent: >
                  {% set sunrise = as_datetime(states('sensor.sun_next_rising'))
                  %} {% set sunset =
                  as_datetime(states('sensor.sun_next_setting')) %} {% set
                  now_time = now() %} {% if sunrise and sunset %}
                    {% if sunrise < sunset %}
                      {% set next_event = sunrise %}
                      {% set last_event = sunrise - timedelta(days=1) %}
                    {% else %}
                      {% set next_event = sunset %}
                      {% set last_event = sunset - timedelta(days=1) %}
                    {% endif %}
                    {% set total = (next_event - last_event).total_seconds() %}
                    {% set elapsed = (now_time - last_event).total_seconds() %}
                    {% if total > 0 %}
                      {{ ((elapsed / total) * 100) | round(2) }}
                    {% else %}
                      0
                    {% endif %}
                  {% else %}
                    0
                  {% endif %}

  - type: custom:windrose-card
    title: Direction et Vitesse du Vent avec Rafales
    windspeed_bar_location: bottom
    refresh_interval: 60
    wind_direction_entity:
      entity: sensor.direction_du_vent_vence
      use_statistics: false
      direction_compensation: 0
    windspeed_entities:
      - entity: weather.vence
        attribute: wind_speed
        name: Moyenne
        windspeed_bar_full: true
        speed_unit: auto
        output_speed_unit: kph
        speed_range_beaufort: false
        speed_range_step: 5
        speed_range_max: 35
        current_speed_arrow: true
        current_speed_arrow_size: 60
        current_speed_arrow_location: below
      - entity: sensor.vence_wind_gust
        name: Rafale
        windspeed_bar_full: true
        speed_unit: auto
        output_speed_unit: kph
        speed_range_beaufort: false
        current_speed_arrow: true
        current_speed_arrow_size: 60
        current_speed_arrow_location: below
        speed_ranges:
          - from_value: 0
            color: rgb(51, 51, 255)
          - from_value: 40
            color: rgb(51, 168, 255)
          - from_value: 50
            color: rgb(51, 255, 226)
          - from_value: 60
            color: rgb(51, 255, 109)
          - from_value: 70
            color: rgb(109, 255, 51)
          - from_value: 80
            color: rgb(226, 255, 51)
          - from_value: 90
            color: rgb(255, 105, 49)
          - from_value: 100
            color: rgb(216, 88, 41)
          - from_value: 110
            color: rgb(101, 19, 19)
    rose_config:
      windrose_draw_north_offset: 0
      center_calm_percentage: true
    direction_labels:
      cardinal_direction_letters: NESO
      show_cardinal_directions: true
      show_intercardinal_directions: true
      show_secondary_intercardinal_directions: true
      cardinal_directions_text_size: 60
      intercardinal_directions_text_size: 45
      secondary_intercardinal_directions_text_size: 30
      custom_labels:
        "n": Nord
        e: Est
        s: Sud
        w: Ouest
        ne: NE
        se: SE
        sw: SO
        nw: "NO"
        nne: NNE
        ene: ENE
        ese: ESE
        sse: SSE
        ssw: SSO
        wsw: OSO
        wnw: ONO
        nnw: NNO
    matching_strategy:
      name: full-time
    colors:
      rose_lines: rgb(0,255,0)
      rose_cardinal_direction_labels: white
      rose_intercardinal_direction_labels: white
      rose_secondary_intercardinal_direction_labels: white
      rose_center_percentage: white
      rose_percentages: white
      rose_current_direction_arrow: red
      bar_border: hsl(200, 100%, 60%)
      bar_unit_name: white
      bar_name: white
      bar_unit_values: white
      bar_percentages: auto
    buttons_config:
      location: top
      default_colors:
        active_color: black
        active_bg_color: white
        color: white
        bg_color: black
      buttons:
        - type: period_selector
          button_text: 1 day
          period_back: "-24h"
          active: true
        - type: period_selector
          button_text: 7 days
          period_back: "-168h"
        - type: period_selector
          button_text: 15 days
          period_back: "-360h"
        - type: period_selector
          button_text: 30 days
          period_back: "-730h"

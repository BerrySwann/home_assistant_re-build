type: grid
cards:
  - type: heading
    icon: mdi:flask-empty-outline
    heading: EMPTY
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1

  - type: custom:stack-in-card
    mode: vertical
    cards:

      # ── SÉPARATEUR HOME ASSISTANT ──────────────────
      - type: horizontal-stack
        cards:
          - type: custom:mod-card
            card_mod:
              style:
                .: |
                  :host {
                    --text-divider-color: white;
                    --text-divider-line-size: 5px;
                  }
            card:
              type: custom:text-divider-row
              text: Home Assistant

      # ── HEADER HA ──────────────────────────────────
      - type: custom:button-card
        entity: sensor.homeassistant_statut
        name: HOME ASSISTANT
        icon: mdi:home-assistant
        show_state: true
        state:
          - value: running
            styles:
              state:
                - color: rgb(15,157,88)
                - background: rgba(15,157,88,0.15)
                - border-radius: 10px
                - padding: 2px 10px
          - value: stopped
            styles:
              state:
                - color: rgb(244,67,54)
                - background: rgba(244,67,54,0.15)
                - border-radius: 10px
                - padding: 2px 10px
        styles:
          card:
            - padding: 8px 12px
            - background: >-
                linear-gradient(90deg, rgba(3,169,244,0.12) 0%,
                rgba(3,169,244,0.02) 100%)
            - border-left: "3px solid #03a9f4 !important"
            - border-radius: 8px !important
            - margin-bottom: 2px
          grid:
            - grid-template-areas: "\"i n s\""
            - grid-template-columns: min-content 1fr min-content
          name:
            - font-size: 13px
            - font-weight: bold
            - justify-self: start
            - padding-left: 8px
            - color: "#03a9f4"
            - letter-spacing: 0.5px
          state:
            - font-size: 11px
            - font-weight: bold
          icon:
            - width: 22px
            - color: "#03a9f4"
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card {
              border: none !important;
              box-shadow: none !important;
              background: none !important;
            }

      # ── MÉTRIQUES HA ───────────────────────────────
      - type: horizontal-stack
        cards:
          - type: custom:bar-card
            entity: sensor.homeassistant_utilisation_du_processeur
            name: CPU %
            icon: mdi:cpu-64-bit
            height: 42px
            min: 0
            max: 100
            target: 82
            decimal: 1
            animation:
              state: "on"
            positions:
              icon: inside
              indicator: inside
            entity_row: true
            tap_action:
              action: none
            severity:
              - color: rgb(15,157,88)
                from: 0
                to: 75
              - color: rgb(255,152,0)
                from: 75.1
                to: 90
              - color: rgb(244,67,54)
                from: 90.1
                to: 100
            card_mod:
              style: |
                ha-card {
                  font-size: 12px; font-weight: bold;
                  --mdc-icon-size: 26px;
                  --paper-item-icon-color: white !important;
                  border: none !important; box-shadow: none !important; background: none !important;
                }
          - type: custom:bar-card
            entity: sensor.homeassistant_memory_usage_percentage
            name: RAM %
            icon: mdi:memory
            height: 42px
            min: 0
            max: 100
            target: 72
            decimal: 1
            animation:
              state: "on"
            positions:
              icon: inside
              indicator: inside
            entity_row: true
            tap_action:

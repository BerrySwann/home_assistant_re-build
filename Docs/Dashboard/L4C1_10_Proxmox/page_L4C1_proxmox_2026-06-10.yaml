type: grid
cards:
  - type: heading
    icon: phu:proxmox
    heading: PROXMOX
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/0
    layout_options:
      grid_columns: full
      grid_rows: 1
  - type: custom:stack-in-card
    mode: vertical
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
        }
    cards:

      # ══════════════════════════════════════════════
      # PROXMOX VE (node)
      # ══════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mod-card
            card_mod:
              style:
                .: |
                  :host {
                    --text-divider-color: white;
                    --text-divider-line-size: 5px;
                  }
            card:
              type: custom:text-divider-row
              text: Proxmox VE
      - type: custom:button-card
        entity: sensor.pve_statut
        name: PROXMOX VE
        icon: phu:proxmox
        show_state: true
        state:
          - value: online
            styles:
              state:
                - color: rgb(15,157,88)
                - background: rgba(15,157,88,0.15)
                - border-radius: 10px
                - padding: 2px 10px
          - value: offline
            styles:
              state:
                - color: rgb(244,67,54)
                - background: rgba(244,67,54,0.15)
                - border-radius: 10px
                - padding: 2px 10px
        styles:
          card:
            - padding: 8px 12px
            - background: >-
                linear-gradient(90deg, rgba(15,157,88,0.12) 0%,
                rgba(15,157,88,0.02) 100%)
            - border-left: "3px solid #0f9d58 !important"
            - border-radius: 8px !important
            - margin-bottom: 2px
          grid:
            - grid-template-areas: "\"i n s\""
            - grid-template-columns: min-content 1fr min-content
          name:
            - font-size: 13px
            - font-weight: bold
            - justify-self: start
            - padding-left: 8px
            - color: "#0f9d58"
            - letter-spacing: 0.5px
          state:
            - font-size: 11px
            - font-weight: bold
          icon:
            - width: 22px
            - color: "#0f9d58"
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card { border: none !important; box-shadow: none !important; background: none !important; }
      - type: custom:button-card
        show_name: false
        show_state: false
        show_icon: false
        show_label: true
        label: |
          [[[
            var cpu = states['sensor.pve_utilisation_du_processeur'];
            var vcpu = states['sensor.pve_max_cpu'];
            if (!cpu || cpu.state === 'unavailable') return '<div style="color:#9e9e9e;font-size:12px;padding:3px 0">CPU: N/A</div>';
            var pct = parseFloat(cpu.state);
            var vcpuStr = (vcpu && vcpu.state !== 'unavailable') ? ' (' + vcpu.state + ' vCPU)' : '';
            var color = pct < 75 ? '#6ea8d7' : pct < 90 ? '#ff9800' : '#f44336';
            return '<div style="display:flex;flex-direction:column;gap:2px;width:100%;padding:3px 0">' +
              '<div style="display:flex;justify-content:space-between;align-items:center">' +
                '<span style="color:#9e9e9e;font-size:12px">CPU' + vcpuStr + '</span>' +
                '<span style="color:white;font-weight:bold;font-size:12px">' + pct.toFixed(1) + ' %</span>' +
              '</div>' +
              '<div style="background:rgba(255,255,255,0.1);height:3px;border-radius:2px">' +
                '<div style="background:' + color + ';width:' + Math.min(pct,100) + '%;height:3px;border-radius:2px"></div>' +
              '</div></div>';
          ]]]
        styles:
          card:
            - padding: 2px 12px
            - background: none !important
          label:
            - width: 100%
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card { border: none !important; box-shadow: none !important; background: none !important; }
      - type: custom:button-card
        show_name: false
        show_state: false
        show_icon: false
        show_label: true
        label: |
          [[[
            var used = states['sensor.pve_utilisation_de_la_memoire'];
            var max = states['sensor.pve_utilisation_maximale_de_la_memoire'];
            if (!used || used.state === 'unavailable') return '<div style="color:#9e9e9e;font-size:12px;padding:3px 0">RAM: N/A</div>';
            var usedV = parseFloat(used.state);
            var maxV = parseFloat(max.state);
            var pct = maxV > 0 ? (usedV / maxV * 100) : 0;
            var color = pct < 60 ? '#6ea8d7' : pct < 80 ? '#ff9800' : '#f44336';
            return '<div style="display:flex;flex-direction:column;gap:2px;width:100%;padding:3px 0">' +
              '<div style="display:flex;justify-content:space-between;align-items:center">' +
                '<span style="color:#9e9e9e;font-size:12px">RAM</span>' +
                '<span style="color:white;font-weight:bold;font-size:12px">' + pct.toFixed(1) + '%  (' + usedV.toFixed(2) + ' / ' + maxV.toFixed(1) + ' GiB)</span>' +
              '</div>' +
              '<div style="background:rgba(255,255,255,0.1);height:3px;border-radius:2px">' +
                '<div style="background:' + color + ';width:' + Math.min(pct,100) + '%;height:3px;border-radius:2px"></div>' +
              '</div></div>';
          ]]]
        styles:
          card:
            - padding: 2px 12px
            - background: none !important
          label:
            - width: 100%
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card { border: none !important; box-shadow: none !important; background: none !important; }
      - type: custom:button-card
        show_name: false
        show_state: false
        show_icon: false
        show_label: true
        label: |
          [[[
            var used = states['sensor.pve_utilisation_du_disque'];
            var max = states['sensor.pve_utilisation_maximale_du_disque'];
            if (!used || used.state === 'unavailable') return '<div style="color:#9e9e9e;font-size:12px;padding:3px 0">Disque: N/A</div>';
            var usedV = parseFloat(used.state);
            var maxV = parseFloat(max.state);
            var pct = maxV > 0 ? (usedV / maxV * 100) : 0;
            var color = pct < 70 ? '#6ea8d7' : pct < 85 ? '#ff9800' : '#f44336';
            return '<div style="display:flex;flex-direction:column;gap:2px;width:100%;padding:3px 0">' +
              '<div style="display:flex;justify-content:space-between;align-items:center">' +
                '<span style="color:#9e9e9e;font-size:12px">Disque</span>' +
                '<span style="color:white;font-weight:bold;font-size:12px">' + usedV.toFixed(2) + ' / ' + maxV.toFixed(1) + ' GiB  (' + pct.toFixed(0) + '%)</span>' +
              '</div>' +
              '<div style="background:rgba(255,255,255,0.1);height:3px;border-radius:2px">' +
                '<div style="background:' + color + ';width:' + Math.min(pct,100) + '%;height:3px;border-radius:2px"></div>' +
              '</div></div>';
          ]]]
        styles:
          card:
            - padding: 2px 12px
            - background: none !important
          label:
            - width: 100%
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card { border: none !important; box-shadow: none !important; background: none !important; }
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            entity: sensor.pve_uptime
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                if (!entity || entity.state === 'unavailable') return 'Uptime: N/A';
                var h_total = parseFloat(entity.state);
                var j = Math.floor(h_total / 24);
                var h = Math.floor(h_total % 24);
                return 'Uptime: ' + (j > 0 ? j + 'j ' : '') + h + 'h';
              ]]]
            styles:
              card:
                - padding: 4px 10px
                - background: rgba(15,157,88,0.05) !important
              label:
                - font-size: 12px
                - font-weight: bold
                - color: white
            tap_action:
              action: none
            card_mod:
              style: >
                ha-card { border: none !important; box-shadow: none !important; }
          - type: custom:button-card
            entity: binary_sensor.pve_backup_status
            show_name: false
            show_state: false
            show_icon: false
            show_label: true
            label: |
              [[[
                if (!entity || entity.state === 'unavailable') return 'Backup: N/A';
                return 'Backup: ' + (entity.state === 'off' ? '✓ OK' : '⚠ ERREUR');
              ]]]
            state:
              - value: "off"
                styles:
                  label:
                    - color: rgb(15,157,88)
              - value: "on"
                styles:
                  label:
                    - color: rgb(244,67,54)
            styles:
              card:
                - padding: 4px 10px
                - background: rgba(15,157,88,0.05) !important
              label:
                - font-size: 12px
                - font-weight: bold
                - color: white
            tap_action:
              action: none
            card_mod:
              style: >
                ha-card { border: none !important; box-shadow: none !important; }
      - type: custom:apexcharts-card
        graph_span: 1h
        cache: true
        span:
          offset: +1m
        header:
          show: false
        apex_config:
          chart:
            height: 70px
            toolbar:
              show: false
            sparkline:
              enabled: true
          tooltip:
            enabled: false
          yaxis:
            min: 0
            max: 100
        series:
          - entity: sensor.pve_utilisation_du_processeur
            type: area
            curve: smooth
            stroke_width: 1.5
            opacity: 0.4
            color: "#a0e57c"
            fill_raw: last
        card_mod:
          style: |
            ha-card { background: none !important; box-shadow: none !important; border: none !important; margin: 0 !important; }


# ╭──────────────────────────────────────────────────────────────────────────────╮
# │                       PAGE : PROXMOX VE (L4C1)                               │
# ╰──────────────────────────────────────────────────────────────────────────────╯

title: "Proxmox VE - Supervision Infrastructure"
path: dashboard-tablette/proxmox
icon: mdi:server
cards:
  # ┌─────────────────────────────────────────────────────────────┐
  # │                    1. HEADER + TITRE                        │
  # └─────────────────────────────────────────────────────────────┘
  - type: custom:button-card
    name: "PROXMOX VE"
    icon: mdi:server
    color: var(--primary-color)
    styles:
      card:
        - font-weight: bold
        - font-size: 20px
        - padding: 12px
      name:
        - font-size: 18px
        - font-weight: bold

  # ┌─────────────────────────────────────────────────────────────┐
  # │          2. SECTION PROXMOX NODE - RESSOURCES PRINCIPALES   │
  # └─────────────────────────────────────────────────────────────┘
  - type: custom:stack-in-card
    mode: vertical
    cards:
      # Titre section
      - type: custom:button-card
        name: "NODE PROXMOX"
        icon: mdi:database-server
        color: var(--primary-color)
        styles:
          card:
            - padding: 8px
            - background-color: rgba(3, 169, 244, 0.1)
          name:
            - font-weight: bold

      # Grille ressources
      - type: horizontal-stack
        cards:
          # CPU Temperature
          - type: custom:bar-card
            entity: sensor.proxmox_pve_cpu_temperature
            title: "CPU Temp"
            unit_of_measurement: "°C"
            positions:
              icon: "off"
              title:
                outside: left
            bar_percent: true
            color: >-
              {% if states('sensor.proxmox_pve_cpu_temperature') | float(0) <= 50 %}
                rgb(15, 157, 88)
              {% elif states('sensor.proxmox_pve_cpu_temperature') | float(0) <= 70 %}
                rgb(255, 152, 0)
              {% else %}
                rgb(244, 67, 54)
              {% endif %}
            severity:
              - color: rgb(15, 157, 88)
                value: 0
              - color: rgb(255, 152, 0)
                value: 50
              - color: rgb(244, 67, 54)
                value: 70

          # CPU Utilization %
          - type: custom:bar-card
            entity: sensor.proxmox_pve_cpu_utilisation_percentage
            title: "CPU %"
            unit_of_measurement: "%"
            positions:
              icon: "off"
              title:
                outside: left
            bar_percent: true
            severity:
              - color: rgb(15, 157, 88)
                value: 0
              - color: rgb(255, 152, 0)
                value: 75
              - color: rgb(244, 67, 54)
                value: 90

          # Memory %
          - type: custom:bar-card
            entity: sensor.proxmox_pve_memory_utilisation_percentage
            title: "RAM %"
            unit_of_measurement: "%"
            positions:
              icon: "off"
              title:
                outside: left
            bar_percent: true
            severity:
              - color: rgb(15, 157, 88)
                value: 0
              - color: rgb(255, 152, 0)
                value: 75
              - color: rgb(244, 67, 54)
                value: 90

      # Deuxième rangée : Storage + Status
      - type: horizontal-stack
        cards:
          # Storage %
          - type: custom:bar-card
            entity: sensor.proxmox_pve_storage_utilisation_percentage
            title: "Storage %"
            unit_of_measurement: "%"
            positions:
              icon: "off"
              title:
                outside: left
            bar_percent: true
            severity:
              - color: rgb(15, 157, 88)
                value: 0
              - color: rgb(255, 152, 0)
                value: 80
              - color: rgb(244, 67, 54)
                value: 90

          # Status
          - type: custom:button-card
            entity: binary_sensor.proxmox_pve_status
            name: "Status"
            icon: >
              {% if is_state('binary_sensor.proxmox_pve_status', 'on') %}
                mdi:check-circle
              {% else %}
                mdi:alert-circle
              {% endif %}
            color: >
              {% if is_state('binary_sensor.proxmox_pve_status', 'on') %}
                rgb(15, 157, 88)
              {% else %}
                rgb(244, 67, 54)
              {% endif %}
            state:
              - value: "on"
                label: "ONLINE"
              - value: "off"
                label: "OFFLINE"

  # ┌─────────────────────────────────────────────────────────────┐
  # │        3. SECTION CONTENEURS (HA, Z2M, MariaDB, Mosquitto)  │
  # └─────────────────────────────────────────────────────────────┘
  - type: custom:stack-in-card
    mode: vertical
    cards:
      # Titre section
      - type: custom:button-card
        name: "CONTENEURS SUPERVISÉS"
        icon: mdi:docker
        color: var(--primary-color)
        styles:
          card:
            - padding: 8px
            - background-color: rgba(33, 150, 243, 0.1)
          name:
            - font-weight: bold

      # --- Home Assistant Container
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:button-card
            name: "HOME ASSISTANT"
            icon: mdi:home-assistant
            color: var(--info-color)
            styles:
              card:
                - padding: 6px
                - background-color: rgba(33, 150, 243, 0.05)

          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entity: sensor.homeassistant_utilisation_du_processeur
                title: "CPU %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 75
                  - color: rgb(244, 67, 54)
                    value: 90

              - type: custom:bar-card
                entity: sensor.homeassistant_memory_usage_percentage
                title: "RAM %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 75
                  - color: rgb(244, 67, 54)
                    value: 90

      # --- Zigbee2MQTT Container
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:button-card
            name: "ZIGBEE2MQTT"
            icon: mdi:zigbee
            color: var(--warning-color)
            styles:
              card:
                - padding: 6px
                - background-color: rgba(255, 152, 0, 0.05)

          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entity: sensor.proxmox_pve_container_z2m_cpu_percentage
                title: "CPU %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 40
                  - color: rgb(244, 67, 54)
                    value: 60

              - type: custom:bar-card
                entity: sensor.proxmox_pve_container_z2m_memory_percentage
                title: "RAM %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 50
                  - color: rgb(244, 67, 54)
                    value: 70

      # --- MariaDB Container
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:button-card
            name: "MARIADB"
            icon: mdi:database
            color: var(--error-color)
            styles:
              card:
                - padding: 6px
                - background-color: rgba(244, 67, 54, 0.05)

          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entity: sensor.proxmox_pve_container_mariadb_cpu_percentage
                title: "CPU %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 50
                  - color: rgb(244, 67, 54)
                    value: 75

              - type: custom:bar-card
                entity: sensor.proxmox_pve_container_mariadb_memory_percentage
                title: "RAM %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 60
                  - color: rgb(244, 67, 54)
                    value: 80

      # --- Mosquitto Container (optionnel)
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:button-card
            name: "MOSQUITTO (MQTT)"
            icon: mdi:mqtt
            color: var(--success-color)
            styles:
              card:
                - padding: 6px
                - background-color: rgba(15, 157, 88, 0.05)

          - type: horizontal-stack
            cards:
              - type: custom:bar-card
                entity: sensor.proxmox_pve_container_mosquitto_cpu_percentage
                title: "CPU %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 30
                  - color: rgb(244, 67, 54)
                    value: 50

              - type: custom:bar-card
                entity: sensor.proxmox_pve_container_mosquitto_memory_percentage
                title: "RAM %"
                unit_of_measurement: "%"
                positions:
                  icon: "off"
                  title:
                    outside: left
                bar_percent: true
                severity:
                  - color: rgb(15, 157, 88)
                    value: 0
                  - color: rgb(255, 152, 0)
                    value: 40
                  - color: rgb(244, 67, 54)
                    value: 60

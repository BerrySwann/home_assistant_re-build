type: custom:stack-in-card
mode: vertical
cards:
  - type: horizontal-stack
    cards:
      - type: custom:mod-card
        card_mod:
          style: |-
            bar-card-currentbar { border-radius: 10px; }
              bar-card-currentbar, bar-card-current, bar-card-backgroundbar {
              height: 6px !important;
                }
            .: |
              :host {
                --text-divider-color: white;
                --text-divider-line-size: 5px;
              }
        card:
          type: custom:text-divider-row
          text: Proxmox VE
  - type: custom:button-card
    entity: sensor.pve_statut
    name: PROXMOX VE
    icon: phu:proxmox
    show_state: true
    state:
      - value: online
        styles:
          state:
            - color: rgb(15,157,88)
            - background: rgba(15,157,88,0.15)
            - border-radius: 10px
            - padding: 2px 10px
      - value: offline
        styles:
          state:
            - color: rgb(244,67,54)
            - background: rgba(244,67,54,0.15)
            - border-radius: 10px
            - padding: 2px 10px
    styles:
      card:
        - padding: 8px 12px
        - background: >-
            linear-gradient(90deg, rgba(15,157,88,0.12) 0%, rgba(15,157,88,0.02)
            100%)
        - border-left: "3px solid #0f9d58 !important"
        - border-radius: 8px !important
        - margin-bottom: 2px
      grid:
        - grid-template-areas: "\"i n s\""
        - grid-template-columns: min-content 1fr min-content
      name:
        - font-size: 13px
        - font-weight: bold
        - justify-self: start
        - padding-left: 8px
        - color: "#0f9d58"
        - letter-spacing: 0.5px
      state:
        - font-size: 11px
        - font-weight: bold
      icon:
        - width: 22px
        - color: "#0f9d58"
    tap_action:
      action: none
    card_mod:
      style: |
        ha-card {
          border: none !important;
          box-shadow: none !important;
          background: none !important;
        }
  - type: horizontal-stack
    cards:
      - type: custom:bar-card
        entity: sensor.pve_utilisation_du_processeur
        name: CPU %
        icon: mdi:cpu-64-bit
        height: 42px
        min: 0
        max: 100
        decimal: 1
        animation:
          state: "on"
        positions:
          icon: inside
          indicator: inside
        entity_row: true
        tap_action:
          action: none
        severity:
          - color: rgb(15,157,88)
            from: 0
            to: 75
          - color: rgb(255,152,0)
            from: 75.1
            to: 90
          - color: rgb(244,67,54)
            from: 90.1
            to: 100
        card_mod:
          style: |
            ha-card {
              font-size: 12px; font-weight: bold;
              --mdc-icon-size: 26px;
              --paper-item-icon-color: white !important;
              border: none !important; box-shadow: none !important; background: none !important;
            }
      - type: custom:bar-card
        entity: sensor.pve_memory_usage_percentage
        name: RAM %
        icon: mdi:memory
        height: 42px
        min: 0
        max: 100
        decimal: 1
        animation:
          state: "on"
        positions:
          icon: inside
          indicator: inside
        entity_row: true
        tap_action:
          action: none
        severity:
          - color: rgb(15,157,88)
            from: 0
            to: 75
          - color: rgb(255,152,0)
            from: 75.1
            to: 90
          - color: rgb(244,67,54)
            from: 90.1
            to: 100
        card_mod:
          style: |
            ha-card {
              font-size: 12px; font-weight: bold;
              --mdc-icon-size: 26px;
              --paper-item-icon-color: white !important;
              border: none !important; box-shadow: none !important; background: none !important;
            }
      - type: custom:bar-card
        entity: sensor.pve_utilisation_du_disque
        name: Disk GiB
        icon: mdi:harddisk
        height: 42px
        min: 0
        max: 94
        decimal: 2
        animation:
          state: "on"
        positions:
          icon: inside
          indicator: inside
        entity_row: true
        tap_action:
          action: none
        severity:
          - color: rgb(15,157,88)
            from: 0
            to: 60
          - color: rgb(255,152,0)
            from: 60.1
            to: 80
          - color: rgb(244,67,54)
            from: 80.1
            to: 94
        card_mod:
          style: |
            ha-card {
              font-size: 12px; font-weight: bold;
              --mdc-icon-size: 26px;
              --paper-item-icon-color: white !important;
              border: none !important; box-shadow: none !important; background: none !important;
            }
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        entity: sensor.pve_uptime
        show_name: false
        show_state: false
        show_label: true
        icon: mdi:clock-outline
        label: |
          [[[
            if (!entity || entity.state === "unavailable" || entity.state === "unknown") return "Uptime: N/A";
            return "Uptime: " + parseFloat(entity.state).toFixed(0) + " h";
          ]]]
        styles:
          card:
            - padding: 6px 10px
            - background: rgba(15,157,88,0.05) !important
          grid:
            - grid-template-areas: "\"i l\""
            - grid-template-columns: min-content min-content
            - align-items: center
            - justify-content: center
          label:
            - font-size: 12px
            - font-weight: bold
            - color: white
            - padding-left: 6px
          icon:
            - width: 16px
            - color: "#0f9d58"
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card { border: none !important; box-shadow: none !important; }
      - type: custom:button-card
        entity: binary_sensor.pve_backup_status
        show_name: false
        show_state: false
        show_label: true
        icon: mdi:backup-restore
        label: |
          [[[
            if (!entity || entity.state === "unavailable" || entity.state === "unknown") return "Backup: N/A";
            return "Backup: " + (entity.state === "off" ? "OK" : "ERREUR");
          ]]]
        state:
          - value: "off"
            styles:
              label:
                - color: rgb(15,157,88)
              icon:
                - color: rgb(15,157,88)
          - value: "on"
            styles:
              label:
                - color: rgb(244,67,54)
              icon:
                - color: rgb(244,67,54)
        styles:
          card:
            - padding: 6px 10px
            - background: rgba(15,157,88,0.05) !important
          grid:
            - grid-template-areas: "\"i l\""
            - grid-template-columns: min-content min-content
            - align-items: center
            - justify-content: center
          label:
            - font-size: 12px
            - font-weight: bold
            - padding-left: 6px
          icon:
            - width: 16px
        tap_action:
          action: none
        card_mod:
          style: |
            ha-card { border: none !important; box-shadow: none !important; }
      - type: custom:button-card
        entity: sensor.pve_max_cpu
        show_name: false
        show_state: false
        show_label: true
        icon: mdi:chip
        label: |
          [[[

# PAGE L1C2 — TEMPERATURES (version 2026-07-08)
# Base : 2026-05-22 — seul changement : thermostat chambre → climate.clim_chambre_nodon
type: grid
cards:
- type: heading
  icon: mdi:thermometer
  heading: TEMPERATURE - HUMIDITEES
  heading_style: title
  badges:
  - type: entity
    show_state: true
    show_icon: true
    entity: sensor.th_balcon_nord_battery
    color: state
  tap_action:
    action: navigate
    navigation_path: /dashboard-tablette/0
  layout_options:
    grid_columns: full
    grid_rows: 1
- type: custom:apexcharts-card
  graph_span: 24h
  apex_config:
    chart:
      height: 250px
  header:
    show: true
    title: Extèrieur
    show_states: true
    colorize_states: true
  yaxis:
  - id: humidity
    min: ~30
    max: ~70
    decimals: 0
    apex_config:
      tickAmount: 10
  - id: temperature
    min: ~10
    max: ~32
    opposite: true
    decimals: 1
    apex_config:
      tickAmount: 10
  all_series_config:
    group_by:
      func: last
      duration: 30m
    show:
      legend_value: false
      extremas: true
  series:
  - entity: sensor.th_balcon_nord_humidity
    name: Humi.Bal.Nrd
    yaxis_id: humidity
    type: column
    color: rgb(19,160,255)
  - entity: sensor.vence_temperature
    name: Météo VENCE
    yaxis_id: temperature
    stroke_width: 2
    color: orange
  - entity: sensor.th_balcon_nord_temperature
    name: T° Bal.Nrd
    yaxis_id: temperature
    stroke_width: 2
    color: green
  card_mod:
    style: |
      ha-card {
        background: none !important;
        box-shadow: none !important;
        border: none !important;
      }
- type: heading
  icon: mdi:water-thermometer-outline
  heading_style: title
  badges:
  - type: entity
    show_state: true
    show_icon: false
    entity: sensor.temperature_delta_affichage
    icon: mdi:delta
    color: primary
    tap_action:
      action: navigate
      navigation_path: "#tendances"
  layout_options:
    grid_columns: full
    grid_rows: 1
  heading: "Tendances "
  tap_action:
    action: navigate
    navigation_path: "#exterieur"
- type: horizontal-stack
  cards:
  - type: custom:vertical-stack-in-card
    cards:
    - type: custom:mushroom-template-card
      entity: sensor.th_balcon_nord_temperature
      icon: >
        {% if is_state('sensor.th_balcon_nord_temperature_trend',
        'increasing') %}
          mdi:arrow-top-right-thick
        {% elif is_state('sensor.th_balcon_nord_temperature_trend',
        'decreasing') %}
          mdi:arrow-bottom-right-thick
        {% else %}
          mdi:arrow-right-thick
        {% endif %}
      primary: ""
      secondary: "{{ states('sensor.th_balcon_nord_temperature') }}°C"
      tap_action:
        action: navigate
        navigation_path: "#tcourbe"
      hold_action:
        action: none
      color: >
        {% if is_state('sensor.th_balcon_nord_temperature_trend',
        'increasing') %}
          red
        {% elif is_state('sensor.th_balcon_nord_temperature_trend',
        'decreasing') %}
          blue
        {% else %}
          #df6366
        {% endif %}
      features_position: bottom
      card_mod:
        style: |
          ha-card {
            background-color: transparent !important;
            border: none !important;
          }
          mushroom-state-info$: |
            .primary {
              font-size: 12px !important;
              color: lightgrey !important;
              position: relative;
              bottom: 5px;
              left: 5px;
              overflow: visible !important;
              white-space: normal !important;
            }
            .secondary {
              font-size: 19px !important;
              position: relative;
              overflow: visible !important;
              top: 0px;
              left: 5px;
            }
          mushroom-shape-icon$: |
            .shape {
              position: relative;
              left: 0px;
              top: 0px;
            }
          .: |
            :host {
              --mush-icon-size: 50px;
            }
    - type: custom:mini-graph-card
      entities:
      - entity: sensor.th_balcon_nord_temperature
        name: Température
        color: "#df6366"
      height: 200
      hours_to_show: 24
      decimals: 0
      points_per_hour: 1
      line_width: 2
      font_size: 20
      animate: true
      show:
        labels: true
        name: false
        icon: false
        state: false
        legend: false
        fill: fade
        points: false
      card_mod:
        style: |
          ha-card {
            background: none !important;
            box-shadow: none !important;
            border: none !important;
          }
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
        }
  - type: custom:vertical-stack-in-card
    cards:
    - type: custom:mushroom-template-card
      entity: sensor.th_balcon_nord_humidity
      icon: >
        {% if is_state('sensor.th_balcon_nord_humidity_trend',
        'increasing') %}
          mdi:arrow-top-right-thick
        {% elif is_state('sensor.th_balcon_nord_humidity_trend',
        'decreasing') %}
          mdi:arrow-bottom-right-thick
        {% else %}
          mdi:arrow-right-thick
        {% endif %}
      icon_color: |
        {% if is_state('sensor.th_balcon_nord_humidity_trend',
            'increasing') %}
              blue
            {% elif is_state('sensor.th_balcon_nord_humidity_trend',
            'decreasing') %}
              #ADD8E6
            {% else %}
              #00CED1
            {% endif %}
      primary: ""
      secondary: "{{ states('sensor.th_balcon_nord_humidity') }}%"
      layout: horizontal
      tap_action:
        action: navigate
        navigation_path: "#hcourbe"
      hold_action:
        action: none
      card_mod:
        style: |
          ha-card {
            background: none !important;
            box-shadow: none !important;
            border: none !important;
          }
          mushroom-state-info$: |
            .primary {
              font-size: 12px !important;
              color: lightgrey !important;
              position: relative;
              bottom: 5px;
              left: 5px;
              overflow: visible !important;
              white-space: normal !important;
            }
            .secondary {
              font-size: 19px !important;
              position: relative;
              overflow: visible !important;
              top: 0px;
              left: 5px;
            }
          mushroom-shape-icon$: |
            .shape {
              position: relative;
              left: 0px;
              top: 0px;
            }
          .: |
            :host {
              --mush-icon-size: 50px;
            }
    - type: custom:mini-graph-card
      entities:
      - entity: sensor.th_balcon_nord_humidity
        name: Humidité
        color: "#00CED1"
      height: 200
      hours_to_show: 24
      decimals: 0
      points_per_hour: 1
      line_width: 2
      font_size: 20
      animate: true
      show:
        labels: true
        name: false
        icon: false
        state: false
        legend: false
        fill: fade
        points: false
      card_mod:
        style: |
          ha-card {
           background: none !important;
            box-shadow: none !important;
            border: none !important;
          }
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
        }
  card_mod:
    style: |
      ha-card {
        background: none !important;
        box-shadow: none !important;
        border: none !important;
        height: 228px;
        margin-left: auto;
        margin-right: auto;
      }
- type: heading
  icon: mdi:lightning-bolt-outline
  heading_style: title
  badges: []
  layout_options:
    grid_columns: full
    grid_rows: 1
  heading: Consomation
- type: custom:mushroom-chips-card
  chips:
  - type: conditional
    conditions:
    - entity: sensor.salon_power_status
      state_not: "off"
    chip:
      type: template
      icon: mdi:air-conditioner
      icon_color: |-
        {% if is_state('sensor.clim_salon_etat', 'Cool') %} #87CEEB
        {% elif is_state('sensor.clim_salon_etat', 'Heat') %} #ff6100
        {% elif is_state('sensor.clim_salon_etat', 'Fan') %} #40E0D0
        {% else %} #FF0000 {% endif %}
      content: "Salon: {{ states('sensor.clim_salon_etat') }}"
      tap_action:
        action: none
  - type: conditional
    conditions:
    - entity: sensor.cuisine_power_status
      state_not: "off"
    chip:
      type: template
      icon: mdi:heating-coil
      icon_color: |-
        {% if is_state('sensor.radiateur_cuisine_etat', 'Heat') %} #ff6100
        {% else %} #FF0000 {% endif %}
      content: "Cuisine: {{ states('sensor.radiateur_cuisine_etat') }}"
      tap_action:
        action: none
  - type: conditional
    conditions:
    - entity: sensor.bureau_power_status
      state_not: "off"
    chip:
      type: template
      icon: mdi:air-conditioner
      icon_color: |-
        {% if is_state('sensor.clim_bureau_etat', 'Cool') %} #87CEEB
        {% elif is_state('sensor.clim_bureau_etat', 'Heat') %} #ff6100
        {% elif is_state('sensor.clim_bureau_etat', 'Fan') %} #40E0D0
        {% else %} #FF0000 {% endif %}
      content: "Bureau: {{ states('sensor.clim_bureau_etat') }}"
      tap_action:
        action: none
  - type: conditional
    conditions:
    - entity: sensor.sdb_soufflant_power_status
      state_not: "off"
    chip:
      type: template
      icon: mdi:heat-wave
      icon_color: |-
        {% if is_state('sensor.sdb_soufflant_etat', 'Heat') %} #ff6100
        {% else %} #FF0000 {% endif %}
      content: "SdB Soufflant: {{ states('sensor.sdb_soufflant_etat') }}"
      tap_action:
        action: none
  - type: conditional
    conditions:
    - entity: sensor.sdb_seche_serviette_power_status
      state_not: "off"
    chip:
      type: template
      icon: mdi:heating-coil
      icon_color: |-
        {% if is_state('sensor.sdb_seche_serviette_etat', 'Heat') %} #ff6100
        {% else %} #FF0000 {% endif %}
      content: "SdB Serviette: {{ states('sensor.sdb_seche_serviette_etat') }}"
      tap_action:
        action: none
  - type: conditional
    conditions:
    - entity: sensor.chambre_power_status
      state_not: "off"
    chip:
      type: template
      icon: mdi:air-conditioner
      icon_color: |-
        {% if is_state('sensor.clim_chambre_etat', 'Cool') %} #87CEEB
        {% elif is_state('sensor.clim_chambre_etat', 'Heat') %} #ff6100
        {% elif is_state('sensor.clim_chambre_etat', 'Fan') %} #40E0D0
        {% else %} #FF0000 {% endif %}
      content: "Chambre: {{ states('sensor.clim_chambre_etat') }}"
      tap_action:
        action: none
  alignment: center
- type: custom:apexcharts-card
  graph_span: 24h
  cache: true
  span:
    start: day
    offset: "-0h"
  apex_config:
    chart:
      height: 400px
  now:
    show: true
    color: darkred
    label: Now
  header:
    show: true
    title: " "
    show_states: true
    colorize_states: true
  yaxis:
  - id: temperature
    min: ~10
    max: ~32
    decimals: 2
    apex_config:
      tickAmount: 10
  - id: conso_clim
    min: ~150
    max: auto
    opposite: true
    decimals: 2
    apex_config:
      tickAmount: 10
  all_series_config:
    group_by:
      func: last
      duration: 60m
    show:
      legend_value: false
  series:
  - entity: sensor.temperature_moyenne_interieure
    name: T̄ Appart.
    yaxis_id: temperature
    stroke_width: 4
    fill_raw: last
    color: orange
    show:
      extremas: true
  - entity: sensor.th_balcon_nord_temperature
    name: T° Bal.Nrd
    yaxis_id: temperature
    stroke_width: 4
    fill_raw: last
    color: green
    show:
      extremas: true
  - entity: sensor.conso_clim_rad_total
    name: Conso. Instan.
    yaxis_id: conso_clim
    type: column
    opacity: 0.6
    fill_raw: last
    color: rgb(68,115,158)
    unit: W
    group_by:
      func: max
      duration: 1h
      start_with_last: true
  - entity: sensor.conso_clim_rad_total_quotidien
    name: Conso. Total
    color: rgb(68,115,158)
    unit: kWh
    show:
      in_brush: false
      in_chart: false
  - entity: sensor.clim_rad_total_avg_watts_quotidien
    name: Moy.depuis Minuit
    yaxis_id: conso_clim
    type: line
    stroke_width: 2
    color: red
    unit: W
    show:
      in_brush: false
      in_chart: true
  - entity: sensor.conso_clim_rad_total_mensuel
    name: Mois en cours
    color: "#F44336"
    show:
      in_brush: false
      in_chart: false
  card_mod:
    style: |
      ha-card {
        background: none !important;
        box-shadow: none !important;
        border: none !important;
        font-size: 12px;
      }

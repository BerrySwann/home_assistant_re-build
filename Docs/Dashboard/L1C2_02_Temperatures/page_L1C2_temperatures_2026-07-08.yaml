- type: custom:bubble-card
  card_type: pop-up
  hash: "#tcourbe"
  show_header: true
  force_icon: false
  show_state: false
  show_last_changed: false
  show_attribute: false
  button_type: name
  name: Tendance (T°)
  icon: mdi:thermometer-check
  show_icon: true
  show_name: true
  card_layout: normal
  hide_backdrop: false
  close_on_click: false
  bg_opacity: "0"
  cards:
  - type: horizontal-stack
    cards:
    - type: custom:vertical-stack-in-card
      cards:
      - type: custom:mushroom-template-card
        entity: sensor.th_balcon_nord_temperature
        icon: >
          {% if is_state('sensor.th_balcon_nord_temperature_trend',
          'increasing') %}
            mdi:arrow-top-right-thick
          {% elif is_state('sensor.th_balcon_nord_temperature_trend',
          'decreasing') %}
            mdi:arrow-bottom-right-thick
          {% else %}
            mdi:arrow-right-thick
          {% endif %}
        primary: ""
        secondary: "{{ states('sensor.th_balcon_nord_temperature') }}°C"
        tap_action:
          action: none
        hold_action:
          action: none
        color: >
          {% if is_state('sensor.th_balcon_nord_temperature_trend',
          'increasing') %}
            red
          {% elif is_state('sensor.th_balcon_nord_temperature_trend',
          'decreasing') %}
            blue
          {% else %}
            #df6366
          {% endif %}
        features_position: bottom
        card_mod:
          style: |
            ha-card {
              background-color: transparent !important;
              border: none !important;
            }
            mushroom-state-info$: |
              .primary {
                font-size: 12px !important;
                color: lightgrey !important;
                position: relative;
                bottom: 5px;
                left: 5px;
                overflow: visible !important;
                white-space: normal !important;
              }
              .secondary {
                font-size: 19px !important;
                position: relative;
                overflow: visible !important;
                top: 0px;
                left: 5px;
              }
            mushroom-shape-icon$: |
              .shape {
                position: relative;
                left: 0px;
                top: 0px;
              }
            .: |
              :host {
                --mush-icon-size: 50px;
              }
      - type: custom:mini-graph-card
        entities:
        - entity: sensor.th_balcon_nord_temperature
          name: Température
          color: "#df6366"
        height: 300
        hours_to_show: 24
        decimals: 1
        points_per_hour: 1
        line_width: 2
        font_size: 85
        hour24: true
        animate: true
        show:
          labels: true
          name: false
          icon: false
          state: true
          legend: true
          extrema: true
          fill: fade
          points: true
          loading_indicator: false
        card_mod:
          style: |
            ha-card {
              background: none !important;
              box-shadow: none !important;
              border: none !important;
            }
      card_mod:
        style: |
          ha-card {
            background: none !important;
            box-shadow: none !important;
            border: none !important;
          }
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
          height: 300px;
          margin-left: auto;
          margin-right: auto;
        }

type: grid
cards:
  - type: picture-elements
    image: /local/meteo/empty.png
    card_mod:
      style: |-
        :host {
          display: block;
          overflow: hidden;
        }
        ha-card {
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
        }
    elements:
      # 1 — CIEL ANIMÉ
      - type: custom:html-template-card
        title: ""
        ignore_line_breaks: true
        picture_elements_mode: true
        content: |-
          {%- from 'meteo.jinja' import generate_content -%}
            {{ generate_content('background','html')|replace('"','') }}
        card_mod:
          style: |-
            {%- from 'meteo.jinja' import generate_content -%}
              {{ generate_content('background','css')|replace('"','') }}
        style:
          top: 50%
          left: 50%
          width: 100%
          height: 100%
      # 2 — ROSE DES VENTS (sous sun/moon)
      - type: custom:html-template-card
        title: ""
        ignore_line_breaks: true
        picture_elements_mode: true
        content: |-
          <div style="position:absolute;top:62%;left:50%;
            transform:translate(-50%,-50%) perspective(180px) rotateX(62deg);
            width:190px;height:190px;opacity:0.25;pointer-events:none;">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
              <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
              <polygon points="146,54 108,100 146,146 100,108 54,146 92,100 54,54 100,92"
                fill="rgba(180,200,230,0.6)"/>
              <polygon points="100,38 106,94 162,100 106,106 100,162 94,106 38,100 94,94"
                fill="rgba(255,255,255,0.9)"/>
              <circle cx="100" cy="100" r="9" fill="rgba(20,30,50,0.8)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
              <text x="100" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="white" font-family="Arial,sans-serif">S</text>
              <text x="100" y="174" text-anchor="middle" font-size="20" font-weight="bold" fill="rgba(200,215,235,0.85)" font-family="Arial,sans-serif">N</text>
              <text x="22" y="106" text-anchor="middle" font-size="20" font-weight="bold" fill="rgba(200,215,235,0.85)" font-family="Arial,sans-serif">E</text>
              <text x="180" y="106" text-anchor="middle" font-size="20" font-weight="bold" fill="white" font-family="Arial,sans-serif">W</text>
            </svg>
          </div>
        style:
          top: 50%
          left: 50%
          width: 100%
          height: 100%
      # 3 — SOLEIL + LUNE
      - type: custom:html-template-card
        title: ""
        ignore_line_breaks: true
        picture_elements_mode: true
        content: >-
          <img src="/local/meteo/sun.png" style="width:16%; left:{{
          states('sensor.sun_left') }}%; top:{{ states('sensor.sun_top') }}%;
          opacity:{{ states('sensor.sun_opacity') }};
          padding:0;margin:0;position:absolute;transform:translate(-50%,-50%);"
          /> <img
          src="/local/images/moon_phases/{{states('sensor.moon_phase')}}.png"
          style="width:10%; left:{{ states('sensor.moon_left') }}%; top:{{
          states('sensor.moon_top') }}%; opacity:{{
          states('sensor.moon_opacity') }};
          padding:0;margin:0;position:absolute;
          rotate:{{state_attr('sensor.moon_api','moon_parallactic_angle')}}deg;
          transform:translate(-50%,-50%);" />
        style:
          top: 50%
          left: 50%
          width: 100%
          height: 100%
      # 4 — FOREGROUND
      - type: custom:html-template-card
        title: ""
        ignore_line_breaks: true
        picture_elements_mode: true
        content: |-
          {%- from 'meteo.jinja' import generate_content -%}
            {{ generate_content('foreground','html')|replace('"','') }}
        card_mod:
          style: |-
            {%- from 'meteo.jinja' import generate_content -%}
              {{ generate_content('foreground','css')|replace('"','') }}
        style:
          top: 50%
          left: 50%
          width: 100%
          height: 100%
      # 5 — ALERTE MÉTÉO
      - type: custom:html-template-card
        title: ""
        ignore_line_breaks: true
        picture_elements_mode: true
        content: >-
          {% if is_state('sensor.alerte_meteo', 'Orange') or
          is_state('sensor.alerte_meteo', 'Rouge') %}
          <div style="position:absolute;top:70%;left:50%;
            transform:translateX(-50%);
            font-size:13px;font-weight:bold;letter-spacing:4px;
            font-variant:small-caps;color:rgba(255,255,255,0.65);
            text-shadow:0px 1px 4px rgba(0,0,0,0.8);
            white-space:nowrap;pointer-events:none;">
            {% if is_state('sensor.alerte_meteo', 'Orange') %}! Vigilance Orange !
            {% elif is_state('sensor.alerte_meteo', 'Rouge') %}! Vigilance Rouge !
            {% endif %}
          </div>
          {% endif %}
        style:
          top: 50%
          left: 50%
          width: 100%
          height: 100%
      # 6 — STATUT MÉTÉO + TEMPÉRATURE
      - type: custom:html-template-card
        title: ""
        ignore_line_breaks: true
        picture_elements_mode: true
        content: |-
          <div style="
            position:absolute;
            bottom:8px;
            left:50%;
            transform:translateX(-50%);
            font-size:14px;
            font-weight:bold;
            letter-spacing:4px;
            font-variant:small-caps;
            color:rgba(255,255,255,0.65);
            text-shadow:0px 1px 4px rgba(0,0,0,0.8);
            white-space:nowrap;
            pointer-events:none;
          ">
            {{ states('sensor.vence_original_condition') }} — {{ states('sensor.th_balcon_nord_temperature') | round(1) }}°C
          </div>
        style:
          top: 50%
          left: 50%
          width: 100%
          height: 100%
      # 7 — TITRE VENCE + HEURE (layer le plus haut)
      - type: custom:html-template-card
        title: ""
        ignore_line_breaks: true
        picture_elements_mode: true
        content: |-
          <div style="
            position:absolute;
            top:8px;
            left:50%;
            transform:translateX(-50%);
            font-size:18px;
            font-weight:bold;
            letter-spacing:4px;
            font-variant:small-caps;
            color:rgba(255,255,255,0.65);
            text-shadow:0px 1px 4px rgba(0,0,0,0.8);
            white-space:nowrap;
            pointer-events:none;
          ">VENCE — {{ now().strftime('%H:%M') }}</div>
        style:
          top: 50%
          left: 50%
          width: 100%
          height: 100%
  - type: custom:meteofrance-weather-card
    entity: weather.vence
    animated_icons: true
    alert_forecast: true
    details: false
    current: false
    one_hour_forecast: true
    forecast: true
    rainChanceEntity: sensor.vence_rain_chance
    uvEntity: sensor.vence_uv
    cloudCoverEntity: sensor.vence_cloud_cover
    freezeChanceEntity: sensor.vence_freeze_chance
    snowChanceEntity: sensor.vence_snow_chance
    alertEntity: sensor.06_weather_alert
    name: Vence
    detailEntity: sensor.temperature_delta_affichage
    daily_forecast: false
    wind_forecast_icons: true
    humidity_forecast: true
    hourly_forecast: false
    rainForecastEntity: sensor.vence_next_rain
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
        }
  - type: conditional
    conditions:
      - condition: numeric_state
        entity: sensor.studio_code_server_pourcentage_du_processeur
        above: 1
    card:
      type: custom:button-card
      entity: sensor.studio_code_server_pourcentage_du_processeur
      name: Visual Server Code
      icon: mdi:microsoft-visual-studio-code
      show_state: true
      show_label: false
      state_display: |
        [[[
          return parseFloat(entity.state).toFixed(2) + ' %';
        ]]]
      layout: icon_name_state
      tap_action:
        action: call-service
        confirmation:
          text: |-
            ⚠️ VS Code semble bloqué ?
            Voulez-vous forcer le redémarrage de l'Add-on ?
        service: hassio.addon_restart
        service_data:
          addon: a0d7b954_vscode
      styles:
        card:
          - border-radius: 12px
          - height: 50px
          - padding: 0px 15px
          - border: none
          - box-shadow: none
          - background-color: |
              [[[
                return (parseFloat(entity.state) > 20) ? '#f44336' : '#03a9f4';
              ]]]
          - animation: |
              [[[
                return (parseFloat(entity.state) > 20) ? 'blink 1s ease infinite' : 'none';
              ]]]
        grid:
          - grid-template-columns: 35px auto 60px
        icon:
          - width: 24px
          - color: white
        name:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - justify-self: start
        state:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - justify-self: end
      extra_styles: |
        @keyframes blink {
          50% { opacity: 0.5; }
        }
  - type: custom:button-card
    entity: sensor.maison_lightning_counter
    triggers_update:
      - sensor.dernier_impact_temps_reel
      - sensor.maison_lightning_distance
    name: |
      [[[
        const distRaw = states['sensor.maison_lightning_distance'] ? parseFloat(states['sensor.maison_lightning_distance'].state) : 0;
        const localisation = states['sensor.maison_lightning_localisation'];
        const azimuth = states['sensor.maison_lightning_azimuth'] ? parseFloat(states['sensor.maison_lightning_azimuth'].state) : null;
        const impactCount = parseInt(entity.state) || 0;
        const timePhrase = states['sensor.dernier_impact_temps_reel'] ? states['sensor.dernier_impact_temps_reel'].state : '';
        let message = '';

        if (distRaw > 0) {
          const distance = distRaw.toFixed(1);
          message = `Impact à <strong>${distance} Km</strong>`;

          let city = null;
          if (localisation && localisation.attributes && localisation.attributes.features) {
            const features = localisation.attributes.features;
            if (features[0]?.properties?.geocoding?.city) {
              city = features[0].properties.geocoding.city;
              message += ` à ${city}`;
            }
          }
          if (!city && azimuth !== null) {
            const directions = [
              "au nord", "au nord-nord-est", "au nord-est", "à l'est-nord-est",
              "à l'est", "à l'est-sud-est", "au sud-est", "au sud-sud-est",
              "au sud", "au sud-sud-ouest", "au sud-ouest", "à l'ouest-sud-ouest",
              "à l'ouest", "à l'ouest-nord-ouest", "au nord-ouest", "au nord-nord-ouest"
            ];
            const index = Math.round(azimuth / 22.5) % 16;
            message += ` ${directions[index]}`;
          }
        } else {
          message = "Aucun impact récent détecté";
        }
        const impactLine = impactCount > 0
          ? `<br><span style="color: #ffeb3b; font-weight: bold; font-size: 17px;">⚡ ${impactCount} impact(s) détecté(s)</span>`
          : '';
        return `
          <div style="line-height: 1.6;">
            <span style="font-size: 14px;">${message}</span><br>
            <span style="font-size: 13px; opacity: 0.9; font-weight: 500;">${timePhrase}</span>
            ${impactLine}
          </div>
        `;
      ]]]
    show_state: false
    styles:
      card:
        - border-radius: 12px
        - padding: 15px
        - border-style: solid
        - border-width: 2px
        - background: |
            [[[
              const d = parseFloat(states['sensor.maison_lightning_distance']?.state);
              if (d > 0 && d <= 5) return 'rgba(255, 0, 0, 0.2)';
              if (d > 5) return 'rgba(255, 123, 0, 0.1)';
              return 'rgba(0, 255, 0, 0.05)';
            ]]]
        - border-color: |
            [[[
              const d = parseFloat(states['sensor.maison_lightning_distance']?.state);
              if (d > 0 && d <= 5) return 'red';
              if (d > 5) return 'rgba(255, 123, 0, 0.5)';
              return 'rgba(0, 255, 0, 0.4)';
            ]]]
        - animation: |
            [[[
              const d = parseFloat(states['sensor.maison_lightning_distance']?.state);
              return (d > 0 && d <= 5) ? 'blink-danger 1s ease infinite' : 'none';
            ]]]
      name:
        - justify-self: center
        - text-align: center
        - color: white
      icon:
        - width: 45px
        - color: |
            [[[
              const d = parseFloat(states['sensor.maison_lightning_distance']?.state);
              if (d > 0 && d <= 5) return 'red';
              if (d > 5) return 'rgb(255, 123, 0)';
              return 'rgb(0, 255, 0)';
            ]]]
    extra_styles: |
      @keyframes blink-danger {
        50% { background: rgba(255, 0, 0, 0.6); border-color: white; }
      }
    tap_action:
      action: navigate
      navigation_path: meteo/#foudre
    grid_options:
      columns: 12
      rows: 2.5
    visibility:
      - condition: numeric_state
        entity: sensor.maison_lightning_counter
        above: 1
  - type: custom:mushroom-entity-card
    entity: sensor.prise_lave_linge_nous_power
    tap_action:
      action: toggle
    icon: mdi:washing-machine
    icon_color: blue
    name: Lave-linge
    card_mod:
      style:
        mushroom-shape-icon$: |
          .shape {
            {# ========== USER CONFIG ========== #}
            {% set use_number      = true %}
            {% set number_entity   = 'sensor.prise_lave_linge_nous_power' %}
            {% set number_operator = '>' %}
            {% set threshold       = 1.0 %}
            {# ========== END USER CONFIG ====== #}
            {% if use_number %}
              {% set num = states(number_entity) | float(0) %}
              {% if number_operator == '>' %}
                {% set trigger_active = (num > threshold) %}
              {% elif number_operator == '<' %}
                {% set trigger_active = (num < threshold) %}
              {% elif number_operator == '=' %}
                {% set trigger_active = (num == threshold) %}
              {% elif number_operator == '>=' %}
                {% set trigger_active = (num >= threshold) %}
              {% elif number_operator == '<=' %}
                {% set trigger_active = (num <= threshold) %}
              {% else %}
                {% set trigger_active = false %}
              {% endif %}
            {% else %}
              {% set state_entity = 'switch.plug_6_local' %}
              {% set active_value = 'on' %}
              {% set trigger_active = (states(state_entity) == active_value) %}
            {% endif %}
            {% if trigger_active %}
              --shape-animation: washer-chaos 1.1s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
              opacity: 1;
            {% else %}
              --shape-animation: none;
              opacity: 0.85;
            {% endif %}
            transform-origin: 50% 55%;
            box-shadow:
              inset 0 0 0 2px rgba(var(--rgb-{{ config.icon_color }}), 0.5),
              0 0 10px 0 rgba(var(--rgb-{{ config.icon_color }}), 0.6);
            position: relative;
          }
          @keyframes washer-chaos {
            0% {
              transform: rotate(0deg) scale(1);
              box-shadow:
                inset 0 0 0 2px rgba(var(--rgb-{{ config.icon_color }}), 0.7),
                0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.6);
            }
            15%  { transform: rotate(18deg) translate(1px, -1px) scale(1.02); }
            30%  { transform: rotate(60deg) translate(-2px, 2px) scale(0.98); }
            45%  { transform: rotate(120deg) translate(3px, -2px) scale(1.03); }
            60%  { transform: rotate(190deg) translate(-1px, 3px) scale(0.97); }
            75%  { transform: rotate(260deg) translate(1px, -3px) scale(1.04); }
            90%  { transform: rotate(330deg) translate(-2px, 1px) scale(1.01); }
            100% {
              transform: rotate(360deg) translate(0, 0) scale(1);
              box-shadow:
                inset 0 0 0 2px rgba(var(--rgb-{{ config.icon_color }}), 0.7),
                0 0 10px 6px rgba(var(--rgb-{{ config.icon_color }}), 0.0);
            }
          }
        .: |
          mushroom-shape-icon {
            --icon-size: 65px;
            display: flex;
            margin: -22px 0 10px -22px !important;
            padding-right: 10px;
          }
          ha-card {
            clip-path: inset(0 0 0 0 round var(--ha-card-border-radius, 12px));
            background: none !important;
            box-shadow: none !important;
            border: none !important;
          }
    grid_options:
      columns: 6
      rows: 2
    visibility:
      - condition: numeric_state
        entity: sensor.prise_lave_linge_nous_power
        above: 50
  - type: custom:mushroom-entity-card
    entity: sensor.prise_lave_vaisselle_nous_power
    tap_action:
      action: toggle
    icon: mdi:dishwasher
    icon_color: blue
    name: Lave-vaisselle
    card_mod:
      style:
        mushroom-shape-icon$: |
          .shape {
            {% set use_number      = true %}
            {% set number_entity   = 'sensor.prise_lave_vaisselle_nous_power' %}
            {% set number_operator = '>' %}
            {% set threshold       = 5.0 %}
            {% if use_number %}
              {% set num = states(number_entity) | float(0) %}
              {% if number_operator == '>' %}
                {% set trigger_active = (num > threshold) %}
              {% elif number_operator == '<' %}
                {% set trigger_active = (num < threshold) %}
              {% elif number_operator == '=' %}
                {% set trigger_active = (num == threshold) %}
              {% elif number_operator == '>=' %}
                {% set trigger_active = (num >= threshold) %}
              {% elif number_operator == '<=' %}
                {% set trigger_active = (num <= threshold) %}
              {% else %}
                {% set trigger_active = false %}
              {% endif %}
            {% else %}
              {% set state_entity = 'switch.plug_6_local' %}
              {% set active_value = 'on' %}
              {% set trigger_active = (states(state_entity) == active_value) %}
            {% endif %}
            {% if trigger_active %}
              --shape-animation: dishwasher-swash 1.5s ease-in-out infinite;
              opacity: 1;
            {% else %}
              --shape-animation: none;
              opacity: 0.8;
            {% endif %}
            transform-origin: 50% 55%;
          }
          @keyframes dishwasher-swash {
            0% {
              transform: scale(1) rotate(0deg);
              box-shadow: 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.8), 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.3);
              filter: blur(0);
            }
            25% {
              transform: scale(1.03) rotate(10deg);
              box-shadow: 0 0 10px 3px rgba(var(--rgb-{{ config.icon_color }}), 0.9), 0 0 18px 8px rgba(var(--rgb-{{ config.icon_color }}), 0.3);
              filter: blur(0.4px);
            }
            50% {
              transform: scale(0.98) rotate(-15deg);
              box-shadow: 0 0 14px 6px rgba(var(--rgb-{{ config.icon_color }}), 0.7), 0 0 26px 12px rgba(var(--rgb-{{ config.icon_color }}), 0.2);
              filter: blur(0.6px);
            }
            75% {
              transform: scale(1.04) rotate(15deg);
              box-shadow: 0 0 10px 3px rgba(var(--rgb-{{ config.icon_color }}), 0.9), 0 0 18px 8px rgba(var(--rgb-{{ config.icon_color }}), 0.3);
              filter: blur(0.4px);
            }
            100% {
              transform: scale(1) rotate(0deg);
              box-shadow: 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.0), 0 0 0 0 rgba(var(--rgb-{{ config.icon_color }}), 0.0);
              filter: blur(0);
            }
          }
        .: |
          mushroom-shape-icon {
            --icon-size: 65px;
            display: flex;
            margin: -18px 0 10px -20px !important;
            padding-right: 10px;
          }
          ha-card {
            clip-path: inset(0 0 0 0 round var(--ha-card-border-radius, 12px));
            background: none !important;
            box-shadow: none !important;
            border: none !important;
          }
    grid_options:
      columns: 6
      rows: 2
    visibility:
      - condition: numeric_state
        entity: sensor.prise_lave_vaisselle_nous_power
        above: 50
  - type: custom:bubble-card
    card_type: separator
    name: Personne(s)
    icon: mdi:account-group
    card_layout: normal
    rows: 1
    styles: |
      .bubble-line {
        background: var(--primary-text-color);
        opacity: 0.8;
      }
      .bubble-sub-button {
        background-color: ${
          hass.states['sensor.etat_wifi_maison'].state === '2'
            ? 'darkgreen'
            : (hass.states['sensor.etat_wifi_maison'].state === 'Eric' ||
               hass.states['sensor.etat_wifi_maison'].state === 'Mamour')
              ? 'darkorange'
              : 'grey'
        } !important;
        color: gainsboro !important;
      }
      ha-card {
        margin-top: 20px !important;
      }
    sub_button:
      - entity: sensor.etat_wifi_maison
        show_last_changed: false
        show_state: true
        show_icon: true
        icon: mdi:home
        show_attribute: false
        show_name: true
        name: Maison
  - type: custom:bubble-card
    card_type: button
    button_type: state
    entity: device_tracker.poco
    show_name: true
    show_last_changed: true
    show_attribute: false
    card_layout: normal
    layout_options:
      grid_columns: 2
      grid_rows: 1
    show_state: false
    sub_button:
      main:
        - entity: person.eric
          show_state: false
          show_icon: true
          show_background: true
          show_attribute: false
          attribute: entity_picture
      bottom: []
    styles: |
      ha-card {
        --bubble-icon-background-color: black !important;
      }
      .bubble-sub-button {
        background-color: black !important;
      }
      .bubble-button-background {
        background-color:
          ${ state === 'home'
            ? 'green'
            : state === 'not_home'
              ? 'rgb(255, 103, 0)'
              : state === 'Boulot'
              ? 'rgb(0,87,81)'
              : 'grey'
          } !important;
      }
      .bubble-icon,
      .bubble-sub-button > ha-icon {
        color:
          ${ state === 'home'
            ? 'darkgreen'
            : state === 'not_home'
              ? 'rgb(255, 103, 0)'
              : state === 'Boulot'
                ? 'rgb(0,87,81)'
                : 'grey'
          } !important;
      }
      ${subButtonIcon[0].setAttribute("icon",
        state === 'home'
          ? 'mdi:home'
          : state === 'not_home'
            ? 'mdi:home-off'
            : state === 'Boulot'
              ? 'mdi:hammer-screwdriver'
              : 'mdi:crosshairs-question'
      )}
  - type: custom:bubble-card
    card_type: button
    button_type: state
    entity: device_tracker.mamour
    show_name: true
    show_last_changed: true
    show_attribute: false
    card_layout: normal
    layout_options:
      grid_columns: 2
      grid_rows: 1
    show_state: false
    sub_button:
      - entity: person.mamour
        show_state: false
        show_icon: true
        show_background: true
        show_attribute: false
        attribute: entity_picture
    styles: |
      ha-card {
        --bubble-icon-background-color: black !important;
      }
      .bubble-sub-button {
        background-color: black !important;
      }
      .bubble-button-background {
        background-color:
          ${ state === 'home'
            ? 'darkgreen'
            : state === 'not_home'
              ? 'rgb(255, 103, 0)'
              : state === 'LECLERC VENCE'
                ? 'rgb(0, 102, 204)'

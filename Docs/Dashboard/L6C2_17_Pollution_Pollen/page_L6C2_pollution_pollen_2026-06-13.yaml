                    ring_size: 3
                    scale: ticks_with_labels
                    middle_element: value_with_unit
                    bottom_element: name
                    colorize_icon: true
                    indicator: dot
                    min: 0
                    max: 7
                    colour:
                      "0": "#ddd"
                      "1": "#50f0e6"
                      "2": "#50ccaa"
                      "3": "#f0e641"
                      "4": "#ff5050"
                      "5": "#960032"
                      "6": "#872181"
                      "7": "#888"
                    card_mod:
                      style: |
                        ha-card {
                          border: none !important;
                          box-shadow: none !important;
                          background: none !important;
                          align-items: center;
                          justify-content: center;
                          transform: scale(0.96);

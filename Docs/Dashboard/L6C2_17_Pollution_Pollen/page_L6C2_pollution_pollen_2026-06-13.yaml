type: grid
cards:
  - type: heading
    icon: mdi:decagram
    heading: POLLULÈNE ©
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/home
    layout_options:
      grid_columns: full
      grid_rows: 1
  - card_mod:
      style: |
        ha-card {
          border: none !important;
          box-shadow: none !important;
          background: none !important;
          margin: 0;
          padding: 0;
        }
    type: custom:stack-in-card
    mode: vertical
    keep:
      box_shadow: false
      margin: false
      border_radius: false
      background: false
      outer_padding: false
    cards:
      - type: custom:mod-card
        card_mod:
          style: |
            :host {
              --text-divider-color: white;
              --text-divider-line-size: 1px;
            }
        card:
          type: custom:text-divider-row
          text: POLLENS [ Atmo France - Vence ]
  - type: custom:vertical-stack-in-card
    cards:
      - type: vertical-stack
        cards:
          - type: custom:entity-progress-card
            entity: sensor.qualite_globale_pollen_vence
            name: Qualité Pollens
            icon: mdi:flower-pollen
            secondary: "{{ state_attr(entity, 'Libellé') }} ({{ states(entity) }})"
            bar_color: "{{ state_attr(entity, 'Couleur') }}"
            color: "{{ state_attr(entity, 'Couleur') }}"
            bar_size: large
            bar_effect: radius
            percent: |
              {% set current = states(entity) | int(0) %}
              {% set max_value = 7 %}
              {% set percent = (current / max_value * 100) | round(0) %}
              {{ percent }}
            icon_tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border: none !important;
                  box-shadow: none !important;
                  background: none !important;
                }
      - type: vertical-stack
        cards:
          - type: vertical-stack

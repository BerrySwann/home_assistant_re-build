type: grid
cards:
  - type: heading
    icon: hue:bulb-group-filament-hung
    heading: LAMPES
    heading_style: title
    badges: []
    tap_action:
      action: navigate
      navigation_path: /dashboard-tablette/home
    layout_options:
      grid_columns: full
      grid_rows: 1
  - type: custom:button-card
    styles:
      card:
        - height: 1px
        - background: rgba(255, 255, 255, 1)
        - border: none
        - box-shadow: none
        - border-radius: 0
        - padding: 0
        - margin: 10px
  - type: heading
    icon: mdi:sofa
    heading_style: title
    badges:
      - type: entity
        show_state: true
        show_icon: true
        entity: light.salon
        color: state
        icon: hue:flourish-alt
        tap_action:
          action: more-info
        state_content: state
      - type: entity
        show_state: true
        show_icon: true
        entity: light.table
        color: state
        icon: mdi:ceiling-light
        tap_action:
          action: more-info
    layout_options:
      grid_columns: full
      grid_rows: 1
    heading: SALON
  - type: custom:tabbed-card
    styles:
      "--mdc-theme-primary": rgb(215, 95, 115)
      "--mdc-tab-text-label-color-default": rgba(255, 255, 255, 0.6)
      max-width: 100%
    attributes:
      animated: true
      swipeable: true
    tabs:
      - attributes:
          label: JOUR
          icon: mdi:weather-sunny
        card:
          type: custom:apexcharts-card
          chart_type: donut
          cache: true
          span:
            start: day
          apex_config:
            chart:
              height: 700px
          header:
            show: true
            title: LAMPES SALON CONSO. PAR JOURS
            show_states: true
            colorize_states: true
          all_series_config:
            group_by:
              func: diff
              duration: 24h
            show:
              legend_value: false
              extremas: false
          show:
            loading: true
            last_updated: false
          series:
            - entity: sensor.hue_white_lamp_table_quotidien_um_kwh_tpl
              name: Table
              color: rgb(174, 68, 90)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_color_candle_salon_1_quotidien_um_kwh_tpl
              name: Salon 1C (L1)
              color: rgb(196, 75, 97)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_ambiance_lamp_salon_3_quotidien_um_kwh_tpl
              name: Salon 3A (L1)
              color: rgb(215, 95, 115)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_ambiance_lamp_salon_2_quotidien_um_kwh_tpl
              name: Salon 2A (B2)
              color: rgb(235, 165, 175)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_ambiance_lamp_salon_1_quotidien_um_kwh_tpl
              name: Salon 1A (B1)
              color: rgb(248, 210, 215)
              transform: return x * 1000;
              unit: W
          card_mod:
            style: |
              ha-card {
                background: none !important;
                box-shadow: none !important;
                border: none !important;
              }
      - attributes:
          label: MOIS
          icon: mdi:calendar-month
        card:
          type: custom:apexcharts-card
          chart_type: donut
          cache: true
          span:
            start: month
          apex_config:
            chart:
              height: 700px
          header:
            show: true
            title: LAMPES SALON CONSO. PAR MOIS
            show_states: true
            colorize_states: true
          all_series_config:
            show:
              legend_value: false
              extremas: false
          show:
            loading: true
            last_updated: false
          series:
            - entity: sensor.hue_white_lamp_table_mensuel_um_kwh_tpl
              name: Table
              color: rgb(174, 68, 90)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_color_candle_salon_1_mensuel_um_kwh_tpl
              name: Salon 1C (L1)
              color: rgb(196, 75, 97)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_ambiance_lamp_salon_3_mensuel_um_kwh_tpl
              name: Salon 3A (L1)
              color: rgb(215, 95, 115)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_ambiance_lamp_salon_2_mensuel_um_kwh_tpl
              name: Salon 2A (B2)
              color: rgb(235, 165, 175)
              transform: return x * 1000;
              unit: W
            - entity: sensor.hue_ambiance_lamp_salon_1_mensuel_um_kwh_tpl
              name: Salon 1A (B1)
              color: rgb(248, 210, 215)
              transform: return x * 1000;
              unit: W
          card_mod:
            style: |
              ha-card {
                background: none !important;
                box-shadow: none !important;
                border: none !important;
              }
      - attributes:
          label: 30 JOURS
          icon: mdi:chart-bar
        card:
          type: custom:apexcharts-card
          graph_span: 730h
          span:
            end: day
          apex_config:
            chart:
              height: 500px
          header:
            show: true
            title: Conso. Mensuel Lampes Salon
            show_states: true
            colorize_states: true
          yaxis:
            - id: Watts
              min: 0
              max: auto
              opposite: false
              decimals: 0
              apex_config:
                tickAmount: 4
            - id: Avg
              min: 0
              max: auto
              opposite: true
              decimals: 1
              apex_config:
                tickAmount: 4
          all_series_config:
            group_by:
              func: diff
              duration: 24h
            show:
              legend_value: true
              extremas: true
          series:
            - entity: sensor.eclairage_salon_5_mensuel_um_kwh_tpl
              transform: return x * 1000;
              unit: W
              name: Conso. par jours
              yaxis_id: Watts
              color: rgb(215, 95, 115)
              type: column
            - entity: sensor.eclairage_salon_5_avg_watts_mensuel
              yaxis_id: Avg
              type: line
              stroke_dash: 8
              color: red
              unit: W
              stroke_width: 1
              name: Moy. 1er du mois
          card_mod:
            style: |
              ha-card {
                background: none !important;
                box-shadow: none !important;
                border: none !important;
              }
    card_mod:
      style: |
        ha-card {
          background: none !important;
          box-shadow: none !important;
          border: none !important;
        }

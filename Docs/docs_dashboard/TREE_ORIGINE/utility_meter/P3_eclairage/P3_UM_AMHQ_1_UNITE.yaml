# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : ÉCLAIRAGE — AMHQ PAR AMPOULE (UNITÉ)             │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant la consommation de chaque ampoule Hue
# individuellement en 4 cycles AMHQ. Couvre 7 pièces : Entrée (1x), Salon (5x),
# Cuisine (1x), Couloir (1x), Bureau (5x), SDB (2x), Chambre (4x).
# Total : 19 ampoules × 4 cycles = 76 compteurs.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources White/Play  : sensor.[ampoule]_energie_totale_kwh (Riemann — P3_kWh_1_UNITE.yaml)
# - Sources PowerCalc   : sensor.[ampoule]_energy (direct — bypass Riemann)
#   Lampes concernées   : hue_ambiance_lamp_salon_1/2/3, hue_color_candle_salon_1,
#                         hue_color_candle_chambre_gege, hue_color_candle_chambre_eric
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ne pas confondre UNITE (ampoule seule) avec ZONE (somme par pièce).
# - Lampes PowerCalc : _power = 'unavailable' quand éteinte → Riemann bascule unavailable
#   → Si minuit tombe avec Riemann unavailable, le UM quotidien ne peut pas stocker son
#   baseline → il retourne 0 toute la journée même si la lampe est utilisée.
#   FIX : pointer le UM sur sensor.[lampe]_energy (PowerCalc) qui, lui, conserve sa
#   dernière valeur kWh même lampe éteinte — baseline de minuit toujours valide.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (détail par ampoule)


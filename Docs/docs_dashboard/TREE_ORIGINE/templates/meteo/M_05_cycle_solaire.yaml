# ╭──────────────────────────────────────────────────────────────────────────╮
# │ MÉTÉO. TEMPLATES : CYCLE SOLAIRE — DURÉE / TENDANCE / VARIATION (M_05)   │
# ╰──────────────────────────────────────────────────────────────────────────╯
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Trois capteurs templates du cycle solaire journalier :
# 1. DURÉE DU JOUR       : Calcul astronomique réel (latitude/déclinaison/angle horaire).
# 2. TENDANCE DURÉE JOUR : "Jours rallongent" / "Jours raccourcissent" selon le jour
#                          de l'année (solstices jours 172 et 355 comme pivots).
# 3. VARIATION QUOTIDIENNE : Variation progressive en min/jour selon la saison.
#
# ## 🧮 CALCUL & SOURCES :
# - Durée du jour : lat = zone.home.latitude → déclinaison = 23.45 * sin(2π(j-80)/365)
#                   → cos_h = -(tan(lat_rad) * tan(decl_rad)) → acos(cos_h) → heures.
# - Tendance : j >= 172 AND j <= 355 → raccourcissent, sinon → rallongent.
# - Variation : Printemps (j80→172) : 0→+3 progressif | Été (j172→264) : 0→-3 progressif
#               Automne (j264→355) : stable -3 | Hiver (j355→80) : stable +2.
# - Dates clés : Équinoxe printemps j80 | Solstice été j172 | Équinoxe automne j264
#                Solstice hiver j355.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - La durée du jour est calculée astronomiquement — PAS via sun.sun (next_rising/setting).
#   Elle est donc disponible même si l'intégration Sun est absente ou en erreur.
# - Utilise zone.home.latitude → vérifier que la zone Home est bien configurée.
# - Les fonctions sin/cos/acos/pi/tan sont disponibles nativement dans Jinja2 HA.
# - La variation est arrondie à 1 décimale (round(1)).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L1C1 Météo (données solaires complémentaires — durée, tendance, variation).

  - sensor:
      # ┌───────────────────────────────────┐
      # │ 1/3 : DURÉE DU JOUR               │
      # └───────────────────────────────────┘
      # --- duree_du_jour ---
      - name: "Durée du Jour"
        unique_id: duree_du_jour
        unit_of_measurement: "h"
        icon: mdi:weather-sunny
        state: >
          {# Récupération sécurisée de la latitude #}
          {% set lat = state_attr('zone.home', 'latitude') | float(default=43.72) %}
          {% set lat_rad = lat * pi / 180 %}

          {# Jour de l'année (1-365) #}
          {% set day = now().timetuple().tm_yday %}

          {# Calcul de la déclinaison #}
          {% set decl = 23.45 * sin((2 * pi * (day - 80)) / 365) %}
          {% set decl_rad = decl * pi / 180 %}

          {# Calcul de l'angle horaire #}
          {% set cos_h = -(tan(lat_rad) * tan(decl_rad)) %}

          {# Sécurité pour les limites polaires #}
          {% set cos_h = [ [-1, cos_h] | max, 1 ] | min %}
          {% set hour_angle = acos(cos_h) %}

          {# Résultat en heures #}
          {{ (2 * hour_angle * 180 / pi / 15) | round(2) }}

      # ┌───────────────────────────────────┐
      # │ 2/3 : TENDANCE DURÉE JOUR         │
      # └───────────────────────────────────┘
      # --- tendance_duree_jour ---
      - name: "Tendance durée jour"
        unique_id: tendance_duree_jour
        state: >
          {% set day_of_year = now().timetuple().tm_yday %}
          {% if day_of_year >= 172 and day_of_year <= 355 %}
            Jours raccourcissent
          {% else %}
            Jours rallongent
          {% endif %}
        icon: >
          {% set day_of_year = now().timetuple().tm_yday %}
          {% if day_of_year >= 172 and day_of_year <= 355 %}
            mdi:arrow-down-thick
          {% else %}
            mdi:arrow-up-thick
          {% endif %}
        attributes:
          jour_annee: "{{ now().timetuple().tm_yday }}"
          solstice_ete: "172"
          solstice_hiver: "355"
          jours_avant_solstice: >
            {% set day = now().timetuple().tm_yday %}
            {% if day < 172 %}
              {{ 172 - day }}
            {% elif day < 355 %}
              {{ 355 - day }}
            {% else %}
              {{ 172 + (365 - day) }}
            {% endif %}

      # ┌───────────────────────────────────┐
      # │ 3/3 : VARIATION QUOTIDIENNE       │
      # └───────────────────────────────────┘
      # --- variation_quotidienne ---
      - name: "Variation quotidienne"
        unique_id: variation_quotidienne
        unit_of_measurement: "min"
        icon: mdi:clock-fast
        state: >
          {% set day_of_year = now().timetuple().tm_yday %}
          {% if day_of_year >= 80 and day_of_year <= 172 %}
            {# Printemps : variation progressive 0 → +3 min/jour #}
            {{ (3 * ((day_of_year - 80) / 92)) | round(1) }}
          {% elif day_of_year >= 172 and day_of_year <= 264 %}
            {# Été : variation progressive 0 → -3 min/jour #}
            {{ (-3 * ((day_of_year - 172) / 92)) | round(1) }}
          {% elif day_of_year >= 264 and day_of_year <= 355 %}
            {# Automne : stable à -3 min/jour #}
            {{ -3 | round(1) }}
          {% else %}
            {# Hiver : stable à +2 min/jour #}
            {{ 2 | round(1) }}
          {% endif %}
        attributes:
          jour_annee: "{{ now().timetuple().tm_yday }}"
          periode: >
            {% set day = now().timetuple().tm_yday %}
            {% if day >= 80 and day <= 172 %}
              Printemps (accélération)
            {% elif day >= 172 and day <= 264 %}
              Été (décélération)
            {% elif day >= 264 and day <= 355 %}
              Automne (raccourcissement max)
            {% else %}
              Hiver (rallongement stable)
            {% endif %}
          variation_type: >
            {% set var = states('sensor.variation_quotidienne') | float(0) %}
            {% if var > 0 %}
              Rallongement
            {% elif var < 0 %}
              Raccourcissement
            {% else %}
              Stable
            {% endif %}

# annotations_log:
# - [Réécriture complète] Fichier corrigé depuis le YAML source GitHub (2026-03-13).
# - [L42-56] Durée du jour : calcul astronomique lat/décl/angle horaire (pas sun.sun).
# - [L59-82] Tendance : logique binaire j172/j355 + attributs jours_avant_solstice.
# - [L85-120] Variation : formule progressive printemps/été, valeurs stables automne/hiver.

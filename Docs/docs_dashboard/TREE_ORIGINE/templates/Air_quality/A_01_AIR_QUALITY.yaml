# ╭──────────────────────────────────────────────────────────────────────────╮
# │ [ A ] TEMPLATES : QUALITÉ DE L'AIR — TCOV EN PPB (3 PIÈCES)              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Trois capteurs templates convertissant l'index VOC brut IKEA Vindstyrka
# en ppb (parties par milliard) avec device_class volatile_organic_compounds_parts.
# Permet l'affichage correct dans HA et la compatibilité avec les ring-tiles.
#
# ## 🧮 CALCUL & SOURCES :
# - Source   : sensor.qualite_air_*_ikea_voc_index (IKEA Vindstyrka — natif HA)
# - Formule  : state | float(0) — pas de conversion (index = ppb natif)
# - Pièces   : Salon (4), Bureau (7), Chambre (9)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ne pas confondre avec sensor.tcov_*_moy_24h (statistiques 24h — sensors/).
# - device_class: volatile_organic_compounds_parts est requis pour que HA
#   affiche l'unité ppb correctement dans les cartes et l'historique.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L6C1 Qualité de l'air — ring-tile tCOV (entity: sensor.tcov_*_ppb).
# - Page /air-quality — pop-up graphique cov (entity_sensor: voc_index natif).

- sensor:
    # ┌───────────────────────────────────┐
    # │ 1. MESURES PPB                    │
    # └───────────────────────────────────┘

    # --- tcov_salon_ppb ---
    - name: "tCOV Salon (ppb)"
      unique_id: tcov_salon_ppb
      unit_of_measurement: "ppb"
      device_class: volatile_organic_compounds_parts
      state_class: measurement
      icon: mdi:chemical-weapon
      state: "{{ states('sensor.qualite_air_salon_ikea_voc_index') | float(0) }}"

    # --- tcov_bureau_ppb ---
    - name: "tCOV Bureau (ppb)"
      unique_id: tcov_bureau_ppb
      unit_of_measurement: "ppb"
      device_class: volatile_organic_compounds_parts
      state_class: measurement
      icon: mdi:chemical-weapon
      state: "{{ states('sensor.qualite_air_bureau_ikea_voc_index') | float(0) }}"

    # --- tcov_chambre_ppb ---
    - name: "tCOV Chambre (ppb)"
      unique_id: tcov_chambre_ppb
      unit_of_measurement: "ppb"
      device_class: volatile_organic_compounds_parts
      state_class: measurement
      icon: mdi:chemical-weapon
      state: "{{ states('sensor.qualite_air_chambre_ikea_voc_index') | float(0) }}"


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATE : ECOJOKO — CALCUL COÛTS HP/HC/TOTAL (4 PÉRIODES)       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template calculant le coût en euros de la consommation Ecojoko sur
# 4 périodes (Quotidien, Mensuel, Hebdomadaire, Annuel) pour HP, HC et Total.
# Multiplie la valeur UM (kWh) par le tarif TTC en vigueur.
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : sensor.ecojoko_[periode]_um × sensor.tarif_heures_[hp/hc]_ttc
# - Sources UM : utility_meter/P0_Energie_total/Ecojoko/01_UM_AMHQ_cost.yaml
# - Tarifs : intégration tarif_edf (sensor.tarif_heures_pleines_ttc / creuses_ttc)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# Le tarif TTC change avec les périodes réglementaires EDF. Vérifier la
# disponibilité de sensor.tarif_heures_pleines_ttc et
# sensor.tarif_heures_creuses_ttc. Ne pas coder un tarif en dur.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (section coûts quotidiens/mensuels, pie charts HP/HC)
#
- sensor:
# ╭──────────────────────────────────────────────────────────────────────────╮
# │ 1. QUOTIDIEN (Q)                                                         │
# ╰──────────────────────────────────────────────────────────────────────────╯
    # --- ecojoko_cout_hp_quotidien ---
    - name: "Ecojoko Coût HP Quotidien"
      unique_id: ecojoko_cout_hp_quotidien
      unit_of_measurement: "€"
      device_class: monetary
      state_class: total
      state: >
        {% set kwh   = states('sensor.ecojoko_hp_reseau_quotidien_um') | float(0) %}
        {% set tarif = states('sensor.tarif_heures_pleines_ttc') | float(0) %}
        {{ (kwh * tarif) | round(2) }}
      availability: >
        {{ states('sensor.ecojoko_hp_reseau_quotidien_um') not in ['unavailable','unknown','none']
          and states('sensor.tarif_heures_pleines_ttc') not in ['unavailable','unknown','none'] }}
    # --- ecojoko_cout_hc_quotidien ---
    - name: "Ecojoko Coût HC Quotidien"
      unique_id: ecojoko_cout_hc_quotidien
      unit_of_measurement: "€"
      device_class: monetary
      state_class: total
      state: >
        {% set kwh   = states('sensor.ecojoko_hc_reseau_quotidien_um') | float(0) %}
        {% set tarif = states('sensor.tarif_heures_creuses_ttc') | float(0) %}
        {{ (kwh * tarif) | round(2) }}
      availability: >
        {{ states('sensor.ecojoko_hc_reseau_quotidien_um') not in ['unavailable','unknown','none']
          and states('sensor.tarif_heures_creuses_ttc') not in ['unavailable','unknown','none'] }}
    # --- ecojoko_cout_total_quotidien ---
    - name: "Ecojoko Coût Total Quotidien"
      unique_id: ecojoko_cout_total_quotidien
      unit_of_measurement: "€"
      device_class: monetary
      state_class: total
      state: >
        {% set hp = states('sensor.ecojoko_cout_hp_quotidien') | float(0) %}
        {% set hc = states('sensor.ecojoko_cout_hc_quotidien') | float(0) %}
        {{ (hp + hc) | round(2) }}
# ╭──────────────────────────────────────────────────────────────────────────╮
# │ 2. HEBDOMADAIRE (H)                                                      │
# ╰──────────────────────────────────────────────────────────────────────────╯

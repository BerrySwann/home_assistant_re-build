# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATES : DIAGNOSTIC CONSO — SEMAINE EN COURS (7 PÔLES)        │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Neuf capteurs templates calculant la consommation hebdomadaire identifiée
# par pôle fonctionnel (7 pôles), plus un capteur de maximum dynamique et
# un capteur de total identifié.
#
# ## 🧮 CALCUL & SOURCES :
# - Même structure que le fichier journalier — cycle hebdomadaire AMHQ.
# - Reset le lundi 00h00. Max dynamique : buffer 2 kWh.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Tous les UM P1/P2/P3 utilisent le suffixe _kwh_um (nomenclature unifiée).
# - state_class: measurement — reset le lundi 00h00 via UM.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (graphique répartition par pôle — hebdomadaire).

- sensor:
  # --- diag_poste_hygiene_hebdomadaire ---
  - name: "Diag Poste Hygiene Hebdomadaire"
    unique_id: diag_poste_hygiene_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:washing-machine
    state: >
      {% set ll = states('sensor.prise_lave_linge_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set lv = states('sensor.prise_lave_vaisselle_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set fr = states('sensor.prise_bureau_fer_a_repasser_nous_hebdomadaire_kwh_um') | float(0) %}
      {{ (ll + lv + fr) | round(3) }}

  # --- diag_poste_cuisine_hebdomadaire ---
  - name: "Diag Poste Cuisine Hebdomadaire"
    unique_id: diag_poste_cuisine_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:stove
    state: >
      {% set mo = states('sensor.prise_four_micro_ondes_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set pd = states('sensor.prise_petit_dejeune_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set af = states('sensor.prise_airfryer_ninja_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set fp = states('sensor.four_et_plaque_de_cuisson_hebdomadaire_kwh_um') | float(0) %}
      {{ (mo + pd + af + fp) | round(3) }}

  # --- diag_poste_froid_hebdomadaire ---
  - name: "Diag Poste Froid Hebdomadaire"
    unique_id: diag_poste_froid_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:fridge
    state: >
      {% set fr = states('sensor.prise_frigo_cuisine_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set cg = states('sensor.prise_congelateur_cuisine_nous_hebdomadaire_kwh_um') | float(0) %}
      {{ (fr + cg) | round(3) }}

  # --- diag_poste_chauffage_hebdomadaire ---
  - name: "Diag Poste Chauffage Hebdomadaire"
    unique_id: diag_poste_chauffage_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:fire
    state: >
      {% set cs = states('sensor.clim_salon_hebdomadaire_kwh_um') | float(0) %}
      {% set rc = states('sensor.radiateur_elec_cuisine_hebdomadaire_kwh_um') | float(0) %}
      {% set cb = states('sensor.clim_bureau_hebdomadaire_kwh_um') | float(0) %}
      {% set ss = states('sensor.soufflant_sdb_hebdomadaire_kwh_um') | float(0) %}
      {% set sv = states('sensor.seche_serviette_sdb_hebdomadaire_kwh_um') | float(0) %}
      {% set cc = states('sensor.clim_chambre_hebdomadaire_kwh_um') | float(0) %}
      {{ (cs + rc + cb + ss + sv + cc) | round(3) }}

  # --- diag_poste_multimedia_hebdomadaire ---
  - name: "Diag Poste Multimedia Hebdomadaire"
    unique_id: diag_poste_multimedia_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:monitor
    state: >
      {% set bx = states('sensor.prise_box_internet_ikea_hebdomadaire_kwh_um') | float(0) %}
      {% set ts = states('sensor.prise_tv_salon_ikea_hebdomadaire_kwh_um') | float(0) %}
      {% set tc = states('sensor.prise_tv_chambre_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set pg = states('sensor.prise_pc_s_gege_ikea_hebdomadaire_kwh_um') | float(0) %}
      {% set pb = states('sensor.prise_bureau_pc_ikea_hebdomadaire_kwh_um') | float(0) %}
      {{ (bx + ts + tc + pg + pb) | round(3) }}

  # --- diag_poste_eclairage_hebdomadaire ---
  - name: "Diag Poste Eclairage Hebdomadaire"
    unique_id: diag_poste_eclairage_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:lightbulb
    state: >
      {{ states('sensor.eclairage_total_group_hebdomadaire_kwh_um') | float(0) | round(3) }}

  # --- diag_poste_autre_hebdomadaire ---
  - name: "Diag Poste Autre Hebdomadaire"
    unique_id: diag_poste_autre_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:plus-circle
    state: >
      {% set vs = states('sensor.all_standby_hebdomadaire_kwh_um') | float(0) %}
      {% set tl = states('sensor.prise_tete_de_lit_chambre_hebdomadaire_kwh_um') | float(0) %}
      {% set ch = states('sensor.prise_salon_chargeur_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set hr = states('sensor.prise_horloge_ikea_hebdomadaire_kwh_um') | float(0) %}
      {{ (vs + tl + ch + hr) | round(3) }}

  # --- diag_max_poste_hebdomadaire ---
  - name: "Diag Max Poste Hebdomadaire Dynamique"
    unique_id: diag_max_poste_hebdomadaire_dynamique
    unit_of_measurement: "kWh"
    device_class: energy
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_hebdomadaire') | float(0),
        states('sensor.diag_poste_cuisine_hebdomadaire') | float(0),
        states('sensor.diag_poste_froid_hebdomadaire') | float(0),
        states('sensor.diag_poste_chauffage_hebdomadaire') | float(0),
        states('sensor.diag_poste_multimedia_hebdomadaire') | float(0),
        states('sensor.diag_poste_eclairage_hebdomadaire') | float(0),
        states('sensor.diag_poste_autre_hebdomadaire') | float(0)
      ] %}
      {{ (poles | max + 2) | round(2) }}

  # --- diag_total_identifie_hebdomadaire ---
  - name: "Diag Total Identifie Hebdomadaire"
    unique_id: diag_total_identifie_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_hebdomadaire') | float(0),
        states('sensor.diag_poste_cuisine_hebdomadaire') | float(0),
        states('sensor.diag_poste_froid_hebdomadaire') | float(0),
        states('sensor.diag_poste_chauffage_hebdomadaire') | float(0),
        states('sensor.diag_poste_multimedia_hebdomadaire') | float(0),
        states('sensor.diag_poste_eclairage_hebdomadaire') | float(0),
        states('sensor.diag_poste_autre_hebdomadaire') | float(0)
      ] %}
      {{ (poles | sum) | round(2) }}

# annotations_log:
# [Toutes state_class] measurement (reset lundi 00h00)
# [Pôle 4] _hebdomadaire_kwh_um sur toutes les sources P1
# [Max buffer] 2 kWh

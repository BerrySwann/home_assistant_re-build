# ╭──────────────────────────────────────────────────────────────────────────╮
# │ SWITCH : ÉCLAIRAGE — INTERRUPTEUR BP VIRTUEL SOMRIG SALON                │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Switch template contrôlant la lampe IKEA TRADFRI Somrig du salon via un
# input_boolean virtuel. Permet un pilotage unifié depuis l'interface
# (bouton poussoir virtuel) sans dépendance directe à l'entité lumière.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : input_boolean.inter_somrig_salon
# - turn_on  → input_boolean.turn_on
# - turn_off → input_boolean.turn_off
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ce switch pilote l'input_boolean, pas directement la lampe physique.
# - L'input_boolean déclarant (inter_somrig_salon) est dans :
#   input_booleans/P3/P3_BV_inter_salon.yaml
# - Icône dynamique : mdi:lightbulb-on (ON) / mdi:lightbulb-off (OFF).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L3C1 Commandes Éclairage (bouton on/off Somrig salon)

- switch:
    # ┌───────────────────────────────────┐
    # │ 4. SALON                          │
    # └───────────────────────────────────┘
    # --- inter_somrig_salon ---
    - name: "Inter Somrig Salon"
      unique_id: inter_somrig_salon
      state: "{{ is_state('input_boolean.inter_somrig_salon', 'on') }}"
      icon: >
        {% if is_state('input_boolean.inter_somrig_salon', 'on') %}
          mdi:lightbulb-on
        {% else %}
          mdi:lightbulb-off
        {% endif %}
      turn_on:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.inter_somrig_salon
      turn_off:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.inter_somrig_salon

# annotations_log:

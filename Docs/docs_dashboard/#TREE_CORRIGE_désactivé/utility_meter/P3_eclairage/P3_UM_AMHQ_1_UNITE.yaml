# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : ÉCLAIRAGE — AMHQ PAR AMPOULE (UNITÉ)             │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant la consommation de chaque ampoule Hue
# individuellement en 4 cycles AMHQ. Couvre 7 pièces : Entrée (1x), Salon (5x),
# Cuisine (1x), Couloir (1x), Bureau (5x), SDB (2x), Chambre (4x).
# Total : 19 ampoules × 4 cycles = 76 compteurs.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources White/Play  : sensor.[ampoule]_energie_totale_kwh (Riemann — P3_kWh_1_UNITE.yaml)
#   Hue Bridge ne fournit pas de sensor _energy natif → Riemann est le seul chemin possible.
# - Sources PowerCalc   : sensor.[ampoule]_energy (direct — bypass Riemann)
#   Lampes concernées   : hue_ambiance_lamp_salon_1/2/3, hue_color_candle_salon_1,
#                         hue_color_candle_chambre_gege, hue_color_candle_chambre_eric
#   Raison du bypass    : _power = 'unavailable' quand éteinte → Riemann bascule unavailable
#                         → baseline de minuit invalide → UM retourne 0 toute la journée.
#                         PowerCalc _energy conserve la valeur même lampe éteinte.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL              | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                          | AVAL                            |
# |:----------------------|:---------------------------------------------------|:------------------------------------------------|:--------------------------------|
# | Hue Bridge (Riemann)  | sensor.*_energie_totale_kwh (×13 White/Play)       | *_annuel/mensuel/hebdomadaire/quotidien_um      | P3_AVG_AMHQ_1_UNITE.yaml → L2C3 |
# | PowerCalc (×6 Color)  | sensor.*_energy (ambiance_salon 1/2/3, color ×3)   | *_annuel/mensuel/hebdomadaire/quotidien_um      | P3_AVG_AMHQ_1_UNITE.yaml → L2C3 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Riemann White/Play : accumulation sans remise à zéro — cycles AMHQ ici.
# - PowerCalc bypass : sensor.*_energy (PowerCalc) stable même lampe éteinte → baseline minuit OK.
# - Ne pas confondre UNITE (ampoule seule) avec ZONE (somme par pièce).
# - Suffixe _um (sans _kwh_) : convention uniforme depuis refactoring 2026-04-25.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (détail par ampoule)


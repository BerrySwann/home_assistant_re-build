# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : ÉCLAIRAGE — AMHQ TOTAL APPARTEMENT               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter donnant la consommation totale de tout l'éclairage
# de l'appartement en 4 cycles AMHQ. 2 totaux × 4 cycles = 8 compteurs.
# - Total GROUP : somme des 7 zones (P3_kWh_2_ZONE → P3_POWER_3_TOTAL_ZONE)
# - Total UNIT  : somme des 19 ampoules (P3_kWh_1_UNITE → P3_POWER_1_TOTAL_UNITE)
#
# ## 🧮 CALCUL & SOURCES :
# - sensor.eclairage_total_group_energie_totale_kwh (calculé — P3_kWh_3_TOTAL.yaml)
# - sensor.eclairage_total_unit_energie_totale_kwh  (calculé — P3_kWh_3_TOTAL.yaml)
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL   | CAPTEUR BRUT (source)                                 | CE FICHIER (unique_id)                              | AVAL                            |
# |:-----------|:------------------------------------------------------|:----------------------------------------------------|:--------------------------------|
# | [calculé]  | sensor.eclairage_total_group_energie_totale_kwh       | eclairage_total_group_*_um                          | P3_AVG_AMHQ_3_TOTAL.yaml → L2C3 |
# | [calculé]  | sensor.eclairage_total_unit_energie_totale_kwh        | eclairage_total_unit_*_um                           | P3_AVG_AMHQ_3_TOTAL.yaml → L2C3 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les deux totaux (GROUP et UNIT) doivent converger. Un écart persistant
#   indique une source manquante dans l'un des deux chemins de calcul.
# - Suffixe _um (sans _kwh_) : convention uniforme depuis refactoring 2026-04-25.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (vignette total éclairage)

# ┌───────────────────────────────────┐
# │  TOTAL : PAR REGROUPEMENT (zones) │
# └───────────────────────────────────┘

# --- eclairage_total_group_annuel_um ---
eclairage_total_group_annuel_um:
  source: sensor.eclairage_total_group_energie_totale_kwh
  name: "Eclairage Total Group Annuel UM"
  unique_id: eclairage_total_group_annuel_um
  cycle: yearly

# --- eclairage_total_group_mensuel_um ---
eclairage_total_group_mensuel_um:
  source: sensor.eclairage_total_group_energie_totale_kwh
  name: "Eclairage Total Group Mensuel UM"
  unique_id: eclairage_total_group_mensuel_um
  cycle: monthly

# --- eclairage_total_group_hebdomadaire_um ---
eclairage_total_group_hebdomadaire_um:
  source: sensor.eclairage_total_group_energie_totale_kwh
  name: "Eclairage Total Group Hebdomadaire UM"
  unique_id: eclairage_total_group_hebdomadaire_um
  cycle: weekly

# --- eclairage_total_group_quotidien_um ---
eclairage_total_group_quotidien_um:
  source: sensor.eclairage_total_group_energie_totale_kwh
  name: "Eclairage Total Group Quotidien UM"
  unique_id: eclairage_total_group_quotidien_um
  cycle: daily

# ┌───────────────────────────────────┐
# │  TOTAL : À L'UNITÉ (19 lampes)    │
# └───────────────────────────────────┘

# --- eclairage_total_unit_annuel_um ---
eclairage_total_unit_annuel_um:
  source: sensor.eclairage_total_unit_energie_totale_kwh
  name: "Eclairage Total Unit Annuel UM"
  unique_id: eclairage_total_unit_annuel_um
  cycle: yearly

# --- eclairage_total_unit_mensuel_um ---
eclairage_total_unit_mensuel_um:
  source: sensor.eclairage_total_unit_energie_totale_kwh
  name: "Eclairage Total Unit Mensuel UM"
  unique_id: eclairage_total_unit_mensuel_um
  cycle: monthly

# --- eclairage_total_unit_hebdomadaire_um ---
eclairage_total_unit_hebdomadaire_um:
  source: sensor.eclairage_total_unit_energie_totale_kwh
  name: "Eclairage Total Unit Hebdomadaire UM"
  unique_id: eclairage_total_unit_hebdomadaire_um
  cycle: weekly

# --- eclairage_total_unit_quotidien_um ---
eclairage_total_unit_quotidien_um:
  source: sensor.eclairage_total_unit_energie_totale_kwh

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1. TEMPLATE — TOTAUX AMHQ & PUISSANCE INSTANTANÉE CHAUFFAGE & CLIM  │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Cinq capteurs templates agrégeant la consommation totale Pôle 1 (6 appareils)
# sur 4 cycles temporels (Annuel / Mensuel / Hebdo / Quotidien) + puissance W.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources kWh : utility_meter/P1_clim_chauffage/P1_UM_AMHQ.yaml
#   → sensor.*_{période}_um (clim_salon, radiateur_cuisine, clim_bureau,
#     soufflant_sdb, seche_serviette_sdb, clim_chambre)
# - Source W   : sensors natifs NOUS (*_nous_power, radiateur_elec_cuisine_power,
#     prise_soufflant_salle_de_bain_nous_power, prise_seche_serviette_salle_de_bain_nous_power)
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | [calculé]      | sensor.p1_*_{periode}_um (×6 équipements)      | p1_total_kwh_{periode}                             | L2C2 Énergie Clim                  |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Le capteur de puissance (conso_clim_rad_total) lit les sensors natifs NOUS
#   et non les UM — c'est la puissance instantanée, pas l'énergie cumulée.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C2 Conso Énergie Clim / Radiateur / Soufflant (totaux AMHQ + W temps réel)

- sensor:

    # ┌───────────────────────────────────┐
    # │ TOTAL P1 kWh — QUOTIDIEN          │
    # └───────────────────────────────────┘

    # --- conso_clim_rad_total_quotidien ---
    - name: "Conso. Clim. Rad. Total QUOTIDIEN"
      unique_id: conso_clim_rad_total_quotidien
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_quotidien_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_quotidien_um') | float(0) +
          states('sensor.clim_bureau_quotidien_um') | float(0) +
          states('sensor.soufflant_sdb_quotidien_um') | float(0) +
          states('sensor.seche_serviette_sdb_quotidien_um') | float(0) +
          states('sensor.clim_chambre_quotidien_um') | float(0)) | round(3) }}

    # ┌───────────────────────────────────┐
    # │ TOTAL P1 kWh — MENSUEL            │
    # └───────────────────────────────────┘

    # --- conso_clim_rad_total_mensuel ---
    - name: "Conso. Clim. Rad. Total MENSUEL"
      unique_id: conso_clim_rad_total_mensuel
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_mensuel_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_mensuel_um') | float(0) +
          states('sensor.clim_bureau_mensuel_um') | float(0) +
          states('sensor.soufflant_sdb_mensuel_um') | float(0) +
          states('sensor.seche_serviette_sdb_mensuel_um') | float(0) +
          states('sensor.clim_chambre_mensuel_um') | float(0)) | round(3) }}

    # ┌───────────────────────────────────┐
    # │ TOTAL P1 kWh — HEBDOMADAIRE       │
    # └───────────────────────────────────┘

    # --- conso_clim_rad_total_hebdomadaire ---
    - name: "Conso. Clim. Rad. Total HEBDOMADAIRE"
      unique_id: conso_clim_rad_total_hebdomadaire
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_hebdomadaire_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_hebdomadaire_um') | float(0) +
          states('sensor.clim_bureau_hebdomadaire_um') | float(0) +
          states('sensor.soufflant_sdb_hebdomadaire_um') | float(0) +
          states('sensor.seche_serviette_sdb_hebdomadaire_um') | float(0) +
          states('sensor.clim_chambre_hebdomadaire_um') | float(0)) | round(3) }}

    # ┌───────────────────────────────────┐
    # │ TOTAL P1 kWh — ANNUEL             │
    # └───────────────────────────────────┘

    # --- conso_clim_rad_total_annuel ---
    - name: "Conso. Clim. Rad. Total ANNUEL"
      unique_id: conso_clim_rad_total_annuel
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_annuel_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_annuel_um') | float(0) +
          states('sensor.clim_bureau_annuel_um') | float(0) +
          states('sensor.soufflant_sdb_annuel_um') | float(0) +
          states('sensor.seche_serviette_sdb_annuel_um') | float(0) +
          states('sensor.clim_chambre_annuel_um') | float(0)) | round(3) }}

    # ┌───────────────────────────────────┐
    # │ TOTAL P1 — PUISSANCE INSTANTANÉE  │
    # └───────────────────────────────────┘

    # --- conso_clim_rad_total ---
    - name: "Conso Clim Rad Total"
      unique_id: conso_clim_rad_total
      device_class: power
      unit_of_measurement: "W"
      state: >
        {{ (states('sensor.clim_salon_nous_power') | float(0) +
          states('sensor.radiateur_elec_cuisine_power') | float(0) +
          states('sensor.clim_bureau_nous_power') | float(0) +
          states('sensor.prise_soufflant_salle_de_bain_nous_power') | float(0) +
          states('sensor.prise_seche_serviette_salle_de_bain_nous_power') | float(0) +
          states('sensor.clim_chambre_nous_power') | float(0)) | round(3) }}

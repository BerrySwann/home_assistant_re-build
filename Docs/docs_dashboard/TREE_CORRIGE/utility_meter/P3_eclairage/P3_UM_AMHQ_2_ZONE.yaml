# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : ÉCLAIRAGE — AMHQ PAR ZONE / PIÈCE               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter découpant la consommation de l'éclairage par zone
# (pièce physique ou groupe transversal) en 4 cycles AMHQ.
# Couvre 7 pièces + 2 zones transversales = 9 zones × 4 cycles = 36 compteurs.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : sensor.eclairage_*_energie (templates P3_ENERGIE_2_ZONE.yaml).
# - Ces templates calculent la somme kWh de chaque zone à partir des _energy ampoules.
# - Riemann (_energie_totale_kwh) supprimé — sources remplacées par templates zone.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL    | CAPTEUR BRUT (source)                       | CE FICHIER (unique_id)                                | AVAL                            |
# |:------------|:--------------------------------------------|:------------------------------------------------------|:--------------------------------|
# | [calculé]   | sensor.eclairage_entree_1_energie           | eclairage_entree_1_{annuel|mensuel|hebdo|quotidien}_um | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_salon_5_energie            | eclairage_salon_5_{annuel|mensuel|hebdo|quotidien}_um  | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_cuisine_1_energie          | eclairage_cuisine_1_*_um                              | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_couloir_1_energie          | eclairage_couloir_1_*_um                              | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_bureau_5_energie           | eclairage_bureau_5_*_um                               | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_sdb_2_energie              | eclairage_sdb_2_*_um                                  | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_chambre_4_energie          | eclairage_chambre_4_*_um                              | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_appart_3_energie           | eclairage_appart_3_*_um                               | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
# | [calculé]   | sensor.eclairage_appart_2_energie           | eclairage_appart_2_*_um                               | P3_AVG_AMHQ_2_ZONE.yaml → L2C3 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Sources = templates zone (P3_ENERGIE_2_ZONE.yaml) — PAS les _energie_totale_kwh Riemann.
# - eclairage_appart_2/3 sont des zones transversales (sous-ensemble) — ne pas inclure
#   dans les calculs de total global (double-comptage).
# - eclairage_couloir_1 : pas d'UM dans le dashboard — inclus ici pour complétude.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (détail par zone via P3_AVG_AMHQ_2_ZONE)

# ┌───────────────────────────────────┐

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : ÉCLAIRAGE — AMHQ TOTAUX APPARTEMENT              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Compteurs Utility Meter calculant la consommation totale de l'éclairage
# de l'appartement selon 2 méthodes de calcul complémentaires, en 4 cycles
# AMHQ. Total : 2 totaux × 4 cycles = 8 compteurs.
#
# ## 🧮 CALCUL & SOURCES :
# - eclairage_total_unit_* : source = sensor.eclairage_total_unit_energie
#   (P3_ENERGIE_1_TOTAL_UNITE.yaml — somme directe des 19 ampoules _energy).
# - eclairage_total_group_* : source = sensor.eclairage_total_group_energie
#   (P3_ENERGIE_3_TOTAL_ZONE.yaml — somme des 7 zones physiques _energie).
# - Les deux résultats sont théoriquement identiques (cross-check de cohérence).
# - Riemann (_energie_totale_kwh) supprimé — sources remplacées par templates.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL    | CAPTEUR BRUT (source)                         | CE FICHIER (unique_id)                                  | AVAL       |
# |:------------|:----------------------------------------------|:--------------------------------------------------------|:-----------|
# | [calculé]   | sensor.eclairage_total_unit_energie           | eclairage_total_unit_{annuel|mensuel|hebdo|quotidien}_um | L2C3       |
# | [calculé]   | sensor.eclairage_total_group_energie          | eclairage_total_group_{annuel|mensuel|hebdo|quotidien}_um| L2C3       |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - eclairage_total_unit et eclairage_total_group doivent rester cohérents.
#   Tout écart indique une ampoule manquante ou doublée dans l'une des sources.
# - Ne jamais pointer sur eclairage_appart_2/3 ici — zones transversales = double-comptage.
# - Pas de tariff HP/HC — ces UM sont simples (pas de split tarifaire).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (total appartement — graphes AMHQ)

# ╭──────────────────────────────────────────────────────────────────────────╮
# │    TOTAL UNITÉ (somme directe 19 ampoules)                                │
# ╰──────────────────────────────────────────────────────────────────────────╯

# --- eclairage_total_unit_annuel_um ---
eclairage_total_unit_annuel_um:
  source: sensor.eclairage_total_unit_energie
  name: "Eclairage Total Unit Annuel UM"
  unique_id: eclairage_total_unit_annuel_um
  cycle: yearly

# --- eclairage_total_unit_mensuel_um ---
eclairage_total_unit_mensuel_um:
  source: sensor.eclairage_total_unit_energie
  name: "Eclairage Total Unit Mensuel UM"
  unique_id: eclairage_total_unit_mensuel_um
  cycle: monthly

# --- eclairage_total_unit_hebdomadaire_um ---
eclairage_total_unit_hebdomadaire_um:
  source: sensor.eclairage_total_unit_energie
  name: "Eclairage Total Unit Hebdomadaire UM"
  unique_id: eclairage_total_unit_hebdomadaire_um
  cycle: weekly

# --- eclairage_total_unit_quotidien_um ---
eclairage_total_unit_quotidien_um:
  source: sensor.eclairage_total_unit_energie
  name: "Eclairage Total Unit Quotidien UM"
  unique_id: eclairage_total_unit_quotidien_um
  cycle: daily

# ╭──────────────────────────────────────────────────────────────────────────╮
# │    TOTAL GROUP (somme des 7 zones physiques)                              │
# ╰──────────────────────────────────────────────────────────────────────────╯

# --- eclairage_total_group_annuel_um ---

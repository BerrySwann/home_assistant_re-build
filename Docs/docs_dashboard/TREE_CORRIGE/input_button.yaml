# ╭──────────────────────────────────────────────────────────────────────────╮
# │ INPUT BUTTON : PUSH GITHUB                                               │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Déclare 2 boutons virtuels HA (input_button) permettant de déclencher
# manuellement le backup Git depuis l'interface graphique (dashboard ou
# outils de développement).
# Inclus via : input_button: !include input_button.yaml (configuration.yaml)
#
# ## 🧮 CALCUL & SOURCES :
# - git_push_manuel        → déclenche shell_command.git_backup_push_manual
#                            → argument "Manuel" → commit libellé "Manuel"
# - git_push_weekly_manuel → déclenche shell_command.git_backup_push_weekly
#                            → argument "weekly" → commit + tag ISO semaine
# (Liaison via automation dans automations.yaml — trigger: platform: event,
#  event_type: input_button.pressed)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces boutons sont PASSIFS : ils ne font rien sans l'automation associée.
# - L'automation doit écouter l'event input_button.pressed pour chaque entité.
# - Pas de state (on/off) — uniquement un event ponctuel à la pression.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Affiché dans le dashboard système (boutons de maintenance manuelle Git)

# --- git_push_manuel ---
git_push_manuel:
  name: "Git Push Manuel"
  icon: mdi:github

# --- git_push_weekly_manuel ---
git_push_weekly_manuel:
  name: "Git Push Weekly Manuel"
  icon: mdi:tag-outline
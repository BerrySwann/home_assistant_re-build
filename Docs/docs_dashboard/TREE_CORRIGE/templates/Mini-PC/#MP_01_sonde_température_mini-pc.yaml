# ╭──────────────────────────────────────────────────────────────────────────╮
# │ SENSOR : SYSTÈME — TEMPÉRATURES MINI PC (6 SONDES)                       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# 6 capteurs de température du Mini PC Intel NUC :
# carte mère (zone thermique 0), CPU Package, et 4 cores individuels.
# ⚠️ DÉSACTIVÉ — command_line non fonctionnel depuis passage en VM HA.
# Remplacé par MQTT Discovery (publish_temp.sh sur host Proxmox).
# Entités actives : sensor.proxmox_carte_mere / proxmox_cpu_package / proxmox_core_0→3
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : valeur_brute (millidegrés) / 1000 → °C (arrondi 1 décimale)
# - Sources : sensor.thermal_zone_0_temp, sensor.temperature_cpu_package,
#             sensor.temperature_core_0/1/2/3
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | Mini-PC (thermal_zone Linux) | sensor.mini_pc_thermal_zone_* (command_line)       | mini_pc_temp_cpu_* / mini_pc_temp_carte_mere       | L4C2 Mini PC                       |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les sources remontent des millidegrés (entiers), la division /1000 est obligatoire.
# - float(0) → valeur par défaut 0 en cas d'indisponibilité du capteur source.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L4C2 Mini PC (surveillance thermique)

- sensor:
    # ┌───────────────────────────────────┐
    # │ [ MP ] MINI-PC                    │
    # └───────────────────────────────────┘
    # --- temperature_carte_mere ---
    - name: "Température Carte Mère"
      unique_id: temperature_carte_mere
      unit_of_measurement: "°C"
      device_class: temperature
      state: "{{ (states('sensor.thermal_zone_0_temp') | float(0) / 1000) | round(1) }}"

    # --- temperature_cpu_package ---
    - name: "Température CPU (Package)"
      unique_id: temperature_cpu_package
      unit_of_measurement: "°C"
      device_class: temperature
      state: "{{ (states('sensor.temperature_cpu_package') | float(0) / 1000) | round(1) }}"

    # --- temperature_core_0 ---
    - name: "Température Core 0"
      unique_id: temperature_core_0
      unit_of_measurement: "°C"
      device_class: temperature
      state: "{{ (states('sensor.temperature_core_0') | float(0) / 1000) | round(1) }}"

    # --- temperature_core_1 ---
    - name: "Température Core 1"
      unique_id: temperature_core_1
      unit_of_measurement: "°C"
      device_class: temperature
      state: "{{ (states('sensor.temperature_core_1') | float(0) / 1000) | round(1) }}"

    # --- temperature_core_2 ---
    - name: "Température Core 2"
      unique_id: temperature_core_2
      unit_of_measurement: "°C"
      device_class: temperature
      state: "{{ (states('sensor.temperature_core_2') | float(0) / 1000) | round(1) }}"

    # --- temperature_core_3 ---
    - name: "Température Core 3"
      unique_id: temperature_core_3
      unit_of_measurement: "°C"
      device_class: temperature
      state: "{{ (states('sensor.temperature_core_3') | float(0) / 1000) | round(1) }}"


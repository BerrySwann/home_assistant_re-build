# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 4. TEMPLATE : PRÉSENCE — LOGIQUE WIFI / CELLULAIRE (GROUPE & STATUTS) │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template calculant l'état de présence global via deux sensors :
# - sensor.groupe : code numérique (groupe_1=Absent / groupe_2=Mamour /
#   groupe_3=Eric / groupe_4=Tous) pour déclencher les automations.
# - sensor.presence : texte formaté affichant les statuts réseau de chaque
#   téléphone (WIFI / CELL / WIFI_!?) pour le dashboard.
#
# ## 🧮 CALCUL & SOURCES :
# - sensor.mamour_network_type / wi_fi_connection (Mamour)
# - sensor.eric_network_type / wi_fi_connection (Eric)
# - SSID cible : 'Module B.E.R.Y.L. [GG-5.0]' et '[GG-2.4]' (codé en dur)
# - Logique groupe : AND → groupe_4, Eric seul → groupe_3, Mamour → groupe_2
# - Logique présence : affichage "[2] en [WIFI]" ou "[Mamour: WIFI/CELL]"
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | [calculé]      | device_tracker.* / sensor.*_network_type           | presence_maison (présent/absent)                   | Home Page / automations présence   |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - sensor.groupe alimente les AUTOMATIONS de présence (volets, clim, etc.)
#   — toute modification a un impact direct sur le comportement de la maison.
# - WIFI_!? = connecté Wi-Fi mais SSID inconnu (ex: chez un voisin).
#   Ne pas traiter comme une présence valide.
# - Prévoir un délai de confirmation (5-10 min) dans les automations pour
#   éviter les bascules fugaces lors d'une sortie/entrée rapide.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - WIFI_PRESENCE (Page Home — logique déclenchement mode Absent/Présent)

- sensor:
# ┌───────────────────────────────────────────────────────────────────┐
# │ P4 : DÉTERMINATION DU GROUPE (PRESENCE AUTOMATION)                │
# └───────────────────────────────────────────────────────────────────┘

# Calcul du groupe (1=Personne, 2=Mamour, 3=Eric, 4=Tous)
# --- groupe ---
    - name: "Groupe"
      unique_id: groupe
      icon: mdi:account-group
      state: >
        {# 1. Définition de la Cible #}
        {% set target_ssids = ['Module B.E.R.Y.L. [GG-5.0]', 'Module B.E.R.Y.L. [GG-2.4]'] %}

        {# 2. Vérification Booléenne (Vrai ou Faux) #}
        {% set mamour_is_home = states('sensor.mamour_network_type') == 'wifi'
                                and states('sensor.mamour_wi_fi_connection') in target_ssids %}

        {% set eric_is_home = states('sensor.eric_network_type') == 'wifi'
                              and states('sensor.eric_wi_fi_connection') in target_ssids %}

        {# 3. Déduction du Groupe #}
        {% if mamour_is_home and eric_is_home %}
          groupe_4
        {% elif eric_is_home %}
          groupe_3
        {% elif mamour_is_home %}
          groupe_2
        {% else %}
          groupe_1
        {% endif %}

# ┌───────────────────────────────────────────────────────────────────┐
# │ P4 : CALCUL ET AFFICHAGE DES STATUTS RÉSEAU (INTERFACE)           │
# └───────────────────────────────────────────────────────────────────┘

# Affichage textuel complexe (WIFI / CELL / WIFI_!?)
# --- presence ---
    - name: "Presence"
      unique_id: presence
      icon: mdi:cellphone-information
      state: >
        {# --- 1. CONFIGURATION --- #}
        {% set target_ssids = ['Module B.E.R.Y.L. [GG-5.0]', 'Module B.E.R.Y.L. [GG-2.4]'] %}

        {# --- 2. RÉCUPÉRATION DES DONNÉES (Mamour) --- #}
        {% set m_net = states('sensor.mamour_network_type') %}
        {% set m_ssid = states('sensor.mamour_wi_fi_connection') %}

        {# --- 3. RÉCUPÉRATION DES DONNÉES (Eric) --- #}
        {% set e_net = states('sensor.eric_network_type') %}
        {% set e_ssid = states('sensor.eric_wi_fi_connection') %}

        {# --- 4. CALCUL DU STATUT (Mamour) --- #}
        {% if m_net == 'wifi' and m_ssid in target_ssids %}
          {% set m_stat = "WIFI" %}
        {% elif m_net == 'wifi' %}
          {% set m_stat = "WIFI_!?" %}
        {% else %}
          {% set m_stat = "CELL" %}
        {% endif %}

        {# --- 5. CALCUL DU STATUT (Eric) --- #}
        {% if e_net == 'wifi' and e_ssid in target_ssids %}
          {% set e_stat = "WIFI" %}
        {% elif e_net == 'wifi' %}
          {% set e_stat = "WIFI_!?" %}
        {% else %}
          {% set e_stat = "CELL" %}
        {% endif %}

        {# --- 6. AFFICHAGE FINAL --- #}
        {%- if m_stat == e_stat -%}
          [2] en [{{ m_stat }}]
        {%- else -%}
          {# Vérification si connectés au WiFi cible #}
          {%- set m_here = (m_net == 'wifi' and m_ssid in target_ssids) -%}
          {%- set e_here = (e_net == 'wifi' and e_ssid in target_ssids) -%}

          {%- if m_here and e_here -%}
            {# Cas où les deux sont là mais statuts différents #}
            [Tous les 2: {{ m_stat }}/{{ e_stat }}]
          {%- elif m_here -%}
            [Mamour: {{ m_stat }}/{{ e_stat }}]
          {%- elif e_here -%}
            [Eric: {{ e_stat }}/{{ m_stat }}]
          {%- else -%}
            {# Fallback : aucun n'est sur le WiFi cible #}
            [{{ m_stat }} / {{ e_stat }}]
          {%- endif -%}
        {%- endif -%}

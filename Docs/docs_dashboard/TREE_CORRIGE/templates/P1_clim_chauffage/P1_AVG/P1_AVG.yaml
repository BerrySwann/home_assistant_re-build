# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1. TEMPLATE : PUISSANCE MOYENNE CHAUFFAGE & CLIM                    │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates calculant la puissance moyenne (W) par équipement P1,
# sur 4 cycles temporels (Annuel / Mensuel / Hebdo / Quotidien).
# Formule : (kWh UM × 1000) / heures_écoulées_dans_le_cycle.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : utility_meter/P1_clim_chauffage/P1_UM_AMHQ.yaml
#   → sensor.*_{période}_kwh_um
# - Quotidien  : h = now().hour + minute/60
# - Hebdo      : h = weekday × 24 + now().hour + minute/60
# - Mensuel    : h = (now().day - 1) × 24 + now().hour + minute/60
# - Annuel     : h = (now() - 1er jan) en secondes / 3600
# - Guard : h > 0.1 → sinon 0 (évite division par zéro en début de cycle)
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | [calculé]      | sensor.p1_*_{periode}_kwh_um (P1_UM_AMHQ)          | clim_*_avg_w_{periode}                             | L2C2 Énergie Clim                  |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces capteurs n'ont pas de state_class (valeur calculée, pas cumulée).
# - Ne pas utiliser device_class: energy ici — c'est de la puissance (W).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C2 Conso Énergie Clim / Radiateur / Soufflant (graphes AVG)

- sensor:

    # ┌───────────────────────────────────┐
    # │ 4. SALON                          │
    # └───────────────────────────────────┘

    # --- clim_salon_avg_watts_quotidien ---
    - name: "Clim Salon Avg Watts Quotidien"
      unique_id: clim_salon_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_quotidien_kwh_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_salon_avg_watts_mensuel ---
    - name: "Clim Salon Avg Watts Mensuel"
      unique_id: clim_salon_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_mensuel_kwh_um') | float(0) %}
        {% set h = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_salon_avg_watts_hebdomadaire ---
    - name: "Clim Salon Avg Watts Hebdomadaire"
      unique_id: clim_salon_avg_watts_hebdomadaire
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_hebdomadaire_kwh_um') | float(0) %}
        {% set h = (now().weekday() * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_salon_avg_watts_annuel ---
    - name: "Clim Salon Avg Watts Annuel"
      unique_id: clim_salon_avg_watts_annuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_annuel_kwh_um') | float(0) %}
        {% set debut = now().replace(month=1, day=1, hour=0, minute=0, second=0, microsecond=0) %}
        {% set h = (now() - debut).total_seconds() / 3600 %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ TEMPLATE TRIGGER : RIEMANN KWH — RADIATEUR CUISINE (P1)                  │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Intégration Riemann manuelle (template trigger) pour le radiateur cuisine.
# Remplace platform: integration supprimé en HA 2026.x.
# Accumule l'énergie (kWh) à chaque changement de puissance (W).
#
# ## 🧮 CALCUL & SOURCES :
# Riemann gauche : puissance précédente (W) × temps écoulé (h) / 1000 → kWh
# sensor.radiateur_elec_cuisine_power → sensor.radiateur_elec_cuisine_energie_totale_kwh
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL              | CAPTEUR BRUT (source)                    | CE FICHIER (unique_id)                    | AVAL                                        |
# |:----------------------|:-----------------------------------------|:------------------------------------------|:--------------------------------------------|
# | Shelly 1PM Gen4 (Z2M) | sensor.radiateur_elec_cuisine_power      | radiateur_elec_cuisine_energie_totale_kwh | P1_UM_AMHQ.yaml → P1_AVG / P1_TOTAL → L2C2 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Bug firmware Shelly 1PM Gen4 (S4SW-001P16EU) : UNREPORTABLE_ATTRIBUTE
#   sur seMetering/currentSummDelivered → kWh natif Z2M inutilisable.
# - platform: integration supprimé en HA 2026.x → template trigger comme alternative.
# - state_class: total_increasing + device_class: energy → HA restaure la valeur
#   au redémarrage (perte max = quelques minutes de consommation).
# - Fix firmware identifié : 20250819-150402/ga0def2d (shellyRPCBugFixed)
#   → dès que disponible via Z2M OTA : supprimer ce fichier + restaurer
#   source directe dans P1_UM_AMHQ.yaml.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Via P1_UM_AMHQ.yaml → L2C2 (Conso Énergie Clim / Radiateur / Soufflant)

# --- radiateur_elec_cuisine_energie_totale_kwh ---
- trigger:
    - trigger: state
      entity_id: sensor.radiateur_elec_cuisine_power
  sensor:
    - name: "Radiateur Elec Cuisine Energie Totale kWh"
      unique_id: radiateur_elec_cuisine_energie_totale_kwh
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing
      state: >
        {% set prev = this.state | float(0) %}
        {% set power_w = trigger.from_state.state | float(0) %}
        {% if trigger.from_state and trigger.from_state.last_changed %}
          {% set elapsed_h = (now().timestamp() - trigger.from_state.last_changed.timestamp()) / 3600 %}
          {{ [0, prev + (power_w * elapsed_h / 1000)] | max | round(3) }}
        {% else %}
          {{ prev }}
        {% endif %}


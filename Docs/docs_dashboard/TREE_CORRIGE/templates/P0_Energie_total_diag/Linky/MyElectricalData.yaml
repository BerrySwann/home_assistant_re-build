# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATES : LINKY — DONNÉES J0 À J7 (MYELECTRICALDATA)           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Huit capteurs templates fournissant les données de consommation journalière
# Linky sur une fenêtre glissante de 8 jours (J0 à J7). J0 = aujourd'hui
# (données temps réel via Ecojoko), J1 à J7 = historique via l'API MEData
# (MyElectricalData / Enedis).
#
# ## 🧮 CALCUL & SOURCES :
# - J0 (Aujourd'hui) : sensor.genelec_appart_quotidien_um (UM daily — general_electric_appart_energy). # "[modif] : ecojoko_hp + ecojoko_hc → UM quotidien total"
# - J1-J7            : attributs dailyweek / dailyweek_cost de l'intégration MEData.
# - Noms des jours   : attribut dailyweek → dictionnaire de traduction français.
# - Coûts            : attribut dailyweek_cost (index correspondant à J1..J7).
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | Linky (MyElectricalData) | sensor.myelectricaldata_*                          | linky_cout_* / linky_index_*                       | L2C1 Énergie Générale              |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Vérifications de longueur ajoutées pour éviter "UndefinedError: None has no element 0".
# - Valeurs de repli : "Inconnu" pour les dates, "0" pour les coûts si MED n'est pas prêt.
# - Le numéro de compteur Linky (25481620821301) est lié au compte MEData.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (tableau J0-J7 barre/courbe).

- sensor:
  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    J0 — AUJOURD'HUI (via UM quotidien general_electric_appart)       │
  # ╰──────────────────────────────────────────────────────────────────────╯
      # --- linky_jour_0 ---
    - name: "Linky Jour 0"
      unique_id: linky_jour_0
      state: >-
        {{ states('sensor.genelec_appart_quotidien_um') | float(0) | round(1) }}  {# "[modif] : ecojoko_hp + hc → UM quotidien total" #}
      unit_of_measurement: kWh
      icon: mdi:flash-outline
      attributes:
        jour: "Aujourd'hui"
        hp: >-
          {{ states('sensor.genelec_appart_hphc_quotidien_um_hp') | float(0) | round(2) }}   {# "[modif] : split HP natif UM tariff" #}
        hc: >-
          {{ states('sensor.genelec_appart_hphc_quotidien_um_hc') | float(0) | round(2) }}   {# "[modif] : split HC natif UM tariff" #}
        total: >-
          {{ states('sensor.genelec_appart_quotidien_um') | float(0) | round(1) }}            {# "[modif]" #}
        cout: >-
          {% set hp = states('sensor.genelec_appart_hphc_quotidien_um_hp') | float(0) %}
          {% set hc = states('sensor.genelec_appart_hphc_quotidien_um_hc') | float(0) %}
          {% set hp_trf = states('sensor.edf_tempo_price_blue_hp') | float(0) %}
          {% set hc_trf = states('sensor.edf_tempo_price_blue_hc') | float(0) %}
          {{ ((hp * hp_trf) + (hc * hc_trf)) | round(2) }}                           {# "[modif] : HP×0.1494 + HC×0.1232 (EDF Tempo Bleu)" #}

    # ┌───────────────────────────────────┐
    # │ 2. HISTORIQUE (LINKY)             │
    # └───────────────────────────────────┘
    # --- linky_jour_1 ---
    - name: "Linky Jour 1"
      unique_id: linky_jour_1
      state: >-
        {{ ((state_attr('sensor.linky_25481620821301_consumption', 'day_1_HP') | float(0) / 1000) +
            (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HC') | float(0) / 1000)) | round(1) }}
      unit_of_measurement: kWh
      icon: mdi:flash-outline
      attributes:
        jour: >-
          {% set jours = {'Monday':'Lundi','Tuesday':'Mardi','Wednesday':'Mercredi','Thursday':'Jeudi','Friday':'Vendredi','Saturday':'Samedi','Sunday':'Dimanche'} %}
          {% set dw = state_attr('sensor.linky_25481620821301_consumption', 'dailyweek') %}
          {% if dw and dw | length > 0 %}
            {% set date_str = dw[0] %}
            {% if '-' in date_str %}
              {% set eng = as_timestamp(date_str) | timestamp_custom('%A', true) %}
            {% elif '/' in date_str %}
              {% set p = date_str.split('/') %}
              {% set eng = as_timestamp(now().year ~ '-' ~ p[1] ~ '-' ~ p[0]) | timestamp_custom('%A', true) %}
            {% else %}
              {% set eng = "Inconnu" %}
            {% endif %}
            {{ jours[eng] if eng in jours else eng }}
          {% else %}
            Inconnu
          {% endif %}
        hp: >-
          {{ (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HP') | float(0) / 1000) | round(1) }}
        hc: >-
          {{ (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HC') | float(0) / 1000) | round(1) }}
        total: >-
          {{ ((state_attr('sensor.linky_25481620821301_consumption', 'day_1_HP') | float(0) / 1000) +
              (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HC') | float(0) / 1000)) | round(1) }}
        cout: >-
          {% set dwc = state_attr('sensor.linky_25481620821301_consumption', 'dailyweek_cost') %}
          {% if dwc and dwc | length > 0 %}
            {{ (dwc[0] | float(0)) | round(1) }}
          {% else %}
            0.0
          {% endif %}


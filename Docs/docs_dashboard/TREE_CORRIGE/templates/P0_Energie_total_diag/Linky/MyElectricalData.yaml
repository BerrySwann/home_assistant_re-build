# annotations_log:
# - [L12]  modif : source J0 → sensor.genelec_appart_quotidien_um (UM daily total)
# - [L33]  modif : state J0 ecojoko_hp + ecojoko_hc → genelec_appart_quotidien_um
# - [L38]  modif : hp → "N/A" (plus de split HP/HC disponible)
# - [L39]  modif : hc → "N/A" (plus de split HP/HC disponible)
# - [L41]  modif : total → genelec_appart_quotidien_um
# - [L43]  modif : cout J0 → UM quotidien × tarif HP (approché, surestimé ~10-15%)
# - [J1-J7] inchangés (source MEData / Linky — HP/HC toujours disponibles via Enedis)
# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATES : DIAGNOSTIC CONSO — MOIS EN COURS (7 PÔLES)           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Neuf capteurs templates calculant la consommation mensuelle identifiée
# par pôle fonctionnel (7 pôles), plus un capteur de maximum dynamique et
# un capteur de total identifié. Sources : utility_meters AMHQ mensuels P1/P2/P3.
#
# ## 🧮 CALCUL & SOURCES :
# - Pôle 1 Hygiène     : lave_linge + lave_vaisselle + fer_a_repasser (P2 UM Mensuel)
# - Pôle 2 Cuisine     : four_mo + petit_dej + airfryer + four_plaque (P2 UM Mensuel)
# - Pôle 3 Froid       : frigo + congelateur (P2 UM Mensuel)
# - Pôle 4 Chauffage   : clim_salon + radiateur + clim_bureau + soufflant + seche_serv + clim_chambre (P1 UM Mensuel)
# - Pôle 5 Multimédia  : box_internet + tv_salon + tv_chambre + pc_gege + pc_bureau (P2 UM Mensuel)
# - Pôle 6 Éclairage   : eclairage_total_unit_mensuel_kwh_tpl (P3 TPL AMHQ 3 TOTAL)
# - Pôle 7 Autre       : all_standby + tete_de_lit + chargeur_salon + horloge (P2 UM Mensuel)
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                               |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:-----------------------------------|
# | [calculé]      | sensor.genelec_appart_mensuel / P1/P2/P3 mensuels  | diag_conso_mois_*                                  | L2C1 Énergie Générale (diagnostic) |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Tous les UM P1/P2/P3 utilisent le suffixe _um (nomenclature unifiée).
# - state_class: total — ces capteurs reflètent les UM qui se resetent le 1er du mois.
#   Ne PAS utiliser total_increasing (valeur décroissante → WARNING recorder).
# - Max dynamique : buffer 10 kWh (échelle mensuelle).
# - Pôle 6 source : eclairage_total_unit_mensuel_kwh_tpl (TPL layer) — PAS un _um brut.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (graphique répartition par pôle — mensuel).

- sensor:
  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 1 — HYGIÈNE (Lave-linge, Lave-vaisselle, Fer)                │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_hygiene_mensuel ---
  - name: "Diag Poste Hygiene Mensuel"
    unique_id: diag_poste_hygiene_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:washing-machine
    state: >
      {% set ll = states('sensor.prise_lave_linge_nous_mensuel_um') | float(0) %}
      {% set lv = states('sensor.prise_lave_vaisselle_nous_mensuel_um') | float(0) %}
      {% set fr = states('sensor.prise_bureau_fer_a_repasser_nous_mensuel_um') | float(0) %}
      {{ (ll + lv + fr) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 2 — CUISINE (Micro-ondes, Petit-dej, AirFryer, Four/Plaque)  │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_cuisine_mensuel ---
  - name: "Diag Poste Cuisine Mensuel"
    unique_id: diag_poste_cuisine_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:stove
    state: >
      {% set mo = states('sensor.prise_four_micro_ondes_nous_mensuel_um') | float(0) %}
      {% set pd = states('sensor.prise_petit_dejeune_nous_mensuel_um') | float(0) %}
      {% set af = states('sensor.prise_airfryer_ninja_nous_mensuel_um') | float(0) %}
      {% set fp = states('sensor.four_et_plaque_de_cuisson_mensuel_um') | float(0) %}
      {{ (mo + pd + af + fp) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 3 — FROID (Frigo, Congélateur)                               │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_froid_mensuel ---
  - name: "Diag Poste Froid Mensuel"
    unique_id: diag_poste_froid_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:fridge
    state: >
      {% set fr = states('sensor.prise_frigo_cuisine_nous_mensuel_um') | float(0) %}
      {% set cg = states('sensor.prise_congelateur_cuisine_nous_mensuel_um') | float(0) %}
      {{ (fr + cg) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 4 — CHAUFFAGE/CLIM (Salon, Cuisine, Bureau, SDB, Chambre)    │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_chauffage_mensuel ---
  - name: "Diag Poste Chauffage Mensuel"
    unique_id: diag_poste_chauffage_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:fire
    state: >
      {% set cs = states('sensor.clim_salon_mensuel_um') | float(0) %}
      {% set rc = states('sensor.radiateur_elec_cuisine_mensuel_um') | float(0) %}
      {% set cb = states('sensor.clim_bureau_mensuel_um') | float(0) %}
      {% set ss = states('sensor.soufflant_sdb_mensuel_um') | float(0) %}
      {% set sv = states('sensor.seche_serviette_sdb_mensuel_um') | float(0) %}
      {% set cc = states('sensor.clim_chambre_mensuel_um') | float(0) %}
      {{ (cs + rc + cb + ss + sv + cc) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 5 — MULTIMÉDIA (Box, TV×2, PC×2)                             │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_multimedia_mensuel ---
  - name: "Diag Poste Multimedia Mensuel"
    unique_id: diag_poste_multimedia_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:monitor
    state: >
      {% set bx = states('sensor.prise_box_internet_ikea_mensuel_um') | float(0) %}
      {% set ts = states('sensor.prise_tv_salon_ikea_mensuel_um') | float(0) %}
      {% set tc = states('sensor.prise_tv_chambre_nous_mensuel_um') | float(0) %}
      {% set pg = states('sensor.prise_pc_s_gege_ikea_mensuel_um') | float(0) %}
      {% set pb = states('sensor.prise_bureau_pc_ikea_mensuel_um') | float(0) %}
      {{ (bx + ts + tc + pg + pb) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 6 — ÉCLAIRAGE (Total appartement)                            │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_eclairage_mensuel ---
  - name: "Diag Poste Eclairage Mensuel"
    unique_id: diag_poste_eclairage_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:lightbulb
    state: >
      {{ states('sensor.eclairage_total_unit_mensuel_kwh_tpl') | float(0) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 7 — AUTRE (Veilles, Têtes de lit, Chargeurs, Horloge)        │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_autre_mensuel ---
  - name: "Diag Poste Autre Mensuel"
    unique_id: diag_poste_autre_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:plus-circle
    state: >
      {% set vs = states('sensor.all_standby_mensuel_um') | float(0) %}
      {% set tl = states('sensor.prise_tete_de_lit_chambre_mensuel_um') | float(0) %}
      {% set ch = states('sensor.prise_salon_chargeur_nous_mensuel_um') | float(0) %}
      {% set hr = states('sensor.prise_horloge_ikea_mensuel_um') | float(0) %}
      {{ (vs + tl + ch + hr) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    MAX DYNAMIQUE (axe Y des barres + 10 kWh buffer)                  │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_max_poste_mensuel_dynamique ---
  - name: "Diag Max Poste Mensuel Dynamique"
    unique_id: diag_max_poste_mensuel_dynamique
    unit_of_measurement: "kWh"
    device_class: energy
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_mensuel') | float(0),
        states('sensor.diag_poste_cuisine_mensuel') | float(0),
        states('sensor.diag_poste_froid_mensuel') | float(0),
        states('sensor.diag_poste_chauffage_mensuel') | float(0),
        states('sensor.diag_poste_multimedia_mensuel') | float(0),
        states('sensor.diag_poste_eclairage_mensuel') | float(0),
        states('sensor.diag_poste_autre_mensuel') | float(0)
      ] %}
      {{ (poles | max + 10) | round(2) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    TOTAL IDENTIFIÉ (somme des 7 pôles)                               │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_total_identifie_mensuel ---
  - name: "Diag Total Identifie Mensuel"
    unique_id: diag_total_identifie_mensuel
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_mensuel') | float(0),
        states('sensor.diag_poste_cuisine_mensuel') | float(0),
        states('sensor.diag_poste_froid_mensuel') | float(0),
        states('sensor.diag_poste_chauffage_mensuel') | float(0),
        states('sensor.diag_poste_multimedia_mensuel') | float(0),
        states('sensor.diag_poste_eclairage_mensuel') | float(0),
        states('sensor.diag_poste_autre_mensuel') | float(0)
      ] %}
      {{ (poles | sum) | round(2) }}

# annotations_log:
# [Toutes state_class] total_increasing → total (reset 1er du mois)
# [Header CALCUL] détail des 7 pôles ajouté (était "Même structure...")
# [Header IMPORTANT] measurement → total + ajout note Pôle 6 TPL
# [Tous pôles] boîtes ASCII secondaires ╭─╮ ajoutées (alignement avec quotidien)
# [Pôle 6] eclairage_total_group_mensuel_um → eclairage_total_unit_mensuel_kwh_tpl (P3_TPL_AMHQ_3_TOTAL)

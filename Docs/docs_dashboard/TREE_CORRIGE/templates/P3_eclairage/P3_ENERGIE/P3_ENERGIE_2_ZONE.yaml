# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES : SOMMES D'ÉNERGIE PAR PIÈCE ET PAR ZONE (kWh)         │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates calculant l'énergie cumulée totale (kWh) pour
# chaque pièce (7 sensors) et pour 2 zones transversales (Appart 3x et
# Appart 2x). Sert de source directe pour P3_UM_AMHQ_2_ZONE.yaml.
# Remplace le Riemann P3_kWh_2_ZONE.yaml (désactivé).
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : somme des sensor.[ampoule]_energy | float(0) pour chaque pièce.
# - Sources physiques directes : sensor.hue_*_energy, sensor.relais_*_energy.
# - Garde | float(0) sur chaque source pour absorber les unavailable.
# - 9 sensors au total : 7 pièces + 2 zones transversales.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL                  | CAPTEUR BRUT (source)              | CE FICHIER (unique_id)              | AVAL                            |
# |:--------------------------|:-----------------------------------|:------------------------------------|:--------------------------------|
# | Hue Bridge / Sonoff (Z2M) | sensor.*_energy (ampoules)         | eclairage_entree_1_energie          | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | Hue Bridge (Z2M)          | sensor.*_energy (salon ×5)         | eclairage_salon_5_energie           | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | Hue Bridge (Z2M)          | sensor.*_energy (cuisine)          | eclairage_cuisine_1_energie         | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | Hue Bridge (Z2M)          | sensor.*_energy (couloir)          | eclairage_couloir_1_energie         | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | Hue Bridge (Z2M)          | sensor.*_energy (bureau ×5)        | eclairage_bureau_5_energie          | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | Hue Bridge / Sonoff (Z2M) | sensor.*_energy (sdb ×2)           | eclairage_sdb_2_energie             | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | Hue Bridge (Z2M)          | sensor.*_energy (chambre ×4)       | eclairage_chambre_4_energie         | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | [calculé]                 | eclairage_entree/cuisine/couloir   | eclairage_appart_3_energie          | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
# | [calculé]                 | eclairage_entree/couloir           | eclairage_appart_2_energie          | P3_UM_AMHQ_2_ZONE.yaml → L2C3  |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Valeurs cumulatives croissantes (total_increasing) — source UM uniquement.
#   Ne pas afficher brut sur le dashboard (sans-sens sans cycle UM).
# - eclairage_appart_3 et eclairage_appart_2 re-somment des _energy déjà
#   comptés dans d'autres zones — c'est intentionnel (zones transversales).
# - Si une ampoule n'expose pas _energy natif, | float(0) la neutralise.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (via P3_UM_AMHQ_2_ZONE → *_um AMHQ).

- sensor:
      # ╭──────────────────────────────────────────────────────────────────────╮
      # │    PÔLE 3. REGROUPEMENTS ÉCLAIRAGE : ÉNERGIE PAR PIÈCE (_energie)    │
      # ╰──────────────────────────────────────────────────────────────────────╯
      #┌───────────────────────────────────┐
      #│         1. ENTRÉE (1x)            │
      #└───────────────────────────────────┘
      # --- eclairage_entree_1_energie ---
      - name: "Eclairage Entree 1 Energie"
        unique_id: eclairage_entree_1_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_white_lamp_entree_energy') | float(0)
          }}
      #┌───────────────────────────────────┐
      #│         4. SALON (5x)             │
      #└───────────────────────────────────┘
      # --- eclairage_salon_5_energie ---
      - name: "Eclairage Salon 5 Energie"
        unique_id: eclairage_salon_5_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_white_lamp_table_energy') | float(0) +
            states('sensor.hue_ambiance_lamp_salon_1_energy') | float(0) +
            states('sensor.hue_ambiance_lamp_salon_2_energy') | float(0) +
            states('sensor.hue_ambiance_lamp_salon_3_energy') | float(0) +
            states('sensor.hue_color_candle_salon_1_energy') | float(0)
          }}
      #┌───────────────────────────────────┐
      #│         5. CUISINE (1x)           │
      #└───────────────────────────────────┘
      # --- eclairage_cuisine_1_energie ---
      - name: "Eclairage Cuisine 1 Energie"
        unique_id: eclairage_cuisine_1_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_white_lamp_cuisine_energy') | float(0)
          }}
      #┌───────────────────────────────────┐
      #│         6. COULOIR (1x)           │
      #└───────────────────────────────────┘
      # --- eclairage_couloir_1_energie ---
      - name: "Eclairage Couloir 1 Energie"
        unique_id: eclairage_couloir_1_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_white_lamp_couloir_energy') | float(0)
          }}
      #┌───────────────────────────────────┐
      #│         7. BUREAU (5x)            │
      #└───────────────────────────────────┘
      # --- eclairage_bureau_5_energie ---
      - name: "Eclairage Bureau 5 Energie"
        unique_id: eclairage_bureau_5_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_play_1_pc_bureau_energy') | float(0) +
            states('sensor.hue_play_2_pc_bureau_energy') | float(0) +
            states('sensor.hue_play_3_pc_bureau_energy') | float(0) +
            states('sensor.hue_white_lamp_bureau_1_energy') | float(0) +
            states('sensor.hue_white_lamp_bureau_2_energy') | float(0)
          }}
      #┌───────────────────────────────────┐
      #│         8. SDB (2x)               │
      #└───────────────────────────────────┘
      # --- eclairage_sdb_2_energie ---
      - name: "Eclairage Sdb 2 Energie"
        unique_id: eclairage_sdb_2_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.relais_lumiere_sdb_sonoff_energy') | float(0) +
            states('sensor.lampe_salle_de_bain_hue_energy') | float(0)
          }}
      #┌───────────────────────────────────┐
      #│         9. CHAMBRE (4x)           │
      #└───────────────────────────────────┘
      # --- eclairage_chambre_4_energie ---
      - name: "Eclairage Chambre 4 Energie"
        unique_id: eclairage_chambre_4_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_white_lamp_chambre_1_energy') | float(0) +
            states('sensor.hue_white_lamp_chambre_2_energy') | float(0) +
            states('sensor.hue_color_candle_chambre_gege_energy') | float(0) +
            states('sensor.hue_color_candle_chambre_eric_energy') | float(0)
          }}
      # ╭──────────────────────────────────────────────────────────────────────╮
      # │    PÔLE 3. REGROUPEMENTS ÉCLAIRAGE : ZONES TRANSVERSALES             │
      # ╰──────────────────────────────────────────────────────────────────────╯
      #┌───────────────────────────────────┐
      #│   ZONE HOME (3x) E+Cu+Co          │
      #└───────────────────────────────────┘
      # --- eclairage_appart_3_energie ---
      - name: "Eclairage Appart 3 Energie"
        unique_id: eclairage_appart_3_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_white_lamp_entree_energy') | float(0) +
            states('sensor.hue_white_lamp_cuisine_energy') | float(0) +
            states('sensor.hue_white_lamp_couloir_energy') | float(0)
          }}
      #┌───────────────────────────────────┐
      #│   ZONE HOME (2x) E+Co             │
      #└───────────────────────────────────┘
      # --- eclairage_appart_2_energie ---
      - name: "Eclairage Appart 2 Energie"
        unique_id: eclairage_appart_2_energie
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            states('sensor.hue_white_lamp_entree_energy') | float(0) +
            states('sensor.hue_white_lamp_couloir_energy') | float(0)
          }}

# annotations_log:
# - [Création] Nouveau fichier — remplace Riemann P3_kWh_2_ZONE.yaml (désactivé).
# - [Logique] _power → _energy / W → kWh / measurement → total_increasing.
# - Source UM : sensor.eclairage_*_energie → P3_UM_AMHQ_2_ZONE.yaml.
# - 9 capteurs zone couverts — | float(0) sur chaque pour absorber unavailable.

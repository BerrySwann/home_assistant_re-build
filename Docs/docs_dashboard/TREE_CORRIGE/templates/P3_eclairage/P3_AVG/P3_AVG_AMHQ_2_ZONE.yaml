# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES AVG : PUISSANCE MOYENNE (W) — ÉCLAIRAGE PAR ZONE       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates calculant la puissance moyenne (W) pour chaque zone
# d'éclairage (pièce ou groupe transversal) sur 4 périodes AMHQ.
# Sources : sensor.[ampoule]_[cycle]_um_kwh_tpl (P3_TPL_AMHQ_1_UNITE) — zones reconstituées par somme.
# P3_UM_AMHQ_2_ZONE supprimé — zones reconstituées directement depuis les TPL unité.
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : (sum_kWh_UM × 1000) / heures_écoulées = Watts moyens
# - Sources : sensor.[ampoule]_[cycle]_um_kwh_tpl (P3_TPL_AMHQ_1_UNITE — 1 seul UM actif)
# - Quotidien    : h  = now().hour + (now().minute / 60)
# - Hebdomadaire : hh = (now().weekday() * 24) + h
# - Mensuel      : hm = ((now().day - 1) * 24) + h
# - Annuel       : ha = ((now().timetuple().tm_yday - 1) * 24) + h
# - Garde division zéro : if h > 0.1 else 0
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL      | CAPTEUR BRUT (source)                           | CE FICHIER (unique_id)                   | AVAL  |
# |:--------------|:------------------------------------------------|:-----------------------------------------|:------|
# | [calculé]     | sensor.hue_*_[cycle]_um_kwh_tpl (P3_TPL_AMHQ_1_UNITE)   | eclairage_*_avg_watts_{periode}          | L2C3  |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - P3_UM_AMHQ_2_ZONE supprimé : zones reconstituées par somme des UM unité.
# - eclairage_appart_2/3 = zones transversales — ne pas inclure dans un total global.
# - En début de journée (h < 0.1 = < 6 min), retourne 0 — comportement normal.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (puissance moyenne par zone/pièce)

- sensor:
    # ┌───────────────────────────────────┐
    # │ ZONE 1. (1x) ENTRÉE               │
    # └───────────────────────────────────┘
    # --- eclairage_entree_1_avg_watts_quotidien ---
    - name: "Eclairage Entree 1 Avg Watts Quotidien"
      unique_id: eclairage_entree_1_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set h = now().hour + (now().minute / 60) %}
        {% set conso = states('sensor.hue_white_lamp_entree_quotidien_um_kwh_tpl') | float(0) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- eclairage_entree_1_avg_watts_hebdomadaire ---
    - name: "Eclairage Entree 1 Avg Watts Hebdomadaire"
      unique_id: eclairage_entree_1_avg_watts_hebdomadaire
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set h = now().hour + (now().minute / 60) %}
        {% set hh = (now().weekday() * 24) + h %}
        {% set conso = states('sensor.hue_white_lamp_entree_hebdomadaire_um_kwh_tpl') | float(0) %}
        {{ ((conso * 1000) / hh if hh > 0.1 else 0) | round(1) }}

    # --- eclairage_entree_1_avg_watts_mensuel ---
    - name: "Eclairage Entree 1 Avg Watts Mensuel"
      unique_id: eclairage_entree_1_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set h = now().hour + (now().minute / 60) %}
        {% set hm = ((now().day - 1) * 24) + h %}
        {% set conso = states('sensor.hue_white_lamp_entree_mensuel_um_kwh_tpl') | float(0) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

    # --- eclairage_entree_1_avg_watts_annuel ---
    - name: "Eclairage Entree 1 Avg Watts Annuel"
      unique_id: eclairage_entree_1_avg_watts_annuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set h = now().hour + (now().minute / 60) %}
        {% set ha = ((now().timetuple().tm_yday - 1) * 24) + h %}
        {% set conso = states('sensor.hue_white_lamp_entree_annuel_um_kwh_tpl') | float(0) %}
        {{ ((conso * 1000) / ha if ha > 0.1 else 0) | round(1) }}

    # ┌───────────────────────────────────┐
    # │ ZONE 4. (5x) SALON                │
    # └───────────────────────────────────┘
    # --- eclairage_salon_5_avg_watts_quotidien ---

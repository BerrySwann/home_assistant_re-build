          states('sensor.hue_ambiance_lamp_salon_2_hebdomadaire_um_kwh_tpl') | float(0) +
          states('sensor.hue_ambiance_lamp_salon_3_hebdomadaire_um_kwh_tpl') | float(0) +
          states('sensor.hue_color_candle_salon_1_hebdomadaire_um_kwh_tpl')  | float(0) %}

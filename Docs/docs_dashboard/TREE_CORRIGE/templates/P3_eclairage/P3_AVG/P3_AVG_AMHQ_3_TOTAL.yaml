          states('sensor.hue_ambiance_lamp_salon_1_mensuel_um_kwh_tpl')       | float(0) +
          states('sensor.hue_ambiance_lamp_salon_2_mensuel_um_kwh_tpl')       | float(0) +
          states('sensor.hue_ambiance_lamp_salon_3_mensuel_um_kwh_tpl')       | float(0) +
          states('sensor.hue_color_candle_salon_1_mensuel_um_kwh_tpl')        | float(0) +
          states('sensor.hue_white_lamp_cuisine_mensuel_um_kwh_tpl')          | float(0) +
          states('sensor.hue_white_lamp_couloir_mensuel_um_kwh_tpl')          | float(0) +
          states('sensor.hue_play_1_pc_bureau_mensuel_um_kwh_tpl')            | float(0) +
          states('sensor.hue_play_2_pc_bureau_mensuel_um_kwh_tpl')            | float(0) +
          states('sensor.hue_play_3_pc_bureau_mensuel_um_kwh_tpl')            | float(0) +
          states('sensor.hue_white_lamp_bureau_1_mensuel_um_kwh_tpl')         | float(0) +
          states('sensor.hue_white_lamp_bureau_2_mensuel_um_kwh_tpl')         | float(0) +
          states('sensor.relais_lumiere_sdb_sonoff_mensuel_um_kwh_tpl')       | float(0) +
          states('sensor.lampe_salle_de_bain_hue_mensuel_um_kwh_tpl')         | float(0) +
          states('sensor.hue_white_lamp_chambre_1_mensuel_um_kwh_tpl')        | float(0) +
          states('sensor.hue_white_lamp_chambre_2_mensuel_um_kwh_tpl')        | float(0) +
          states('sensor.hue_color_candle_chambre_gege_mensuel_um_kwh_tpl')   | float(0) +
          states('sensor.hue_color_candle_chambre_eric_mensuel_um_kwh_tpl')   | float(0) %}

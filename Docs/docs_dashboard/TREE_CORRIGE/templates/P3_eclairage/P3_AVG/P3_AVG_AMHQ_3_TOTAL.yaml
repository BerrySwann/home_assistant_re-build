# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES AVG : PUISSANCE MOYENNE (W) — ÉCLAIRAGE TOTAL APPART   │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates calculant la puissance moyenne (W) pour l'éclairage total
# de l'appartement sur 4 périodes AMHQ. Somme directe des 19 UM unité.
# P3_UM_AMHQ_3_TOTAL supprimé — plus de dualité GROUP/UNIT.
# Total = 4 sensors (un par cycle AMHQ).
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : (sum_kWh_19_UM × 1000) / heures_écoulées = Watts moyens
# - Sources : sensor.[ampoule]_[cycle]_um_kwh_tpl (P3_TPL_AMHQ_1_UNITE — seul UM actif)
# - Quotidien    : h  = now().hour + (now().minute / 60)
# - Hebdomadaire : hh = (now().weekday() * 24) + h
# - Mensuel      : hm = ((now().day - 1) * 24) + h
# - Annuel       : ha = ((now().timetuple().tm_yday - 1) * 24) + h
# - Garde division zéro : if h > 0.1 else 0
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL    | CAPTEUR BRUT (source)                         | CE FICHIER (unique_id)                          | AVAL  |
# |:------------|:----------------------------------------------|:------------------------------------------------|:------|
# | [calculé]   | sensor.hue_*_[cycle]_um (P3_UM_AMHQ_1_UNITE)  | eclairage_total_unit_avg_watts_{periode}         | L2C3  |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - P3_UM_AMHQ_3_TOTAL supprimé — sensor.eclairage_total_*_um n'existe plus.
# - Ne jamais pointer sur eclairage_appart_2/3 ici — double-comptage.
# - En début de journée (h < 0.1 = < 6 min), retourne 0 — comportement normal.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (total appartement — graphes AMHQ)

- sensor:
    # --- eclairage_total_unit_avg_watts_quotidien ---
    - name: "Eclairage Total Unit Avg Watts Quotidien"
      unique_id: eclairage_total_unit_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set h = now().hour + (now().minute / 60) %}
        {% set conso =
          states('sensor.hue_white_lamp_entree_quotidien_um_kwh_tpl')           | float(0) +
          states('sensor.hue_white_lamp_table_quotidien_um_kwh_tpl')            | float(0) +
          states('sensor.hue_ambiance_lamp_salon_1_quotidien_um_kwh_tpl')       | float(0) +
          states('sensor.hue_ambiance_lamp_salon_2_quotidien_um_kwh_tpl')       | float(0) +
          states('sensor.hue_ambiance_lamp_salon_3_quotidien_um_kwh_tpl')       | float(0) +
          states('sensor.hue_color_candle_salon_1_quotidien_um_kwh_tpl')        | float(0) +
          states('sensor.hue_white_lamp_cuisine_quotidien_um_kwh_tpl')          | float(0) +
          states('sensor.hue_white_lamp_couloir_quotidien_um_kwh_tpl')          | float(0) +
          states('sensor.hue_play_1_pc_bureau_quotidien_um_kwh_tpl')            | float(0) +
          states('sensor.hue_play_2_pc_bureau_quotidien_um_kwh_tpl')            | float(0) +
          states('sensor.hue_play_3_pc_bureau_quotidien_um_kwh_tpl')            | float(0) +
          states('sensor.hue_white_lamp_bureau_1_quotidien_um_kwh_tpl')         | float(0) +
          states('sensor.hue_white_lamp_bureau_2_quotidien_um_kwh_tpl')         | float(0) +
          states('sensor.relais_lumiere_sdb_sonoff_quotidien_um_kwh_tpl')       | float(0) +
          states('sensor.lampe_salle_de_bain_hue_quotidien_um_kwh_tpl')         | float(0) +
          states('sensor.hue_white_lamp_chambre_1_quotidien_um_kwh_tpl')        | float(0) +
          states('sensor.hue_white_lamp_chambre_2_quotidien_um_kwh_tpl')        | float(0) +
          states('sensor.hue_color_candle_chambre_gege_quotidien_um_kwh_tpl')   | float(0) +
          states('sensor.hue_color_candle_chambre_eric_quotidien_um_kwh_tpl')   | float(0) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- eclairage_total_unit_avg_watts_hebdomadaire ---

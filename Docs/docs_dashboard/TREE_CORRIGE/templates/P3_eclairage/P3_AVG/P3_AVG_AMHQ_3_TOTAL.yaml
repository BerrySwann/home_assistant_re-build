      device_class: power
      state: >
        {% set h = now().hour + (now().minute / 60) %}
        {% set hh = (now().weekday() * 24) + h %}
        {% set conso =
          states('sensor.hue_white_lamp_entree_hebdomadaire_um_kwh_tpl')           | float(0) +
          states('sensor.hue_white_lamp_table_hebdomadaire_um_kwh_tpl')            | float(0) +
          states('sensor.hue_ambiance_lamp_salon_1_hebdomadaire_um_kwh_tpl')       | float(0) +
          states('sensor.hue_ambiance_lamp_salon_2_hebdomadaire_um_kwh_tpl')       | float(0) +
          states('sensor.hue_ambiance_lamp_salon_3_hebdomadaire_um_kwh_tpl')       | float(0) +
          states('sensor.hue_color_candle_salon_1_hebdomadaire_um_kwh_tpl')        | float(0) +
          states('sensor.hue_white_lamp_cuisine_hebdomadaire_um_kwh_tpl')          | float(0) +
          states('sensor.hue_white_lamp_couloir_hebdomadaire_um_kwh_tpl')          | float(0) +
          states('sensor.hue_play_1_pc_bureau_hebdomadaire_um_kwh_tpl')            | float(0) +
          states('sensor.hue_play_2_pc_bureau_hebdomadaire_um_kwh_tpl')            | float(0) +
          states('sensor.hue_play_3_pc_bureau_hebdomadaire_um_kwh_tpl')            | float(0) +
          states('sensor.hue_white_lamp_bureau_1_hebdomadaire_um_kwh_tpl')         | float(0) +
          states('sensor.hue_white_lamp_bureau_2_hebdomadaire_um_kwh_tpl')         | float(0) +
          states('sensor.relais_lumiere_sdb_sonoff_hebdomadaire_um_kwh_tpl')       | float(0) +
          states('sensor.lampe_salle_de_bain_hue_hebdomadaire_um_kwh_tpl')         | float(0) +
          states('sensor.hue_white_lamp_chambre_1_hebdomadaire_um_kwh_tpl')        | float(0) +
          states('sensor.hue_white_lamp_chambre_2_hebdomadaire_um_kwh_tpl')        | float(0) +
          states('sensor.hue_color_candle_chambre_gege_hebdomadaire_um_kwh_tpl')   | float(0) +
          states('sensor.hue_color_candle_chambre_eric_hebdomadaire_um_kwh_tpl')   | float(0) %}
        {{ ((conso * 1000) / hh if hh > 0.1 else 0) | round(1) }}


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 2. TEMPLATE AVG : PUISSANCE MOYENNE (W) AMHQ — MINI PC (BUREAU)     │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Calcule la puissance moyenne continue équivalente (en Watts) lissée sur
# 4 périodes : Annuel, Mensuel, Hebdomadaire, Quotidien (AMHQ) pour le Mini PC.
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : Consommation_kWh_UM × 1000 ÷ nombre_heures_écoulées_dans_le_cycle = W_moyen
# - Source en kWh (firmware IKEA natif) → formule = conso * 1000 / h
# - Sources UM (fichier P2_UM_AMHQ_mini_pc.yaml) :
#   - Annuel       : sensor.prise_mini_pc_ikea_annuel_um
#   - Mensuel      : sensor.prise_mini_pc_ikea_mensuel_um
#   - Hebdomadaire : sensor.prise_mini_pc_ikea_hebdomadaire_um
#   - Quotidien    : sensor.prise_mini_pc_ikea_quotidien_um
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL        | CAPTEUR BRUT (source)                    | CE FICHIER (unique_id)          | AVAL         |
# |:----------------|:-----------------------------------------|:--------------------------------|:-------------|
# | [calculé]       | sensor.prise_mini_pc_ikea_annuel_um      | mini_pc_avg_watts_annuel        | L4C2 Mini PC |
# | [calculé]       | sensor.prise_mini_pc_ikea_mensuel_um     | mini_pc_avg_watts_mensuel       | L4C2 Mini PC |
# | [calculé]       | sensor.prise_mini_pc_ikea_hebdomadaire_um| mini_pc_avg_watts_hebdomadaire  | L4C2 Mini PC |
# | [calculé]       | sensor.prise_mini_pc_ikea_quotidien_um   | mini_pc_avg_watts_quotidien     | L4C2 Mini PC |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Division par zéro évitée : if h > 0.1 else 0.
# - Ce n'est pas la puissance en direct, mais une moyenne de tirage ("Average").
# - Source kWh → formule obligatoire : conso * 1000 / h → W
#   (ancienne formule Wh : conso / h → résultat 1000× trop petit)
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L4C2 Mini PC — pop-up #conso (streamline-card : avg_daily_entity + avg_monthly_entity)

- sensor:
    # ┌─────────────────────────────────────────┐
    # │   MINI PC : MOYENNE WATTS ANNUELLE      │
    # └─────────────────────────────────────────┘
    # --- mini_pc_avg_watts_annuel ---
    - name: "Mini PC Avg Watts Annuel"
      unique_id: mini_pc_avg_watts_annuel
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.prise_mini_pc_ikea_annuel_um') | float(0) %}
        {% set ha = ((now().timetuple().tm_yday - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / ha if ha > 0.1 else 0) | round(1) }}

    # ┌─────────────────────────────────────────┐
    # │   MINI PC : MOYENNE WATTS MENSUELLE     │
    # └─────────────────────────────────────────┘
    # --- mini_pc_avg_watts_mensuel ---
    - name: "Mini PC Avg Watts Mensuel"
      unique_id: mini_pc_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.prise_mini_pc_ikea_mensuel_um') | float(0) %}
        {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

    # ┌─────────────────────────────────────────┐
    # │   MINI PC : MOYENNE WATTS HEBDOMADAIRE  │
    # └─────────────────────────────────────────┘
    # --- mini_pc_avg_watts_hebdomadaire ---
    - name: "Mini PC Avg Watts Hebdomadaire"
      unique_id: mini_pc_avg_watts_hebdomadaire
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.prise_mini_pc_ikea_hebdomadaire_um') | float(0) %}
        {% set hh = (now().weekday() * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hh if hh > 0.1 else 0) | round(1) }}

    # ┌─────────────────────────────────────────┐
    # │   MINI PC : MOYENNE WATTS QUOTIDIENNE   │
    # └─────────────────────────────────────────┘
    # --- mini_pc_avg_watts_quotidien ---
    - name: "Mini PC Avg Watts Quotidien"
      unique_id: mini_pc_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.prise_mini_pc_ikea_quotidien_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

# annotations_log:
# - [2026-04-25] Migration Wh → kWh : sources _wh_um → _um (firmware IKEA kWh natif).
# - [2026-05-03] Formule corrigée : conso / h → (conso * 1000) / h (source kWh pas Wh).
# - [2026-05-03] Headers et chaîne de dépendances mis à jour.

                    - border: 2px solid rgba(255,255,255,1)
              custom_fields:
                bar: |
                  [[[
                    let val = parseFloat(states['sensor.genelec_appart_ratio_hc_quotidien'].state);
                    if (isNaN(val)) return "";
                    let pos = val;
                    if (pos > 100) pos = 100;
                    if (pos < 0) pos = 0;
                    return `
                      <div style="
                        position: absolute;
                        left: ${pos}%;
                        top: 50%;
                        width: 18px;
                        height: 18px;
                        background: gainsboro;
                        border-radius: 10px;
                        border: 1.5px solid black;
                        transform: translate(-50%, -50%);

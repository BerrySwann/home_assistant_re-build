alias: "[06-Backup] Git au démarrage HA"
description: Push Git automatique au démarrage complet de Home Assistant
triggers:
  - trigger: homeassistant
    event: start
conditions: []
actions:
  - alias: "DÉLAI : Attente stabilisation HA"
    delay:
      seconds: 30
  - alias: "ACTION : Push Git"
    action: shell_command.git_backup_push
  - alias: "LOG : Confirmation démarrage"
    action: system_log.write
    data:
      level: info
      message: "[Backup] Démarrage HA — push Git exécuté"
mode: single


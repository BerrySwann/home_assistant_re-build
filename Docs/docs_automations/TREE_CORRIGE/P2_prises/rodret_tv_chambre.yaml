id: '1766777250756'
alias: Bouton IKEA RODRET - TV Chambre (JSON)
description: 'Pilotage de la TV Chambre via le bouton RODRET (MQTT)'
triggers:
- trigger: mqtt
  topic: zigbee2mqtt/Inter TV Chambre (IKEA RODRET)
actions:
- choose:
  - alias: Bouton ON
    conditions:
    - condition: template
      value_template: '{{ trigger.payload_json.action == ''on'' }}'
    sequence:
    - action: switch.turn_on
      target:
        entity_id: switch.prise_tv_chambre_nous
  - alias: Bouton OFF
    conditions:
    - condition: template
      value_template: '{{ trigger.payload_json.action == ''off'' }}'
    sequence:
    - action: switch.turn_off
      target:
        entity_id: switch.prise_tv_chambre_nous
mode: restart
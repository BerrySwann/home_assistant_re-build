id: '1766777427587'
alias: Automation éCO. Prises
description: 'Pilotage dynamique des prises (Horloge, Hue Salon, Écrans, PC Bureau, Tête de lit). Logique basée sur les groupes de présence (1 à 4), les Heures Creuses et la fenêtre de présence 7h30-21h.\n'
triggers:
- trigger: state
  entity_id: sensor.groupe
- trigger: time
  at:
  - 01:00:00
  - 07:30:00
  - '13:00:00'
  - '14:30:00'
  - '21:00:00'
actions:
- variables:
    h: '{{ now().strftime(''%H:%M'') }}'
    is_hc: '{{ (''01:00'' <= h < ''07:30'') or (''13:00'' <= h < ''14:30'') }}'
    is_pres_win: '{{ ''07:30'' <= h < ''21:00'' }}'
    g: '{{ states(''sensor.groupe'') }}'
    pres_active: '{{ g in [''groupe_2'', ''groupe_4''] }}'
    target_horloge: '{{ ''on'' if (pres_active and is_pres_win) else ''off'' }}'
    target_vapote: '{{ ''on'' if (pres_active and is_pres_win) or is_hc else ''off''
      }}'
- choose:
  - alias: 'Groupe 1 : Absent (Tout OFF)'
    conditions:
    - condition: template
      value_template: '{{ g == ''groupe_1'' }}'
    sequence:
    - action: homeassistant.turn_off
      target:
        entity_id:
        - switch.prise_horloge_ikea
        - light.hue_smart_salon
        - switch.ecran_p_c_3_play_hue
        - switch.prise_tete_de_lit_chambre
    - action: notify.mobile_app_eric
      data:
        title: '{{ states(''sensor.presence'') }}'
        message: '[5] prises [OFF]'
  - alias: 'Groupes 2, 3, 4 : Présence détectée'
    conditions:
    - condition: template
      value_template: '{{ g in [''groupe_2'', ''groupe_3'', ''groupe_4''] }}'
    sequence:
    - alias: Gestion de la prise Vapote (Hue Salon)
      action: homeassistant.turn_{{ target_vapote }}
      target:
        entity_id: light.hue_smart_salon
    - choose:
      - alias: Logique spécifique GROUPE 2 (Mamour)
        conditions:
        - condition: template
          value_template: '{{ g == ''groupe_2'' }}'
        sequence:
        - action: homeassistant.turn_{{ target_horloge }}
          target:
            entity_id: switch.prise_horloge_ikea
        - action: homeassistant.turn_on
          target:
            entity_id:
            - switch.ecran_p_c_3_play_hue
            - switch.prise_tete_de_lit_chambre
        - action: homeassistant.turn_off
          target:
            entity_id: switch.hue_smart_eco_pc_bureau
      - alias: Logique spécifique GROUPE 3 (Eric)
        conditions:
        - condition: template
          value_template: '{{ g == ''groupe_3'' }}'
        sequence:
        - action: homeassistant.turn_off
          target:
            entity_id:
            - switch.prise_horloge_ikea
            - switch.prise_tete_de_lit_chambre
        - action: homeassistant.turn_on
          target:
            entity_id:
            - switch.ecran_p_c_3_play_hue
      - alias: Logique spécifique GROUPE 4 (Mamour & Eric)
        conditions:
        - condition: template
          value_template: '{{ g == ''groupe_4'' }}'
        sequence:
        - action: homeassistant.turn_{{ target_horloge }}
          target:
            entity_id: switch.prise_horloge_ikea
        - action: homeassistant.turn_on
          target:
            entity_id:
            - switch.ecran_p_c_3_play_hue
            - switch.prise_tete_de_lit_chambre
    - alias: Notification du nombre de prises actives
      action: notify.mobile_app_eric
      data:
        title: '{{ states(''sensor.presence'') }}'
        message: "{% set prises = [\n  'switch.prise_horloge_ikea',\n  'light.hue_smart_salon',\n\
          \  'switch.ecran_p_c_3_play_hue',\n  'switch.hue_smart_eco_pc_bureau',\n\
          \  'switch.prise_tete_de_lit_chambre'\n] %} {% set count_on = prises | select('is_state',\
          \ 'on') | list | count %} [{{ count_on }}] prises [ON]\n"
mode: queued
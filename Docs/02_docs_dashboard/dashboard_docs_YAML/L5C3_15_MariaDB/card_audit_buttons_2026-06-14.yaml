# ╭──────────────────────────────────────────────────────────────────────────╮
# │ CARTE : BOUTON AUDIT MD5 (PAGE SYSTÈME / L5C3)                          │
# ╰──────────────────────────────────────────────────────────────────────────╯
# 1 bouton : AUDIT MD5 (3 passes : tree → MD5 prod → MD5 GitHub)
# Appel via shell_command.audit_md5 → .scripts/audit_md5.sh → md5_audit_YYYY-MM-DD.txt
# Journal affiché par sensor.audit_md5_journal (card_audit_journal)

type: vertical-stack
cards:

  - type: custom:mushroom-title-card
    title: "🔍 Audit MD5 GitHub"
    subtitle: "Compare prod ↔ GitHub (git show — zéro RAM)"
    alignment: center
    card_mod:
      style: |
        ha-card { border: none !important; box-shadow: none !important; background: transparent; }

  - type: button
    name: "LANCER AUDIT MD5"
    icon: mdi:shield-search
    show_state: false
    tap_action:
      action: call-service
      service: shell_command.audit_md5
    hold_action:
      action: none
    card_mod:
      style: |
        ha-card {
          background: rgba(3, 169, 244, 0.15);
          border: 1px solid #03a9f4;
          border-radius: 12px;
        }
        .card-content { padding: 10px; }
        .name { font-size: 14px; font-weight: bold; color: #03a9f4; }
        ha-icon { color: #03a9f4; }

  - type: markdown
    content: >
      Log : `/config/.logs/md5_audit_YYYY-MM-DD.txt`
      · Rafraîchi automatiquement (~30s)
    card_mod:
      style: |
        ha-card { border: none !important; box-shadow: none !important; background: transparent; }
        ha-markdown { font-size: 11px; color: #888; }


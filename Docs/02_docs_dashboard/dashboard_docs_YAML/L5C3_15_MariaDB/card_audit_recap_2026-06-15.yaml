# ╭──────────────────────────────────────────────────────────────────────────╮
# │ CARTE : SÉPARATEUR MD5 + BOUTON AUDIT + RÉCAP (L5C3)                    │
# ╰──────────────────────────────────────────────────────────────────────────╯
# NOTE : spinner sur le bouton via :active CSS (shell_command n'a pas de state)
# Pour un vrai spinner pendant l'exécution → migrer vers script.audit_md5

type: vertical-stack
cards:

  # ── SÉPARATEUR ─────────────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: MD5
    icon: mdi:file-document-outline
    rows: 2
    styles: |-
      .bubble-line {
        background: var(--primary-text-color);
        opacity: 1;
      }
    card_layout: normal

  # ── BOUTON LANCER AUDIT (button-card avec animation au clic) ───────────────
  - type: custom:button-card
    icon: mdi:shield-search
    name: Lancer Audit MD5
    tap_action:
      action: call-service
      service: shell_command.audit_md5
    styles:
      card:
        - background: rgba(3, 169, 244, 0.12)
        - border: 1px solid "#03a9f4"
        - border-radius: 12px
        - padding: 8px
      icon:
        - color: "#03a9f4"
        - width: 24px
      name:
        - color: "#03a9f4"
        - font-size: 13px
        - font-weight: bold
    state_display: ""
    show_state: false
    card_mod:
      style: |
        ha-card:active icon {
          animation: rotating 1s linear infinite;
        }

  # ── RÉCAP ──────────────────────────────────────────────────────────────────
  - type: markdown
    content: >
      {% set text = state_attr('sensor.audit_md5_journal', 'text') or '' %}
      {% set r = namespace(res='', ter='', log='') %}
      {% for line in text.split('\n') %}{% if 'RÉSULTAT' in line %}{% set r.res = line %}{% endif %}{% if 'Audit MD5 terminé' in line %}{% set r.ter = line.split(' · ')[0] %}{% set r.log = line.split('→ ')[1] if '→ ' in line else '' %}{% endif %}{% endfor %}
      {% if r.res %}{{ r.res }}<br>{{ r.ter }}<br>→ {{ r.log }}{% else %}*— Aucun audit lancé —*{% endif %}
    card_mod:
      style: |
        ha-card {
          border: none !important;
          box-shadow: none !important;
          background: transparent;
        }
        ha-markdown { font-size: 12px; line-height: 1.8; }

# annotations_log:
# [2026-06-15] v5 : \n\n → <br> (fiable dans HA markdown)
# [2026-06-15] chip → button-card (animation :active sur l'icône au clic)
# [2026-06-15] shell_command pas de state → spinner uniquement pendant l'appui

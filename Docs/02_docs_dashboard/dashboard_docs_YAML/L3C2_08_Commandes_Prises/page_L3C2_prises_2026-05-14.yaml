          ha-card::before { content: var(--v-amps); background: color-mix(in srgb, rgb(var(--c-amps)), transparent calc(100% - (var(--badge-bg-opacity) * 100))); border: 1px solid rgb(var(--c-amps)); color: rgb(var(--c-amps)); box-shadow: 0 0 6px 0 color-mix(in srgb, rgb(var(--c-amps)), transparent 70%); position: absolute; top: 12px; right: var(--pos-2); width: var(--badge-width); height: var(--badge-height); display: flex; align-items: center; justify-content: center; font-size: var(--fs-badges); font-weight: 700; border-radius: 4px; z-index: 5; }
        mushroom-shape-icon$: |
          .shape { --icon-size: var(--fs-icon) !important; --shape-color: rgba(var(--c-plug), 0.2) !important; --icon-color: rgb(var(--c-plug)) !important; background: radial-gradient(circle, rgba(var(--c-plug), 0.1) 0%, transparent 70%) !important; overflow: visible !important; transform-origin: 50% 50%; animation: var(--anim-shake); }
          .shape::before, .shape::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; pointer-events: none; }
          .shape::before { animation: var(--anim-glow); z-index: 0; } .shape::after { animation: var(--anim-arcs); z-index: 1; }

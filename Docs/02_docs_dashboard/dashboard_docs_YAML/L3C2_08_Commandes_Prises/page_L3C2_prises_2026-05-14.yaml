      action: toggle
    layout: horizontal
    fill_container: false
    card_mod:
      style:
        .: |
          ha-card {
            {% set max_watts = 50 %}
            {% set show_ma = false %}
            {% set custom_msg = "MAX: 50W" %}
            {% set theme_mode = 'dark' %}
            {% set card_height = '90px' %}
            {% set sensor_power =   'sensor.prise_tete_de_lit_chambre_power' %}
            {% set sensor_voltage = 'sensor.prise_tete_de_lit_chambre_voltage' %}
            {% set sensor_current = 'sensor.prise_tete_de_lit_chambre_current' %}
            {% set color_plug = '76, 175, 80' %}{% set color_bar = '76, 175, 80' %}
            {% set color_watts = '255, 152, 0' %}{% set color_amps = '33, 150, 243' %}{% set color_volts = '76, 175, 80' %}
            {% set fs_icon = '65px' %}{% set fs_main = '14px' %}{% set fs_sec = '11px' %}{% set fs_badges = '11px' %}{% set fs_custom = '11px' %}
            {% if theme_mode == 'dark' %}{% set card_bg_color = '28, 28, 28' %}{% set color_text_main = '255, 255, 255' %}{% set color_text_sec = '255, 255, 255' %}{% set color_text_msg = '255, 255, 255' %}
            {% else %}{% set card_bg_color = '255, 255, 255' %}{% set color_text_main = '33, 33, 33' %}{% set color_text_sec = '114, 114, 114' %}{% set color_text_msg = '33, 33, 33' %}{% endif %}
            {% set watts = states(sensor_power) | float(0) | int %}
            {% set volts = states(sensor_voltage) | float(0) | int %}
            {% set amps  = states(sensor_current) | float(0) %}
            {% set str_amps = amps | round(2) ~ " A" %}
            {% set pct = [[(watts / max_watts * 100) | int, 100] | min, 0] | max %}
            {% set dur = [2.0 - (watts / max_watts * 1.5), 0.4] | max %}
            {% if watts > 0 %}{% set anim_shake = 'ultra-plug-on ' ~ dur ~ 's ease-in-out infinite' %}{% set anim_glow = 'ultra-plug-glow 1.8s ease-in-out infinite' %}{% set anim_arcs = 'ultra-plug-arcs 1.2s linear infinite' %}{% set glow_bg = 'inset 0 0 60px rgba(' ~ color_bar ~ ', 0.1)' %}
            {% else %}{% set anim_shake = 'none' %}{% set anim_glow = 'none' %}{% set anim_arcs = 'none' %}{% set glow_bg = 'none' %}{% endif %}
            --c-plug: {{ color_plug }}; --c-watts: {{ color_watts }}; --c-amps: {{ color_amps }}; --c-volts: {{ color_volts }}; --c-bar: {{ color_bar }};
            --c-txt-m: {{ color_text_main }}; --c-txt-s: {{ color_text_sec }}; --c-txt-c: {{ color_text_msg }};
            --v-watts: "{{ watts ~ ' W' }}"; --v-volts: "{{ volts ~ ' V' }}"; --v-amps: "{{ str_amps }}"; --v-custom: "{{ custom_msg }}";
            --anim-shake: {{ anim_shake }}; --anim-glow: {{ anim_glow }}; --anim-arcs: {{ anim_arcs }};
            --fs-main: {{ fs_main }}; --fs-sec: {{ fs_sec }}; --fs-badges: {{ fs_badges }}; --fs-custom: {{ fs_custom }}; --fs-icon: {{ fs_icon }};
            --bar-width: {{ pct }}%; --card-h: {{ card_height }}; --card-b: {{ card_bg_color }}; --card-in-glow: {{ glow_bg }};
            --badge-bg-opacity: 0.15; --badge-width: 58px; --badge-height: 20px; --badge-gap: 6px;
            --pos-1: 12px; --pos-2: calc(12px + var(--badge-width) + var(--badge-gap)); --pos-3: calc(12px + (var(--badge-width) * 2) + (var(--badge-gap) * 2));
            background: rgb(var(--card-b)) !important; height: var(--card-h) !important;
            box-shadow: var(--card-in-glow); overflow: hidden !important; width: auto !important;
            display: flex; flex-direction: column; justify-content: center;
          }


type: grid
cards:
  - type: vertical-stack
    cards:
      - type: heading
        icon: mdi:lightning-bolt
        heading: Temps Réél
        heading_style: title
        badges:
          - type: entity
            show_state: true
            show_icon: true
            entity: sensor.general_electric_appart_power
            name: Réel
            color: green
            state_content:
              - name
              - state
        tap_action:
          action: navigate
          navigation_path: /dashboard-tablette/energie
      - type: markdown
        content: " "
        card_mod:
          style: |
            ha-card {
              height: 1px !important;
              background: rgba(255, 255, 255, 0.4) !important;
              margin: 5px 20px 5px 20px !important;
              border: none !important;
            }
  - type: vertical-stack
    cards:
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.total_poste_chauffage_puissance
            above: 1
        card:
          type: vertical-stack
          cards:
            - type: heading
              icon: mdi:hvac
              heading: Chauffage
              heading_style: title
              badges:
                - type: entity
                  entity: sensor.total_poste_chauffage_puissance
                  show_state: true
                  color: orange
            - type: custom:auto-entities
              card:
                type: custom:bar-card
                title: " "
                icon: mdi:hvac
                title_position: inside
                height: 38
                unit_of_measurement: W
                severity:
                  - color: gainsboro
                    from: 0
                    to: 4
                  - color: "#4caf50"
                    from: 4
                    to: 250
                  - color: "#FFCC99"
                    from: 250
                    to: 750
                  - color: "#ff4444"
                    from: 750
                    to: 6000
                card_mod:
                  style: >
                    :host {
                      --ha-card-border-color: transparent !important;
                      --card-background-color: none !important;
                    }
                    ha-card {
                      font-weight: bold;
                      --mdc-icon-size: 22px;
                      --paper-item-icon-color: white;
                      margin-top: -10px !important;
                      font-size: 12px;
                    }
                    bar-card-currentbar { border-radius: 10px; }
                    bar-card-currentbar, bar-card-current,
                    bar-card-backgroundbar {
                      height: 6px !important;
                      margin-top: 34px;
                    }
                    bar-card-name { font-size: 12px; }
                    bar-card-value { font-size: 12px; }
              filter:
                include:
                  - entity_id: sensor.clim_salon_nous_power
                    options:
                      icon: mdi:air-conditioner
                  - entity_id: sensor.radiateur_elec_cuisine_power
                    options:
                      icon: mdi:radiator
                  - entity_id: sensor.clim_bureau_nous_power
                    options:
                      icon: mdi:air-conditioner
                  - entity_id: sensor.prise_soufflant_salle_de_bain_nous_power
                    options:
                      icon: mdi:fan
                  - entity_id: sensor.prise_seche_serviette_salle_de_bain_nous_power
                    options:
                      icon: mdi:radiator-vertical
                  - entity_id: sensor.clim_chambre_nous_power
                    options:
                      icon: mdi:air-conditioner
                exclude:
                  - options: {}
                    state: <= 1
              sort:
                method: state
                reverse: true
                numeric: true
            - type: markdown
              content: " "
              card_mod:
                style: |
                  ha-card {
                    height: 1px !important;
                    background: rgba(255, 255, 255, 0.4) !important;
                    margin: 5px 20px 5px 20px !important;
                    border: none !important;
                  }

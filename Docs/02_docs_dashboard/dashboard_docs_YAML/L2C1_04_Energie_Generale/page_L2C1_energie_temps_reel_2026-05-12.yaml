        header:
          show: true
          title: Conso. Instantanée
          show_states: true
          colorize_states: true
        yaxis:
          - id: Watts
            min: 0
            max: auto
            opposite: true
            decimals: 0
            apex_config:
              tickAmount: 4
        all_series_config:
          group_by:
            func: last
            duration: 10m
          show:
            legend_value: false
            extremas: true
        series:
          - entity: sensor.prise_box_internet_ikea_power
            name: Box (+)
            color: rgb(183, 183, 183)
            yaxis_id: Watts
            unit: W
            stroke_width: 2
            fill_raw: last
          - entity: sensor.prise_horloge_ikea_power

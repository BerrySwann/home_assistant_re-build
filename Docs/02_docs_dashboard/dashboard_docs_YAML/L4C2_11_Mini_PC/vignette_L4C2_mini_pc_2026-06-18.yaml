type: custom:button-card
entity: sensor.proxmox_cpu_package
icon: phu:intel-nuc
aspect_ratio: 1/1
name: _____ Mini - P.C. _____
entities:
  - sensor.proxmox_cpu_package
  - sensor.pve_utilisation_du_processeur
  - sensor.pve_memory_usage_percentage
  - sensor.storage_local_storage_usage_percentage
  - sensor.prise_mini_pc_ikea_power
triggers_update:
  - sensor.proxmox_cpu_package
  - sensor.pve_utilisation_du_processeur
  - sensor.pve_memory_usage_percentage
  - sensor.storage_local_storage_usage_percentage
  - sensor.prise_mini_pc_ikea_power
tap_action:
  action: navigate
  navigation_path: /dashboard-tablette/systeme-mini-pc
styles:
  card:
    - border-radius: 10px
    - background: transparent
    - border-width: 3px
    - border-color: white
    - border-style: double
    - color: white
    - font-size: 11px
    - line-height: 1.2
    - padding: 3%
  grid:
    - grid-template-areas: |
        "i temp"
        "n n"
        "cpu cpu"
        "conso conso"
        "ram ram"
        "sd sd"
  name:
    - font-weight: bold
    - font-size: 13px
    - color: white
    - align-self: middle
    - justify-self: center
    - padding-bottom: 7px
  icon:
    - color: |
        [[[
          if (!entity || entity.state === 'unavailable' || entity.state === 'unknown') return '#aaaaaa';
          const t = parseFloat(entity.state);
          if (t < 65) return 'rgb(70, 175, 75)';
          if (t < 75) return 'orange';
          return 'rgb(244,67,54)';
        ]]]
    - width: 100%
  custom_fields:
    temp:
      - align-self: start
      - margin-top: 18px
      - margin-right: 10px
      - "--text-icon-sensor": |
          [[[
            if (!entity || entity.state === 'unavailable' || entity.state === 'unknown') return '#aaaaaa';
            const t = parseFloat(entity.state);
            if (t < 65) return 'rgb(70, 175, 75)';
            if (t < 75) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
      - "--text-color-sensor": |
          [[[
            if (!entity || entity.state === 'unavailable' || entity.state === 'unknown') return '#aaaaaa';
            const t = parseFloat(entity.state);
            if (t < 65) return 'rgb(255,255,255)';
            if (t < 75) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
    cpu:
      - padding-bottom: 1px
      - align-self: middle
      - justify-self: start
      - "--text-color-sensor": |
          [[[
            const s = states['sensor.pve_utilisation_du_processeur'];
            if (!s || s.state === 'unavailable' || s.state === 'unknown') return '#aaaaaa';
            const v = parseFloat(s.state);
            if (v < 75) return 'white';
            if (v < 90) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
    conso:
      - padding-bottom: 1px
      - align-self: middle
      - justify-self: start
      - "--text-color-sensor": |
          [[[
            const s = states['sensor.prise_mini_pc_ikea_power'];
            if (!s || s.state === 'unavailable' || s.state === 'unknown') return '#aaaaaa';
            const v = parseFloat(s.state);
            if (v < 15) return 'white';
            if (v < 19) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
    ram:
      - padding-bottom: 1px
      - align-self: middle
      - justify-self: start
      - "--text-color-sensor": |
          [[[
            const s = states['sensor.pve_memory_usage_percentage'];
            if (!s || s.state === 'unavailable' || s.state === 'unknown') return '#aaaaaa';
            const v = parseFloat(s.state);
            if (v < 75) return 'white';
            if (v < 90) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
      - "--icon-color-sensor": |
          [[[
            const s = states['sensor.pve_memory_usage_percentage'];
            if (!s || s.state === 'unavailable' || s.state === 'unknown') return '#aaaaaa';
            const v = parseFloat(s.state);
            if (v < 75) return 'rgb(70, 175, 75)';
            if (v < 90) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
    sd:
      - padding-bottom: 0px
      - align-self: middle
      - justify-self: start
      - "--text-color-sensor": |
          [[[
            const s = states['sensor.storage_local_storage_usage_percentage'];
            if (!s || s.state === 'unavailable' || s.state === 'unknown') return '#aaaaaa';
            const v = parseFloat(s.state);
            if (v < 75) return 'white';
            if (v < 90) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
      - "--icon-color-sensor": |
          [[[
            const s = states['sensor.storage_local_storage_usage_percentage'];
            if (!s || s.state === 'unavailable' || s.state === 'unknown') return '#aaaaaa';
            const v = parseFloat(s.state);
            if (v < 75) return 'rgb(70, 175, 75)';
            if (v < 90) return 'orange';
            return 'rgb(244,67,54)';
          ]]]
custom_fields:
  temp: |
    [[[
      if (!entity || entity.state === 'unavailable' || entity.state === 'unknown')
        return `<ha-icon icon="mdi:thermometer" style="width:15px;height:15px;color:#aaaaaa;"></ha-icon> <span style="color:#aaaaaa;">N/A</span>`;
      const t = parseFloat(entity.state);
      const color = t < 65 ? 'rgb(70,175,75)' : t < 75 ? 'orange' : 'rgb(244,67,54)';
      return `<ha-icon icon="mdi:thermometer" style="width:15px;height:15px;color:${color};"></ha-icon> <span style="color:${color};">${entity.state}°C</span>`;
    ]]]
  cpu: |
    [[[
      const s = states['sensor.pve_utilisation_du_processeur'];
      const val = (s && s.state !== 'unavailable' && s.state !== 'unknown') ? parseFloat(s.state).toFixed(1) + '%' : 'N/A';
      return `<ha-icon icon="mdi:server" style="width:15px;height:15px;color:rgb(70,175,75);"></ha-icon><span>CPU: <span style="color:var(--text-color-sensor);">${val}</span></span>`;
    ]]]
  conso: |
    [[[
      const s = states['sensor.prise_mini_pc_ikea_power'];
      const val = (s && s.state !== 'unavailable' && s.state !== 'unknown') ? parseFloat(s.state).toFixed(1) + 'W' : 'N/A';
      return `<ha-icon icon="mdi:lightning-bolt-outline" style="width:15px;height:15px;color:rgb(70,175,75);"></ha-icon><span>Power: <span style="color:var(--text-color-sensor);">${val}</span></span>`;
    ]]]
  ram: |
    [[[
      const s = states['sensor.pve_memory_usage_percentage'];
      const val = (s && s.state !== 'unavailable' && s.state !== 'unknown') ? parseFloat(s.state).toFixed(1) + '%' : 'N/A';
      return `<ha-icon icon="mdi:memory" style="width:15px;height:15px;color:var(--icon-color-sensor);"></ha-icon><span>RAM: <span style="color:var(--text-color-sensor);">${val}</span></span>`;
    ]]]
  sd: |
    [[[
      const s = states['sensor.storage_local_storage_usage_percentage'];
      const val = (s && s.state !== 'unavailable' && s.state !== 'unknown') ? parseFloat(s.state).toFixed(1) + '%' : 'N/A';
      return `<ha-icon icon="mdi:harddisk" style="width:15px;height:15px;color:var(--icon-color-sensor);"></ha-icon><span>SSD: <span style="color:var(--text-color-sensor);">${val}</span></span>`;
    ]]]

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ SHELL COMMAND : LOG CHANGEMENTS DE ZONE — P4 PRÉSENCE (ERIC)            │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Expose une commande shell appelable depuis HA pour enregistrer
# chaque changement de zone du device_tracker d'Eric dans un fichier texte.
# Appelée par l'automation [P4] Eric — Log Zones à chaque transition d'état.
#
# ## 🧮 CALCUL & SOURCES :
# - Source    : device_tracker.poco (état = nom de la zone HA courante)
# - Log       : /config/.logs/zone_eric.txt (append >> — non écrasé)
# - Variables injectées via data: dans l'automation appelante :
#     ts      → timestamp (now().strftime('%Y-%m-%d %H:%M:%S'))
#     from_z  → zone quittée  (trigger.from_state.state)
#     to_z    → zone rejointe (trigger.to_state.state)
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL      | CAPTEUR BRUT (source)   | CE FICHIER (clé)  | AVAL                        |
# |:--------------|:------------------------|:------------------|:----------------------------|
# | Poco X7 Pro   | device_tracker.poco     | zone_log_eric     | /config/.logs/zone_eric.txt |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - shell_command ne retourne pas de statut HA — vérifier zone_eric.txt manuellement.
# - Les variables ts / from_z / to_z sont des templates Jinja2 rendus au moment
#   de l'appel : ils doivent être passés via data: dans l'action de l'automation.
# - Le répertoire /config/.logs/ doit exister (créé automatiquement par audit_md5.sh).
# - Filtrer unavailable/unknown côté automation (not_from / not_to) pour éviter le bruit.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Pas de vignette directe.
# - Déclenché par l'automation : [P4] Eric — Log Zones

# --- zone_log_eric ---
zone_log_eric: >-
  echo "{{ ts }} | {{ from_z }} -> {{ to_z }}" >> /config/.logs/zone_eric.txt


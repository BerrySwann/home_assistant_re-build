- id: '1775243914127'
  alias: (K) (DEBUG) Notifier les changements de message clim (Mobile)
  description: Surveille et notifie les changements d'état du message personnalisé.
  triggers:
  - trigger: state
    entity_id: sensor.message_clim_personnalise_7h30_21h00
  actions:
  - choose:
    - alias: 'Détection : CELLULAR'
      conditions:
      - condition: template
        value_template: '{{ ''CELLULAR'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_eric
        data:
          message: '[Présence] Personne n''est à la maison (mode CELLULAR/WIFI_?!)'
    - alias: 'Détection : MAMOUR'
      conditions:
      - condition: template
        value_template: '{{ ''MAMOUR'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_eric
        data:
          message: '[Présence] Seul Mamour est à la maison (Wi-Fi)'
    - alias: 'Détection : ERIC'
      conditions:
      - condition: template
        value_template: '{{ ''ERIC'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_eric
        data:
          message: '[Présence] Seul Eric est à la maison (Wi-Fi)'
    - alias: 'Détection : LES DEUX'
      conditions:
      - condition: template
        value_template: '{{ ''Clim [2] en [WIFI]'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_eric
        data:
          message: '[Présence] Mamour et Eric sont à la maison (Wi-Fi)'
    - alias: 'Détection : UP (Hausse)'
      conditions:
      - condition: template
        value_template: '{{ ''Up ↗'' in trigger.to_state.state }}'
      sequence:
      - variables:
          temp_ext: "{% if 'Up ↗' in trigger.to_state.state %}\n  {{ trigger.to_state.state.split('Up
            ↗ ')[1].split('°')[0].strip() }}\n{% else %}\n  ?\n{% endif %}"
      - action: notify.mobile_app_eric
        data:
          message: '[Tendance] Température extérieure en hausse : {{ temp_ext }}°'
    - alias: 'Détection : DOWN (Baisse)'
      conditions:
      - condition: template
        value_template: '{{ ''Down ↘'' in trigger.to_state.state }}'
      sequence:
      - variables:
          temp_ext: "{% if 'Down ↘' in trigger.to_state.state %}\n  {{ trigger.to_state.state.split('Down
            ↘ ')[1].split('°')[0].strip() }}\n{% else %}\n  ?\n{% endif %}"
      - action: notify.mobile_app_eric
        data:
          message: '[Tendance] Température extérieure en baisse : {{ temp_ext }}°'
    - alias: 'Détection : STABLE'
      conditions:
      - condition: template
        value_template: '{{ ''stable →'' in trigger.to_state.state }}'
      sequence:
      - variables:
          temp_ext: "{% if 'stable →' in trigger.to_state.state %}\n  {{ trigger.to_state.state.split('stable
            → ')[1].split('°')[0].strip() }}\n{% else %}\n  ?\n{% endif %}"
      - action: notify.mobile_app_eric
        data:
          message: '[Tendance] Température extérieure stable : {{ temp_ext }}°'
    - alias: 'Détection : HEAT'
      conditions:
      - condition: template
        value_template: '{{ ''HEAT]'' in trigger.to_state.state }}'
      sequence:
      - variables:
          message_part: "{% if 'HEAT]\\n' in trigger.to_state.state %}\n  {{ trigger.to_state.state.split('HEAT]\\n')[1]
            }}\n{% else %}\n  Inconnu\n{% endif %}"
      - action: notify.mobile_app_eric
        data:
          message: '[Mode] Chauffage activé :

            {{ message_part }}'
    - alias: 'Détection : COOL'
      conditions:
      - condition: template
        value_template: '{{ ''COOL]'' in trigger.to_state.state }}'
      sequence:
      - variables:
          message_part: "{% if 'COOL]\\n' in trigger.to_state.state %}\n  {{ trigger.to_state.state.split('COOL]\\n')[1]
            }}\n{% else %}\n  Inconnu\n{% endif %}"
      - action: notify.mobile_app_eric
        data:
          message: '[Mode] Rafraîchissement activé :

            {{ message_part }}'
    - alias: 'Détection : FAN'
      conditions:
      - condition: template
        value_template: '{{ ''FAN ONLY]'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_eric
        data:
          message: '[Mode] Ventilation activée'
- id: '1775244321024'
  alias: A - Chauffage Cuisine (entre 4h45 & 7h LMMJ ou 5:45h & 8h VSD avec T° 19,9°
    <-> 20.5°)
  description: 'Allume ou éteint le chauffage selon la température (19,9° <-> 20.5°)  aux
    conditions horaires spécifiques et si Eric OU Mamour est à la maison.

    '
  triggers:
  - trigger: time
    at: 04:45:00
  - trigger: time
    at: 05:45:00
  - trigger: time
    at: 07:00:00
  - trigger: time
    at: 08:00:00
  - trigger: numeric_state
    entity_id: sensor.th_cuisine_temperature
    below: 19.9
  - trigger: numeric_state
    entity_id: sensor.th_cuisine_temperature
    above: 20.5
  conditions:
  - alias: Présence Eric ou Mamour
    condition: or
    conditions:
    - condition: zone
      entity_id: person.eric
      zone: zone.home
    - condition: zone
      entity_id: person.mamour
      zone: zone.home
  - alias: Vérification Plage Horaire et Jour
    condition: or
    conditions:
    - condition: and
      conditions:
      - condition: time
        after: 04:45:00
        before: 07:00:01
        weekday:
        - mon
        - tue
        - wed
        - thu
    - condition: and
      conditions:
      - condition: time
        after: 05:45:00
        before: 08:00:01
        weekday:
        - fri
        - sat
        - sun
  actions:
  - choose:
    - alias: 'ARRÊT FORCE : Fin de période Semaine (07:00)'
      conditions:
      - condition: template
        value_template: '{{ now().hour == 7 and now().minute == 0 }}'
      - condition: time
        weekday:
        - mon
        - tue
        - wed
        - thu
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.radiateur_cuisine
        data:
          hvac_mode: 'off'
      - action: notify.mobile_app_eric
        data:
          message: /!\ RADIATEUR CUISINE est 'OFF' FORCE (Fin Semaine) /!\
    - alias: 'ARRÊT FORCE : Fin de période Week-end (08:00)'
      conditions:
      - condition: template
        value_template: '{{ now().hour == 8 and now().minute == 0 }}'
      - condition: time
        weekday:
        - fri
        - sat
        - sun
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.radiateur_cuisine
        data:
          hvac_mode: 'off'
      - action: notify.mobile_app_eric
        data:
          message: /!\ RADIATEUR CUISINE est 'OFF' FORCE (Fin W-E) /!\
    - alias: 'ACTION : Allumage (Temp < 19.9)'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_cuisine_temperature
        below: 19.9
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.radiateur_cuisine
        data:
          hvac_mode: heat
      - action: notify.mobile_app_eric
        data:
          message: /!\ RADIATEUR CUISINE est 'ON' /!\
    - alias: 'ACTION : Extinction (Temp > 20.5)'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_cuisine_temperature
        above: 20.5
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.radiateur_cuisine
        data:
          hvac_mode: 'off'
      - action: notify.mobile_app_eric
        data:
          message: /!\ RADIATEUR CUISINE est 'OFF' /!\
  mode: single
- id: '1775244397523'
  alias: B - Chauffage Cuisine Vacances
  description: 'Allume ou éteint le chauffage selon la température entre 6h00 et 8h30  pendant

# --- A_demarrage_initialisation_soufflant.yaml ---
- alias: A - SALLE DE BAIN - DÉMARRAGE ET INITIALISATION DU SOUFFLANT
  description: Allume et initialise la mémoire de puissance
  triggers:
  - trigger: state
    entity_id: switch.inter_soufflant_salle_de_bain
    to: 'on'
  conditions:
  - condition: numeric_state
    entity_id: sensor.th_salle_de_bain_temperature
    below: 25
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.prise_soufflant_salle_de_bain_nous
  - delay: 00:00:01
  - action: remote.send_command
    target:
      entity_id: remote.soufflant_sdb_rm4_mini
    data:
      command: on_off
      device: radiateur_sdb
  - delay: 00:00:01
  - choose:
    - alias: 'CAS FROID : < 21°C -> 2000W'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_salle_de_bain_temperature
        below: 21
      sequence:
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb_rm4_mini
        data:
          command: 1000w
          device: radiateur_sdb
          num_repeats: 2
      - action: input_select.select_option
        target:
          entity_id: input_select.etat_resistance_soufflant_sdb

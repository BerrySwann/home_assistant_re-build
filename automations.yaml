- id: '1771872569647'
  alias: Alerte Météo France actualisation des "CARTES"
  description: 'Force la mise à jour des images d''alerte Météo France au démarrage,  aux
    heures clés, ou toutes les 5 min si elles sont indisponibles.

    '
  triggers:
  - trigger: homeassistant
    event: start
    id: Start
  - trigger: time
    at: 06:32:00
    id: Heure632
  - trigger: time
    at: '16:32:00'
    id: Heure1632
  - trigger: time_pattern
    minutes: /5
    id: Toutesles5minutes
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id:
      - Start
      - Heure632
      - Heure1632
    - alias: Vérif si Today est HS
      condition: and
      conditions:
      - condition: trigger
        id: Toutesles5minutes
      - condition: state
        entity_id: sensor.meteo_france_alertes_image_today
        state: unavailable
    - alias: Vérif si Tomorrow est HS
      condition: and
      conditions:
      - condition: trigger
        id: Toutesles5minutes
      - condition: state
        entity_id: sensor.meteo_france_alertes_image_tomorrow
        state: unavailable
  actions:
  - alias: Premier essai de mise à jour
    action: homeassistant.update_entity
    target:
      entity_id:
      - sensor.meteo_france_alertes_image_today
      - sensor.meteo_france_alertes_image_tomorrow
  - delay: 00:00:05
  - alias: Répéter MAJ Today si toujours indisponible
    repeat:
      count: 1
      sequence:
      - if:
        - condition: state
          entity_id: sensor.meteo_france_alertes_image_today
          state: unavailable
        then:
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.meteo_france_alertes_image_today
        - delay: 00:00:05
  - alias: Répéter MAJ Tomorrow si toujours indisponible
    repeat:
      count: 1
      sequence:
      - if:
        - condition: state
          entity_id: sensor.meteo_france_alertes_image_tomorrow
          state: unavailable
        then:
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.meteo_france_alertes_image_tomorrow
        - delay: 00:00:05
  - alias: Rafraîchir les caméras finales
    action: homeassistant.update_entity
    target:
      entity_id:
      - camera.mf_alerte_today
      - camera.mf_alerte_tomorrow
  mode: single
- id: '1772274292302'
  alias: '[03-Backup] Git weekly (dim 01:30)'
  description: Backup natif HA + push + tag weekly chaque dimanche à 01:30
  triggers:
  - trigger: time
    at: 01:30:00
  conditions:
  - condition: time
    weekday:
    - sun
  actions:
  - action: shell_command.git_backup_push_weekly
  - action: system_log.write
    data:
      level: info
      message: '[Backup] Weekly exécuté'
  - action: notify.mobile_app_poco_x7_pro_e
    data:
      title: BACKUP WEEKLY
      message: Backup hebdo + tag -> GitHub OK. Semaine {{ now().strftime('%G-W%V')
        }}
  mode: single
- id: '1772274342928'
  alias: '[01-Backup] Git hourly H+10'
  description: Push Git + backup natif HA toutes les heures à H+10
  triggers:
  - trigger: time_pattern
    minutes: '10'
  conditions: []
  actions:
  - action: shell_command.git_backup_push
  - action: system_log.write
    data:
      level: info
      message: '[Backup] Horaire H+10 exécuté'
  mode: single
- id: '1772274384811'
  alias: '[02-Backup] Git daily (03:00)'
  description: Backup natif HA + push Git quotidien à 03h00
  triggers:
  - trigger: time
    at: 03:00:00
  conditions: []
  actions:
  - action: shell_command.git_backup_push
  - action: system_log.write
    data:
      level: info
      message: '[Backup] Daily 03:00 exécuté'
  mode: single
- id: '1772275440416'
  alias: '[00-Backup] Alerte si KO 15 min'
  description: Notification si le backup reste en KO pendant 15 minutes
  triggers:
  - trigger: state
    entity_id: sensor.backup_github_status
    to: KO
    for: 00:15:00
  conditions: []
  actions:
  - action: persistent_notification.create
    data:
      title: BACKUP GITHUB KO
      message: 'Echec ou pas de commit depuis 15 min. Verif : /config/.logs/ha_git_backup.log

        '
  - action: notify.mobile_app_poco_x7_pro_e
    data:
      title: BACKUP KO
      message: 'Git push KO depuis 15 min. Verif log backup.

        '
  - action: system_log.write
    data:
      level: error
      message: '[Backup] KO depuis 15 min — vérifier ha_git_backup.log'
  mode: single
- id: '1772276622703'
  alias: '[04-Backup] Git push manuel'
  triggers:
  - trigger: state
    entity_id: input_button.git_push_manuel
  actions:
  - action: shell_command.git_backup_push_manual
- id: '1772289095104'
  alias: '[05-Backup] Git push weekly manuel'
  description: ''
  triggers:
  - trigger: state
    entity_id: input_button.git_push_weekly_manuel
  actions:
  - action: shell_command.git_backup_push_weekly
- id: '1773253598751'
  alias: DB Purge MariaDB + Repack
  description: Ménage nocturne pour réduire la taille de la base de données (7 jours
    de rétention + Repack)
  triggers:
  - trigger: time
    at: 00:30:00
  conditions: []
  actions:
  - action: recorder.purge
    data:
      keep_days: 7
      repack: true
  mode: single
- id: '1773253636237'
  alias: Système - Économie Énergie VS Code
  description: Coupe VS Code si le CPU dépasse 10% ou s'il est inactif, avec confirmation
    (H24).
  triggers:
  - trigger: numeric_state
    entity_id: sensor.system_monitor_utilisation_du_processeur
    above: 10
    for:
      minutes: 10
  - trigger: numeric_state
    entity_id: sensor.studio_code_server_cpu_percent
    below: 0.8
    for:
      minutes: 15
  conditions:
  - condition: state
    entity_id: binary_sensor.studio_code_server_running
    state: 'on'
  actions:
  - action: notify.mobile_app_poco_x7_pro_e
    data:
      title: "\U0001F50B Alerte Énergie - Mini-PC"
      message: 'Il est {{ now().strftime(''%H:%M'') }}. Le CPU global est à {{ states(''sensor.system_monitor_utilisation_du_processeur'')
        }}%. On coupe VS Code pour économiser ?

        '
      data:
        actions:
        - action: STOP_VSC
          title: Oui, couper
        - action: KEEP_VSC
          title: Non, je travaille encore
  - wait_for_trigger:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: STOP_VSC
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: KEEP_VSC
    timeout: 00:05:00
    continue_on_timeout: true
  - choose:
    - alias: 'Action : STOP (ou timeout)'
      conditions:
      - condition: template
        value_template: '{{ wait.trigger == none or wait.trigger.event.data.action
          == ''STOP_VSC'' }}'
      sequence:
      - action: hassio.addon_stop
        data:
          addon: a0d7b954_vscode
      - action: notify.mobile_app_poco_x7_pro_e
        data:
          message: VS Code éteint automatiquement (Économie d'énergie).
    - alias: 'Action : KEEP'
      conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == ''KEEP_VSC'' }}'
      sequence:
      - stop: L'utilisateur code encore, on laisse tourner.
  mode: single
- id: '1774167313491'
  alias: Raspberry CPU Fan PWM 6 States
  description: Règle la vitesse du ventilateur du Raspberry en fonction de la température
    du CPU
  triggers:
  - event: start
    id: HomeAssistant_Start
    trigger: homeassistant
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 30
    id: above_30
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 40
    id: above_40
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 50
    id: above_50
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 60
    id: above_60
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 70
    id: above_70
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 30
    id: below_30
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 40
    id: below_40
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 50
    id: below_50
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 60
    id: below_60
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 70
    id: below_70
    trigger: numeric_state
  conditions: []
  actions:
  - alias: Régler la vitesse du ventilateur de l'unité centrale au démarrage
    if:
    - condition: trigger
      id: HomeAssistant_Start
    then:
    - data:
        percentage: 100
      target:
        entity_id: fan.rpi_cooling_fan
      action: fan.turn_on
  - alias: Régler la vitesse du ventilateur en fonction de la température
    if:
    - condition: numeric_state
      entity_id: sensor.system_monitor_temperature_du_processeur
      below: 30
    then:
    - data:
        percentage: 30
      target:
        entity_id: fan.rpi_cooling_fan
      action: fan.set_percentage
    else:
    - if:
      - condition: numeric_state
        entity_id: sensor.system_monitor_temperature_du_processeur
        below: 40
      then:
      - data:
          percentage: 40
        target:
          entity_id: fan.rpi_cooling_fan
        action: fan.set_percentage
      else:
      - if:
        - condition: numeric_state
          entity_id: sensor.system_monitor_temperature_du_processeur
          below: 50
        then:
        - data:
            percentage: 50
          target:
            entity_id: fan.rpi_cooling_fan
          action: fan.set_percentage
        else:
        - if:
          - condition: numeric_state
            entity_id: sensor.system_monitor_temperature_du_processeur
            below: 60
          then:
          - data:
              percentage: 65
            target:
              entity_id: fan.rpi_cooling_fan
            action: fan.set_percentage
          else:
          - if:
            - condition: numeric_state
              entity_id: sensor.system_monitor_temperature_du_processeur
              below: 70
            then:
            - data:
                percentage: 85
              target:
                entity_id: fan.rpi_cooling_fan
              action: fan.set_percentage
            else:
            - data:
                percentage: 100
              target:
                entity_id: fan.rpi_cooling_fan
              action: fan.set_percentage
  mode: single
- id: '1774183767864'
  alias: Bouton IKEA RODRET - Soufflant SdB Gestion ON/OFF (JSON)
  description: Pilotage du chauffage SDB via le bouton RODRET (MQTT)
  triggers:
  - trigger: mqtt
    options:
      topic: zigbee2mqtt/Inter Radiateur Salle de Bain (IKEA RODRET)
  actions:
  - choose:
    - alias: Bouton ON
      conditions:
      - condition: template
        value_template: '{{ trigger.payload_json.action == ''on'' }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.inter_soufflant_salle_de_bain
        data: {}
    - alias: Bouton OFF
      conditions:
      - condition: template
        value_template: '{{ trigger.payload_json.action == ''off'' }}'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.inter_soufflant_salle_de_bain
        data: {}
  mode: restart

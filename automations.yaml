- id: '1775245530054'
  alias: Eco. PRISES DINAMIQUE -> By-Présence/Groupe
  description: 'Pilotage des 6 prises en fonction du groupe de présence (G1 à G4).
    Sécurité PC : alim bureau garantie si conso > 100W.

    '
  triggers:
  - entity_id: sensor.groupe
    id: groupe_change
    trigger: state
  - entity_id: sensor.prise_bureau_pc_ikea_power
    above: 100
    id: pc_allume
    trigger: numeric_state
  - entity_id: sensor.prise_bureau_pc_ikea_power
    below: 40
    id: pc_eteint
    trigger: numeric_state
  actions:
  - variables:
      g: '{{ states(''sensor.groupe'') }}'
      pc_active: '{{ states(''sensor.prise_bureau_pc_ikea_power'') | float(0) > 100
        }}'
      vapote: '{{ ''on'' if g in [''groupe_2'', ''groupe_4''] else ''off'' }}'
      horloge: '{{ ''on'' if g in [''groupe_2'', ''groupe_4''] else ''off'' }}'
      play3: '{{ ''on'' if g in [''groupe_2'', ''groupe_3'', ''groupe_4''] else ''off''
        }}'
      pc_bureau: '{{ ''on'' if (g in [''groupe_3'', ''groupe_4''] or pc_active) else
        ''off'' }}'
      tete_lit: '{{ ''on'' if g in [''groupe_2'', ''groupe_4''] else ''off'' }}'
  - target:
      entity_id: switch.prise_tv_salon_ikea
    action: homeassistant.turn_off
  - target:
      entity_id: light.hue_smart_eco_salon
    action: homeassistant.turn_{{ vapote }}
  - target:
      entity_id: switch.prise_horloge_ikea
    action: homeassistant.turn_{{ horloge }}
  - target:
      entity_id: switch.ecran_p_c_3_play_hue
    action: homeassistant.turn_{{ play3 }}
  - target:
      entity_id: light.hue_smart_eco_pc_bureau
    action: homeassistant.turn_{{ pc_bureau }}
  - target:
      entity_id: switch.prise_tete_de_lit_chambre
    action: homeassistant.turn_{{ tete_lit }}
  - data:
      title: 'Groupe: {{ g }}'
      message: "{% set prises = [\n  'switch.prise_tv_salon_ikea',\n  'switch.prise_horloge_ikea',\n
        \ 'light.hue_smart_eco_salon',\n  'switch.ecran_p_c_3_play_hue',\n  'light.hue_smart_eco_pc_bureau',\n
        \ 'switch.prise_tete_de_lit_chambre'\n] %} {% set count_on = namespace(value=0)
        %} {% for p in prises %}\n  {% if states(p) == 'on' %}\n    {% set count_on.value
        = count_on.value + 1 %}\n  {% endif %}\n{% endfor %} [{{ count_on.value }}]
        prises ON | PC: {{ states('sensor.prise_bureau_pc_ikea_power') | int }}W\n"
    action: notify.mobile_app_eric
  mode: queued
- id: '1775245732227'
  alias: 'Gestion PC bureau : Scène de Fin + Notif'
  description: 'Éteint la prise du PC et notifie, mais laisse la prise ON pour le
    suivi conso  lorsqu''une veille est détectée.

    '
  triggers:
  - id: bouton_mqtt
    trigger: mqtt
    topic: zigbee2mqtt/Poussoir (IKEA TRADFRI)/action
  - id: extinction_conso
    trigger: numeric_state
    entity_id: sensor.prise_bureau_pc_ikea_power
    below: 40
    for:
      minutes: 2
  actions:
  - choose:
    - alias: 'ALLUMAGE : Bouton ON'
      conditions:
      - or:
        - condition: template
          value_template: '{{ trigger.id == ''bouton_mqtt'' and trigger.payload_json.action
            == ''on'' }}'
        - condition: trigger
          id: bouton_mqtt
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.hue_smart_eco_pc_bureau
        data: {}
      - action: light.turn_on
        target:
          entity_id: light.hue_smart_eco_pc_bureau
        data: {}
    - alias: 'EXTINCTION PRISE PC: Bouton OFF ou Veille (< 80W)'
      conditions:
      - or:
        - condition: template
          value_template: '{{ trigger.id == ''bouton_mqtt'' and trigger.payload_json.action
            == ''off'' }}'
        - condition: trigger
          id: extinction_conso
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.hue_smart_eco_pc_bureau
      - action: notify.mobile_app_eric
        data:
          title: Veille détectée
          message: PC Bureau [OFF]
          data:
            icon: mdi:eye-outline
            tag: notif_pc_bureau
  mode: parallel
- id: '1775330762844'
  alias: 'Gestion TV Chambre : Scène de Fin + Notif'
  description: 'Éteint les lumières et notifie, mais laisse la prise ON pour le suivi
    conso  lorsqu''une veille est détectée.

    '
  triggers:
  - id: bouton_mqtt
    trigger: mqtt
    options:
      topic: zigbee2mqtt/Inter TV Chambre (IKEA RODRET)
  - id: allumage_auto
    trigger: time
    at: '21:00:00'
    enabled: false
  - id: extinction_conso
    trigger: numeric_state
    entity_id: sensor.prise_tv_chambre_nous_power
    below: 20
    for:
      minutes: 2
  actions:
  - choose:
    - alias: 'ALLUMAGE : Bouton ON ou 21h00'
      conditions:
      - or:
        - condition: template
          value_template: '{{ trigger.id == ''bouton_mqtt'' and trigger.payload_json.action
            == ''on'' }}'
        - condition: trigger
          id: allumage_auto
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.hue_smart_eco_tv_chambre
      - action: switch.turn_on
        target:
          entity_id: switch.prise_tv_chambre_nous
    - alias: 'EXTINCTION AMBIANCE : Bouton OFF ou Veille (< 20W)'
      conditions:
      - or:
        - condition: template
          value_template: '{{ trigger.id == ''bouton_mqtt'' and trigger.payload_json.action
            == ''off'' }}'
        - condition: trigger
          id: extinction_conso
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.hue_smart_eco_tv_chambre
      - action: notify.mobile_app_eric
        data:
          title: Veille détectée
          message: Prise TV [OFF]
          data:
            icon: mdi:eye-outline
            tag: notif_tv_chambre
  mode: parallel
- id: '1775331166275'
  alias: 'D - SALLE DE BAIN : WATCHDOG SÉCURITÉ RADIATEUR'
  description: Reset physique si T > 25°C, uniquement si la prise est alimentée
  triggers:
  - alias: 'TRIGGER : CHANGEMENT TEMPÉRATURE SDB'
    trigger: state
    entity_id: sensor.th_salle_de_bain_temperature
  conditions:
  - alias: 'CONDITION : VÉRIFICATION ALIMENTATION PRISE'
    condition: state
    entity_id: switch.prise_soufflant_salle_de_bain_nous
    state: 'on'
  - alias: 'CONDITION : VÉRIFICATION ÉTAT INTERNE'
    condition: state
    entity_id: input_boolean.inter_soufflant_salle_de_bain
    state: 'on'
  - alias: 'CONDITION : TEMPÉRATURE > 25°C'
    condition: numeric_state
    entity_id: sensor.th_salle_de_bain_temperature
    above: 25
  - alias: 'CONDITION : DÉRIVE THERMIQUE RAPIDE (+0.5°C)'
    condition: template
    value_template: "{{ (states('sensor.th_salle_de_bain_temperature') | float) >=
      \n   (trigger.from_state.state | float + 0.5) }}\n"
  actions:
  - alias: 'ACTION : ATTENTE STABILISATION (1 MIN)'
    delay:
      hours: 0
      minutes: 1
      seconds: 0
      milliseconds: 0
  - alias: 'ACTION : ENVOI COMMANDE IR RESET'
    action: remote.send_command
    target:
      entity_id: remote.soufflant_sdb
    data:
      command: on_off
      device: radiateur_sdb
      num_repeats: 1
  - alias: 'ETAT : PASSAGE DU BOOLEAN SUR OFF (SÉCURITÉ)'
    action: input_boolean.turn_off
    target:
      entity_id: input_boolean.inter_soufflant_salle_de_bain
  - alias: 'ACTION : ATTENTE AVANT COUPURE (1 MIN) SÉCURITÉ'
    delay: 00:01:00
  - alias: 'MATÉRIEL : COUPURE PHYSIQUE DE LA PRISE'
    action: switch.turn_off
    target:
      entity_id: switch.prise_soufflant_salle_de_bain_nous
  - alias: 'NOTIFIER : ALERTE MOBILE DÉRIVE THERMIQUE'
    action: notify.mobile_app_eric
    data:
      title: ⚠️ Watchdog SDB
      message: Dérive thermique détectée à {{ states('sensor.th_salle_de_bain_temperature')
        }}°C. Reset IR lancé.
  mode: single
- id: '1775331417577'
  alias: P3_Allumage Lumière Entrée
  description: 'Gestion de l''éclairage de l''entrée basée sur les transitions des
    groupes  de présence et la période de la journée.

    '
  triggers:
  - alias: SURVEILLANCE DU CHANGEMENT DE GROUPE DE PRÉSENCE
    trigger: state
    entity_id: sensor.groupe
  actions:
  - alias: CHOIX DE LA LOGIQUE SELON LA TRANSITION DÉTECTÉE
    choose:
    - alias: 'CAS 1 : ARRIVÉE INITIALE EN PÉRIODE DIURNE (G1 -> PRÉSENCE)'
      conditions:
      - alias: 'VÉRIFICATION : PASSAGE DE ABSENT À PRÉSENT'
        condition: template
        value_template: "{{ trigger.from_state.state == 'groupe_1' and \n   trigger.to_state.state
          in ['groupe_2', 'groupe_3', 'groupe_4'] }}"
      - alias: 'VÉRIFICATION : PÉRIODE DIURNE (SOLEIL LEVÉ)'
        condition: state
        entity_id: sun.sun
        state: above_horizon
      sequence:
      - alias: 'ACTION : ALLUMAGE DE LA LUMIÈRE ENTRÉE'
        action: light.turn_on
        target:
          entity_id: light.entree
    - alias: 'CAS 2 : RETOUR DE MAMOUR (TRANSITION G3 VERS G4)'
      conditions:
      - alias: 'VÉRIFICATION : PASSAGE DE ERIC SEUL À DUO'
        condition: template
        value_template: "{{ trigger.from_state.state == 'groupe_3' and \n   trigger.to_state.state
          == 'groupe_4' }}"
      sequence:
      - alias: 'ACTION : ALLUMAGE DE LA LUMIÈRE ENTRÉE'
        action: light.turn_on
        target:
          entity_id: light.entree
  mode: queued
- id: '1775331454560'
  alias: P3_BUREAU - BOUTON RODRET TOGGLE BLANCHES
  description: Alterne l'allumage des 2 lampes blanches via MQTT (Mode Fainéant)
  triggers:
  - alias: RÉCEPTION MESSAGE MQTT BOUTON RODRET
    trigger: mqtt
    topic: zigbee2mqtt/Inter Bureau (RODRET)
  actions:
  - alias: DÉCISION SELON LE PAYLOAD MQTT (ON OU OFF)
    choose:
    - alias: BOUTON ON OU OFF PRESSÉ -> LOGIQUE TOGGLE
      conditions:
      - alias: VÉRIFICATION ACTION DANS LE JSON
        condition: template
        value_template: '{{ trigger.payload_json.action in [''on'', ''off''] }}'
      sequence:
      - alias: LOGIQUE DE BASCULEMENT (TOGGLE)
        choose:
        - alias: SI LUMIÈRE PRÉSENTE -> EXTINCTION
          conditions:
          - alias: VÉRIFICATION SI UNE LAMPE EST ON
            condition: or
            conditions:
            - condition: state
              entity_id: light.hue_white_lamp_bureau_1
              state: 'on'
            - condition: state
              entity_id: light.hue_white_lamp_bureau_2
              state: 'on'
          sequence:
          - alias: EXTINCTION DES 2 LAMPES BLANCHES
            action: light.turn_off
            target:
              entity_id:
              - light.hue_white_lamp_bureau_1
              - light.hue_white_lamp_bureau_2
        - alias: SI TOUT EST NOIR -> ALLUMAGE
          conditions:
          - alias: VÉRIFICATION SI TOUT EST OFF
            condition: state
            entity_id: light.hue_white_lamp_bureau_1
            state: 'off'
          - condition: state
            entity_id: light.hue_white_lamp_bureau_2
            state: 'off'
          sequence:
          - alias: ALLUMAGE DES 2 LAMPES BLANCHES
            action: light.turn_on
            target:
              entity_id:
              - light.hue_white_lamp_bureau_1
              - light.hue_white_lamp_bureau_2
  - alias: FORÇAGE MISE À JOUR DU SENSOR D'ÉTAT
    action: homeassistant.update_entity
    target:
      entity_id: sensor.bureau_etat
  mode: restart
- id: '1775331482668'
  alias: BUREAU - WATCHDOG SYNCHRONISATION LAMPES BLANCHES
  description: Assure que les deux lampes de bureau (1 et 2) sont synchronisées si
    l'une s'allume
  triggers:
  - alias: DÉTECTION ALLUMAGE LAMPE BUREAU 1
    trigger: state
    entity_id: light.hue_white_lamp_bureau_1
    to: 'on'
    for: 00:00:05
  - alias: DÉTECTION ALLUMAGE LAMPE BUREAU 2
    trigger: state
    entity_id: light.hue_white_lamp_bureau_2
    to: 'on'
    for: 00:00:05
  conditions:
  - alias: VÉRIFICATION SI UNE DES DEUX LAMPES RESTE ÉTEINTE
    condition: or
    conditions:
    - condition: state
      entity_id: light.hue_white_lamp_bureau_1
      state: 'off'
    - condition: state
      entity_id: light.hue_white_lamp_bureau_2
      state: 'off'
  actions:
  - alias: FORÇAGE ALLUMAGE DES DEUX LAMPES
    action: light.turn_on
    target:
      entity_id:
      - light.hue_white_lamp_bureau_1
      - light.hue_white_lamp_bureau_2
  - alias: MISE À JOUR FORCÉE DE L'ÉTAT DU BUREAU
    action: homeassistant.update_entity
    target:
      entity_id: sensor.bureau_etat
  mode: restart
- id: '1775331547996'
  alias: Bureau - Forcer Play ON si PC tourne
  description: Rallume les Hue Play si elles sont éteintes manuellement alors que
    la synchro PC est active
  triggers:
  - entity_id:
    - light.hue_play_1_pc_bureau
    - light.hue_play_2_pc_bureau
    - light.hue_play_3_pc_bureau
    to: 'off'
    trigger: state
  conditions:
  - condition: state
    entity_id: binary_sensor.moniteur_pc
    state: 'on'
  actions:
  - target:
      entity_id: '{{ trigger.entity_id }}'
    action: light.turn_on
  mode: parallel
- id: '1775331623943'
  alias: BUREAU_ACTIVATION_ECRAN_SYNCHRO
  description: Synchronise l'état de l'écran avec l'activité du PC bureau.
  triggers:
  - alias: 'DÉCLENCHEMENT : PC BUREAU ALLUMÉ'
    trigger: state
    entity_id: binary_sensor.moniteur_pc
    to: 'on'
    id: pc_on
  - alias: 'DÉCLENCHEMENT : PC BUREAU ÉTEINT'
    trigger: state
    entity_id: binary_sensor.moniteur_pc
    to: 'off'
    for: 00:02:00
    id: pc_off
  conditions: []
  actions:
  - alias: 'ACTION : SYNCHRONISATION ALIMENTATION ÉCRAN'
    choose:
    - alias: 'CAS : PC ON -> ALLUMER ÉCRAN'
      conditions:
      - condition: trigger
        id: pc_on
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.ecran_p_c_3_play_hue
    - alias: 'CAS : PC OFF -> ÉTEINDRE ÉCRAN'
      conditions:
      - condition: trigger
        id: pc_off
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.ecran_p_c_3_play_hue
  mode: restart
- id: '1775386133385'
  alias: Système - Watchdog Piles (HUE/IKEA/SONOFF)
  description: Vérification 3x/jour basée sur les groupes de la vue synthétique (seuil
    11%)
  triggers:
  - trigger: time
    at: 08:00:00
  - trigger: time
    at: '14:00:00'
  - trigger: time
    at: '20:00:00'
  actions:
  - variables:
      low_batt: "{% set sensors = expand('group.hue_devices', 'group.ikea_devices',
        'group.sonoff_devices') %} {% set ns = namespace(ids=[]) %} {% for s in sensors
        %}\n  {% if s.state | is_number and s.state | int <= 11 %}\n    {% set ns.ids
        = ns.ids + [s.entity_id] %}\n  {% endif %}\n{% endfor %} {{ ns.ids }}\n"
  - if:
    - condition: template
      value_template: '{{ low_batt | count > 0 }}'
    then:
    - action: notify.mobile_app_eric
      data:
        title: "\U0001FAAB Alerte Pile Faible (<10%)"
        message: "{% for id in low_batt %}\n  - {{ state_attr(id, 'friendly_name')
          }} : {{ states(id) }}%\n{% endfor %}\n"
        data:
          tag: alert-batterie
          color: '#f44336'
  mode: single
- id: '1775386803313'
  alias: Z2M last_seen
  description: Surveillance des capteurs Zigbee injoignables (plus de 8h ou indisponibles)
  triggers:
  - trigger: time
    at: 06:00:00
  - trigger: time_pattern
    minutes: /15
  conditions:
  - condition: template
    value_template: '{{ sensors != '''' and (day | int == 0 or day | int == now().isoweekday())
      }}'
  actions:
  - action: notify.mobile_app_eric
    data:
      title: ⚠️ Problème capteur Zigbee
      message: 'Des capteurs Zigbee ne répondent plus : {{ sensors }}'
  variables:
    day: 0
    hours: 8
    exclude:
      entity_id: []
    sensors: "{% set result = namespace(sensors=[]) %} {% for state in states.sensor
      \n   | rejectattr('attributes.device_class', 'undefined') \n   | selectattr('attributes.device_class',
      '==', 'timestamp') %}\n  {% if 'last_seen' in state.entity_id and state.entity_id
      not in exclude.entity_id %}\n    {% set last_seen = states(state.entity_id)
      %}\n    {% if last_seen == 'unavailable' or last_seen == 'unknown' %}\n      {%
      set result.sensors = result.sensors + [state.name | replace(' last seen', '')
      ~ ' (Indisponible)'] %}\n    {% elif (as_timestamp(now()) - as_timestamp(last_seen))
      > (hours | int * 3600) %}\n      {% set result.sensors = result.sensors + [state.name
      | replace(' last seen', '') ~ ' (' ~ relative_time(strptime(last_seen, '%Y-%m-%dT%H:%M:%S%z'))
      ~ ')'] %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ result.sensors |
      join(', ') }}\n"
  mode: single
- id: '1775387556140'
  alias: '[P3-Salon] Bouton IKEA Inter Salon (4) — ON/OFF light.salon'
  description: 'Pilotage de light.salon via le bouton IKEA 4 touches Salon. Topic
    MQTT : zigbee2mqtt/Inter Salon (4) (IKEA)/action ON -> light.turn_on | OFF ->
    light.turn_off

    '
  triggers:
  - alias: TRIGGER MQTT INTER SALON (4) IKEA
    trigger: mqtt
    topic: zigbee2mqtt/Inter Salon (4) (IKEA)/action
  conditions: []
  actions:
  - alias: ACTION ON/OFF LIGHT.SALON
    choose:
    - alias: BOUTON ON
      conditions:
      - condition: template
        value_template: '{{ trigger.payload_json.action == ''on'' }}'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.salon
    - alias: BOUTON OFF
      conditions:
      - condition: template
        value_template: '{{ trigger.payload_json.action == ''off'' }}'
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.salon
  mode: restart
- id: '1775387618751'
  alias: '[P3-SALON] BOUTON IKEA SOMRIG — TOUT MESSAGE = ON/OFF'
  description: 'Pilotage simplifié : n''importe quel appui sur le bouton 1 (simple,
    double, long)  allume le salon. N''importe quel appui sur le bouton 2 éteint le
    salon.

    '
  triggers:
  - alias: 'DÉCLENCHEMENT : BOUTON 1 (CLIC SIMPLE)'
    trigger: mqtt
    topic: zigbee2mqtt/Inter (SOMRIG)/action
    payload: 1_short_release
    id: bouton_on
  - alias: 'DÉCLENCHEMENT : BOUTON 1 (DOUBLE CLIC)'
    trigger: mqtt
    topic: zigbee2mqtt/Inter (SOMRIG)/action
    payload: 1_double_press
    id: bouton_on
  - alias: 'DÉCLENCHEMENT : BOUTON 1 (APPUI LONG)'
    trigger: mqtt
    topic: zigbee2mqtt/Inter (SOMRIG)/action
    payload: 1_long_press
    id: bouton_on
  - alias: 'DÉCLENCHEMENT : BOUTON 2 (CLIC SIMPLE)'
    trigger: mqtt
    topic: zigbee2mqtt/Inter (SOMRIG)/action
    payload: 2_short_release
    id: bouton_off
  - alias: 'DÉCLENCHEMENT : BOUTON 2 (DOUBLE CLIC)'
    trigger: mqtt
    topic: zigbee2mqtt/Inter (SOMRIG)/action
    payload: 2_double_press
    id: bouton_off
  - alias: 'DÉCLENCHEMENT : BOUTON 2 (APPUI LONG)'
    trigger: mqtt
    topic: zigbee2mqtt/Inter (SOMRIG)/action
    payload: 2_long_press
    id: bouton_off
  conditions: []
  actions:
  - alias: 'ACTION : ALLUMER OU ÉTEINDRE'
    choose:
    - alias: 'CAS : N''IMPORTE QUEL APPUI BOUTON 1 -> ALLUMER'
      conditions:
      - condition: trigger
        id: bouton_on
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.salon
    - alias: 'CAS : N''IMPORTE QUEL APPUI BOUTON 2 -> ÉTEINDRE'
      conditions:
      - condition: trigger
        id: bouton_off
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.salon
  mode: restart
- id: '1775997999740'
  alias: AUTO. ENERGIE. Basculement Tarif HC/HP — Genelec Appart
  description: 'Bascule le tarif des 4 UM Genelec Appart HP/HC aux heures de transition
    : HC : 01h00 et 13h00 / HP : 07h30 et 14h30.'
  triggers:
  - alias: 'DÉCLENCHEUR : HC DÉBUT 01H00'
    trigger: time
    at: 01:00:00
    id: hc_1
  - alias: 'DÉCLENCHEUR : HP DÉBUT 07H30'
    trigger: time
    at: 07:30:00
    id: hp_1
  - alias: 'DÉCLENCHEUR : HC DÉBUT 13H00'
    trigger: time
    at: '13:00:00'
    id: hc_2
  - alias: 'DÉCLENCHEUR : HP DÉBUT 14H30'
    trigger: time
    at: '14:30:00'
    id: hp_2
  conditions: []
  actions:
  - choose:
    - alias: 'ACTION : PASSAGE EN HEURES CREUSES'
      conditions:
      - condition: trigger
        id:
        - hc_1
        - hc_2
      sequence:
      - action: select.select_option
        target:
          entity_id:
          - select.genelec_appart_hphc_quotidien_um
          - select.genelec_appart_hphc_hebdomadaire_um
          - select.genelec_appart_hphc_mensuel_um
          - select.genelec_appart_hphc_annuel_um
        data:
          option: HC
    - alias: 'ACTION : PASSAGE EN HEURES PLEINES'
      conditions:
      - condition: trigger
        id:
        - hp_1
        - hp_2
      sequence:
      - action: select.select_option
        target:
          entity_id:
          - select.genelec_appart_hphc_quotidien_um
          - select.genelec_appart_hphc_hebdomadaire_um
          - select.genelec_appart_hphc_mensuel_um
          - select.genelec_appart_hphc_annuel_um
        data:
          option: HP
  mode: single
- id: '1776624322644'
  alias: VEILLE GITHUB — Nouvelle release détectée
  description: 'Surveille les flux Feedreader GitHub (HA core + HACS + cartes HACS).
    Envoie une notif Telegram à chaque nouvelle release. Double notif si le titre
    contient un breaking change / deprecation.

    '
  triggers:
  - event_type: feedreader_entry_added
    alias: DÉCLENCHEUR — Nouvelle entrée Feedreader
    trigger: event
  conditions: []
  actions:
  - alias: VARIABLES — Extraire titre + lien + source
    variables:
      titre: '{{ trigger.event.data.title | default(''Sans titre'') }}'
      lien: '{{ trigger.event.data.link | default('''') }}'
      source: '{{ trigger.event.data.feed_url | default('''') }}'
      est_breaking: '{{ (''breaking'' in titre | lower) or (''deprecated'' in titre
        | lower) or (''removed'' in titre | lower) or (''breaking'' in (trigger.event.data.summary
        | default('''') | lower)) or (''deprecated'' in (trigger.event.data.summary
        | default('''') | lower)) }}

        '
  - alias: ACTION — Notif standard (toutes releases)
    data:
      title: RELEASE GITHUB
      message: '{{ source.split(''github.com/'')[1].split(''/releases'')[0] if ''github.com''
        in source else source }} >> {{ titre[:80] }} Lien: {{ lien }}

        '
    action: notify.mobile_app_eric
  - alias: CONDITION — Breaking change détecté ?
    if:
    - condition: template
      value_template: '{{ est_breaking }}'
    then:
    - alias: ACTION — Notif alerte breaking change
      data:
        title: '! BREAKING CHANGE !'
        message: '[ATTENTION] {{ source.split(''github.com/'')[1].split(''/releases'')[0]
          if ''github.com'' in source else source }} >> {{ titre[:80] }} Verifie avant
          de mettre a jour ! Lien: {{ lien }}

          '
      action: notify.mobile_app_eric
  mode: queued
  max: 10
- id: '1776969396633'
  alias: Log Écart Linky vs Nodon
  description: Enregistre l'écart à 23:59 pile
  triggers:
  - trigger: time
    at: '23:59:00'
  conditions: []
  actions:
  - action: notify.send_message
    target:
      entity_id: notify.log_ecart_energie
    data:
      message: '{% set l   = states(''sensor.linky_25481620821301_consumption_history'')
        | float(0) %} {% set n1  = state_attr(''sensor.genelec_appart_quotidien_kwh_um'',
        ''last_period'') | float(0) %} {% set n2  = state_attr(''sensor.genelec_appart_quotidien_um'',
        ''last_period'') | float(0) %} {% set d1  = (l - n1) | round(3) %} {% set
        d2  = (l - n2) | round(3) %} {% set p1  = ((d1 / l * 100) | round(1)) if l
        > 0 else 0 %} {% set p2  = ((d2 / l * 100) | round(1)) if l > 0 else 0 %}
        {% set t   = now().strftime(''%d/%m %H:%M'') %} {% set lc  = states.sensor.linky_quotidien
        %} {% set age = ((now() - lc.last_changed).total_seconds() / 3600) | round(1)
        if lc else ''N/A'' %} {{t}} | Linky: {{l}} kWh (age: {{age}}h) Riemann: {{n1}}
        kWh | Ecart: {{d1}} ({{p1}}%) Direct:  {{n2}} kWh | Ecart: {{d2}} ({{p2}}%)

        '

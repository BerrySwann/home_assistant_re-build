    - alias: 'CAS MODÉRÉ : > 21°C -> 1000W'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_salle_de_bain_temperature
        above: 20.9
      sequence:
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb_rm4_mini
        data:
          command: 1000w
          device: radiateur_sdb
      - action: input_select.select_option
        target:

- id: '1773253636237'
  alias: Système - Économie Énergie VS Code
  description: Coupe VS Code si son CPU dépasse 10% ou s'il est inactif, avec confirmation
    (H24).
  triggers:
  - entity_id: sensor.studio_code_server_pourcentage_du_processeur
    above: 10
    for:
      minutes: 10
    id: high_cpu
    trigger: numeric_state
  - entity_id: sensor.studio_code_server_pourcentage_du_processeur
    below: 0.8
    for:
      minutes: 15
    id: inactive
    trigger: numeric_state
  conditions:
  - condition: state
    entity_id: binary_sensor.studio_code_server_en_cours_d_execution
    state: 'on'
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: high_cpu
      sequence:
      - data:
          title: ALERTE VSC CPU
          message: CPU VSC >10% dps 10m. Le couper pour economiser ?
          data:
            actions:
            - action: STOP_VSC
              title: Oui, couper
            - action: KEEP_VSC
              title: Non, ignorer
        action: notify.mobile_app_poco_x7_pro_eric
    - conditions:
      - condition: trigger
        id: inactive
      sequence:
      - data:
          title: ALERTE VSC INAC
          message: VSC inactif dps 15m. Le couper pour economiser ?
          data:
            actions:
            - action: STOP_VSC
              title: Oui, couper
            - action: KEEP_VSC
              title: Non, ignorer
        action: notify.mobile_app_poco_x7_pro_eric
  - wait_for_trigger:
    - event_type: mobile_app_notification_action
      event_data:
        action: STOP_VSC
      trigger: event
    - event_type: mobile_app_notification_action
      event_data:
        action: KEEP_VSC
      trigger: event
    timeout: 00:05:00
    continue_on_timeout: true
  - choose:
    - alias: 'ACTION : STOP (OU TIMEOUT)'
      conditions:
      - condition: template
        value_template: '{{ wait.trigger == none or wait.trigger.event.data.action
          == ''STOP_VSC'' }}'
      sequence:
      - data:
          addon: a0d7b954_vscode
        action: hassio.addon_stop
      - data:
          title: VSC ARRETE
          message: Arret auto VSC OK. (Economie energie).
        action: notify.mobile_app_poco_x7_pro_eric
    - alias: 'ACTION : KEEP'
      conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == ''KEEP_VSC'' }}'
      sequence:
      - stop: L'utilisateur code encore, on laisse tourner.
  mode: single
- id: '1774167313491'
  alias: Raspberry CPU Fan PWM 6 States
  description: Règle la vitesse du ventilateur du Raspberry en fonction de la température
    du CPU
  triggers:
  - event: start
    id: HomeAssistant_Start
    trigger: homeassistant
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 30
    id: above_30
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 40
    id: above_40
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 50
    id: above_50
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 60
    id: above_60
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    above: 70
    id: above_70
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 30
    id: below_30
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 40
    id: below_40
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 50
    id: below_50
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 60
    id: below_60
    trigger: numeric_state
  - entity_id: sensor.system_monitor_temperature_du_processeur
    below: 70
    id: below_70
    trigger: numeric_state
  conditions: []
  actions:
  - alias: Régler la vitesse du ventilateur de l'unité centrale au démarrage
    if:
    - condition: trigger
      id: HomeAssistant_Start
    then:
    - data:
        percentage: 100
      target:
        entity_id: fan.rpi_cooling_fan
      action: fan.turn_on
  - alias: Régler la vitesse du ventilateur en fonction de la température
    if:
    - condition: numeric_state
      entity_id: sensor.system_monitor_temperature_du_processeur
      below: 30
    then:
    - data:
        percentage: 30
      target:
        entity_id: fan.rpi_cooling_fan
      action: fan.set_percentage
    else:
    - if:
      - condition: numeric_state
        entity_id: sensor.system_monitor_temperature_du_processeur
        below: 40
      then:
      - data:
          percentage: 40
        target:
          entity_id: fan.rpi_cooling_fan
        action: fan.set_percentage
      else:
      - if:
        - condition: numeric_state
          entity_id: sensor.system_monitor_temperature_du_processeur
          below: 50
        then:
        - data:
            percentage: 50
          target:
            entity_id: fan.rpi_cooling_fan
          action: fan.set_percentage
        else:
        - if:
          - condition: numeric_state
            entity_id: sensor.system_monitor_temperature_du_processeur
            below: 60
          then:
          - data:
              percentage: 65
            target:
              entity_id: fan.rpi_cooling_fan
            action: fan.set_percentage
          else:
          - if:
            - condition: numeric_state
              entity_id: sensor.system_monitor_temperature_du_processeur
              below: 70
            then:
            - data:
                percentage: 85
              target:
                entity_id: fan.rpi_cooling_fan
              action: fan.set_percentage
            else:
            - data:
                percentage: 100
              target:
                entity_id: fan.rpi_cooling_fan
              action: fan.set_percentage
  mode: single
- id: '1774183767864'
  alias: Bouton IKEA RODRET - Soufflant SdB Gestion ON/OFF (JSON)
  description: Pilotage du chauffage SDB via le bouton RODRET (MQTT)
  triggers:
  - trigger: mqtt
    options:
      topic: zigbee2mqtt/Inter Radiateur Salle de Bain (IKEA RODRET)
  actions:
  - choose:
    - alias: Bouton ON
      conditions:
      - condition: template
        value_template: '{{ trigger.payload_json.action == ''on'' }}'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.inter_soufflant_salle_de_bain
        data: {}
    - alias: Bouton OFF
      conditions:
      - condition: template
        value_template: '{{ trigger.payload_json.action == ''off'' }}'
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.inter_soufflant_salle_de_bain
        data: {}
  mode: restart
- id: '1774452171317'
  alias: (I) (CLIM DEBUG) Force Mode Correct & Sécurité
  description: 'WATCHDOG :   1. FORCE OFF si tentative d''allumage alors que Prise
    OFF ou Arrêt Sécurisé en cours.  2. FORCE SAISON si une clim est allumée mais
    dans le mauvais mode (ex: Cool au lieu de Heat).

    '
  triggers:
  - trigger: state
    entity_id:
    - climate.clim_salon_rm4_mini
    - climate.clim_bureau_rm4_mini
    - climate.clim_chambre_rm4_mini
    to:
  - trigger: state
    entity_id: sensor.mode_ete_hiver
    to:
  conditions: []
  actions:
  - delay: 00:00:02
  - alias: CALCUL DES LISTES D'ERREURS
    variables:
      mode_saison: '{{ states(''sensor.mode_ete_hiver'') }}'
      force_off_list: "{% set liste = [] %} {# SALON #} {% if states('climate.clim_salon_rm4_mini')
        != 'off' \n      and (is_state('switch.clim_salon_nous', 'off') or is_state('input_boolean.clim_salon_arret_securise_en_cours',
        'on')) %}\n  {% set liste = liste + ['climate.clim_salon_rm4_mini'] %}\n{%
        endif %} {# BUREAU #} {% if states('climate.clim_bureau_rm4_mini') != 'off'
        \n      and (is_state('switch.clim_bureau_nous', 'off') or is_state('input_boolean.clim_bureau_arret_securise_en_cours',
        'on')) %}\n  {% set liste = liste + ['climate.clim_bureau_rm4_mini'] %}\n{%
        endif %} {# CHAMBRE #} {% if states('climate.clim_chambre_rm4_mini') != 'off'
        \n      and (is_state('switch.clim_chambre_nous', 'off') or is_state('input_boolean.clim_chambre_arret_securise_en_cours',
        'on')) %}\n  {% set liste = liste + ['climate.clim_chambre_rm4_mini'] %}\n{%
        endif %} {{ liste }}\n"
      force_mode_list: "{% set liste = [] %} {# SALON #} {% if states('climate.clim_salon_rm4_mini')
        not in ['off', 'unavailable', 'unknown', mode_saison] \n      and is_state('switch.clim_salon_nous',
        'on') \n      and is_state('input_boolean.clim_salon_arret_securise_en_cours',
        'off') %}\n  {% set liste = liste + ['climate.clim_salon_rm4_mini'] %}\n{%
        endif %} {# BUREAU #} {% if states('climate.clim_bureau_rm4_mini') not in
        ['off', 'unavailable', 'unknown', mode_saison] \n      and is_state('switch.clim_bureau_nous',
        'on') \n      and is_state('input_boolean.clim_bureau_arret_securise_en_cours',
        'off') %}\n  {% set liste = liste + ['climate.clim_bureau_rm4_mini'] %}\n{%
        endif %} {# CHAMBRE #} {% if states('climate.clim_chambre_rm4_mini') not in
        ['off', 'unavailable', 'unknown', mode_saison] \n      and is_state('switch.clim_chambre_nous',
        'on') \n      and is_state('input_boolean.clim_chambre_arret_securise_en_cours',
        'off') %}\n  {% set liste = liste + ['climate.clim_chambre_rm4_mini'] %}\n{%
        endif %} {{ liste }}\n"
  - if:
    - condition: template
      value_template: '{{ force_off_list | length > 0 }}'
    then:
    - alias: 'NOTIF : INTERDICTION DÉMARRAGE'
      action: notify.mobile_app_poco_x7_pro_eric
      data:
        title: SÉCURITÉ CLIM
        message: "Tentative de démarrage interdite (Prise coupée ou Arrêt en cours).
          Retour forcé à OFF pour : {% for c in force_off_list %}\n  - {{ state_attr(c,
          'friendly_name') }}\n{% endfor %}\n"
    - alias: 'ACTION : FORCER OFF'
      action: climate.set_hvac_mode
      target:
        entity_id: '{{ force_off_list }}'
      data:
        hvac_mode: 'off'
  - if:
    - condition: template
      value_template: '{{ force_mode_list | length > 0 }}'
    then:
    - alias: 'NOTIF : CORRECTION MODE'
      action: notify.mobile_app_poco_x7_pro_eric
      data:
        title: "\U0001F527 CORRECTION MODE"
        message: "Mauvais mode détecté. Correction vers {{ mode_saison | upper }}
          pour : {% for c in force_mode_list %}\n  - {{ state_attr(c, 'friendly_name')
          }}\n{% endfor %}\n"
    - alias: 'ACTION : FORCER MODE SAISON'
      action: climate.set_hvac_mode
      target:
        entity_id: '{{ force_mode_list }}'
      data:
        hvac_mode: '{{ mode_saison }}'
  mode: single
- id: '1774803407558'
  alias: A - 2026/02/01 - SALLE DE BAIN - GESTION INTELLIGENTE SOUFFLANT
  description: 'Cycle complet : Démarrage, Régulation, et Auto-off 60 min avec refroidissement'
  triggers:
  - alias: CHANGEMENT ÉTAT INTERRUPTEUR
    trigger: state
    entity_id: switch.inter_soufflant_salle_de_bain
    id: inter_change
  - alias: TEMPÉRATURE > 23°C
    trigger: numeric_state
    entity_id: sensor.th_salle_de_bain_temperature
    above: 22.9
    for: 00:01:00
    id: temp_high
  - alias: TEMPÉRATURE < 22°C
    trigger: numeric_state
    entity_id: sensor.th_salle_de_bain_temperature
    below: 21.9
    id: temp_low
  - alias: SÉCURITÉ AUTO-OFF 60 MIN
    trigger: state
    entity_id: switch.inter_soufflant_salle_de_bain
    to: 'on'
    for: 01:00:00
    id: auto_off
  actions:
  - alias: ROUTAGE DES ACTIONS PAR TRIGGER
    choose:
    - alias: CAS ALLUMAGE INTER
      conditions:
      - condition: trigger
        id: inter_change
      - condition: state
        entity_id: switch.inter_soufflant_salle_de_bain
        state: 'on'
      - condition: numeric_state
        entity_id: sensor.th_salle_de_bain_temperature
        below: 25
      sequence:
      - action: switch.turn_on
        target:
          entity_id: switch.prise_soufflant_salle_de_bain_nous
      - delay: 00:00:01
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb_rm4_mini
        data:
          command: on_off
          device: radiateur_sdb
      - delay: '00:00:00.8'
      - choose:
        - alias: DÉMARRAGE 2000W (< 21°C)
          conditions:
          - condition: numeric_state
            entity_id: sensor.th_salle_de_bain_temperature
            below: 21
          sequence:
          - action: remote.send_command
            target:
              entity_id: remote.soufflant_sdb_rm4_mini
            data:
              command: 1000w
              device: radiateur_sdb
              num_repeats: 2
              delay_secs: 0.8
          - action: input_select.select_option
            target:
              entity_id: input_select.etat_resistance_soufflant_sdb
            data:
              option: 2000W
        default:
        - action: remote.send_command
          target:
            entity_id: remote.soufflant_sdb_rm4_mini
          data:
            command: 1000w
            device: radiateur_sdb
        - action: input_select.select_option
          target:
            entity_id: input_select.etat_resistance_soufflant_sdb
          data:
            option: 1000W
      - delay: '00:00:00.8'
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb_rm4_mini
        data:
          command: swing
          device: radiateur_sdb
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.soufflant_salle_de_bain
        data:
          hvac_mode: heat
    - alias: CAS TEMPÉRATURE > 23°C
      conditions:
      - condition: trigger
        id: temp_high
      - condition: state
        entity_id: switch.inter_soufflant_salle_de_bain
        state: 'on'
      - condition: not
        conditions:
        - condition: state
          entity_id: input_select.etat_resistance_soufflant_sdb
          state: 0W
      sequence:
      - variables:
          current_power: '{{ states(''input_select.etat_resistance_soufflant_sdb'')
            }}'
          ir_repeats: '{{ 2 if current_power == ''1000W'' else 1 }}'
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb_rm4_mini
        data:
          command: 1000w
          device: radiateur_sdb
          num_repeats: '{{ ir_repeats }}'
          delay_secs: 0.8
      - action: input_select.select_option
        target:
          entity_id: input_select.etat_resistance_soufflant_sdb
        data:
          option: 0W
    - alias: CAS TEMPÉRATURE < 22°C
      conditions:
      - condition: trigger
        id: temp_low
      - condition: state
        entity_id: switch.inter_soufflant_salle_de_bain
        state: 'on'
      - condition: state
        entity_id: input_select.etat_resistance_soufflant_sdb
        state: 0W
      sequence:
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb_rm4_mini
        data:
          command: 1000w
          device: radiateur_sdb
      - action: input_select.select_option
        target:
          entity_id: input_select.etat_resistance_soufflant_sdb
        data:
          option: 1000W
    - alias: CAS EXTINCTION (MANUELLE OU AUTO)
      conditions:
      - or:
        - and:
          - condition: trigger
            id: inter_change
          - condition: state
            entity_id: switch.inter_soufflant_salle_de_bain
            state: 'off'
        - condition: trigger
          id: auto_off
      sequence:
      - if:
        - condition: trigger
          id: auto_off
        then:
        - action: switch.turn_off
          target:
            entity_id: switch.inter_soufflant_salle_de_bain
      - action: remote.send_command
        target:
          entity_id: remote.soufflant_sdb_rm4_mini
        data:
          command: on_off
          device: radiateur_sdb
      - delay: 00:01:00
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.soufflant_salle_de_bain
        data:
          hvac_mode: 'off'
      - action: switch.turn_off
        target:
          entity_id: switch.prise_soufflant_salle_de_bain_nous
      - action: input_select.select_option
        target:
          entity_id: input_select.etat_resistance_soufflant_sdb
        data:
          option: 0W
  mode: queued
  max: 3
- id: '1774803634186'
  alias: E - Minuterie Sèche Serviettes Salle de Bain (Timer Absolu 2h)
  description: Timer de 1h après détection de chauffe. Sécurité anti-redémarrage incluse.
  triggers:
  - alias: 'START : DÉTECTION PUISSANCE > 50W'
    trigger: numeric_state
    entity_id: sensor.prise_seche_serviette_salle_de_bain_nous_power
    above: 50
  conditions: []
  actions:
  - alias: 'CHRONO : DÉCOMPTE DE 2 HEURE'
    delay: 02:00:00

# --- diag_enregistrement_journalier.yaml ---
- alias: DIAG - ENREGISTREMENT JOURNALIER (6 POSTES + DUT)
  description: Log toutes les 15 min la consommation des 6 postes, la température extérieure et le DUT chauffage (Ordre S/R/B/C) dans un fichier.
  triggers:
  - alias: 'DÉCLENCHEUR : TOUTES LES 15 MINUTES'
    trigger: time_pattern
    minutes: /15
  conditions: []
  actions:
  - alias: 'ACTION : ENREGISTREMENT DANS LE FICHIER'
    action: notify.send_message
    target:
      entity_id: notify.file
    data:
      message: '{% set p1 = states(''sensor.diag_poste_1_hygiene_quotidien'') | float(0) | round(2) %}   {% set p2 = states(''sensor.diag_poste_2_cuisson_quotidien'')  | float(0) | round(2) %} {% set p3 = states(''sensor.diag_poste_3_froid_quotidien'') | float(0) | round(2) %} {% set p4 = states(''sensor.diag_poste_4_chauffage_quotidien'') | float(0) | round(2) %} {% set agv_clim = states(''sensor.clim_rad_total_avg_watts_daily'') | float(0) | round(2) %} {% set p5 = states(''sensor.diag_poste_5_multimedia_quotidien'') | float(0) | round(2) %} {% set p6 = states(''sensor.diag_poste_6_lumiere_quotidien'') | float(0) | round(2) %} {% set p7 = states(''sensor.diag_poste_7_autres_quotidien'') | float(0) | round(2) %} {% set ext = states(''sensor.th_balcon_nord_temperature'') | float(0) %} {% set int = states(''sensor.temperature_moyenne_interieure'') | float(0) %} {% set dut_s = states(''sensor.dut_clim_salon'') | float(0) | round(1) %} {% set dut_r = states(''sensor.dut_radiateur_cuisine'') |
        float(0) | round(1) %}  {% set dut_b = states(''sensor.dut_clim_bureau'') | float(0) | round(1) %} {% set dut_c = states(''sensor.dut_clim_chambre'') | float(0) | round(1) %} {% set t = now().strftime(''%d/%m %H:%M'') %} {{t}} | Hyg:{{p1}} | Cuis:{{p2}} | Froid:{{p3}} | Chauff:{{p4}} | Avg 4:{{agv_clim}} | Multi:{{p5}} | Lum:{{p6}} | Autres:{{p7}} |T̄i:{{int}}°C | Ext:{{ext}}°C | DUT S/R/B/C:{{dut_s}}/{{dut_r}}/{{dut_b}}/{{dut_c}} %}

        '
  mode: single

# --- economie_energie_vscode.yaml ---
- alias: Système - Économie Énergie VS Code
  description: Coupe VS Code si le CPU dépasse 10% ou s'il est inactif, avec confirmation (H24).
  triggers:
  - trigger: numeric_state
    entity_id: sensor.system_monitor_utilisation_du_processeur
    above: 10
    for:
      minutes: 10
  - trigger: numeric_state
    entity_id: sensor.studio_code_server_cpu_percent
    below: 0.8
    for:
      minutes: 15
  conditions:
  - condition: state
    entity_id: binary_sensor.studio_code_server_running
    state: 'on'
  actions:
  - action: notify.mobile_app_poco_x7_pro_eric
    data:
      title: 🔋 Alerte Énergie - Mini-PC
      message: 'Il est {{ now().strftime(''%H:%M'') }}. Le CPU global est à {{ states(''sensor.system_monitor_utilisation_du_processeur'') }}%. On coupe VS Code pour économiser ?

        '
      data:
        actions:
        - action: STOP_VSC
          title: Oui, couper
        - action: KEEP_VSC
          title: Non, je travaille encore
  - wait_for_trigger:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: STOP_VSC
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: KEEP_VSC
    timeout: 00:05:00
    continue_on_timeout: true
  - choose:
    - alias: 'Action : STOP (ou timeout)'
      conditions:
      - condition: template
        value_template: '{{ wait.trigger == none or wait.trigger.event.data.action == ''STOP_VSC'' }}'
      sequence:
      - action: hassio.addon_stop
        data:
          addon: a0d7b954_vscode
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: VS Code éteint automatiquement (Économie d'énergie).
    - alias: 'Action : KEEP'
      conditions:
      - condition: template
        value_template: '{{ wait.trigger.event.data.action == ''KEEP_VSC'' }}'
      sequence:
      - stop: L'utilisateur code encore, on laisse tourner.
  mode: single

# --- update_texte_temps_ecoule.yaml ---
- alias: Mettre à jour le texte du temps écoulé
  description: Met à jour le texte du temps écoulé depuis le dernier impact de foudre toutes les minutes.
  triggers:
  - entity_id: sensor.blitzortung_lightning_counter
    trigger: state
  - trigger: time_pattern
    seconds: /30
  actions:
  - target:
      entity_id: input_text.dernier_impact_de_foudre_temps_ecoule
    data:
      value: "{% set last_lightning = states('input_datetime.dernier_eclair') %} {% if last_lightning not in ['unknown', 'unavailable', 'none', ''] %}\n  {% set last_lightning_ts = as_timestamp(last_lightning) %}\n  {% set now = as_timestamp(now()) %}\n  {% set time_since_last = now - last_lightning_ts %}\n  {% set minutes = ((time_since_last % 3600) // 60) | int %}\n  {% set hours = ((time_since_last // 3600) % 24) | int %}\n  {% set days = (time_since_last // 86400) | int %}\n  {% if days > 0 %}\n    Dernier impact de foudre il y a {{ days }} jours, {{ hours }} heures et {{ minutes }} minutes\n  {% elif hours > 0 %}\n    Dernier impact de foudre il y a {{ hours }} heures et {{ minutes }} minutes\n  {% else %}\n    Dernier impact de foudre il y a {{ minutes }} minutes\n  {% endif %}\n{% else %}\n  Dernier impact de foudre : Inconnu\n{% endif %}"
    action: input_text.set_value
  mode: single

# --- watchdog_piles.yaml ---
- alias: Système - Watchdog Piles (HUE/IKEA/SONOFF)
  description: Vérification 3x/jour basée sur les groupes de la vue synthétique (seuil 11%)
  triggers:
  - trigger: time
    at: 08:00:00
  - trigger: time
    at: '14:00:00'
  - trigger: time
    at: '20:00:00'
  actions:
  - variables:
      low_batt: "{% set sensors = expand('group.hue_devices', 'group.ikea_devices', 'group.sonoff_devices') %} {% set ns = namespace(ids=[]) %} {% for s in sensors %}\n  {% if s.state | is_number and s.state | int <= 11 %}\n    {% set ns.ids = ns.ids + [s.entity_id] %}\n  {% endif %}\n{% endfor %} {{ ns.ids }}\n"
  - if:
    - condition: template
      value_template: '{{ low_batt | count > 0 }}'
    then:
    - action: notify.mobile_app_poco_x7_pro_eric
      data:
        title: 🪫 Alerte Pile Faible (<10%)
        message: "{% for id in low_batt %}\n  - {{ state_attr(id, 'friendly_name') }} : {{ states(id) }}%\n{% endfor %}\n"
        data:
          tag: alert-batterie
          color: '#f44336'
  mode: single

# --- z2m_last_seen.yaml ---
- alias: Z2M last_seen
  description: Surveillance des capteurs Zigbee injoignables (plus de 8h ou indisponibles)
  triggers:
  - trigger: time
    at: 06:00:00
  - trigger: time_pattern
    minutes: /15
  conditions:
  - condition: template
    value_template: '{{ sensors != '''' and (day | int == 0 or day | int == now().isoweekday()) }}'
  actions:
  - action: notify.mobile_app_poco_x7_pro_eric
    data:
      title: ⚠️ Problème capteur Zigbee
      message: 'Des capteurs Zigbee ne répondent plus : {{ sensors }}'
  variables:
    day: 0
    hours: 8
    exclude:
      entity_id: []
    sensors: "{% set result = namespace(sensors=[]) %} {% for state in states.sensor \n   | rejectattr('attributes.device_class', 'undefined') \n   | selectattr('attributes.device_class', '==', 'timestamp') %}\n  {% if 'last_seen' in state.entity_id and state.entity_id not in exclude.entity_id %}\n    {% set last_seen = states(state.entity_id) %}\n    {% if last_seen == 'unavailable' or last_seen == 'unknown' %}\n      {% set result.sensors = result.sensors + [state.name | replace(' last seen', '') ~ ' (Indisponible)'] %}\n    {% elif (as_timestamp(now()) - as_timestamp(last_seen)) > (hours | int * 3600) %}\n      {% set result.sensors = result.sensors + [state.name | replace(' last seen', '') ~ ' (' ~ relative_time(strptime(last_seen, '%Y-%m-%dT%H:%M:%S%z')) ~ ')'] %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ result.sensors | join(', ') }}\n"
  mode: single


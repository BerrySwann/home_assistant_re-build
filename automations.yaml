- alias: (B - 0) 2026-01-11 AUTOMATISATION CLIM NUIT (21H00 <-> 07H30)
  description: Pilotage clims nuit avec boucle de relance et notification ciblée fenêtres
  triggers:
  - alias: 'SYSTEM : REDÉMARRAGE HOME ASSISTANT'
    trigger: homeassistant
    event: start
    id: ha_restart
  - alias: 'HORAIRE : DÉMARRAGE 21H00'
    trigger: time
    at: '21:00:00'
    id: force_run
  - alias: 'RÉSEAU : CHANGEMENT WIFI <-> CELLULAR'
    trigger: state
    entity_id:
    - sensor.mamour_network_type
    - sensor.eric_network_type
    id: force_run
  - alias: 'PRISES : CHANGEMENT ÉTAT ON/OFF'
    trigger: state
    entity_id:
    - switch.clim_salon_nous

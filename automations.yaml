- id: '1775244953345'
  alias: Gestion Optimisée du Store Bureau
  description: 'Priorité Sommeil et Anti-Reflet. Sécurité : Bloque tout mouvement
    si la fenêtre est ouverte.'
  triggers:
  - id: reveil
    trigger: time
    at: 07:00:00
  - trigger: state
    entity_id: sensor.th_balcon_nord_temperature
  - trigger: sun
    event: sunset
  - id: fenetre
    trigger: state
    entity_id: binary_sensor.contact_fenetre_bureau_sonoff_contact
    to: 'off'
  conditions:
  - alias: 'SÉCURITÉ : La fenêtre doit être FERMÉE pour bouger le store'
    condition: state
    entity_id: binary_sensor.contact_fenetre_bureau_sonoff_contact
    state: 'off'
  actions:
  - choose:
    - alias: 'SCÉNARIO A : Ouverture Travail (Printemps/Automne)'
      conditions:
      - condition: time
        after: 07:00:00
      - condition: sun
        before: sunset
      - condition: numeric_state
        entity_id: sensor.th_balcon_nord_temperature
        above: 18
        below: 25
      - condition: numeric_state
        entity_id: cover.store_bureau
        attribute: current_position
        below: 1
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.store_bureau
    - alias: 'SCÉNARIO B : Fermeture Chaleur (Été)'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_balcon_nord_temperature
        above: 25
      - condition: sun
        before: sunset
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.store_bureau
    - alias: 'SCÉNARIO C : Fermeture Nuit'
      conditions:
      - condition: sun
        after: sunset
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.store_bureau
  mode: single
- id: '1775244989013'
  alias: Gestion Simple du Store Salon (Matin/Soir)
  description: Ouvre le store au lever du soleil (pas avant 6h30) et le ferme au coucher.
  triggers:
  - id: ouverture
    trigger: time
    at: 06:30:00
  - id: ouverture
    trigger: sun
    event: sunrise
  - id: fermeture
    trigger: sun
    event: sunset
  conditions:
  - alias: 'SÉCURITÉ : La fenêtre doit être FERMÉE'
    condition: state
    entity_id: binary_sensor.contact_fenetre_salon_sonoff_contact
    state: 'off'
  actions:
  - choose:
    - alias: 'Matin : Ouverture si > 6h30 ET Soleil levé'
      conditions:
      - condition: trigger
        id: ouverture
      - condition: time
        after: 06:29:00
      - condition: state
        entity_id: sun.sun
        state: above_horizon
      sequence:
      - action: cover.open_cover
        target:

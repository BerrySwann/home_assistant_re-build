# --- I_debug_force_mode.yaml ---
- alias: (I) (CLIM DEBUG) Force Mode Correct & Sécurité
  description: 'WATCHDOG :   1. FORCE OFF si tentative d''allumage alors que Prise OFF ou Arrêt Sécurisé en cours.  2. FORCE SAISON si une clim est allumée mais dans le mauvais mode (ex: Cool au lieu de Heat).

    '
  triggers:
  - trigger: state
    entity_id:
    - climate.clim_salon_rm4_mini
    - climate.clim_bureau_rm4_mini
    - climate.clim_chambre_rm4_mini
    to: null
  - trigger: state
    entity_id: sensor.mode_ete_hiver
    to: null
  conditions: []
  actions:
  - delay: 00:00:02
  - alias: CALCUL DES LISTES D'ERREURS
    variables:
      mode_saison: '{{ states(''sensor.mode_ete_hiver'') }}'
      force_off_list: "{% set liste = [] %} {# SALON #} {% if states('climate.clim_salon_rm4_mini') != 'off' \n      and (is_state('switch.clim_salon_nous', 'off') or is_state('input_boolean.clim_salon_arret_securise_en_cours', 'on')) %}\n  {% set liste = liste + ['climate.clim_salon_rm4_mini'] %}\n{% endif %} {# BUREAU #} {% if states('climate.clim_bureau_rm4_mini') != 'off' \n      and (is_state('switch.clim_bureau_nous', 'off') or is_state('input_boolean.clim_bureau_arret_securise_en_cours', 'on')) %}\n  {% set liste = liste + ['climate.clim_bureau_rm4_mini'] %}\n{% endif %} {# CHAMBRE #} {% if states('climate.clim_chambre_rm4_mini') != 'off' \n      and (is_state('switch.clim_chambre_nous', 'off') or is_state('input_boolean.clim_chambre_arret_securise_en_cours', 'on')) %}\n  {% set liste = liste + ['climate.clim_chambre_rm4_mini'] %}\n{% endif %} {{ liste }}\n"
      force_mode_list: "{% set liste = [] %} {# SALON #} {% if states('climate.clim_salon_rm4_mini') not in ['off', 'unavailable', 'unknown', mode_saison] \n      and is_state('switch.clim_salon_nous', 'on') \n      and is_state('input_boolean.clim_salon_arret_securise_en_cours', 'off') %}\n  {% set liste = liste + ['climate.clim_salon_rm4_mini'] %}\n{% endif %} {# BUREAU #} {% if states('climate.clim_bureau_rm4_mini') not in ['off', 'unavailable', 'unknown', mode_saison] \n      and is_state('switch.clim_bureau_nous', 'on') \n      and is_state('input_boolean.clim_bureau_arret_securise_en_cours', 'off') %}\n  {% set liste = liste + ['climate.clim_bureau_rm4_mini'] %}\n{% endif %} {# CHAMBRE #} {% if states('climate.clim_chambre_rm4_mini') not in ['off', 'unavailable', 'unknown', mode_saison] \n      and is_state('switch.clim_chambre_nous', 'on') \n      and is_state('input_boolean.clim_chambre_arret_securise_en_cours', 'off') %}\n  {% set liste = liste + ['climate.clim_chambre_rm4_mini']\
        \ %}\n{% endif %} {{ liste }}\n"
  - if:
    - condition: template
      value_template: '{{ force_off_list | length > 0 }}'
    then:
    - alias: 'NOTIF : INTERDICTION DÉMARRAGE'
      action: notify.mobile_app_poco_x7_pro_eric
      data:
        title: ⛔ SÉCURITÉ CLIM
        message: "Tentative de démarrage interdite (Prise coupée ou Arrêt en cours). Retour forcé à OFF pour : {% for c in force_off_list %}\n  - {{ state_attr(c, 'friendly_name') }}\n{% endfor %}\n"
    - alias: 'ACTION : FORCER OFF'
      action: climate.set_hvac_mode
      target:
        entity_id: '{{ force_off_list }}'
      data:
        hvac_mode: 'off'
  - if:
    - condition: template
      value_template: '{{ force_mode_list | length > 0 }}'
    then:
    - alias: 'NOTIF : CORRECTION MODE'
      action: notify.mobile_app_poco_x7_pro_eric
      data:
        title: 🔧 CORRECTION MODE
        message: "Mauvais mode détecté. Correction vers {{ mode_saison | upper }} pour : {% for c in force_mode_list %}\n  - {{ state_attr(c, 'friendly_name') }}\n{% endfor %}\n"
    - alias: 'ACTION : FORCER MODE SAISON'
      action: climate.set_hvac_mode
      target:
        entity_id: '{{ force_mode_list }}'
      data:
        hvac_mode: '{{ mode_saison }}'
  mode: single

# --- J_synchro_notif_prise_coupee.yaml ---
- alias: (J) Synchro & Notif Clim si Prise Coupée
  description: 'Met à jour l''état du thermostat et notifie proprement si la prise est coupée.

    '
  triggers:
  - trigger: state
    entity_id:
    - switch.clim_salon_nous
    - switch.clim_bureau_nous
    - switch.clim_chambre_nous
    from: 'on'
    to: 'off'
  actions:
  - action: climate.set_hvac_mode
    data:
      hvac_mode: 'off'
    target:
      entity_id: "{% if trigger.entity_id == 'switch.clim_salon_nous' %}\n  climate.clim_salon_rm4_mini\n{% elif trigger.entity_id == 'switch.clim_bureau_nous' %}\n  climate.clim_bureau_rm4_mini\n{% elif trigger.entity_id == 'switch.clim_chambre_nous' %}\n  climate.clim_chambre_rm4_mini\n{% endif %}\n"
  - if:
    - condition: time
      after: 07:30:00
      before: '21:00:00'
    then:
    - action: notify.mobile_app_poco_x7_pro_eric
      data:
        title: CLIM COUPÉE
        message: "{% set piece = 'inconnue' %}  {% if 'salon' in trigger.entity_id %}\n  {% set piece = 'du Salon' %}\n{% elif 'bureau' in trigger.entity_id %}\n  {% set piece = 'du Bureau' %}\n{% elif 'chambre' in trigger.entity_id %}\n  {% set piece = 'de la Chambre' %}\n{% endif %}  La prise extérieure {{ piece }} vient d'être éteinte.\n"
  mode: parallel

# --- L_debug_notif_message_clim.yaml ---
- alias: (K) (DEBUG) Notifier les changements de message clim (Mobile)
  description: Surveille et notifie les changements d'état du message personnalisé.
  triggers:
  - trigger: state
    entity_id: sensor.message_clim_personnalise_7h30_21h00
  actions:
  - choose:
    - alias: 'Détection : CELLULAR'
      conditions:
      - condition: template
        value_template: '{{ ''CELLULAR'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Présence] Personne n''est à la maison (mode CELLULAR/WIFI_?!)'
    - alias: 'Détection : MAMOUR'
      conditions:
      - condition: template
        value_template: '{{ ''MAMOUR'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Présence] Seul Mamour est à la maison (Wi-Fi)'
    - alias: 'Détection : ERIC'
      conditions:
      - condition: template
        value_template: '{{ ''ERIC'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Présence] Seul Eric est à la maison (Wi-Fi)'
    - alias: 'Détection : LES DEUX'
      conditions:
      - condition: template
        value_template: '{{ ''Clim [2] en [WIFI]'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Présence] Mamour et Eric sont à la maison (Wi-Fi)'
    - alias: 'Détection : UP (Hausse)'
      conditions:
      - condition: template
        value_template: '{{ ''Up >>>'' in trigger.to_state.state }}'
      sequence:
      - variables:
          temp_ext: '{{ trigger.to_state.state.split(''|'')[1].split(''Up >>>'')[1].split(''°'')[0].strip() }}'
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Tendance] Température extérieure en hausse : {{ temp_ext }}°'
    - alias: 'Détection : DOWN (Baisse)'
      conditions:
      - condition: template
        value_template: '{{ ''Down <<<'' in trigger.to_state.state }}'
      sequence:
      - variables:
          temp_ext: '{{ trigger.to_state.state.split(''|'')[1].split(''Down <<<'')[1].split(''°'')[0].strip() }}'
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Tendance] Température extérieure en baisse : {{ temp_ext }}°'
    - alias: 'Détection : STABLE'
      conditions:
      - condition: template
        value_template: '{{ ''stable'' in trigger.to_state.state }}'
      sequence:
      - variables:
          temp_ext: '{{ trigger.to_state.state.split(''|'')[1].split(''°'')[0].split(''stable'')[1].strip() }}'
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Tendance] Température extérieure stable : {{ temp_ext }}°'
    - alias: 'Détection : HEAT'
      conditions:
      - condition: template
        value_template: '{{ ''Heat'' in trigger.to_state.state }}'
      sequence:
      - variables:
          message_part: '{{ trigger.to_state.state.split(''|'')[2] }}'
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Mode] Chauffage activé : {{ message_part }}'
    - alias: 'Détection : COOL'
      conditions:
      - condition: template
        value_template: '{{ ''Cool'' in trigger.to_state.state }}'
      sequence:
      - variables:
          message_part: '{{ trigger.to_state.state.split(''|'')[2] }}'
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Mode] Rafraîchissement activé : {{ message_part }}'
    - alias: 'Détection : FAN'
      conditions:
      - condition: template
        value_template: '{{ ''Fan'' in trigger.to_state.state }}'
      sequence:
      - action: notify.mobile_app_poco_x7_pro_eric
        data:
          message: '[Mode] Ventilation activée'


    - condition: template
      value_template: "{{ states('sensor.message_clim_personnalise_7h30_21h00') in ['unknown', 'unavailable'] or\n   states('sensor.mamour_wi_fi_connection') in ['unknown', 'unavailable'] or\n   states('sensor.eric_wi_fi_connection') in ['unknown', 'unavailable'] or\n   states('sensor.th_balcon_nord_temperature') in ['unknown', 'unavailable'] }}\n"

# --- gestion_store_bureau.yaml ---
- alias: Gestion Optimisée du Store Bureau
  description: 'Priorité Sommeil et Anti-Reflet. Sécurité : Bloque tout mouvement si la fenêtre est ouverte.'
  triggers:
  - id: reveil
    trigger: time
    at: 07:00:00
  - trigger: state
    entity_id: sensor.th_balcon_nord_temperature
  - trigger: sun
    event: sunset
  - id: fenetre
    trigger: state
    entity_id: binary_sensor.contact_fenetre_bureau_sonoff_contact
    to: 'off'
  conditions:
  - alias: 'SÉCURITÉ : La fenêtre doit être FERMÉE pour bouger le store'
    condition: state
    entity_id: binary_sensor.contact_fenetre_bureau_sonoff_contact
    state: 'off'
  actions:
  - choose:
    - alias: 'SCÉNARIO A : Ouverture Travail (Printemps/Automne)'
      conditions:
      - condition: time
        after: 07:00:00
      - condition: sun
        before: sunset
      - condition: numeric_state
        entity_id: sensor.th_balcon_nord_temperature
        above: 18
        below: 25
      - condition: numeric_state
        entity_id: cover.store_bureau
        attribute: current_position
        below: 1
      sequence:
      - action: cover.open_cover
        target:
          entity_id: cover.store_bureau
    - alias: 'SCÉNARIO B : Fermeture Chaleur (Été)'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_balcon_nord_temperature
        above: 25
      - condition: sun
        before: sunset
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.store_bureau
    - alias: 'SCÉNARIO C : Fermeture Nuit'
      conditions:
      - condition: sun
        after: sunset
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.store_bureau
  mode: single

# --- gestion_store_salon.yaml ---
- alias: Gestion Optimisée du Store Salon (Avec Mode Anti-Reflet PC)
  description: Gère Canicule, Froid, et surtout le confort visuel de Mamour (Anti-Glare).
  triggers:
  - id: re-evaluation
    trigger: state
    entity_id:
    - sensor.th_balcon_nord_temperature
    - sensor.groupe_clim
    - sun.sun
  - id: fenetre
    trigger: state
    entity_id: binary_sensor.contact_fenetre_salon_sonoff_contact
  - id: matin_soir
    trigger: sun
    event: sunrise
  - id: matin_soir
    trigger: sun
    event: sunset
  conditions:
  - alias: 'SÉCURITÉ : La fenêtre doit être FERMÉE'
    condition: state
    entity_id: binary_sensor.contact_fenetre_salon_sonoff_contact
    state: 'off'
  actions:
  - choose:
    - alias: 'SCÉNARIO 1 : Canicule (> 34°C)'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_balcon_nord_temperature
        above: 34
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: sensor.groupe_clim
            state:
            - groupe_2
            - groupe_4
          sequence:
          - action: cover.set_cover_position
            target:
              entity_id: cover.store_salon
            data:
              position: 50
        default:
        - action: cover.close_cover
          target:
            entity_id: cover.store_salon
    - alias: 'SCÉNARIO 2 : Anti-Reflet PC (Soleil dans les yeux)'
      conditions:
      - condition: state
        entity_id: sensor.groupe_clim
        state:
        - groupe_2
        - groupe_4
      - condition: template
        value_template: '{% set az = state_attr(''sun.sun'', ''azimuth'') | float(0) %} {% set el = state_attr(''sun.sun'', ''elevation'') | float(0) %} {% set az_ok = states(''input_number.soleil_azimut_debut'')|float <= az <= states(''input_number.soleil_azimut_fin'')|float %} {% set el_ok = states(''input_number.soleil_elevation_min'')|float <= el <= states(''input_number.soleil_elevation_max'')|float %} {{ az_ok and el_ok }}

          '
      sequence:
      - action: cover.set_cover_position
        target:
          entity_id: cover.store_salon
        data:
          position: 30
    - alias: 'SCÉNARIO 3 : Froid (< 17°) & Pas de Mamour'
      conditions:
      - condition: numeric_state
        entity_id: sensor.th_balcon_nord_temperature
        below: 17
      - condition: state
        entity_id: sensor.groupe_clim
        state:
        - groupe_1
        - groupe_3
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.store_salon
    - alias: 'SCÉNARIO 4 : Nuit'
      conditions:
      - condition: sun
        after: sunset
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.store_salon
    default:
    - action: cover.open_cover
      target:
        entity_id: cover.store_salon
  mode: single

# ──────────────────────────────────────────────────────────────────────────
# meteo/
# ──────────────────────────────────────────────────────────────────────────

# --- alerte_meteo_cartes.yaml ---
- alias: Alerte Météo France actualisation des "CARTES"
  description: 'Force la mise à jour des images d''alerte Météo France au démarrage,  aux heures clés, ou toutes les 5 min si elles sont indisponibles.

    '
  triggers:
  - trigger: homeassistant
    event: start
    id: Start
  - trigger: time
    at: 06:32:00
    id: Heure632
  - trigger: time
    at: '16:32:00'
    id: Heure1632
  - trigger: time_pattern
    minutes: /5
    id: Toutesles5minutes
  conditions:
  - condition: or
    conditions:
    - condition: trigger
      id:
      - Start
      - Heure632
      - Heure1632
    - alias: Vérif si Today est HS
      condition: and
      conditions:
      - condition: trigger
        id: Toutesles5minutes
      - condition: state
        entity_id: sensor.meteo_france_alertes_image_today
        state: unavailable
    - alias: Vérif si Tomorrow est HS
      condition: and
      conditions:
      - condition: trigger
        id: Toutesles5minutes
      - condition: state
        entity_id: sensor.meteo_france_alertes_image_tomorrow
        state: unavailable
  actions:
  - alias: Premier essai de mise à jour
    action: homeassistant.update_entity
    target:
      entity_id:
      - sensor.meteo_france_alertes_image_today
      - sensor.meteo_france_alertes_image_tomorrow
  - delay: 00:00:05
  - alias: Répéter MAJ Today si toujours indisponible
    repeat:
      count: 1
      sequence:
      - if:
        - condition: state
          entity_id: sensor.meteo_france_alertes_image_today
          state: unavailable
        then:
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.meteo_france_alertes_image_today
        - delay: 00:00:05
  - alias: Répéter MAJ Tomorrow si toujours indisponible
    repeat:
      count: 1
      sequence:
      - if:
        - condition: state
          entity_id: sensor.meteo_france_alertes_image_tomorrow
          state: unavailable
        then:
        - action: homeassistant.update_entity
          target:
            entity_id: sensor.meteo_france_alertes_image_tomorrow
        - delay: 00:00:05
  - alias: Rafraîchir les caméras finales
    action: homeassistant.update_entity
    target:
      entity_id:
      - camera.mf_alerte_today
      - camera.mf_alerte_tomorrow
  mode: single


# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ CARD : PÔLE 2. ENERGIE TOTALE 7 JOURS — OPTIMISÉE (OPT.1)                   │
# ╰──────────────────────────────────────────────────────────────────────────────╯
#
# AVANT (version originale) :
#   8 × sensor.ecojoko_consommation_reseau avec offsets -0d...-7d
#   → 8 requêtes DB full-history 24h à chaque rendu de page
#
# APRÈS (version optimisée) :
#   J-0  : sensor.ecojoko_reseau_quotidien_um (live, courbe intraday)
#   J-1  : sensor.ecojoko_consommation_reseau offset "-1d" (courbe hier — utile pour comparer)
#   J-2..J-7 : sensors snapshot statiques → lecture instantanée, valeur finale du jour
#
# RÉSULTAT : 2 requêtes history (J-0 + J-1) + 6 lectures instantanées
#
# AFFICHAGE J-2..J-7 :
#   in_chart: false / in_header: true → valeurs en en-tête, pas de ligne plate
#   Avantage : évite les lignes horizontales parasites dans le graphe
#
# SENSOR MAP :
#   J-0  → ecojoko_reseau_quotidien_um       (utility_meter, live)
#   J-1  → ecojoko_consommation_reseau -1d   (offset, courbe complète d'hier)
#   J-2  → ecojoko_j2_kwh                   (snapshot, total final)
#   J-3  → ecojoko_j3_kwh
#   J-4  → ecojoko_j4_kwh
#   J-5  → ecojoko_j5_kwh
#   J-6  → ecojoko_j6_kwh
#   J-7  → ecojoko_j7_kwh (= même jour semaine dernière)

type: custom:apexcharts-card
experimental:
  color_threshold: true
graph_span: 24h
cache: true
span:
  end: day
now:
  show: true
  color: darkred
  label: Now
header:
  show: true
  show_states: true
  colorize_states: true
  title: " "
apex_config:
  chart:
    height: 450px
    type: area
  stroke:
    show: true
  dataLabels:
    enabled: true
  legend:
    show: true
  fill:
    type: gradient
    gradient:
      inverseColors: true
      type: vertical
      shadeIntensity: 0.1
      opacityFrom: 0.5
      opacityTo: 0.15
      stops:
        - 0
        - 50
        - 100
  grid:
    show: true
  tooltip:
    "y":
      formatter: >
        EVAL:(val) => (val === null || isNaN(val)) ? '' :
        `${Number(val).toFixed(1)} kWh`
all_series_config:
  group_by:
    func: last
    duration: 10m
  curve: smooth
  type: area
yaxis:
  - id: kWh
    min: 0
    max: auto
    decimals: 1
    opposite: true
    apex_config:
      tickAmount: 20

series:

  # ── J-0 : Aujourd'hui (courbe live) ────────────────────────────────────────
  - entity: sensor.ecojoko_reseau_quotidien_um
    yaxis_id: kWh
    color: gainsboro
    extend_to: false
    name: (Aujourd'hui)
    unit: kWh
    stroke_width: 3
    float_precision: 2
    show:
      legend_value: true
      extremas: max

  # ── J-1 : Hier (courbe complète — comparaison intraday) ────────────────────
  - entity: sensor.ecojoko_consommation_reseau
    yaxis_id: kWh
    color: rgb(204, 255, 204)
    extend_to: false
    name: "Hier"
    unit: kWh
    stroke_width: 2
    float_precision: 1
    offset: "-1d"
    show:
      legend_value: true
      extremas: max

  # ── J-2..J-7 : Jours passés (valeur finale en header, pas de courbe plate) ─

  - entity: sensor.ecojoko_j2_kwh
    yaxis_id: kWh
    color: rgb(153, 255, 153)
    name: "{{ state_attr('sensor.ecojoko_j2_kwh', 'jour') or 'J-2' }}"
    unit: kWh
    float_precision: 1
    show:
      in_chart: false
      in_header: true
      legend_value: true
      extremas: false

  - entity: sensor.ecojoko_j3_kwh
    yaxis_id: kWh
    color: rgb(102, 255, 102)
    name: "{{ state_attr('sensor.ecojoko_j3_kwh', 'jour') or 'J-3' }}"
    unit: kWh
    float_precision: 1
    show:
      in_chart: false
      in_header: true
      legend_value: true
      extremas: false

  - entity: sensor.ecojoko_j4_kwh
    yaxis_id: kWh
    color: rgb(51, 204, 51)
    name: "{{ state_attr('sensor.ecojoko_j4_kwh', 'jour') or 'J-4' }}"
    unit: kWh
    float_precision: 1
    show:
      in_chart: false
      in_header: true
      legend_value: true
      extremas: false

  - entity: sensor.ecojoko_j5_kwh
    yaxis_id: kWh
    color: rgb(0, 153, 0)
    name: "{{ state_attr('sensor.ecojoko_j5_kwh', 'jour') or 'J-5' }}"
    unit: kWh
    float_precision: 1
    show:
      in_chart: false
      in_header: true
      legend_value: true
      extremas: false

  - entity: sensor.ecojoko_j6_kwh
    yaxis_id: kWh
    color: rgb(0, 102, 0)
    name: "{{ state_attr('sensor.ecojoko_j6_kwh', 'jour') or 'J-6' }}"
    unit: kWh
    float_precision: 1
    show:
      in_chart: false
      in_header: true
      legend_value: true
      extremas: false

  # ── J-7 : Même jour la semaine dernière ────────────────────────────────────
  - entity: sensor.ecojoko_j7_kwh
    yaxis_id: kWh
    color: rgb(0, 70, 0)
    name: "{{ state_attr('sensor.ecojoko_j7_kwh', 'jour') or 'J-7' }}"
    unit: kWh
    stroke_width: 2
    float_precision: 1
    show:
      in_chart: false
      in_header: true
      legend_value: true
      extremas: false

card_mod:
  style: |
    div#state__value {
      font-size: 8.5px;
    }
    ha-card {
      background: none !important;
      box-shadow: none !important;
      border: none !important;
    }

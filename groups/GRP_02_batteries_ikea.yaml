# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ GRP 02 — BATTERIES : IKEA DEVICES                                           │
# ╰──────────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Groupe des capteurs de batteries des équipements IKEA Zigbee.
# Télécommandes, interrupteurs, détecteur de fuite, vallhorn (8 unités).
# Contacts fenêtres IKEA supprimés — remplacés par capteurs SONOFF (GRP_03).
# Utilisé par auto-entities (L5C1) pour la surveillance centralisée des piles.
#
# ## 🧮 CALCUL & SOURCES :
# Source : Zigbee2MQTT (Z2M) → intégration MQTT HA
# Entités : sensor.*_battery (rodret, somrig, poussoir, vallhorn, fuite)
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
# | MATÉRIEL      | CAPTEUR BRUT (source)                      | CE FICHIER          | AVAL          |
# |:--------------|:-------------------------------------------|:--------------------|:--------------|
# | IKEA (Z2M)    | sensor.*_ikea_battery / sensor.*_battery   | group.ikea_devices  | auto-entities → L5C1 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Chaque entité doit exister dans HA avant d'être ajoutée ici.
# - Après ajout d'un équipement IKEA, recharger via Outils dev → YAML → Recharger groupes.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# L5C1 — Surveillance Batteries / Piles

# --- ikea_devices ---
ikea_devices:
  name: "IKEA Devices"
  entities:
    - sensor.detecteur_de_fuite_ikea_battery
    - sensor.inter_salon_4_ikea_battery
    - sensor.detecteur_vallhorn_battery
    - sensor.inter_tv_chambre_ikea_rodret_battery
    - sensor.inter_somrig_battery
    - sensor.inter_bureau_rodret_battery
    - sensor.poussoir_ikea_tradfri_battery
    - sensor.inter_radiateur_salle_de_bain_ikea_rodret_battery

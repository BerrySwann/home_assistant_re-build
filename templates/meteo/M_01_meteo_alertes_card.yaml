# ╭──────────────────────────────────────────────────────────────────────────╮
# │ MODÈLE : M_01 MÉTÉO ALERTES VENCE (CATÉGORIE M. ENVIRONNEMENT)           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Regroupement et formatage des alertes Météo France (Vigilance) pour 
# affichage dynamique (couleurs/icônes) sur l'interface.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.meteo_france_vence_weather_alert (ou équivalent)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# Ce fichier est dédié à l'UI. Il ne contient aucun calcul d'énergie. 
# Attention aux mises à jour de l'intégration Météo France qui peuvent 
# changer le nom des attributs.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Sert à la remontée d'info pour la vignette : Météo / Alertes

- sensor:

# ┌───────────────────────────────────────────────────┐
# │ MÉTÉO — ALERTES (LOGIQUE ET DÉTAILS)              │
# └───────────────────────────────────────────────────┘

# --- alerte_vent_violent ---
    - name: 'Alerte Vent violent'
      unique_id: sensor.alerte_vent_violent
      state: >-
        {% set wa = state_attr('sensor.06_weather_alert', 'Vent violent') | default('Vert', true) %}
        {% set at = state_attr('binary_sensor.meteoalarm', 'awareness_type') %}
        {% set ev = state_attr('binary_sensor.meteoalarm', 'event') | default('') %}
        {% if wa in ['Vert', 'Jaune', 'Orange', 'Rouge'] %}
          {% set al = wa %}
        {% elif 'jaune vent-violent' in ev %}
          {% set al = 'Jaune' %}
        {% elif 'orange vent-violent' in ev %}
          {% set al = 'Orange' %}
        {% elif 'rouge vent-violent' in ev %}
          {% set al = 'Rouge' %}
        {% else %}
          {% set al = 'Vert' %}
        {% endif %}
        {{ al }}
      icon: mdi:weather-windy


    - name: 'Alerte Grand-froid'
      unique_id: alerte_grand_froid
      state: >-
        {% set wa = state_attr('sensor.06_weather_alert', 'Grand-froid') %}
        {% set ev = state_attr('binary_sensor.meteoalarm', 'event') | default('', true) %}
        {% if wa in ['Vert', 'Jaune', 'Orange', 'Rouge'] %}
          {{ wa }}
        {% elif ev is not none and 'grand-froid' in ev | lower %}
          {% if 'rouge' in ev | lower %} Rouge {% elif 'orange' in ev | lower %} Orange {% else %} Jaune {% endif %}
        {% else %}
          Vert
        {% endif %}
      icon: mdi:snowflake


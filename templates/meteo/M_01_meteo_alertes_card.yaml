# ╭──────────────────────────────────────────────────────────────────────────╮
# │ MÉTÉO. TEMPLATE : ALERTES MÉTÉO-FRANCE — VENCE 06140 (10 NIVEAUX)        │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template créant 10 indicateurs d'alertes météo pour le
# département 06 (Alpes-Maritimes / Vence) : vent violent, inondation,
# orages, pluie-inondation, neige/verglas, grand-froid, canicule,
# avalanches, vagues-submersion, et synthèse globale. États : Vert /
# Jaune / Orange / Rouge.
#
# ## 🧮 CALCUL & SOURCES :
# - Source primaire  : sensor.06_weather_alert (intégration Météo France)
#   → attributs par type d'alerte (Vent violent, Inondation, etc.)
# - Source secondaire : binary_sensor.meteoalarm (intégration MeteoAlarm)
#   → attributs awareness_type, awareness_level, event (chaîne texte)
# - Logique de fusion : Météo France en priorité, MeteoAlarm en fallback.
# - Garde | default('') sur l'attribut 'event' pour éviter TypeError
#   quand meteoalarm n'a pas de phénomène actif.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - L'alerte est DÉPARTEMENTALE (06 entier) — pas localisée à Vence.
# - MeteoAlarm peut avoir un décalage de quelques heures vs Météo France.
# - Sans le | default('') sur 'event', TypeError: 'NoneType' not iterable
#   quand aucun phénomène n'est actif → obligatoire sur les 9 sensors.
# - | default('') sur awareness_level dans alerte_meteo → même raison.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L1C1 Météo (bandeau alertes coloré en haut de la vignette météo)

- sensor:

# ┌───────────────────────────────────────────────────────────────────┐
# │ MÉTÉO — ALERTES (LOGIQUE ET DÉTAILS)                              │
# └───────────────────────────────────────────────────────────────────┘

# --- alerte_vent_violent ---
    - name: 'Alerte Vent violent'
      unique_id: sensor.alerte_vent_violent
      state: >-
        {% set wa = state_attr('sensor.06_weather_alert', 'Vent violent') %}
        {% set at = state_attr('binary_sensor.meteoalarm', 'awareness_type') %}
        {% set ev = state_attr('binary_sensor.meteoalarm', 'event') | default('') %}
        {% if wa in ['Vert', 'Jaune', 'Orange', 'Rouge'] %}
          {% set al = wa %}
        {% elif 'jaune vent-violent' in ev %}
          {% set al = 'Jaune' %}
        {% elif 'orange vent-violent' in ev %}
          {% set al = 'Orange' %}
        {% elif 'rouge vent-violent' in ev %}
          {% set al = 'Rouge' %}
        {% else %}
          {% set al = 'Vert' %}
        {% endif %}
        {{ al }}
      icon: mdi:weather-windy


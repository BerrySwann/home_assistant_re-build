# ╭──────────────────────────────────────────────────────────────────────────╮
# │ SWITCH : INTER RODRET SALON                                              │
# ╰──────────────────────────────────────────────────────────────────────────╯
- switch:
    - name: "Inter Rodret Salon"
      unique_id: inter_rodret_salon
      state: "{{ is_state('input_boolean.inter_rodret_salon', 'on') }}"
      icon: >
        {% if is_state('input_boolean.inter_rodret_salon', 'on') %}
          mdi:lightbulb-on
        {% else %}
          mdi:lightbulb-off
        {% endif %}
      turn_on:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.inter_rodret_salon
      turn_off:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.inter_rodret_salon
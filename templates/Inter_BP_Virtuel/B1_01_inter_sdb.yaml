# ╭──────────────────────────────────────────────────────────────────────────╮
# │ BINARY_SENSOR : CHAUFFAGE — INTERRUPTEUR / BP SDB                       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteur binaire virtuel indiquant si le radiateur SDB est actif,
# piloté par l'input_boolean dédié.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : input_boolean.inter_radiateur_salle_de_bain
# - État ON  → radiateur actif
# - État OFF → radiateur inactif
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ce capteur est piloté par un input_boolean (interrupteur virtuel BP).
# - Ne pas confondre avec le switch physique du soufflant (BI_02).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L1C3 Commandes Clim (état soufflant/radiateur SDB)

- binary_sensor:
    # ┌───────────────────────────────────┐
    # │ 8. SDB                            │
    # └───────────────────────────────────┘
    # --- radiateur_salle_de_bain_actif ---
    - name: "Radiateur Salle de Bain Actif"
      unique_id: radiateur_salle_de_bain_actif
      state: "{{ is_state('input_boolean.inter_radiateur_salle_de_bain', 'on') }}"

# annotations_log:
# [L1-3]   Boîte ASCII arrondie mise à 78 chars (standard ReBuild).
# [L6-16]  En-tête doc obligatoire ajouté (DESCRIPTION, CALCUL, PIÈGES, VIGNETTE).
# [L19-21] Boîte secondaire carrée 37 chars + numérotation officielle (8. SDB).
# [L22]    Slug tertiaire présent.

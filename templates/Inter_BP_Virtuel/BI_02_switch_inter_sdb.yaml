# [L6-17]  En-tête doc obligatoire ajouté (DESCRIPTION, CALCUL, PIÈGES, VIGNETTE).
# [L20-22] Boîte secondaire carrée 37 chars + numérotation officielle (8. SDB).
# [L23]    Slug tertiaire présent.

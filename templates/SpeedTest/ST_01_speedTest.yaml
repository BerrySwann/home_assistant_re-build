- sensor:
    - name: "Speedtest CLI Download"
      unique_id: speedtest_cli_download
      unit_of_measurement: "Mbps"
      icon: mdi:download-network
      state: >
        {% set dl = state_attr('sensor.speedtest_cli_data', 'download') %}
        {% if dl and dl.bandwidth is defined %}
          {{ (dl.bandwidth / 125000) | round(1) }}
        {% else %}
          Indisponible
        {% endif %}

    - name: "Speedtest CLI Upload"
      unique_id: speedtest_cli_upload
      unit_of_measurement: "Mbps"
      icon: mdi:upload-network
      state: >
        {% set ul = state_attr('sensor.speedtest_cli_data', 'upload') %}
        {% if ul and ul.bandwidth is defined %}
          {{ (ul.bandwidth / 125000) | round(1) }}
        {% else %}
          Indisponible
        {% endif %}

    - name: "Speedtest CLI Ping"
      unique_id: speedtest_cli_ping
      unit_of_measurement: "ms"
      icon: mdi:timer-outline
      state: >
        {% set p = state_attr('sensor.speedtest_cli_data', 'ping') %}
        {% if p and p.latency is defined %}
          {{ p.latency | round(1) }}
        {% else %}
          Indisponible
        {% endif %}
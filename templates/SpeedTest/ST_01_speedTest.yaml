# ╭──────────────────────────────────────────────────────────────────────────╮
# │ [ ST ] TEMPLATES : SPEEDTEST CLI — DOWNLOAD / UPLOAD / PING              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Trois capteurs templates calculant Download (Mbps), Upload (Mbps) et Ping (ms)
# depuis les attributs bruts de sensor.speedtest_cli_data (intégration CLI).
# Conversion : bandwidth (bytes/s) / 125000 = Mbps.
#
# ## 🧮 CALCUL & SOURCES :
# - Source    : sensor.speedtest_cli_data (intégration Speedtest CLI — command_line/)
# - Download  : state_attr(..., 'download').bandwidth / 125000 → Mbps
# - Upload    : state_attr(..., 'upload').bandwidth / 125000   → Mbps
# - Ping      : state_attr(..., 'ping').latency                → ms
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - La source est speedtest_cli_data (CLI binaire) et NON speedtest_download_speed
#   (intégration native HA Speedtest.net) — attributs structurés différents.
# - Si le test n'a pas encore tourné, les attributs sont None → "Indisponible".
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L4C1 Freebox Pop (réseau — débit entrant/sortant/latence).

- sensor:
    # --- speedtest_cli_download ---
    - name: "Speedtest CLI Download"
      unique_id: speedtest_cli_download
      unit_of_measurement: "Mbps"
      icon: mdi:download-network
      state: >
        {% set dl = state_attr('sensor.speedtest_cli_data', 'download') %}
        {% if dl and dl.bandwidth is defined %}
          {{ (dl.bandwidth / 125000) | round(1) }}
        {% else %}
          Indisponible
        {% endif %}

    # --- speedtest_cli_upload ---
    - name: "Speedtest CLI Upload"
      unique_id: speedtest_cli_upload
      unit_of_measurement: "Mbps"
      icon: mdi:upload-network
      state: >
        {% set ul = state_attr('sensor.speedtest_cli_data', 'upload') %}
        {% if ul and ul.bandwidth is defined %}
          {{ (ul.bandwidth / 125000) | round(1) }}
        {% else %}
          Indisponible
        {% endif %}

    # --- speedtest_cli_ping ---
    - name: "Speedtest CLI Ping"
      unique_id: speedtest_cli_ping
      unit_of_measurement: "ms"
      icon: mdi:timer-outline
      state: >
        {% set p = state_attr('sensor.speedtest_cli_data', 'ping') %}
        {% if p and p.latency is defined %}
          {{ p.latency | round(1) }}
        {% else %}
          Indisponible
        {% endif %}

# annotations_log:

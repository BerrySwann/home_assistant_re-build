# ╭──────────────────────────────────────────────────────────────────────────╮
# │ [ ST ] TEMPLATES : SPEEDTEST CLI — DOWNLOAD / UPLOAD / PING              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Trois capteurs templates extrayant les métriques de bande passante depuis
# le capteur parent sensor.speedtest_cli_data (intégration Speedtest CLI).
# Conversion bits/s → Mbps pour Download et Upload, ms pour Ping.
#
# ## 🧮 CALCUL & SOURCES :
# - Source unique : sensor.speedtest_cli_data [NAT] (attributs JSON imbriqués)
# - Download      : state_attr(..., 'download').bandwidth / 125000 → Mbps
# - Upload        : state_attr(..., 'upload').bandwidth / 125000 → Mbps
# - Ping          : state_attr(..., 'ping').latency → ms (valeur directe)
# - Fallback      : "Indisponible" si l'attribut est absent ou non défini
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - sensor.speedtest_cli_data ≠ sensor.speedtest_download
#   └── sensor.speedtest_cli_data  : capteur parent [NAT] source de CE fichier
#   └── sensor.speedtest_download  : entité native séparée [NAT] utilisée comme
#       cible du homeassistant.update_entity dans la page L4C1 pour déclencher
#       le test — elle n'alimente PAS ces templates.
# - Les attributs .bandwidth et .latency sont dans des sous-objets JSON
#   (download{}, upload{}, ping{}) — accès direct à l'attribut racine invalide.
# - Les valeurs sont "gelées" entre deux tests planifiés. Le déclenchement
#   manuel via update_entity sur sensor.speedtest_download force un nouveau test.
# - Pas de device_class standard HA pour la vitesse réseau (Mbps) ni le ping (ms).
#   state_class: measurement activé pour que les valeurs soient enregistrées
#   correctement dans la base (courbe historique dans les mini-graph-card).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L4C1 Freebox Pop → Page /systeme-freebox → Pop-up #speedtest_details
#   └── sensor.speedtest_cli_download → mini-graph 24h (seuils 100/200/400/600/800 Mbps)
#   └── sensor.speedtest_cli_upload   → mini-graph 24h (seuils 50/100/200/400/600 Mbps)
#   └── sensor.speedtest_cli_ping     → mini-graph 24h (seuils 40/35/30/25/20 ms)

- sensor:

    # ┌───────────────────────────────────┐
    # │ [ ST ] SPEEDTEST CLI              │
    # └───────────────────────────────────┘

    # --- speedtest_cli_download ---
    - name: "Speedtest CLI Download"
      unique_id: speedtest_cli_download
      unit_of_measurement: "Mbps"
      state_class: measurement
      icon: mdi:download-network
      state: >
        {% set dl = state_attr('sensor.speedtest_cli_data', 'download') %}
        {% if dl and dl.bandwidth is defined %}
          {{ (dl.bandwidth / 125000) | round(1) }}
        {% else %}
          Indisponible
        {% endif %}

    # --- speedtest_cli_upload ---
    - name: "Speedtest CLI Upload"
      unique_id: speedtest_cli_upload
      unit_of_measurement: "Mbps"
      state_class: measurement
      icon: mdi:upload-network
      state: >
        {% set ul = state_attr('sensor.speedtest_cli_data', 'upload') %}
        {% if ul and ul.bandwidth is defined %}
          {{ (ul.bandwidth / 125000) | round(1) }}
        {% else %}
          Indisponible
        {% endif %}

    # --- speedtest_cli_ping ---
    - name: "Speedtest CLI Ping"
      unique_id: speedtest_cli_ping
      unit_of_measurement: "ms"
      state_class: measurement
      icon: mdi:timer-outline
      state: >
        {% set p = state_attr('sensor.speedtest_cli_data', 'ping') %}
        {% if p and p.latency is defined %}
          {{ p.latency | round(1) }}
        {% else %}
          Indisponible
        {% endif %}


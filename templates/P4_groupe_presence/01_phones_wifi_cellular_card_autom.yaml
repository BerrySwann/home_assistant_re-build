# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 4. TEMPLATE : TÉLÉPHONES — ÉTAT WI-FI & SYNTHÈSE PRÉSENCE           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template détectant l'état de connexion Wi-Fi individuel des deux
# téléphones (Mamour : Poco X7 Pro Mamour / Eric : Poco X7 Pro) et
# calculant un statut de présence combiné (couleur + nombre) pour
# l'affichage sur le dashboard Wi-Fi/Présence.
#
# ## 🧮 CALCUL & SOURCES :
# - sensor.mamour_network_type → 'wifi' ou autre
# - sensor.mamour_wi_fi_connection → SSID 'Module B.E.R.Y.L.'
# - sensor.eric_network_type → 'wifi' ou autre
# - sensor.eric_wi_fi_connection → SSID 'Module B.E.R.Y.L.'
# - Résultat : true / wifi_!? / false par téléphone
# - etat_wifi_maison : 0 / "Mamour" / "Eric" / 2 + attribut couleur
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Le SSID 'Freebox_GG' est codé en dur — à mettre à jour si changement
#   de box ou de nom réseau.
# - wifi_!? signifie connecté en Wi-Fi mais PAS sur le bon réseau (voisin).
# - Dépend de l'intégration Companion App (HA) sur chaque téléphone.
#   Sans l'app active en background, les sensors peuvent être 'unavailable'.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - WIFI_PRESENCE (Page Home — vignette présence Wi-Fi, bubble-card)

- sensor:
    # ┌───────────────────────────────────┐
    # │ WiFi                              │
    # └───────────────────────────────────┘
    # --- condition_mamour_wifi ---
    - name: "Condition Mamour Wifi"
      unique_id: condition_mamour_wifi
      state: >-
        {% if is_state('sensor.mamour_network_type', 'wifi') %}
          {% if states('sensor.mamour_wi_fi_connection') in ['Module B.E.R.Y.L. [GG-5.0]', 'Module B.E.R.Y.L. [GG-2.4]'] %}
            true
          {% else %}
            wifi_!?
          {% endif %}
        {% else %}
          false
        {% endif %}

    # --- condition_eric_wifi ---
    - name: "Condition Eric Wifi"
      unique_id: condition_eric_wifi
      state: >-
        {% if is_state('sensor.eric_network_type', 'wifi') %}
          {% if states('sensor.eric_wi_fi_connection') in ['Module B.E.R.Y.L. [GG-5.0]', 'Module B.E.R.Y.L. [GG-2.4]'] %}
            true
          {% else %}
            wifi_!?
          {% endif %}
        {% else %}
          false
        {% endif %}

    # --- etat_wifi_maison ---
    - name: "État WiFi Maison"
      unique_id: etat_wifi_maison
      state: >-
        {% set mamour = is_state('sensor.condition_mamour_wifi', 'true') %}
        {% set eric = is_state('sensor.condition_eric_wifi', 'true') %}
        {% if mamour and eric %}
          2
        {% elif mamour and not eric %}
          Mamour
        {% elif eric and not mamour %}
          Eric
        {% else %}
          0
        {% endif %}
      attributes:
        couleur: >-
          {% set mamour = is_state('sensor.condition_mamour_wifi', 'true') %}
          {% set eric = is_state('sensor.condition_eric_wifi', 'true') %}
          {% if mamour and eric %}
            green
          {% elif mamour and not eric %}
            orange
          {% elif eric and not mamour %}
            gold
          {% else %}
            red
          {% endif %}

# annotations_log:
# - [L1-3] Mise en forme du titre principal (Boîte ASCII arrondie 74 car).
# - [L6-8] Ajout du titre secondaire (Boîte ASCII carrée 37 car).
# - [L9,23,37] Ajout des titres tertiaires (slugs).
# - [Global] Fusion des blocs sensor et standardisation de l'indentation.

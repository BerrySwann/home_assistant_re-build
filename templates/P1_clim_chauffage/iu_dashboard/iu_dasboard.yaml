# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ TEMPLATES : CLIMATISATION & CHAUFFAGE — POWER STATUS ET ÉTATS                │
# ╰──────────────────────────────────────────────────────────────────────────────╯
- sensor:

    # ┌───────────────────────────────────┐
    # │ 4. SALON                          │
    # └───────────────────────────────────┘
    # --- salon_power_status ---
    - name: "Salon Power Status"
      unique_id: salon_power_status
      state: >
        {% if states('sensor.clim_salon_nous_power') | float(0) > 50 %}
          on
        {% else %}
          off
        {% endif %}

    # --- salon_power_locks ---
    - name: "Salon Power Lock"
      unique_id: salon_power_locks
      state: >
        {% if states('sensor.clim_salon_nous_power') | float(0) >= 5 %}
          on
        {% else %}
          off
        {% endif %}

    # --- salon_power_status_affichage ---
    - name: "Salon Power Status_Affichage"
      unique_id: salon_power_status_affichage
      state: >
        {% if states('sensor.clim_salon_nous_power') | float(0) > 1 %}
          on
        {% else %}
          off
        {% endif %}

    # --- clim_salon_etat ---
    - name: "Clim Salon État"
      unique_id: clim_salon_etat
      state: >
        {% if is_state('climate.clim_salon_rm4_mini', 'off') %} Off
        {% elif is_state('climate.clim_salon_rm4_mini', 'cool') %} Cool
        {% elif is_state('climate.clim_salon_rm4_mini', 'heat') %} Heat
        {% elif is_state('climate.clim_salon_rm4_mini', 'fan_only') %} Fan
        {% else %} Erreur {% endif %}


    # ┌───────────────────────────────────┐
    # │ 5. CUISINE                        │
    # └───────────────────────────────────┘
    # --- cuisine_power_status ---
    - name: "Cuisine Power Status"
      unique_id: cuisine_power_status
      state: >
        {% if states('sensor.radiateur_elec_cuisine_power') | float(0) > 50 %}
          on
        {% else %}
          off
        {% endif %}

    # --- cuisine_power_status_affichage ---
    - name: "Cuisine Power Status Affichage"
      unique_id: cuisine_power_status_affichage
      state: >
        {% if states('sensor.radiateur_elec_cuisine_power') | float(0) > 1 %}
          on
        {% else %}
          off
        {% endif %}

    # --- radiateur_cuisine_etat ---
    - name: "Radiateur Cuisine État"
      unique_id: radiateur_cuisine_etat
      state: >
        {% if is_state('climate.radiateur_cuisine', 'off') %} Off
        {% elif is_state('climate.radiateur_cuisine', 'heat') %} Heat
        {% else %} Erreur {% endif %}


    # ┌───────────────────────────────────┐
    # │ 7. BUREAU                         │
    # └───────────────────────────────────┘
    # --- bureau_power_status ---
    - name: "Bureau Power Status"
      unique_id: bureau_power_status
      state: >
        {% if states('sensor.clim_bureau_nous_power') | float(0) > 50 %}
          on
        {% else %}
          off
        {% endif %}

    # --- bureau_power_locks ---
    - name: "Bureau Power Lock"
      unique_id: bureau_power_locks
      state: >
        {% if states('sensor.clim_bureau_nous_power') | float(0) >= 9 %}
          on
        {% else %}
          off
        {% endif %}

    # --- bureau_power_status_affichage ---
    - name: "Bureau Power Status Affichage"
      unique_id: bureau_power_status_affichage
      state: >
        {% if states('sensor.clim_bureau_nous_power') | float(0) > 1 %}
          on
        {% else %}
          off
        {% endif %}

    # --- clim_bureau_etat ---
    - name: "Clim Bureau État"
      unique_id: clim_bureau_etat
      state: >
        {% if is_state('climate.clim_bureau_rm4_mini', 'off') %} Off
        {% elif is_state('climate.clim_bureau_rm4_mini', 'cool') %} Cool
        {% elif is_state('climate.clim_bureau_rm4_mini', 'heat') %} Heat
        {% elif is_state('climate.clim_bureau_rm4_mini', 'fan_only') %} Fan
        {% else %} Erreur {% endif %}


    # ┌───────────────────────────────────┐
    # │ 8. SALLE DE BAIN                  │
    # └───────────────────────────────────┘
    # 8.1 --- Soufflant ---
    # --- sdb_soufflant_power_status ---
    - name: "SdB Soufflant Power Status"
      unique_id: sdb_soufflant_power_status
      state: >
        {% if states('sensor.prise_soufflant_salle_de_bain_nous_power') | float(0) > 20 %}
          on
        {% else %}
          off
        {% endif %}

    # --- sdb_power_status_affichage ---
    - name: "SdB Power Status Affichage"
      unique_id: sdb_power_status_affichage
      state: >
        {% if states('sensor.prise_soufflant_salle_de_bain_nous_power') | float(0) > 1 %}
          on
        {% else %}
          off
        {% endif %}

    # --- sdb_soufflant_power_etat ---
    - name: "SdB Soufflant Etat"
      unique_id: sdb_soufflant_etat
      state: >
        {% if states('sensor.prise_soufflant_salle_de_bain_nous_power') | float(0) >= 20 %} Heat
        {% else %} Off {% endif %}

    # 8.2 --- Sèche-Serviettes ---
    # --- sdb_seche_serviettes_power_status ---
    - name: "SdB Sèche-Serviette Power Status"
      unique_id: sdb_seche_serviette_power_status
      state: >
        {% if states('sensor.prise_seche_serviette_salle_de_bain_nous_power') | float(0) > 20 %}
          on
        {% else %}
          off
        {% endif %}

    # --- sdb_seche_serviettes_power_status_affichage ---
    - name: "SdB Sèche-Serviette Power Status Affichage"
      unique_id: sdb_seche_serviette_power_status_affichage
      state: >
        {% if states('sensor.prise_seche_serviette_salle_de_bain_nous_power') | float(0) > 1 %}
          on
        {% else %}
          off
        {% endif %}

    # --- sdb_seche_serviettes_etat ---
    - name: "SdB Sèche Serviette État"
      unique_id: sdb_seche_serviette_etat
      state: >
        {% if states('sensor.prise_seche_serviette_salle_de_bain_nous_power') | float(0) >= 20 %} Heat
        {% else %} Off {% endif %}


    # ┌───────────────────────────────────┐
    # │ 9. CHAMBRE                        │
    # └───────────────────────────────────┘
    # --- chambre_power_status ---
    - name: "Chambre Power Status"
      unique_id: chambre_power_status
      state: >
        {% if states('sensor.clim_chambre_nous_power') | float(0) > 50 %}
          on
        {% else %}
          off
        {% endif %}

    # --- chambre_power_locks ---
    - name: "Chambre Power Lock"
      unique_id: chambre_power_locks
      state: >
        {% if states('sensor.clim_chambre_nous_power') | float(0) >= 9 %}
          on
        {% else %}
          off
        {% endif %}

    # --- chambre_power_status_affichage ---
    - name: "Chambre Power Status Affichage"
      unique_id: chambre_power_status_affichage
      state: >
        {% if states('sensor.clim_chambre_nous_power') | float(0) > 1 %}
          on
        {% else %}
          off
        {% endif %}

    # --- clim_chambre_etat ---
    - name: "Clim Chambre État"
      unique_id: clim_chambre_etat
      state: >
        {% if is_state('climate.clim_chambre_rm4_mini', 'off') %} Off
        {% elif is_state('climate.clim_chambre_rm4_mini', 'cool') %} Cool
        {% elif is_state('climate.clim_chambre_rm4_mini', 'heat') %} Heat
        {% elif is_state('climate.clim_chambre_rm4_mini', 'fan_only') %} Fan
        {% else %} Erreur {% endif %}


    # ┌───────────────────────────────────┐
    # │ 10. AUTRE : LOGIQUE GLOBALE       │
    # └───────────────────────────────────┘
    # --- mode_ete_hiver_etat ---
    - name: "Mode été Hiver État"
      unique_id: mode_ete_hiver_etat
      state: >
        {% set m = states('sensor.mode_ete_hiver') %}
        {% if m == 'cool' %} Cool
        {% elif m == 'heat' %} Heat
        {% elif m == 'fan_only' %} Fan
        {% else %} Off {% endif %}
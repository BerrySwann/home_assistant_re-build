# ╭──────────────────────────────────────────────────────────────────────────╮
# │ TEMPLATES : SÉRIE 03_07. CLIM — MESSAGE PERSONNALISÉ (7h30 <-> 21h00)    │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Template sensor générant le message texte envoyé via notification mobile lors des
# changements d'état de la clim en plage jour (7h30 → 21h00). Le message intègre
# la tendance de température extérieure, la présence, et le scénario groupe actif
# (groupe_1 = absent, groupe_2/3/4 = présences avec températures personnalisées).
#
# ## 🧮 CALCUL & SOURCES :
# - sensor.th_balcon_nord_temperature_trend (increasing / decreasing / stable)
# - sensor.groupe → groupe_1 / groupe_2 / groupe_3 / groupe_4
# - sensor.presence → texte de présence affiché en en-tête du message
# - sensor.mode_ete_hiver → heat / cool / fan_only
# - sensor.temperature_corrige_mamour / sensor.temperature_corrige_eric
# - sensor.temperature_corrige_Chambre: 
# - sensor.temperature_eco_hiver_corrige / sensor.temperature_eco_ete_corrige
# - switch.clim_*_nous → vérifie alimentation de chaque unité
#
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL       | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                             | AVAL                                |
# |:---------------|:---------------------------------------------------|:---------------------------------------------------|:------------------------------------|
# | [calculé]      | sensor.clim_*_temperature_cible / climate.*        | message_clim_personnalise_7h30_21h00               | L1C3 Commandes Clim (notifications) |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ce fichier produit : sensor.message_clim_personnalise_7h30_21h00
# - Disponibilité conditionnée à la présence des 5 capteurs réseau/T°.
# - Ne pas confondre avec le fichier nuit (21h → 7h30) qui utilise temp_nuit.
# - Les sauts de ligne \n dans les messages sont intentionnels pour l'affichage mobile.
# - Labels pré-calculés s_*/b_*/c_* AVANT le bloc groupe → Mode: [OFF] si prise coupée.
# - Les branches groupe/mode reflètent EXACTEMENT t_*_target du script
#   p1_master_gestion_clim (aligné 2026-07-20) — toute modif du script doit
#   être répercutée ici (et dans le fichier nuit P1_03).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Déclenché par automation L1C3 (notification clim 7h30-21h)
# - Indirect : remonte dans la notification mobile via automation D_notif_temp_jour.yaml

- sensor:

# ┌───────────────────────────────────────────────────────┐
# │ 10. AUTRE : GÉNÉRATEUR DE MESSAGE (LOGIQUE SCÉNARIOS)  │
# └───────────────────────────────────────────────────────┘

# --- message_clim_personnalise_7h30_21h00 ---
    - name: "Message Clim Personnalise 7h30 <-> 21h00"
      unique_id: message_clim_personnalise_7h30_21h00
      state: >
        {%- if states('sensor.mamour_network_type') in ['unknown', 'unavailable'] or
              states('sensor.eric_network_type') in ['unknown', 'unavailable'] or
              states('sensor.th_balcon_nord_temperature') in ['unknown', 'unavailable'] or
              states('sensor.groupe') in ['unknown', 'unavailable'] or
              states('sensor.presence') in ['unknown', 'unavailable'] %}
          En attente des capteurs...
        {%- else %}
          {%- set tendance     = states('sensor.th_balcon_nord_temperature_trend') %}
          {%- set temp_ext     = states('sensor.th_balcon_nord_temperature') | float(0) %}
          {%- set temp_conf_m  = states('sensor.temperature_corrige_mamour') | float(20) %}
          {%- set temp_conf_e  = states('sensor.temperature_corrige_eric') | float(18) %}
          {%- set temp_conf_c  = states('sensor.temperature_corrige_chambre') | float(18) %}
          {%- set temp_eco     = states('sensor.temperature_eco_hiver_corrige') | float(17) %}
          {%- set temp_eco_ete = states('sensor.temperature_eco_ete_corrige') | float(28) %}
          {%- set mode         = states('sensor.mode_ete_hiver') %}
          {%- set groupe       = states('sensor.groupe') %}
          {%- set presence     = states('sensor.presence') %}
          {%- set prise_salon   = is_state('switch.clim_salon_nous', 'on') %}
          {%- set prise_bureau  = is_state('switch.clim_bureau_nous', 'on') %}
          {%- set prise_chambre = is_state('switch.clim_chambre_nous', 'on') %}
          {%- set clims_alimentees = prise_salon or prise_bureau or prise_chambre %}

          {#- Pré-calcul labels par prise — Mode: [OFF] si prise coupée -#}
          {%- set s_eco    = "Mode: [OFF]" if not prise_salon   else temp_eco     ~ "°" %}
          {%- set s_eco_e  = "Mode: [OFF]" if not prise_salon   else temp_eco_ete ~ "°" %}
          {%- set s_conf_m = "Mode: [OFF]" if not prise_salon   else temp_conf_m  ~ "°" %}
          {%- set s_conf_e = "Mode: [OFF]" if not prise_salon   else temp_conf_e  ~ "°" %}
          {%- set b_eco    = "Mode: [OFF]" if not prise_bureau  else temp_eco     ~ "°" %}
          {%- set b_eco_e  = "Mode: [OFF]" if not prise_bureau  else temp_eco_ete ~ "°" %}
          {%- set b_conf_e = "Mode: [OFF]" if not prise_bureau  else temp_conf_e  ~ "°" %}
          {%- set c_eco    = "Mode: [OFF]" if not prise_chambre else temp_eco     ~ "°" %}
          {%- set c_eco_e  = "Mode: [OFF]" if not prise_chambre else temp_eco_ete ~ "°" %}
          {%- set c_conf_c = "Mode: [OFF]" if not prise_chambre else temp_conf_c  ~ "°" %}
          {%- set s_fan    = "Mode: [OFF]" if not prise_salon   else "[FAN]" %}
          {%- set b_fan    = "Mode: [OFF]" if not prise_bureau  else "[FAN]" %}
          {%- set c_fan    = "Mode: [OFF]" if not prise_chambre else "[FAN]" %}
          {%- set s_off    = "Mode: [OFF]" %}
          {%- set b_off    = "Mode: [OFF]" %}
          {%- set c_off    = "Mode: [OFF]" %}

          {# --- PARTIE 1 : TENDANCE --- #}
          {%- if tendance == 'increasing' %}
            {%- set message_tendance = "T°Ext Up ↗ " ~ temp_ext ~ "°" %}
          {%- elif tendance == 'decreasing' %}
            {%- set message_tendance = "T°Ext Down ↘ " ~ temp_ext ~ "°" %}
          {%- else %}
            {%- set message_tendance = "T°Ext stable → " ~ temp_ext ~ "°" %}
          {%- endif %}

          {# --- PARTIE 2 : HEADER --- EN-TÊTE --- #}
          {%- set message_header = presence %}

          {# --- PARTIE 3 : MODE --- SCÉNARIO STANDARD --- #}
          {%- if not clims_alimentees %}
            {%- set message_mode = "Mode: [UNITS OFF]" %}
          {%- else %}

            {%- if 'groupe_1' in groupe %}
              {%- if mode == 'heat' %}
                {%- set message_mode = "Mode: [ECO HEAT]\nSalon: " ~ s_eco ~ "\nBureau: " ~ b_eco ~ "\nChambre: " ~ c_eco %}
              {%- elif mode == 'cool' %}
                {%- set message_mode = "Mode: [ECO COOL]\nSalon: " ~ s_eco_e ~ "\nBureau: " ~ b_eco_e ~ "\nChambre: " ~ c_eco_e %}
              {%- elif mode == 'fan_only' %}
                {%- set message_mode = "Mode: [FAN ONLY]\nSalon: " ~ s_fan ~ "\nBureau: " ~ b_fan ~ "\nChambre: " ~ c_fan %}
              {%- elif mode == 'off' %}
                {%- set message_mode = "Mode: [OFF]\nSalon: " ~ s_off ~ "\nBureau: " ~ b_off ~ "\nChambre: " ~ c_off %}
              {%- else %}
                {%- set message_mode = "Mode clim inconnu" %}
              {%- endif %}

            {%- elif 'groupe_2' in groupe %}
              {%- if mode == 'heat' %}
                {%- set message_mode = "Mode: [HEAT]\nSalon: " ~ s_conf_m ~ "\nBureau: " ~ b_eco ~ "\nChambre: " ~ c_conf_c %}
              {%- elif mode == 'cool' %}
                {%- set message_mode = "Mode: [COOL]\nSalon: " ~ s_conf_m ~ "\nBureau: " ~ b_eco_e ~ "\nChambre: " ~ c_conf_c %}
              {%- elif mode == 'fan_only' %}
                {%- set message_mode = "Mode: [FAN ONLY]\nSalon: " ~ s_fan ~ "\nBureau: " ~ b_fan ~ "\nChambre: " ~ c_fan %}
              {%- elif mode == 'off' %}
                {%- set message_mode = "Mode: [OFF]\nSalon: " ~ s_off ~ "\nBureau: " ~ b_off ~ "\nChambre: " ~ c_off %}
              {%- else %}
                {%- set message_mode = "Mode clim inconnu" %}
              {%- endif %}

            {%- elif 'groupe_3' in groupe %}
              {%- if mode == 'heat' %}
                {%- set message_mode = "Mode: [HEAT]\nSalon: " ~ s_conf_e ~ "\nBureau: " ~ b_conf_e ~ "\nChambre: " ~ c_conf_c %}
              {%- elif mode == 'cool' %}
                {%- set message_mode = "Mode: [COOL]\nSalon: " ~ s_conf_e ~ "\nBureau: " ~ b_conf_e ~ "\nChambre: " ~ c_conf_c %}
              {%- elif mode == 'fan_only' %}
                {%- set message_mode = "Mode: [FAN ONLY]\nSalon: " ~ s_fan ~ "\nBureau: " ~ b_fan ~ "\nChambre: " ~ c_fan %}
              {%- elif mode == 'off' %}
                {%- set message_mode = "Mode: [OFF]\nSalon: " ~ s_off ~ "\nBureau: " ~ b_off ~ "\nChambre: " ~ c_off %}
              {%- else %}
                {%- set message_mode = "Mode clim inconnu" %}
              {%- endif %}

            {%- elif 'groupe_4' in groupe %}
              {%- if mode == 'heat' %}
                {%- set message_mode = "Mode: [HEAT]\nSalon: " ~ s_conf_m ~ "\nBureau: " ~ b_conf_e ~ "\nChambre: " ~ c_conf_c %}
              {%- elif mode == 'cool' %}
                {%- set message_mode = "Mode: [COOL]\nSalon: " ~ s_conf_m ~ "\nBureau: " ~ b_conf_e ~ "\nChambre: " ~ c_conf_c %}
              {%- elif mode == 'fan_only' %}
                {%- set message_mode = "Mode: [FAN ONLY]\nSalon: " ~ s_fan ~ "\nBureau: " ~ b_fan ~ "\nChambre: " ~ c_fan %}
              {%- elif mode == 'off' %}
                {%- set message_mode = "Mode: [OFF]\nSalon: " ~ s_off ~ "\nBureau: " ~ b_off ~ "\nChambre: " ~ c_off %}
              {%- else %}
                {%- set message_mode = "Mode clim inconnu" %}
              {%- endif %}

            {%- else %}
              {%- set message_mode = "Scenario groupe non gere" %}
            {%- endif %}
          {%- endif %}

          {# --- ASSEMBLAGE FINAL --- #}
          {{ message_header }}
          {{ message_tendance }}
          {{ message_mode }}
        {%- endif %}

      availability: >
        {{ states('sensor.mamour_network_type') not in ['unknown', 'unavailable'] and
            states('sensor.eric_network_type') not in ['unknown', 'unavailable'] and
            states('sensor.th_balcon_nord_temperature') not in ['unknown', 'unavailable'] and
            states('sensor.groupe') not in ['unknown', 'unavailable'] and
            states('sensor.presence') not in ['unknown', 'unavailable'] }}

# annotations_log:
# [FIX] 2026-07-20 : correction Ctrl+H malheureux ("Bureau"→"Bureau: ", "Chambre"→"Chambre: ", "Salon"→"Salon:")
#       qui avait cassé : entity_id (switch.clim_Bureau:_nous, switch.clim_Chambre:_nous,
#       sensor.temperature_corrige_Chambre: → syntaxe entity_id invalide, ":" interdit),
#       noms de variables Jinja (prise_Salon:, prise_Bureau:, prise_Chambre: → erreur de
#       compilation du template, ":" interdit dans un nom de variable),
#       et espacement du texte affiché ("Bureau:  " double espace → "Bureau: " simple).
# [SIMPLIF] s_off/b_off/c_off étaient devenus des tautologies conditionnelles inutiles
#           après la casse (toujours "Mode: [OFF]" dans les deux branches) — simplifiées
#           en constantes. Comportement fonctionnel inchangé.
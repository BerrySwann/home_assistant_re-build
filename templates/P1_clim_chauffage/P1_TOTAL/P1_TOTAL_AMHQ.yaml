# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1. TEMPLATES : TOTAUX ÉNERGIE (kWh) & PUISSANCE P1 — AMHQ          │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template agrégeant les 6 équipements P1 en 5 capteurs de synthèse :
# - Énergie totale × 4 périodes AMHQ (kWh, somme des UM individuels)
# - Puissance instantanée totale (W, somme des capteurs hardware)
# NB : Les avg_watts totaux sont dans P1_AVG/P1_AVG_TOTAL_AMHQ.yaml.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources kWh : sensor.*_{période}_kwh_um (P1_UM_AMHQ.yaml)
# - Puissance   : sensor.*_nous_power / sensor.*_power (hardware NOUS)
# - Formule     : somme des 6 capteurs UM de la même période
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ces capteurs sont des ORPHELINS : pas de propre UM créé pour ces totaux.
#   Les unique_ids n'ont PAS de suffixe _kwh_um (ce ne sont pas des outputs UM).
# - Ne pas confondre avec P1_AVG_TOTAL_AMHQ.yaml (puissances moyennes W).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C2 Conso Énergie Clim/Radiateur/Soufflant (totaux kWh et puissance)

- sensor:

    # ┌─────────────────────────────────────┐
    # │ TOTAL P1 kWh — QUOTIDIEN            │
    # └─────────────────────────────────────┘

    # --- conso_clim_rad_total_quotidien ---
    - name: "Conso. Clim. Rad. Total QUOTIDIEN"
      unique_id: conso_clim_rad_total_quotidien
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_quotidien_kwh_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_quotidien_kwh_um') | float(0) +
          states('sensor.clim_bureau_quotidien_kwh_um') | float(0) +
          states('sensor.soufflant_sdb_quotidien_kwh_um') | float(0) +
          states('sensor.seche_serviette_sdb_quotidien_kwh_um') | float(0) +
          states('sensor.clim_chambre_quotidien_kwh_um') | float(0)) | round(3) }}

    # ┌─────────────────────────────────────┐
    # │ TOTAL P1 kWh — MENSUEL              │
    # └─────────────────────────────────────┘

    # --- conso_clim_rad_total_mensuel ---
    - name: "Conso. Clim. Rad. Total MENSUEL"
      unique_id: conso_clim_rad_total_mensuel
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_mensuel_kwh_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_mensuel_kwh_um') | float(0) +
          states('sensor.clim_bureau_mensuel_kwh_um') | float(0) +
          states('sensor.soufflant_sdb_mensuel_kwh_um') | float(0) +
          states('sensor.seche_serviette_sdb_mensuel_kwh_um') | float(0) +
          states('sensor.clim_chambre_mensuel_kwh_um') | float(0)) | round(3) }}

    # ┌─────────────────────────────────────┐
    # │ TOTAL P1 kWh — HEBDOMADAIRE         │
    # └─────────────────────────────────────┘

    # --- conso_clim_rad_total_hebdomadaire ---
    - name: "Conso. Clim. Rad. Total HEBDOMADAIRE"
      unique_id: conso_clim_rad_total_hebdomadaire
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_hebdomadaire_kwh_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_hebdomadaire_kwh_um') | float(0) +
          states('sensor.clim_bureau_hebdomadaire_kwh_um') | float(0) +
          states('sensor.soufflant_sdb_hebdomadaire_kwh_um') | float(0) +
          states('sensor.seche_serviette_sdb_hebdomadaire_kwh_um') | float(0) +
          states('sensor.clim_chambre_hebdomadaire_kwh_um') | float(0)) | round(3) }}

    # ┌─────────────────────────────────────┐
    # │ TOTAL P1 kWh — ANNUEL               │
    # └─────────────────────────────────────┘

    # --- conso_clim_rad_total_annuel ---
    - name: "Conso. Clim. Rad. Total ANNUEL"
      unique_id: conso_clim_rad_total_annuel
      device_class: energy
      unit_of_measurement: "kWh"
      state: >
        {{ (states('sensor.clim_salon_annuel_kwh_um') | float(0) +
          states('sensor.radiateur_elec_cuisine_annuel_kwh_um') | float(0) +
          states('sensor.clim_bureau_annuel_kwh_um') | float(0) +
          states('sensor.soufflant_sdb_annuel_kwh_um') | float(0) +
          states('sensor.seche_serviette_sdb_annuel_kwh_um') | float(0) +
          states('sensor.clim_chambre_annuel_kwh_um') | float(0)) | round(3) }}

    # ┌─────────────────────────────────────┐
    # │ TOTAL P1 — PUISSANCE INSTANTANÉE    │
    # └─────────────────────────────────────┘

    # --- conso_clim_rad_total ---
    - name: "Conso Clim Rad Total"
      unique_id: conso_clim_rad_total
      device_class: power
      unit_of_measurement: "W"
      state: >
        {{ (states('sensor.clim_salon_nous_power') | float(0) +
          states('sensor.radiateur_elec_cuisine_power') | float(0) +
          states('sensor.clim_bureau_nous_power') | float(0) +
          states('sensor.prise_soufflant_salle_de_bain_nous_power') | float(0) +
          states('sensor.prise_seche_serviette_salle_de_bain_nous_power') | float(0) +
          states('sensor.clim_chambre_nous_power') | float(0)) | round(3) }}

# annotations_log:
# [L1] avg_watts extraits → P1_AVG/P1_AVG_TOTAL_AMHQ.yaml (règle 1 fonction = 1 fichier)
# [L2] +hebdomadaire : conso_clim_rad_total_hebdomadaire (sources *_hebdomadaire_kwh_um ×6)
# [L3] +annuel       : conso_clim_rad_total_annuel (sources *_annuel_kwh_um ×6)
# Total : 5 sensors (4 kWh AMHQ + 1 puissance instantanée)

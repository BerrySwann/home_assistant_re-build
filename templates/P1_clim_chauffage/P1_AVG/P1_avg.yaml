# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1. TEMPLATE : PUISSANCE MOYENNE (W) CHAUFFAGE & CLIM — AMHQ        │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template calculant la puissance moyenne glissante (W) de chaque
# équipement chauffage/clim sur 2 périodes : quotidien (depuis minuit) et
# mensuel (depuis le 1er du mois). Couvre 5 pièces : Salon, Cuisine,
# Bureau, SDB (soufflant + sèche-serviette), Chambre.
#
# ## 🧮 CALCUL & SOURCES :
# - Formule quotidien : (kWh_UM × 1000) / heures_écoulées_depuis_minuit
# - Formule mensuel  : (kWh_UM × 1000) / heures_écoulées_depuis_le_1er
# - Sources UM : sensor.[equipement]_quotidien/mensuel_kwh_um
#   (utility_meter/P1_clim_chauffage/P1_UM_AMHQ.yaml)
# - Garde division zéro : if h > 0.1 else 0
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - En début de journée (h < 0.1h soit < 6 min), retourne 0 — normal.
# - La puissance moyenne W ≠ puissance instantanée. Ne pas utiliser pour
#   des alertes de surcharge (utiliser sensor.[equipement]_nous_power).
# - Les UM sources doivent être chargés AVANT ce template dans HA.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C2 Conso Énergie Clim/Radiateur/Soufflant (puissance de croisière W)

- sensor:
    # ==========================================================================
    # PÔLE 1. CHAUFFAGE / CLIM
    # ==========================================================================

    # ┌───────────────────────────────────┐
    # │ 4. SALON                          │
    # └───────────────────────────────────┘
    # --- clim_salon_avg_watts_quotidien ---
    - name: "Clim Salon Avg Watts Quotidien"
      unique_id: clim_salon_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_quotidien_kwh_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_salon_avg_watts_mensuel ---
    - name: "Clim Salon Avg Watts Mensuel"
      unique_id: clim_salon_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_mensuel_kwh_um') | float(0) %}
        {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

    # ┌───────────────────────────────────┐
    # │ 5. CUISINE                        │
    # └───────────────────────────────────┘
    # --- radiateur_elec_cuisine_avg_watts_quotidien ---
    - name: "Radiateur Elec Cuisine Avg Watts Quotidien"
      unique_id: radiateur_elec_cuisine_avg_watts_quotidien  # [L1] modif — était: radiateur_cuisine_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.radiateur_elec_cuisine_quotidien_kwh_um') | float(0) %}  # [L2] modif — était: sensor.radiateur_cuisine_quotidien_kwh_um
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- radiateur_elec_cuisine_avg_watts_mensuel ---
    - name: "Radiateur Elec Cuisine Avg Watts Mensuel"
      unique_id: radiateur_elec_cuisine_avg_watts_mensuel    # [L3] modif — était: radiateur_cuisine_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.radiateur_elec_cuisine_mensuel_kwh_um') | float(0) %}    # [L4] modif — était: sensor.radiateur_cuisine_mensuel_kwh_um
        {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

    # ┌───────────────────────────────────┐
    # │ 7. BUREAU                         │
    # └───────────────────────────────────┘
    # --- clim_bureau_avg_watts_quotidien ---
    - name: "Clim Bureau Avg Watts Quotidien"
      unique_id: clim_bureau_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_bureau_quotidien_kwh_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_bureau_avg_watts_mensuel ---
    - name: "Clim Bureau Avg Watts Mensuel"
      unique_id: clim_bureau_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_bureau_mensuel_kwh_um') | float(0) %}
        {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

    # ┌───────────────────────────────────┐
    # │ 8. SDB                            │
    # └───────────────────────────────────┘
    # --- soufflant_sdb_avg_watts_quotidien ---
    - name: "Soufflant Sdb Avg Watts Quotidien"
      unique_id: soufflant_sdb_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.soufflant_sdb_quotidien_kwh_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- soufflant_sdb_avg_watts_mensuel ---
    - name: "Soufflant Sdb Avg Watts Mensuel"
      unique_id: soufflant_sdb_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.soufflant_sdb_mensuel_kwh_um') | float(0) %}
        {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

    # --- seche_serviette_sdb_avg_watts_quotidien ---
    - name: "Seche Serviette Sdb Avg Watts Quotidien"
      unique_id: seche_serviette_sdb_avg_watts_quotidien     # [L5] modif — était: seche_serv_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.seche_serviette_sdb_quotidien_kwh_um') | float(0) %}    # [L6] modif — était: sensor.seche_serv_quotidien_kwh_um
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- seche_serviette_sdb_avg_watts_mensuel ---
    - name: "Seche Serviette Sdb Avg Watts Mensuel"
      unique_id: seche_serviette_sdb_avg_watts_mensuel       # [L7] modif — était: seche_serv_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.seche_serviette_sdb_mensuel_kwh_um') | float(0) %}      # [L8] modif — était: sensor.seche_serv_mensuel_kwh_um
        {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

    # ┌───────────────────────────────────┐
    # │ 9. CHAMBRE                        │
    # └───────────────────────────────────┘
    # --- clim_chambre_avg_watts_quotidien ---
    - name: "Clim Chambre Avg Watts Quotidien"
      unique_id: clim_chambre_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_chambre_quotidien_kwh_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_chambre_avg_watts_mensuel ---
    - name: "Clim Chambre Avg Watts Mensuel"
      unique_id: clim_chambre_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_chambre_mensuel_kwh_um') | float(0) %}
        {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}


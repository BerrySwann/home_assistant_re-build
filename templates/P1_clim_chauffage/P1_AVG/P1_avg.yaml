# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 1. TEMPLATE : PUISSANCE MOYENNE (W) CHAUFFAGE & CLIM — AMHQ        │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template calculant la puissance moyenne glissante (W) de chaque
# équipement chauffage/clim sur 4 périodes AMHQ : annuel, mensuel, hebdo,
# quotidien. Couvre 5 pièces : Salon, Cuisine, Bureau, SDB (soufflant +
# sèche-serviette), Chambre. 6 appareils × 4 périodes = 24 sensors.
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : (kWh_UM × 1000) / heures_écoulées_depuis_début_période
# - Quotidien  : heures depuis minuit
# - Mensuel    : heures depuis le 1er du mois
# - Hebdo      : heures depuis lundi 00h00 (weekday() = 0 = lundi)
# - Annuel     : heures depuis le 1er janvier 00h00
# - Sources UM : sensor.[equipement]_{période}_kwh_um (P1_UM_AMHQ.yaml)
# - Garde division zéro : if h > 0.1 else 0
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - En début de période (h < 0.1), retourne 0 — normal.
# - Puissance moyenne W ≠ puissance instantanée.
# - Les UM sources doivent être chargés AVANT ce template dans HA.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C2 Conso Énergie Clim/Radiateur/Soufflant (puissance de croisière W)

- sensor:
    # ==========================================================================
    # PÔLE 1. CHAUFFAGE / CLIM
    # ==========================================================================

    # ┌───────────────────────────────────┐
    # │ 4. SALON                          │
    # └───────────────────────────────────┘

    # --- clim_salon_avg_watts_quotidien ---
    - name: "Clim Salon Avg Watts Quotidien"
      unique_id: clim_salon_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_quotidien_kwh_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_salon_avg_watts_mensuel ---
    - name: "Clim Salon Avg Watts Mensuel"
      unique_id: clim_salon_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_mensuel_kwh_um') | float(0) %}
        {% set h = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_salon_avg_watts_hebdomadaire ---
    - name: "Clim Salon Avg Watts Hebdomadaire"
      unique_id: clim_salon_avg_watts_hebdomadaire
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_hebdomadaire_kwh_um') | float(0) %}
        {% set h = (now().weekday() * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

    # --- clim_salon_avg_watts_annuel ---
    - name: "Clim Salon Avg Watts Annuel"
      unique_id: clim_salon_avg_watts_annuel
      unit_of_measurement: "W"
      device_class: power
      state: >
        {% set conso = states('sensor.clim_salon_annuel_kwh_um') | float(0) %}
        {% set debut = now().replace(month=1, day=1, hour=0, minute=0, second=0, microsecond=0) %}
        {% set h = (now() - debut).total_seconds() / 3600 %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}


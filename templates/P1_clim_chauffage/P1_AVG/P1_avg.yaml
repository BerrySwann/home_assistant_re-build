# annotations_log:
# [L1] +hebdomadaire ×6 : formule (now().weekday() * 24) + h + m/60
# [L2] +annuel ×6       : formule timedelta depuis now().replace(month=1, day=1, ...)
# [L3] radiateur_elec_cuisine ×4 : corrigé (était radiateur_cuisine dans TREE_ORIGINE)
# [L4] seche_serviette_sdb ×4   : corrigé (était seche_serv dans TREE_ORIGINE)
# Total : 24 sensors (6 appareils × 4 périodes AMHQ)

# ╭────────────────────────────────────────────────────────────────────────╮
# │ SENSOR : STORES — ÉTATS (SALON / BUREAU)                               │
# ╰────────────────────────────────────────────────────────────────────────╯

- sensor:
    # ┌───────────────────────────────────┐
    # │ 1. ÉTATS VIGNETTE                 │
    # └───────────────────────────────────┘

    # --- 08_1 : store_salon_status ---
    - name: "Store Salon Status"
      unique_id: store_salon_status
      state: >
        {% set pos = state_attr('cover.store_salon', 'current_position') %}
        {% if is_state('cover.store_salon', 'closed') or pos == 0 %}
          <span style="color: rgb(244,67,54); ">Fermé</span>
        {% elif is_state('cover.store_salon', 'opening') %}
          <span style="color: #FFA500; font-weight: bold;">Up</span>
        {% elif is_state('cover.store_salon', 'closing') %}
          <span style="color: #FFA500; font-weight: bold;">Down</span>
        {% elif pos == 100 %}
          <span style="color: lightgreen; ">Ouvert</span>
        {% else %}
          <span style="color: #FFA500; font-weight: bold;">Ouvert</span>
        {% endif %}

    # --- 08_2 : store_bureau_status ---
    - name: "Store Bureau Status"
      unique_id: store_bureau_status
      state: >
        {% set pos = state_attr('cover.store_bureau', 'current_position') %}
        {% if is_state('cover.store_bureau', 'closed') or pos == 0 %}
          <span style="color: rgb(244,67,54); ">Fermé</span>
        {% elif is_state('cover.store_bureau', 'opening') %}
          <span style="color: #FFA500; font-weight: bold;">Up</span>
        {% elif is_state('cover.store_bureau', 'closing') %}
          <span style="color: #FFA500; font-weight: bold;">Down</span>
        {% elif pos == 100 %}
          <span style="color: lightgreen; ">Ouvert</span>
        {% else %}
          <span style="color: #FFA500; font-weight: bold;">Ouvert</span>
        {% endif %}

# annotations_log:
# - [08_1, 08_2] Identification précise des pièces.
# - [Couleurs] Harmonisation : Fermé (Rouge), Ouvert 100% (Vert), Entre-deux/Mouvement (Orange).
# - [Style] Forçage du Bold pour alignement avec la colonne fenêtres.

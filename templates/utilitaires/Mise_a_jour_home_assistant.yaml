- sensor:
    # ┌───────────────────────────────────┐
    # │ 10. AUTRE                         │
    # └───────────────────────────────────┘
    # --- available_updates ---
    - name: "Available Updates"
      unique_id: available_updates
      icon: mdi:update
      state: >
        {{ 
          states.update
          |selectattr('state', 'eq', 'on')
          |list
          |count
        }}


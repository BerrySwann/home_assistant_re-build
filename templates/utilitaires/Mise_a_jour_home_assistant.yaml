# ╭──────────────────────────────────────────────────────────────────────────╮
# │ UTILITAIRES. TEMPLATES : SYSTÈME — MISES À JOUR DISPONIBLES              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Calcule le nombre total de mises à jour disponibles dans Home Assistant
# (Core, HACS, add-ons, intégrations) en comptant les entités du domaine
# "update" dont l'état est "on" (= mise à jour en attente).
#
# ## 🧮 CALCUL & SOURCES :
# - Source  : domaine "update" (toutes entités update.*)
# - Filtre  : state == 'on'  →  mise à jour disponible
# - Résultat: entier (0 = tout à jour / N = N mises à jour en attente)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les entités update.* "unavailable" sont ignorées par selectattr.
# - L'entité générée est sensor.available_updates (unique_id snake_case).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Sert à la remontée d'info pour la vignette : L4C3 Mises à jour HA

- sensor:
    # ┌───────────────────────────────────┐
    # │ MISE A JOUR HOME ASSISTANT        │
    # └───────────────────────────────────┘
    # --- available_updates ---
    - name: "Available Updates"
      unique_id: available_updates
      icon: mdi:update
      state: >
        {{ 
          states.update
          |selectattr('state', 'eq', 'on')
          |list
          |count
        }}


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ SENSOR : OUVERTURES — COMPTEURS FENÊTRES OUVERTES / FERMÉES              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Deux capteurs comptant le nombre de fenêtres ouvertes et fermées
# à partir des 4 capteurs de contact Sonoff (salon, cuisine, bureau, chambre).
#
# ## 🧮 CALCUL & SOURCES :
# - Sources : binary_sensor.contact_fenetre_*_sonoff_contact (natifs Sonoff)
# - Méthode : list.count(true) sur comparaisons état 'on' / 'off'
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - unique_id : nbre_de_fenetres_ouvertes (avec "nbre", PAS "nombre")
# - automations.yaml doit référencer sensor.nbre_de_fenetres_ouvertes
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L3C3 État des fenêtres + Commandes 2 stores

- sensor:
    # ┌───────────────────────────────────┐
    # │ 1. COMPTEURS                      │
    # └───────────────────────────────────┘
    # --- nbre_de_fenetres_fermees ---
    - name: "Nombre de fenêtres fermées"
      unique_id: nombre_de_fenetres_fermees
      icon: mdi:window-shutter
      state: >-
        {{
          [
            states('binary_sensor.contact_fenetre_salon_sonoff_contact') == 'off',
            states('binary_sensor.contact_fenetre_cuisine_sonoff_contact') == 'off',
            states('binary_sensor.contact_fenetre_bureau_sonoff_contact') == 'off',
            states('binary_sensor.contact_fenetre_chambre_sonoff_contact') == 'off',
          ].count(true)
        }}

    # --- nbre_de_fenetres_ouvertes ---
    - name: "Nombre de fenêtres ouvertes"
      unique_id: nombre_de_fenetres_ouvertes
      icon: mdi:window-shutter-open
      state: >-
        {{
          [
            states('binary_sensor.contact_fenetre_salon_sonoff_contact') == 'on',
            states('binary_sensor.contact_fenetre_cuisine_sonoff_contact') == 'on',
            states('binary_sensor.contact_fenetre_bureau_sonoff_contact') == 'on',
            states('binary_sensor.contact_fenetre_chambre_sonoff_contact') == 'on',
          ].count(true)
        }}


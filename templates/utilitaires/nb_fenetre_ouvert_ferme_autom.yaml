# ╭────────────────────────────────────────────────────────────────────────╮
# │ SENSOR : SÉRIE 07. OUVERTURES — COMPTES FENÊTRES                       │
# ╰────────────────────────────────────────────────────────────────────────╯

- sensor:
    # ┌───────────────────────────────────┐
    # │ 1. COMPTEURS                      │
    # └───────────────────────────────────┘
    # --- nbre_de_fenetres_fermees ---
    - name: "Nombre de fenêtres fermées"
      unique_id: nbre_de_fenetres_fermees
      icon: mdi:window-shutter
      state: >-
        {{
          [
            states('binary_sensor.contact_fenetre_salon_sonoff_contact') == 'off',
            states('binary_sensor.contact_fenetre_cuisine_sonoff_contact') == 'off',
            states('binary_sensor.contact_fenetre_bureau_sonoff_contact') == 'off',
            states('binary_sensor.contact_fenetre_chambre_sonoff_contact') == 'off',
          ].count(true)
        }}

    # --- nbre_de_fenetres_ouvertes ---
    - name: "Nombre de fenêtres ouvertes"
      unique_id: nbre_de_fenetres_ouvertes
      icon: mdi:window-shutter-open
      state: >-
        {{
          [
            states('binary_sensor.contact_fenetre_salon_sonoff_contact') == 'on',
            states('binary_sensor.contact_fenetre_cuisine_sonoff_contact') == 'on',
            states('binary_sensor.contact_fenetre_bureau_sonoff_contact') == 'on',
            states('binary_sensor.contact_fenetre_chambre_sonoff_contact') == 'on',
          ].count(true)
        }}


        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_entree_annuel_um',
          'sensor.eclairage_hue_white_lamp_table_salon_annuel_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_1_annuel_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_2_annuel_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_3_annuel_um',
          'sensor.eclairage_hue_color_candle_salon_1_annuel_um',
          'sensor.eclairage_hue_white_lamp_cuisine_annuel_um',
          'sensor.eclairage_hue_white_lamp_couloir_annuel_um',
          'sensor.eclairage_hue_play_1_pc_bureau_annuel_um',
          'sensor.eclairage_hue_play_2_pc_bureau_annuel_um',
          'sensor.eclairage_hue_play_3_pc_bureau_annuel_um',
          'sensor.eclairage_lampe_bureau_1_hue_annuel_um',
          'sensor.eclairage_lampe_bureau_2_hue_annuel_um',

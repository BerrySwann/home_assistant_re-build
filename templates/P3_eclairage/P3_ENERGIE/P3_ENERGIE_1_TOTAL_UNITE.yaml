          'sensor.eclairage_hue_white_lamp_chambre_2_annuel_um',
          'sensor.eclairage_hue_color_candle_chambre_gege_annuel_um',
          'sensor.eclairage_hue_color_candle_chambre_eric_annuel_um'
        ] %}
        {{ sensors | map('states') | select('is_number') | list | count > 0 }}

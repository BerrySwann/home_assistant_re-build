# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATE : ÉNERGIE ÉCLAIRAGE TOTAL — À L'UNITÉ (19 lampes)       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Un capteur template calculant l'énergie cumulée totale (kWh) de
# l'éclairage en additionnant les 19 _energy des ampoules physiques.
# Sert de source directe pour P3_UM_AMHQ_3_TOTAL.yaml (éclairage_total_unit_*_um).
# Remplace le Riemann sensor.eclairage_total_unit_energie_totale_kwh (supprimé).
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : somme directe des 19 sensor.[ampoule]_energy | float(0).
# - Sources : hue_white_lamp_entree, hue_white_lamp_table, hue_ambiance_lamp_salon_1/2/3,
#             hue_color_candle_salon_1, hue_white_lamp_cuisine, hue_white_lamp_couloir,
#             hue_play_1/2/3_pc_bureau, hue_white_lamp_bureau_1/2,
#             relais_lumiere_sdb_sonoff, lampe_salle_de_bain_hue,
#             hue_white_lamp_chambre_1/2, hue_color_candle_chambre_gege/eric.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL                  | CAPTEUR BRUT (source)              | CE FICHIER (unique_id)          | AVAL                              |
# |:--------------------------|:-----------------------------------|:--------------------------------|:----------------------------------|
# | Hue Bridge / Sonoff (Z2M) | sensor.*_energy (19 ampoules)      | eclairage_total_unit_energie    | P3_UM_AMHQ_3_TOTAL.yaml → L2C3   |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Valeur cumulative croissante (total_increasing) — NE JAMAIS comparer à un
#   capteur de puissance W. Ce sensor est exclusivement une source pour UM.
# - Si une ampoule n'expose pas sensor.*_energy (pas de reporting natif),
#   le | float(0) la neutralise sans planter — mais sa conso sera ignorée.
# - Pour le contrôle de cohérence en W, voir P3_POWER_1_TOTAL_UNITE.yaml.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (via P3_UM_AMHQ_3_TOTAL → eclairage_total_unit_*_um).

- sensor:

    # --- eclairage_total_unit_energie ---
    - name: "Eclairage Total Unit Energie"
      unique_id: eclairage_total_unit_energie
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{
          states('sensor.hue_white_lamp_entree_energy') | float(0) +
          states('sensor.hue_white_lamp_table_energy') | float(0) +
          states('sensor.hue_ambiance_lamp_salon_1_energy') | float(0) +
          states('sensor.hue_ambiance_lamp_salon_2_energy') | float(0) +
          states('sensor.hue_ambiance_lamp_salon_3_energy') | float(0) +
          states('sensor.hue_color_candle_salon_1_energy') | float(0) +
          states('sensor.hue_white_lamp_cuisine_energy') | float(0) +
          states('sensor.hue_white_lamp_couloir_energy') | float(0) +
          states('sensor.hue_play_1_pc_bureau_energy') | float(0) +
          states('sensor.hue_play_2_pc_bureau_energy') | float(0) +
          states('sensor.hue_play_3_pc_bureau_energy') | float(0) +
          states('sensor.hue_white_lamp_bureau_1_energy') | float(0) +
          states('sensor.hue_white_lamp_bureau_2_energy') | float(0) +
          states('sensor.relais_lumiere_sdb_sonoff_energy') | float(0) +
          states('sensor.lampe_salle_de_bain_hue_energy') | float(0) +
          states('sensor.hue_white_lamp_chambre_1_energy') | float(0) +
          states('sensor.hue_white_lamp_chambre_2_energy') | float(0) +
          states('sensor.hue_color_candle_chambre_gege_energy') | float(0) +
          states('sensor.hue_color_candle_chambre_eric_energy') | float(0)
        }}

# annotations_log:
# - [Création] Nouveau fichier — remplace Riemann P3_kWh_3_TOTAL.yaml (désactivé).
# - [Logique] _power → _energy / W → kWh / measurement → total_increasing.
# - Source UM : sensor.eclairage_total_unit_energie → P3_UM_AMHQ_3_TOTAL.yaml.
# - 19 ampoules couvertes — | float(0) sur chaque pour absorber unavailable.
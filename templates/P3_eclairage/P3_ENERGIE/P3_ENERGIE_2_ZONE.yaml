# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES : SOMMES ÉNERGIE PIÈCES & ZONES AMHQ (kWh)             │
# ╰──────────────────────────────────────────────────────────────────────────╯

- sensor:
    # Génération automatique des 4 cycles pour chaque zone
    {% for cycle in ['annuel', 'mensuel', 'hebdomadaire', 'quotidien'] %}
    
    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : ENTRÉE | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Entree 1 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_entree_1_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {{ states('sensor.eclairage_hue_white_lamp_entree_{{ cycle }}_um') | is_number }}
      state: >
        {{ states('sensor.eclairage_hue_white_lamp_entree_{{ cycle }}_um') | float(0) | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : SALON | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Salon 5 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_salon_5_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_table_salon_{{ cycle }}_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_1_{{ cycle }}_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_2_{{ cycle }}_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_3_{{ cycle }}_um',
          'sensor.eclairage_hue_color_candle_salon_1_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | select('is_number') | list | count > 0 }}
      state: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_table_salon_{{ cycle }}_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_1_{{ cycle }}_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_2_{{ cycle }}_um',
          'sensor.eclairage_hue_ambiance_lamp_salon_3_{{ cycle }}_um',
          'sensor.eclairage_hue_color_candle_salon_1_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : CUISINE | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Cuisine 1 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_cuisine_1_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {{ states('sensor.eclairage_hue_white_lamp_cuisine_{{ cycle }}_um') | is_number }}
      state: >
        {{ states('sensor.eclairage_hue_white_lamp_cuisine_{{ cycle }}_um') | float(0) | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : COULOIR | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Couloir 1 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_couloir_1_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {{ states('sensor.eclairage_hue_white_lamp_couloir_{{ cycle }}_um') | is_number }}
      state: >
        {{ states('sensor.eclairage_hue_white_lamp_couloir_{{ cycle }}_um') | float(0) | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : BUREAU | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Bureau 5 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_bureau_5_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {% set sensors = [
          'sensor.eclairage_hue_play_1_pc_bureau_{{ cycle }}_um',
          'sensor.eclairage_hue_play_2_pc_bureau_{{ cycle }}_um',
          'sensor.eclairage_hue_play_3_pc_bureau_{{ cycle }}_um',
          'sensor.eclairage_lampe_bureau_1_hue_{{ cycle }}_um',
          'sensor.eclairage_lampe_bureau_2_hue_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | select('is_number') | list | count > 0 }}
      state: >
        {% set sensors = [
          'sensor.eclairage_hue_play_1_pc_bureau_{{ cycle }}_um',
          'sensor.eclairage_hue_play_2_pc_bureau_{{ cycle }}_um',
          'sensor.eclairage_hue_play_3_pc_bureau_{{ cycle }}_um',
          'sensor.eclairage_lampe_bureau_1_hue_{{ cycle }}_um',
          'sensor.eclairage_lampe_bureau_2_hue_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : SDB | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Sdb 2 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_sdb_2_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {% set sensors = [
          'sensor.eclairage_relais_lumiere_sdb_sonoff_{{ cycle }}_um',
          'sensor.eclairage_lampe_salle_de_bain_hue_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | select('is_number') | list | count > 0 }}
      state: >
        {% set sensors = [
          'sensor.eclairage_relais_lumiere_sdb_sonoff_{{ cycle }}_um',
          'sensor.eclairage_lampe_salle_de_bain_hue_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : CHAMBRE | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Chambre 4 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_chambre_4_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_chambre_1_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_chambre_2_{{ cycle }}_um',
          'sensor.eclairage_hue_color_candle_chambre_gege_{{ cycle }}_um',
          'sensor.eclairage_hue_color_candle_chambre_eric_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | select('is_number') | list | count > 0 }}
      state: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_chambre_1_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_chambre_2_{{ cycle }}_um',
          'sensor.eclairage_hue_color_candle_chambre_gege_{{ cycle }}_um',
          'sensor.eclairage_hue_color_candle_chambre_eric_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : APPART 3 (E+Cu+Co) | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Appart 3 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_appart_3_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_entree_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_cuisine_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_couloir_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | select('is_number') | list | count > 0 }}
      state: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_entree_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_cuisine_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_couloir_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    # ──────────────────────────────────────────────────────────────────────────
    #  ZONE : APPART 2 (E+Co) | CYCLE : {{ cycle | upper }}
    # ──────────────────────────────────────────────────────────────────────────
    - name: "Eclairage Appart 2 {{ cycle | capitalize }} TPL"
      unique_id: eclairage_appart_2_{{ cycle }}_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      availability: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_entree_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_couloir_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | select('is_number') | list | count > 0 }}
      state: >
        {% set sensors = [
          'sensor.eclairage_hue_white_lamp_entree_{{ cycle }}_um',
          'sensor.eclairage_hue_white_lamp_couloir_{{ cycle }}_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    {% endfor %}

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES TPL : TOTAL kWh UM — ÉCLAIRAGE TOUTES AMPOULES (19x)  │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates calculant la somme totale des kWh de toutes les ampoules
# de l'appartement (19 unités). 4 cycles AMHQ = 4 sensors _kwh_tpl.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.{slug}_{cycle}_um_kwh_tpl (P3_TPL_AMHQ_1_UNITE — 19 ampoules)
# - Formule : sum(float(default=0)) sur les 19 _um_kwh_tpl
# - state_class: measurement (hérite du reset UM sous-jacent)
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL   | CAPTEUR BRUT (source)                              | CE FICHIER (unique_id)                  | AVAL  |
# |:-----------|:---------------------------------------------------|:----------------------------------------|:------|
# | [calculé]  | sensor.{slug}_{cycle}_um_kwh_tpl × 19 (TPL_1_UNITE) | eclairage_total_unit_{cycle}_kwh_tpl   | L2C3  |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Source = _um_kwh_tpl (P3_TPL_AMHQ_1_UNITE), PAS les _um bruts du UM.
# - 19 ampoules : 1 Entrée, 5 Salon, 1 Cuisine, 1 Couloir, 5 Bureau, 2 SDB, 4 Chambre.
# - state_class: measurement — reset à chaque cycle.
# - Pas d'availability : float(default=0) absorbe les unavailable.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (total appartement)

- sensor:
    # --- eclairage_total_unit_quotidien_kwh_tpl ---
    - name: "Eclairage Total Unit Quotidien Kwh Tpl"
      unique_id: eclairage_total_unit_quotidien_kwh_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: measurement
      state: >
        {% set sensors = [
          'sensor.hue_white_lamp_entree_quotidien_um_kwh_tpl',
          'sensor.hue_white_lamp_table_quotidien_um_kwh_tpl',
          'sensor.hue_ambiance_lamp_salon_1_quotidien_um_kwh_tpl',
          'sensor.hue_ambiance_lamp_salon_2_quotidien_um_kwh_tpl',
          'sensor.hue_ambiance_lamp_salon_3_quotidien_um_kwh_tpl',
          'sensor.hue_color_candle_salon_1_quotidien_um_kwh_tpl',
          'sensor.hue_white_lamp_cuisine_quotidien_um_kwh_tpl',
          'sensor.hue_white_lamp_couloir_quotidien_um_kwh_tpl',
          'sensor.hue_play_1_pc_bureau_quotidien_um_kwh_tpl',
          'sensor.hue_play_2_pc_bureau_quotidien_um_kwh_tpl',
          'sensor.hue_play_3_pc_bureau_quotidien_um_kwh_tpl',
          'sensor.hue_white_lamp_bureau_1_quotidien_um_kwh_tpl',
          'sensor.hue_white_lamp_bureau_2_quotidien_um_kwh_tpl',
          'sensor.relais_lumiere_sdb_sonoff_quotidien_um_kwh_tpl',
          'sensor.lampe_salle_de_bain_hue_quotidien_um_kwh_tpl',
          'sensor.hue_white_lamp_chambre_1_quotidien_um_kwh_tpl',
          'sensor.hue_white_lamp_chambre_2_quotidien_um_kwh_tpl',
          'sensor.hue_color_candle_chambre_gege_quotidien_um_kwh_tpl',
          'sensor.hue_color_candle_chambre_eric_quotidien_um_kwh_tpl'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(3) }}


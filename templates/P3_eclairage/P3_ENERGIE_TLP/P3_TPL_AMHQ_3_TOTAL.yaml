          'sensor.hue_white_lamp_cuisine_hebdomadaire_um_kwh_tpl',
          'sensor.hue_white_lamp_couloir_hebdomadaire_um_kwh_tpl',
          'sensor.hue_play_1_pc_bureau_hebdomadaire_um_kwh_tpl',
          'sensor.hue_play_2_pc_bureau_hebdomadaire_um_kwh_tpl',
          'sensor.hue_play_3_pc_bureau_hebdomadaire_um_kwh_tpl',

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES : SOMMES ÉNERGIE PIÈCES & ZONES AMHQ (kWh)             │
# ╰──────────────────────────────────────────────────────────────────────────╯

- sensor:
    # ==========================================================================
    # CYCLE : ANNUEL
    # ==========================================================================

    - name: "Eclairage Entree 1 Annuel TPL"
      unique_id: eclairage_entree_1_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: "{{ states('sensor.hue_white_lamp_entree_annuel_um') | float(0) | round(2) }}"

    - name: "Eclairage Salon 5 Annuel TPL"
      unique_id: eclairage_salon_5_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {% set sensors = [
          'sensor.hue_white_lamp_table_salon_annuel_um',
          'sensor.hue_ambiance_lamp_salon_1_annuel_um',
          'sensor.hue_ambiance_lamp_salon_2_annuel_um',
          'sensor.hue_ambiance_lamp_salon_3_annuel_um',
          'sensor.hue_color_candle_salon_1_annuel_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    - name: "Eclairage Cuisine 1 Annuel TPL"
      unique_id: eclairage_cuisine_1_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: "{{ states('sensor.hue_white_lamp_cuisine_annuel_um') | float(0) | round(2) }}"

    - name: "Eclairage Couloir 1 Annuel TPL"
      unique_id: eclairage_couloir_1_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: "{{ states('sensor.hue_white_lamp_couloir_annuel_um') | float(0) | round(2) }}"

    - name: "Eclairage Bureau 5 Annuel TPL"
      unique_id: eclairage_bureau_5_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {% set sensors = [
          'sensor.hue_play_1_pc_bureau_annuel_um',
          'sensor.hue_play_2_pc_bureau_annuel_um',
          'sensor.hue_play_3_pc_bureau_annuel_um',
          'sensor.lampe_bureau_1_hue_annuel_um',
          'sensor.lampe_bureau_2_hue_annuel_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    - name: "Eclairage Sdb 2 Annuel TPL"
      unique_id: eclairage_sdb_2_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {% set sensors = [
          'sensor.relais_lumiere_sdb_sonoff_annuel_um',
          'sensor.lampe_salle_de_bain_hue_annuel_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    - name: "Eclairage Chambre 4 Annuel TPL"
      unique_id: eclairage_chambre_4_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {% set sensors = [
          'sensor.hue_white_lamp_chambre_1_annuel_um',
          'sensor.hue_white_lamp_chambre_2_annuel_um',
          'sensor.hue_color_candle_chambre_gege_annuel_um',
          'sensor.hue_color_candle_chambre_eric_annuel_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    - name: "Eclairage Appart 3 Annuel TPL"
      unique_id: eclairage_appart_3_annuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {% set sensors = [
          'sensor.hue_white_lamp_entree_annuel_um',
          'sensor.hue_white_lamp_cuisine_annuel_um',
          'sensor.hue_white_lamp_couloir_annuel_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    # ==========================================================================
    # CYCLE : MENSUEL
    # ==========================================================================


    - name: "Eclairage Bureau 5 Mensuel TPL"
      unique_id: eclairage_bureau_5_mensuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {% set sensors = [
          'sensor.hue_play_1_pc_bureau_mensuel_um',
          'sensor.hue_play_2_pc_bureau_mensuel_um',
          'sensor.hue_play_3_pc_bureau_mensuel_um',
          'sensor.lampe_bureau_1_hue_mensuel_um',
          'sensor.lampe_bureau_2_hue_mensuel_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    - name: "Eclairage Sdb 2 Mensuel TPL"
      unique_id: eclairage_sdb_2_mensuel_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {% set sensors = [
          'sensor.relais_lumiere_sdb_sonoff_mensuel_um',

          'sensor.hue_ambiance_lamp_salon_3_mensuel_um',
          'sensor.hue_color_candle_salon_1_mensuel_um'
        ] %}
        {{ sensors | map('states') | map('float', default=0) | sum | round(2) }}

    - name: "Eclairage Cuisine 1 Mensuel TPL"

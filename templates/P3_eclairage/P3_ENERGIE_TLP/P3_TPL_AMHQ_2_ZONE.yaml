# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES : RELAIS TPL — ZONES ÉCLAIRAGE AMHQ (kWh)              │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates relayant les sorties des Utility Meters "PAR ZONE"
# (P3_UM_AMHQ_2_ZONE.yaml) vers des sensors measurement utilisables
# directement dans le dashboard (vignette L2C3 et page éclairage).
# 9 zones × 4 cycles = 36 sensors _tpl.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.eclairage_*_*_um (sorties UM par zone — 9 zones physiques + transversales)
# - Formule : relay direct | float(0)
# - state_class: measurement → permet l'affichage sans cumul HA supplémentaire.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL    | CAPTEUR BRUT (source)                        | CE FICHIER (unique_id)                   | AVAL        |
# |:------------|:---------------------------------------------|:-----------------------------------------|:------------|
# | [UM]        | sensor.eclairage_entree_1_*_um               | eclairage_entree_1_*_tpl                 | L2C3 → page |
# | [UM]        | sensor.eclairage_salon_5_*_um                | eclairage_salon_5_*_tpl                  | L2C3 → vignette/page |
# | [UM]        | sensor.eclairage_cuisine_1_*_um              | eclairage_cuisine_1_*_tpl                | L2C3 → page |
# | [UM]        | sensor.eclairage_couloir_1_*_um              | eclairage_couloir_1_*_tpl                | L2C3 → page |
# | [UM]        | sensor.eclairage_bureau_5_*_um               | eclairage_bureau_5_*_tpl                 | L2C3 → vignette/page |
# | [UM]        | sensor.eclairage_sdb_2_*_um                  | eclairage_sdb_2_*_tpl                    | L2C3 → vignette/page |
# | [UM]        | sensor.eclairage_chambre_4_*_um              | eclairage_chambre_4_*_tpl                | L2C3 → vignette/page |
# | [UM]        | sensor.eclairage_appart_3_*_um               | eclairage_appart_3_*_tpl                 | L2C3 → page |
# | [UM]        | sensor.eclairage_appart_2_*_um               | eclairage_appart_2_*_tpl                 | L2C3 → vignette/page |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - state_class: measurement (pas total_increasing) — les UM se réinitialisent.
# - eclairage_appart_2/3 = zones transversales — affichage seulement, pas inclus dans totaux.
# - eclairage_couloir_1 inclus pour complétude (peut ne pas apparaître dans la vignette).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage — détail par zone/pièce (vignette + page)


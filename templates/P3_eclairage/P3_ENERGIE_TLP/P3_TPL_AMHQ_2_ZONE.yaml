# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES TPL : RELAIS kWh UM — ÉCLAIRAGE PAR ZONE (8 ZONES)    │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates agrégeant les kWh par zone (pièce ou groupe de pièces).
# 8 zones × 4 cycles AMHQ = 32 sensors _um_kwh_tpl.
# Zones : ENTRÉE×1, SALON×5, CUISINE×1, COULOIR×1, BUREAU×5, SDB×2, CHAMBRE×4,
# APPART_3 (Entrée+Cuisine+Couloir).
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.{slug}_{cycle}_um_kwh_tpl (P3_TPL_AMHQ_1_UNITE)
# - Formule : sum(float(default=0)) sur la liste des _um_kwh_tpl de chaque zone.
# - state_class: measurement (hérite du reset UM sous-jacent)
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL   | CAPTEUR BRUT (source)                            | CE FICHIER (unique_id)                    | AVAL                      |
# |:-----------|:-------------------------------------------------|:------------------------------------------|:--------------------------|
# | [calculé]  | sensor.hue_white_lamp_entree_{c}_um_kwh_tpl      | eclairage_entree_1_{c}_um_kwh_tpl         | P3_AVG_AMHQ_2_ZONE → L2C3 |
# | [calculé]  | sensor.hue_white_lamp_table_{c}_um_kwh_tpl … ×5 | eclairage_salon_5_{c}_um_kwh_tpl          | P3_AVG_AMHQ_2_ZONE → L2C3 |
# | [calculé]  | sensor.hue_white_lamp_cuisine_{c}_um_kwh_tpl     | eclairage_cuisine_1_{c}_um_kwh_tpl        | P3_AVG_AMHQ_2_ZONE → L2C3 |
# | [calculé]  | sensor.hue_white_lamp_couloir_{c}_um_kwh_tpl     | eclairage_couloir_1_{c}_um_kwh_tpl        | P3_AVG_AMHQ_2_ZONE → L2C3 |
# | [calculé]  | sensor.hue_play_1_pc_bureau_{c}_um_kwh_tpl … ×5 | eclairage_bureau_5_{c}_um_kwh_tpl         | P3_AVG_AMHQ_2_ZONE → L2C3 |
# | [calculé]  | sensor.relais_lumiere_sdb_sonoff_{c}_um_kwh_tpl … ×2 | eclairage_sdb_2_{c}_um_kwh_tpl       | P3_AVG_AMHQ_2_ZONE → L2C3 |
# | [calculé]  | sensor.hue_white_lamp_chambre_1_{c}_um_kwh_tpl … ×4 | eclairage_chambre_4_{c}_um_kwh_tpl   | P3_AVG_AMHQ_2_ZONE → L2C3 |
# | [calculé]  | entree + cuisine + couloir _um_kwh_tpl           | eclairage_appart_3_{c}_um_kwh_tpl         | P3_AVG_AMHQ_2_ZONE → L2C3 |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Source = _um_kwh_tpl (P3_TPL_AMHQ_1_UNITE), PAS les _um bruts du UM.
# - Slugs CANONIQUES obligatoires (hue_white_lamp_bureau_1, hue_white_lamp_table…).
# - state_class: measurement — les sources _um_kwh_tpl remettent à 0 à chaque cycle.
# - Multi-sources : pas d'availability (float(default=0) absorbe les unavailable).
# - eclairage_appart_3 = ENTRÉE + CUISINE + COULOIR uniquement.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (agrégat par zone/pièce)

- sensor:
    # ┌───────────────────────────────────┐
    # │         1. ENTRÉE (1x)            │
    # └───────────────────────────────────┘

    # --- eclairage_entree_1_quotidien_um_kwh_tpl ---
    - name: "Eclairage Entree 1 Quotidien Um Kwh Tpl"
      unique_id: eclairage_entree_1_quotidien_um_kwh_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: measurement
      state: "{{ states('sensor.hue_white_lamp_entree_quotidien_um_kwh_tpl') | float(0) }}"
      availability: "{{ states('sensor.hue_white_lamp_entree_quotidien_um_kwh_tpl') not in ['unavailable', 'unknown'] }}"

    # --- eclairage_entree_1_hebdomadaire_um_kwh_tpl ---

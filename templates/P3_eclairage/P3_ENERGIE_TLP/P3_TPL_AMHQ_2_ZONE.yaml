# annotations_log:
# - [Création] Nouveau fichier — couche TPL relayant P3_UM_AMHQ_2_ZONE vers le dashboard.
# - [Logique] state_class: measurement (UM se réinitialise → pas total_increasing).
# - [Source] sensor.eclairage_*_*_um → P3_UM_AMHQ_2_ZONE.yaml (9 zones × 4 cycles).
# - [Dashboard] L2C3 vignette (salon/bureau/sdb/chambre/appart_2) + page (toutes zones).
# - [Transversaux] appart_2/3 inclus — affichage uniquement, pas dans les totaux.

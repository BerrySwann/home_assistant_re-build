# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES : RELAIS TPL — AMPOULES INDIVIDUELLES AMHQ (kWh)       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates relayant les sorties des Utility Meters "PAR AMPOULE"
# (P3_UM_AMHQ_1_UNITE.yaml) vers des sensors measurement utilisables
# directement dans le dashboard (page éclairage — détail par lampe).
# 19 ampoules × 4 cycles = 76 sensors _tpl.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.[lampe]_*_um (sorties UM par ampoule physique — 19 lampes)
# - Formule : relay direct | float(0)
# - state_class: measurement → permet l'affichage sans cumul HA supplémentaire.
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL              | CAPTEUR BRUT (source)                      | CE FICHIER (unique_id)                    | AVAL        |
# |:----------------------|:-------------------------------------------|:------------------------------------------|:------------|
# | Hue Bridge            | sensor.hue_white_lamp_entree_*_um          | hue_white_lamp_entree_*_tpl               | L2C3 → page |
# | Hue Bridge            | sensor.hue_white_lamp_table_*_um     | hue_white_lamp_table_*_tpl          | L2C3 → page |
# | Hue Bridge            | sensor.hue_ambiance_lamp_salon_1_*_um      | hue_ambiance_lamp_salon_1_*_tpl           | L2C3 → page |
# | Hue Bridge            | sensor.hue_ambiance_lamp_salon_2_*_um      | hue_ambiance_lamp_salon_2_*_tpl           | L2C3 → page |
# | Hue Bridge            | sensor.hue_ambiance_lamp_salon_3_*_um      | hue_ambiance_lamp_salon_3_*_tpl           | L2C3 → page |
# | Hue Bridge            | sensor.hue_color_candle_salon_1_*_um       | hue_color_candle_salon_1_*_tpl            | L2C3 → page |
# | Hue Bridge            | sensor.hue_white_lamp_cuisine_*_um         | hue_white_lamp_cuisine_*_tpl              | L2C3 → page |
# | Hue Bridge            | sensor.hue_white_lamp_couloir_*_um         | hue_white_lamp_couloir_*_tpl              | L2C3 → page |
# | Hue Bridge            | sensor.hue_play_1_pc_bureau_*_um           | hue_play_1_pc_bureau_*_tpl               | L2C3 → page |
# | Hue Bridge            | sensor.hue_play_2_pc_bureau_*_um           | hue_play_2_pc_bureau_*_tpl               | L2C3 → page |
# | Hue Bridge            | sensor.hue_play_3_pc_bureau_*_um           | hue_play_3_pc_bureau_*_tpl               | L2C3 → page |
# | Hue Bridge            | sensor.hue_white_lamp_bureau_1_*_um             | hue_white_lamp_bureau_1_*_tpl                 | L2C3 → page |
# | Hue Bridge            | sensor.hue_white_lamp_bureau_2_*_um             | hue_white_lamp_bureau_2_*_tpl                 | L2C3 → page |
# | Sonoff (Z2M)          | sensor.relais_lumiere_sdb_sonoff_*_um      | relais_lumiere_sdb_sonoff_*_tpl          | L2C3 → page |
# | Hue Bridge            | sensor.lampe_salle_de_bain_hue_*_um        | lampe_salle_de_bain_hue_*_tpl            | L2C3 → page |
# | Hue Bridge            | sensor.hue_white_lamp_chambre_1_*_um       | hue_white_lamp_chambre_1_*_tpl           | L2C3 → page |
# | Hue Bridge            | sensor.hue_white_lamp_chambre_2_*_um       | hue_white_lamp_chambre_2_*_tpl           | L2C3 → page |
# | Hue Bridge            | sensor.hue_color_candle_chambre_gege_*_um  | hue_color_candle_chambre_gege_*_tpl      | L2C3 → page |
# | Hue Bridge            | sensor.hue_color_candle_chambre_eric_*_um  | hue_color_candle_chambre_eric_*_tpl      | L2C3 → page |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - state_class: measurement (pas total_increasing) — les UM se réinitialisent.
# - Noms bureau : lampe_bureau_1/2_hue (pas hue_white_lamp_bureau_1/2 — UM renommés).
# - Noms table salon : hue_white_lamp_table (avec _salon — aligné sur UM).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage — détail par ampoule (page éclairage)


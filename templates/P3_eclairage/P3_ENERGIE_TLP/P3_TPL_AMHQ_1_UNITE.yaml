    - name: "Hue White Lamp Entree Quotidien Um Kwh Tpl"
      unique_id: hue_white_lamp_entree_quotidien_um_kwh_tpl
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: measurement
      state: "{{ states('sensor.hue_white_lamp_entree_quotidien_um') | float(0) }}"
      availability: "{{ states('sensor.hue_white_lamp_entree_quotidien_um') not in ['unavailable', 'unknown'] }}"


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. TEMPLATES TPL : RELAIS kWh UM — ÉCLAIRAGE À L'UNITÉ (19 AMP.)   │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteurs templates relayant les valeurs kWh des Utility Meters vers le
# dashboard. 19 ampoules × 4 cycles AMHQ = 76 sensors _um_kwh_tpl.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.{slug}_{cycle}_um (P3_UM_AMHQ_1_UNITE)
# - Formule : float(source) avec guard availability
# - state_class: measurement (UM remet à 0 à chaque cycle)
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
#
# | MATÉRIEL     | CAPTEUR BRUT (source)                 | CE FICHIER (unique_id)                      | AVAL  |
# |:-------------|:--------------------------------------|:--------------------------------------------|:------|
# | [Hue Bridge] | sensor.{slug}_{cycle}_um              | {slug}_{cycle}_um_kwh_tpl                   | L2C3  |
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - state_class: measurement OBLIGATOIRE — UM remet à 0 à chaque cycle.
# - Ne jamais pointer sur _energy directement — passer par le UM.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C3 Conso Énergie Éclairage (détail par ampoule)

- sensor:
    # ┌───────────────────────────────────┐
    # │         1. ENTRÉE (1x)            │

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 3. UTILITY METER : SOMMES AMHQ PAR ZONE (ENTRÉE - 1 AMPOULE)         │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Utility Meter pour la zone Entrée (1 ampoule Hue White) en AMHQ.
#
# ## 🧮 CALCUL & SOURCES :
# - Source : sensor.hue_white_lamp_entree_energy (Riemann)
#
# ## 🔗 CHAÎNE DE DÉPENDANCES :
# | MATÉRIEL       | CAPTEUR BRUT (source)       | CE FICHIER (unique_id)          | AVAL               |
# |:---------------|:----------------------------|:--------------------------------|:-------------------|
# | Hue Bridge     | sensor.hue_white_lamp_entree_energy | eclairage_entree_1_*_um | P3_AVG_AMHQ_2_ZONE.yaml |
#
# ## ⚠️ IMPORTANT :
# - Conversion Wh → kWh (division par 1000).
#
# ## 🖥️ TABLEAU DE BORD :
# - L2C3 Conso Énergie Éclairage

# ┌───────────────────────────────────┐
# │         1. ENTRÉE (1x)            │
# └───────────────────────────────────┘

# --- eclairage_entree_1_annuel_um ---
eclairage_entree_1_annuel_um:
  source: >
    {{ (states('sensor.hue_white_lamp_entree_energy') | float(0)) / 1000 }}
  name: "Eclairage Entree 1 Annuel UM"
  unique_id: eclairage_entree_1_annuel_um
  cycle: yearly
  unit_prefix: k
  device_class: energy


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ TEMPLATE : P2_CURRENT_VEILLES | AMPÉRAGE FANTÔME (PÔLE 2)                │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Capteur virtuel (Dummy sensor) fixant l'ampérage total des veilles à 0A.
# Utile uniquement pour satisfaire les exigences de la carte graphique 
# (streamline-card / ApexCharts) du Dashboard qui exige cette entité.
#
# ## 🧮 CALCUL & SOURCES :
# - Valeur fixe (0) pour économiser les ressources de calcul du CPU.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Vignette L2C1/L2C3 (Détails de consommation des veilles).

- sensor:
  # --- all_standby_current ---
  - name: "All Standby Current"
    unique_id: all_standby_current
    unit_of_measurement: "A"
    device_class: current
    state: "0"


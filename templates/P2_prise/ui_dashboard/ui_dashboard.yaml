# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 2. UI DASHBOARD — ÉTATS & STATUTS PRISES (P2)                       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Templates d'affichage pour le tableau de bord — états ON/OFF et statuts de
# fonctionnement pour le gros électroménager (Cuisine).
# Ne contient aucun calcul kWh ou DUT.
#
# ## 🧮 CALCUL & SOURCES :
# - Sources directes : sensor.lave_linge_cuisine_power, sensor.lave_vaisselle_cuisine_power
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les statuts basculent sur "on" selon un seuil de puissance (W) pour 
#   déterminer si le cycle de lavage est actif.
# - Ne PAS y placer de calculs kWh — ce fichier est ui_dashboard UNIQUEMENT.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L3C2 Commandes Éco (Prises)

- sensor:

    # ┌───────────────────────────────────┐
    # │ 5. CUISINE                        │
    # └───────────────────────────────────┘
    
    # =====================================
    # LAVE-LINGE
    # =====================================
    # --- lave_linge_power_status ---
    - name: "Lave Linge Power Status"
      unique_id: lave_linge_power_status
      state: >
        {% if states('sensor.lave_linge_cuisine_power') | float(0) >= 5 %}
          on
        {% else %}
          off
        {% endif %}

    # --- lave_linge_power_locks ---
    - name: "Lave Linge Power Lock"
      unique_id: lave_linge_power_locks
      state: >
        {% if states('sensor.lave_linge_cuisine_power') | float(0) >= 1 %}
          on
        {% else %}
          off
        {% endif %}

    # =====================================
    # LAVE-VAISSELLE
    # =====================================
    # --- lave_vaisselle_power_status ---
    - name: "Lave Vaisselle Power Status"
      unique_id: lave_vaisselle_power_status
      state: >
        {% if states('sensor.lave_vaisselle_cuisine_power') | float(0) >= 5 %}
          on
        {% else %}
          off
        {% endif %}

    # --- lave_vaisselle_power_locks ---
    - name: "Lave Vaisselle Power Lock"
      unique_id: lave_vaisselle_power_locks
      state: >
        {% if states('sensor.lave_vaisselle_cuisine_power') | float(0) >= 1 %}
          on
        {% else %}
          off
        {% endif %}

# annotations_log:
# - [Global] Transformation du fichier P1 (Clim) vers P2 (Prises).
# - [Titres] Mise à jour des en-têtes ASCII pour PÔLE 2 et Pièce 5. CUISINE.
# - [Logique] Remplacement de la détection HVAC (fan_only) par des seuils de puissance purs (5W pour actif, 1W pour lock/veille).
# - [Entités] Utilisation des noms de capteurs standards définis dans la documentation : lave_linge_cuisine et lave_vaisselle_cuisine.
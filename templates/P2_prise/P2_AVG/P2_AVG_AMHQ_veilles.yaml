# ╭──────────────────────────────────────────────────────────────────────────╮
# │ TEMPLATE : P2_AVG_VEILLES | PUISSANCE MOYENNE VEILLES (W) AMHQ           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Calcule la puissance moyenne continue équivalente (en Watts) lissée sur 
# 4 périodes (Annuel, Mensuel, Hebdomadaire, Quotidien) pour l'ensemble 
# des veilles globales de l'appartement (Standby).
#
# ## 🧮 CALCUL & SOURCES :
# - Formule : (Consommation_kWh_UM × 1000) ÷ nombre_heures_écoulées_dans_le_cycle
# - Sources : Capteurs Utility Meter (_kwh_um) de 'all_standby'.
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Ce fichier complète la logique de 'P2_kWh_veilles.yaml'.
# - La division par zéro au début de chaque cycle est évitée par la 
#   condition mathématique (if h > 0.1 else 0).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - Sert à la remontée d'info pour la vignette : L2C1 Conso Énergie Générale

- sensor:
  # --- all_standby_avg_watts_quotidien ---
  - name: "All Standby Avg Watts Quotidien"
    unique_id: all_standby_avg_watts_quotidien
    unit_of_measurement: "W"
    device_class: power
    state: >
      {% set conso = states('sensor.all_standby_quotidien_kwh_um') | float(0) %}
      {% set h = now().hour + (now().minute / 60) %}
      {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}

  # --- all_standby_avg_watts_hebdomadaire ---
  - name: "All Standby Avg Watts Hebdomadaire"
    unique_id: all_standby_avg_watts_hebdomadaire
    unit_of_measurement: "W"
    device_class: power
    state: >
      {% set conso = states('sensor.all_standby_hebdomadaire_kwh_um') | float(0) %}
      {% set hh = (now().weekday() * 24) + now().hour + (now().minute / 60) %}
      {{ ((conso * 1000) / hh if hh > 0.1 else 0) | round(1) }}

  # --- all_standby_avg_watts_mensuel ---
  - name: "All Standby Avg Watts Mensuel"
    unique_id: all_standby_avg_watts_mensuel
    unit_of_measurement: "W"
    device_class: power
    state: >
      {% set conso = states('sensor.all_standby_mensuel_kwh_um') | float(0) %}
      {% set hm = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
      {{ ((conso * 1000) / hm if hm > 0.1 else 0) | round(1) }}

  # --- all_standby_avg_watts_annuel ---
  - name: "All Standby Avg Watts Annuel"
    unique_id: all_standby_avg_watts_annuel
    unit_of_measurement: "W"
    device_class: power
    state: >
      {% set conso = states('sensor.all_standby_annuel_kwh_um') | float(0) %}
      {% set ha = ((now().timetuple().tm_yday - 1) * 24) + now().hour + (now().minute / 60) %}
      {{ ((conso * 1000) / ha if ha > 0.1 else 0) | round(1) }}


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATE : ÉNERGIE APPART — CALCUL COÛTS HP/HC + TOTAL (AMHQ)    │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Sensors template calculant les coûts HP, HC et Total en euros de la
# consommation de l'appartement sur 4 périodes (Quotidien, Hebdo, Mensuel,
# Annuel). Split HP/HC géré nativement via utility_meter tariffs.
#
# ## 🧮 CALCUL & SOURCES :
# - Formule HP   : sensor.genelec_appart_hphc_[periode]_um_hp × sensor.edf_tempo_price_blue_hp
# - Formule HC   : sensor.genelec_appart_hphc_[periode]_um_hc × sensor.edf_tempo_price_blue_hc
# - Formule TOTAL: cout_hp + cout_hc
# - Sources UM   : utility_meter/P0_Energie_total/Genelec_appart/03_UM_genelec_appart_HPHC_AMHQ.yaml
# - Tarifs EDF Tempo Bleu :
#     HP : sensor.edf_tempo_price_blue_hp  (0.1494 €/kWh)
#     HC : sensor.edf_tempo_price_blue_hc  (0.1232 €/kWh)
# - Basculement HP ↔ HC : automation energie/basculement_tarif_hphc.yaml
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les entités UM génèrent des sous-capteurs automatiques :
#     sensor.genelec_appart_hphc_*_um_hp  (Heures Pleines)
#     sensor.genelec_appart_hphc_*_um_hc  (Heures Creuses)
# - L'automation de basculement DOIT être active pour que le split soit correct.
# - Sans automation, le tarif reste figé sur le dernier sélectionné.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (section coûts HP/HC/Total par période)

- sensor:

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ 1. QUOTIDIEN (Q)                                                         │
# ╰──────────────────────────────────────────────────────────────────────────╯

    # --- genelec_appart_cout_hp_quotidien ---
    - name: "Genelec Appart Coût HP Quotidien"
      unique_id: genelec_appart_cout_hp_quotidien
      unit_of_measurement: "€"
      device_class: monetary
      state_class: total
      state: >
        {% set kwh   = states('sensor.genelec_appart_hphc_quotidien_um_hp') | float(0) %}
        {% set tarif = states('sensor.edf_tempo_price_blue_hp') | float(0) %}
        {{ (kwh * tarif) | round(3) }}
      availability: >
        {{ states('sensor.genelec_appart_hphc_quotidien_um_hp') not in ['unavailable','unknown','none']
          and states('sensor.edf_tempo_price_blue_hp') not in ['unavailable','unknown','none'] }}

    # --- genelec_appart_cout_hc_quotidien ---
    - name: "Genelec Appart Coût HC Quotidien"
      unique_id: genelec_appart_cout_hc_quotidien
      unit_of_measurement: "€"
      device_class: monetary
      state_class: total
      state: >
        {% set kwh   = states('sensor.genelec_appart_hphc_quotidien_um_hc') | float(0) %}
        {% set tarif = states('sensor.edf_tempo_price_blue_hc') | float(0) %}
        {{ (kwh * tarif) | round(3) }}
      availability: >
        {{ states('sensor.genelec_appart_hphc_quotidien_um_hc') not in ['unavailable','unknown','none']
          and states('sensor.edf_tempo_price_blue_hc') not in ['unavailable','unknown','none'] }}

    # --- genelec_appart_cout_total_quotidien ---
    - name: "Genelec Appart Coût Total Quotidien"
      unique_id: genelec_appart_cout_total_quotidien
      unit_of_measurement: "€"
      device_class: monetary
      state_class: total
      state: >
        {% set hp_kwh  = states('sensor.genelec_appart_hphc_quotidien_um_hp') | float(0) %}
        {% set hc_kwh  = states('sensor.genelec_appart_hphc_quotidien_um_hc') | float(0) %}
        {% set hp_trf  = states('sensor.edf_tempo_price_blue_hp') | float(0) %}
        {% set hc_trf  = states('sensor.edf_tempo_price_blue_hc') | float(0) %}
        {{ ((hp_kwh * hp_trf) + (hc_kwh * hc_trf)) | round(2) }}
      availability: >
        {{ states('sensor.genelec_appart_hphc_quotidien_um_hp') not in ['unavailable','unknown','none']
          and states('sensor.genelec_appart_hphc_quotidien_um_hc') not in ['unavailable','unknown','none'] }}

# ╭──────────────────────────────────────────────────────────────────────────╮

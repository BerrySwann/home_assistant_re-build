        {% set hp_trf  = states('sensor.tarif_heures_pleines_ttc') | float(0.2065) %}  # "[L128] modif"
        {% set hc_trf  = states('sensor.tarif_heures_creuses_ttc') | float(0.1578) %}  # "[L129] modif"
        {{ ((hp_kwh * hp_trf) + (hc_kwh * hc_trf)) | round(2) }}
      availability: >
        {{ states('sensor.genelec_appart_hphc_hebdomadaire_um_hp') not in ['unavailable','unknown','none']
          and states('sensor.genelec_appart_hphc_hebdomadaire_um_hc') not in ['unavailable','unknown','none'] }}

# ╭──────────────────────────────────────────────────────────────────────────╮
# │ 3. MENSUEL (M)                                                           │
# ╰──────────────────────────────────────────────────────────────────────────╯


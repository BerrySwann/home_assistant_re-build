# annotations_log:
# - [REFONTE] Remplacement du calcul approximatif (× tarif HP unique) par split HP/HC réel
# - [AJOUT] 8 nouveaux sensors HP + HC individuels (2 par période × 4 périodes)
# - [MODIF] Sources : genelec_appart_*_um → genelec_appart_hphc_*_um_hp + *_hc
# - [MODIF] Tarif : sensor.tarif_heures_pleines_ttc → sensor.edf_tempo_price_blue_hp / _hc
# - [TARIFS] HP = 0.1494 €/kWh / HC = 0.1232 €/kWh (EDF Tempo Bleu)
# - [PRECISION] round(3) pour HP/HC individuels, round(2) pour total

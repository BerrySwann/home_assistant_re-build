        {% set hc_kwh  = states('sensor.genelec_appart_hphc_mensuel_um_hc') | float(0) %}
        {% set hp_trf  = states('sensor.tarif_heures_pleines_ttc') | float(0.2065) %}  # "[L176] modif"
        {% set hc_trf  = states('sensor.tarif_heures_creuses_ttc') | float(0.1578) %}  # "[L177] modif"

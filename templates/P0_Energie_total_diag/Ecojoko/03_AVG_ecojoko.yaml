# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ TEMPLATE : PÔLE 0. ECOJOKO — AVG WATTS (A/M/H/Q)                             │
# ╰──────────────────────────────────────────────────────────────────────────────╯
#
# FORMULE : (kWh_cumulé × 1000) / heures_écoulées_depuis_reset → W moyen
# UNITÉ   : W (affiché comme "Wh" dans ApexCharts par override de la carte)
#
# SOURCES (UMs rebuild) :
#   Quotidien  → sensor.ecojoko_reseau_quotidien_um   (reset minuit)
#   Hebdo      → sensor.ecojoko_reseau_hebdo_um        (reset lundi)
#   Mensuel    → sensor.ecojoko_reseau_mensuel_um      (reset 1er du mois)
#   Annuel     → sensor.ecojoko_reseau_annuel_um       (reset 1er jan)
#
# ┌───────────────────────────────────┐
# │ Ecojoko                           │
# └───────────────────────────────────┘

- sensor:

    # ─── QUOTIDIEN ───────────────────────────────────────────────────────────

    # --- ecojoko_avg_watts_quotidien ---
    - name: "Ecojoko Avg Watts Quotidien"
      unique_id: ecojoko_avg_watts_quotidien
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.ecojoko_reseau_quotidien_um') | float(0) %}
        {% set h = now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}
      availability: >
        {{ states('sensor.ecojoko_reseau_quotidien_um') not in ['unavailable','unknown','none'] }}

    # ─── HEBDOMADAIRE ────────────────────────────────────────────────────────

    # --- ecojoko_avg_watts_hebdo ---
    - name: "Ecojoko Avg Watts Hebdo"
      unique_id: ecojoko_avg_watts_hebdo
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.ecojoko_reseau_hebdo_um') | float(0) %}
        {% set h = (now().weekday() * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}
      availability: >
        {{ states('sensor.ecojoko_reseau_hebdo_um') not in ['unavailable','unknown','none'] }}

    # ─── MENSUEL ─────────────────────────────────────────────────────────────

    # --- ecojoko_avg_watts_mensuel ---
    - name: "Ecojoko Avg Watts Mensuel"
      unique_id: ecojoko_avg_watts_mensuel
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.ecojoko_reseau_mensuel_um') | float(0) %}
        {% set h = ((now().day - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}
      availability: >
        {{ states('sensor.ecojoko_reseau_mensuel_um') not in ['unavailable','unknown','none'] }}

    # ─── ANNUEL ──────────────────────────────────────────────────────────────

    # --- ecojoko_avg_watts_annuel ---
    - name: "Ecojoko Avg Watts Annuel"
      unique_id: ecojoko_avg_watts_annuel
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set conso = states('sensor.ecojoko_reseau_annuel_um') | float(0) %}
        {% set h = ((now().timetuple().tm_yday - 1) * 24) + now().hour + (now().minute / 60) %}
        {{ ((conso * 1000) / h if h > 0.1 else 0) | round(1) }}
      availability: >
        {{ states('sensor.ecojoko_reseau_annuel_um') not in ['unavailable','unknown','none'] }}
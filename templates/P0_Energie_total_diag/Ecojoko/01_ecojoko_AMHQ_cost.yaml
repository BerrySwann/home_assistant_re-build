# annotations_log:
#   [L125] ecojoko_cout_hp_mensuel : source modifiée
#          ecojoko_consommation_hp_reseau (sensor daily, reset minuit)
#          → ecojoko_hp_reseau_mensuel_um (UM monthly, reset 1er du mois)
#          Raison : bug coût mensuel HP = 0.45€ au lieu de ~X€ (daily × tarif ≠ monthly × tarif)
#   [L139] ecojoko_cout_hc_mensuel : même correction que [L125] pour HC
#          ecojoko_consommation_hc_reseau → ecojoko_hc_reseau_mensuel_um
#   Dépendance ajoutée : sensor.ecojoko_hp/hc_reseau_mensuel_um
#     → défini dans utility_meter/P0_Energie_total/Ecojoko/03_P2_UM_ecojoko_hebdo_annuel.yaml
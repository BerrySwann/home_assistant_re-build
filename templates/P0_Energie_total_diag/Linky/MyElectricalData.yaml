# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATES : LINKY — DONNÉES J0 À J7 (MYELECTRICALDATA)          │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Huit capteurs templates fournissant les données de consommation journalière
# Linky sur une fenêtre glissante de 8 jours (J0 à J7). J0 = aujourd'hui
# (données temps réel via Ecojoko), J1 à J7 = historique via l'API MEData
# (MyElectricalData / Enedis).
#
# ## 🧮 CALCUL & SOURCES :
# - J0 (Aujourd'hui) : sensor.ecojoko_hp_reseau_quotidien + sensor.ecojoko_hc_reseau_quotidien.
# - J1-J7            : attributs dailyweek / dailyweek_cost de l'intégration MEData.
# - MEData (Wh → kWh) : valeur / 1000.
# - Noms des jours    : attribut dailyweek → dictionnaire de traduction français.
# - Coûts             : attribut dailyweek_cost (index correspondant à J1..J7).
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Vérifications de longueur (|length >= X) pour éviter les erreurs si MEData
#   n'a pas encore fourni les données Enedis.
# - Valeurs de repli : "Inconnu" pour les dates, "0" pour les coûts.
# - Le numéro de compteur Linky (25481620821301) est lié au compte MEData.
#   À mettre à jour si le compteur change.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (tableau J0-J7 barre/courbe).

- sensor:
  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    J0 — AUJOURD'HUI (via Ecojoko temps réel)                         │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- linky_jour_j0 ---
  - name: "Linky Jour J0"
    unique_id: linky_jour_j0
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    state: >
      {% set hp = states('sensor.ecojoko_hp_reseau_quotidien_um') | float(0) %}
      {% set hc = states('sensor.ecojoko_hc_reseau_quotidien_um') | float(0) %}
      {{ (hp + hc) | round(3) }}
    attributes:
      jour: "{{ now().strftime('%A') | replace('Monday','Lundi') | replace('Tuesday','Mardi') | replace('Wednesday','Mercredi') | replace('Thursday','Jeudi') | replace('Friday','Vendredi') | replace('Saturday','Samedi') | replace('Sunday','Dimanche') }}"
      hp_kwh: "{{ states('sensor.ecojoko_hp_reseau_quotidien_um') | float(0) | round(3) }}"
      hc_kwh: "{{ states('sensor.ecojoko_hc_reseau_quotidien_um') | float(0) | round(3) }}"
      total_kwh: >
        {% set hp = states('sensor.ecojoko_hp_reseau_quotidien_um') | float(0) %}
        {% set hc = states('sensor.ecojoko_hc_reseau_quotidien_um') | float(0) %}
        {{ (hp + hc) | round(3) }}
      cout: "0"

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    J1 À J7 — HISTORIQUE MEData (Enedis)                              │
  # ╰──────────────────────────────────────────────────────────────────────╯

  # --- linky_jour_j1 ---
  - name: "Linky Jour J1"
    unique_id: linky_jour_j1
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    state: >
      {% set data = state_attr('sensor.myelectricaldata_25481620821301', 'dailyweek') %}
      {{ ((data[1] | float(0)) / 1000) | round(3) if data and data | length >= 2 else 0.0 }}
    attributes:
      jour: >
        {% set data = state_attr('sensor.myelectricaldata_25481620821301', 'dailyweek') %}
        {% if data and data | length >= 2 %}
          {% set wd = (now() - timedelta(days=1)).weekday() %}
          {{ ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'][wd] }}
        {% else %}Inconnu{% endif %}
      total_kwh: >
        {% set data = state_attr('sensor.myelectricaldata_25481620821301', 'dailyweek') %}
        {{ ((data[1] | float(0)) / 1000) | round(3) if data and data | length >= 2 else 0.0 }}
      cout: >
        {% set couts = state_attr('sensor.myelectricaldata_25481620821301', 'dailyweek_cost') %}
        {{ couts[1] | default('0') if couts and couts | length >= 2 else '0' }}


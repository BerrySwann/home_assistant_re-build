# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATES : LINKY — DONNÉES J0 À J7 (MYELECTRICALDATA)           │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Huit capteurs templates fournissant les données de consommation journalière
# Linky sur une fenêtre glissante de 8 jours (J0 à J7). J0 = aujourd'hui
# (données temps réel via Ecojoko), J1 à J7 = historique via l'API MEData
# (MyElectricalData / Enedis).
#
# ## 🧮 CALCUL & SOURCES :
# - J0 (Aujourd'hui) : sensor.ecojoko_hp_reseau_quotidien + sensor.ecojoko_hc_reseau_quotidien.
# - J1-J7            : attributs dailyweek / dailyweek_cost de l'intégration MEData.
# - MEData (Wh → kWh) : valeur / 1000.
# - Noms des jours    : attribut dailyweek → dictionnaire de traduction français.
# - Coûts             : attribut dailyweek_cost (index correspondant à J1..J7).
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Vérifications de longueur (|length >= X) pour éviter les erreurs si MEData
#   n'a pas encore fourni les données Enedis.
# - Valeurs de repli : "Inconnu" pour les dates, "0" pour les coûts.
# - Le numéro de compteur Linky (25481620821301) est lié au compte MEData.
#   À mettre à jour si le compteur change.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (tableau J0-J7 barre/courbe).

- sensor:
  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    J0 — AUJOURD'HUI (via Ecojoko temps réel)                         │
  # ╰──────────────────────────────────────────────────────────────────────╯
      # --- linky_jour_0 ---
    - name: "Linky Jour 0"
      unique_id: linky_jour_0
      state: >-
        {{ ((states('sensor.ecojoko_consommation_hp_reseau') | float(0)) +
            (states('sensor.ecojoko_consommation_hc_reseau') | float(0))) | round(1) }}
      unit_of_measurement: kWh
      icon: mdi:flash-outline
      attributes:
        jour: "Aujourd'hui"
        hp_kwh: >-
          {{ states('sensor.ecojoko_consommation_hp_reseau') | float(0) | round(1) }}
        hc_kwh: >-
          {{ states('sensor.ecojoko_consommation_hc_reseau') | float(0) | round(1) }}
        total_kwh: >-
          {{ ((states('sensor.ecojoko_consommation_hp_reseau') | float(0)) +
              (states('sensor.ecojoko_consommation_hc_reseau') | float(0))) | round(1) }}
        cout: >-
          {{ ((states('sensor.ecojoko_consommation_hp_reseau') | float(0) *
              states('sensor.tarif_heures_pleines_ttc') | float(0)) +
              (states('sensor.ecojoko_consommation_hc_reseau') | float(0) *
              states('sensor.tarif_heures_creuses_ttc') | float(0))) | round(2) }}

    # ┌───────────────────────────────────┐
    # │ 2. HISTORIQUE (LINKY)             │
    # └───────────────────────────────────┘
    # --- linky_jour_1 ---
    - name: "Linky Jour 1"
      unique_id: linky_jour_1
      state: >-
        {{ ((state_attr('sensor.linky_25481620821301_consumption', 'day_1_HP') | float(0) / 1000) +
            (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HC') | float(0) / 1000)) | round(1) }}
      unit_of_measurement: kWh
      icon: mdi:flash-outline
      attributes:
        jour: >-
          {% set jours = {
            'Monday': 'Lundi',
            'Tuesday': 'Mardi',
            'Wednesday': 'Mercredi',
            'Thursday': 'Jeudi',
            'Friday': 'Vendredi',
            'Saturday': 'Samedi',
            'Sunday': 'Dimanche'
          } %}
          {% set dailyweek = state_attr('sensor.linky_25481620821301_consumption', 'dailyweek') %}
          {% set date_str = dailyweek[0] if dailyweek else None %}
          {% if date_str %}
            {% if '-' in date_str %}
              {% set eng = as_timestamp(date_str) | timestamp_custom('%A', true) %}
            {% elif '/' in date_str %}
              {% set p = date_str.split('/') %}
              {% set annee = now().year %}
              {% set eng = as_timestamp(annee ~ '-' ~ p[1] ~ '-' ~ p[0]) | timestamp_custom('%A', true) %}
            {% endif %}
            {{ jours[eng] if eng in jours else eng }}
          {% else %}
            Inconnu
          {% endif %}
        hp_kwh: >-
          {{ (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HP') | float(0) / 1000) | round(1) }}
        hc_kwh: >-
          {{ (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HC') | float(0) / 1000) | round(1) }}
        total_kwh: >-
          {{ ((state_attr('sensor.linky_25481620821301_consumption', 'day_1_HP') | float(0) / 1000) +
              (state_attr('sensor.linky_25481620821301_consumption', 'day_1_HC') | float(0) / 1000)) | round(1) }}
        cout: >-
          {{ (state_attr('sensor.linky_25481620821301_consumption', 'dailyweek_cost')[0] | float(0)) | round(1) }}


# ╭────────────────────────────────────────────────────────────────────────────────────────────────╮
# │ GENELEC : CONSOMMATION QUOTIDIENNE J-1 À J-7 (PÔLE 0. ÉNERGIE GLOBALE)                         │
# │ Source : sensor.genelec_appart_quotidien_kwh_um (reset à 00:00)                                │
# │ Méthode : Différence entre les valeurs à minuit chaque jour.                                   │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯

# --- genelec_quotidien_kwh_um_tpl_j_1 ---
- sensor:
    - name: "GENELEC Quotidien kWh UM TPL J-1"
      unique_id: genelec_quotidien_kwh_um_tpl_j_1
      unit_of_measurement: "kWh"
      state: >-
        {% set aujourdhui_minuit = states('sensor.genelec_appart_quotidien_kwh_um') | float %}
        {% set hier_minuit = states('sensor.genelec_appart_quotidien_kwh_um', now().replace(hour=0, minute=0, second=0) - timedelta(days=1)) | float %}
        {{ (aujourdhui_minuit - hier_minuit) | round(2) }}
      availability: >-
        {{ states('sensor.genelec_appart_quotidien_kwh_um') not in ['unknown', 'unavailable'] }}


# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATES : DIAGNOSTIC CONSO — JOUR EN COURS (7 PÔLES)          │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Neuf capteurs templates calculant la consommation journalière identifiée
# par pôle fonctionnel (7 pôles), plus un capteur de maximum dynamique et
# un capteur de total identifié. Sources : utility_meters AMHQ quotidiens P1/P2/P3.
#
# ## 🧮 CALCUL & SOURCES :
# - Pôle 1 Hygiène     : lave_linge + lave_vaisselle + fer_a_repasser (P2 UM Quotidien)
# - Pôle 2 Cuisine     : four_mo + petit_dej + airfryer + four_plaque (P2 UM Quotidien)
# - Pôle 3 Froid       : frigo + congelateur (P2 UM Quotidien)
# - Pôle 4 Chauffage   : clim_salon + radiateur + clim_bureau + soufflant + seche_serv + clim_chambre (P1 UM Quotidien)
# - Pôle 5 Multimédia  : box_internet + tv_salon + tv_chambre + pc_gege + pc_bureau (P2 UM Quotidien)
# - Pôle 6 Éclairage   : eclairage_total_group (P3 UM Quotidien)
# - Pôle 7 Autre       : all_standby + tete_de_lit + chargeur_salon + horloge (P2 UM Quotidien)
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Tous les UM P1/P2/P3 utilisent le suffixe _kwh_um (nomenclature unifiée).
# - state_class: measurement — ces capteurs reflètent les UM qui resetent à minuit.
#   Ne PAS utiliser total_increasing (valeur décroissante → WARNING recorder).
# - Max dynamique : buffer 0.5 kWh (échelle journalière).
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (graphique répartition par pôle — journalier).

- sensor:
  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 1 — HYGIÈNE (Lave-linge, Lave-vaisselle, Fer)                │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_hygiene_quotidien ---
  - name: "Diag Poste Hygiene Quotidien"
    unique_id: diag_poste_hygiene_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:washing-machine
    state: >
      {% set ll = states('sensor.prise_lave_linge_nous_quotidien_kwh_um') | float(0) %}
      {% set lv = states('sensor.prise_lave_vaisselle_nous_quotidien_kwh_um') | float(0) %}
      {% set fr = states('sensor.prise_bureau_fer_a_repasser_nous_quotidien_kwh_um') | float(0) %}
      {{ (ll + lv + fr) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 2 — CUISINE (Micro-ondes, Petit-dej, AirFryer, Four/Plaque)  │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_cuisine_quotidien ---
  - name: "Diag Poste Cuisine Quotidien"
    unique_id: diag_poste_cuisine_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:stove
    state: >
      {% set mo = states('sensor.prise_four_micro_ondes_nous_quotidien_kwh_um') | float(0) %}
      {% set pd = states('sensor.prise_petit_dejeune_nous_quotidien_kwh_um') | float(0) %}
      {% set af = states('sensor.prise_airfryer_ninja_nous_quotidien_kwh_um') | float(0) %}
      {% set fp = states('sensor.four_et_plaque_de_cuisson_quotidien_kwh_um') | float(0) %}
      {{ (mo + pd + af + fp) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 3 — FROID (Frigo, Congélateur)                               │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_froid_quotidien ---
  - name: "Diag Poste Froid Quotidien"
    unique_id: diag_poste_froid_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:fridge
    state: >
      {% set fr = states('sensor.prise_frigo_cuisine_nous_quotidien_kwh_um') | float(0) %}
      {% set cg = states('sensor.prise_congelateur_cuisine_nous_quotidien_kwh_um') | float(0) %}
      {{ (fr + cg) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 4 — CHAUFFAGE/CLIM (Salon, Cuisine, Bureau, SDB, Chambre)    │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_chauffage_quotidien ---
  - name: "Diag Poste Chauffage Quotidien"
    unique_id: diag_poste_chauffage_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:fire
    # [L77-82] P1 UM Pôle 4 Chauffage : _quotidien_um → _quotidien_kwh_um (×6)
    state: >
      {% set cs = states('sensor.clim_salon_quotidien_kwh_um') | float(0) %}
      {% set rc = states('sensor.radiateur_elec_cuisine_quotidien_kwh_um') | float(0) %}
      {% set cb = states('sensor.clim_bureau_quotidien_kwh_um') | float(0) %}
      {% set ss = states('sensor.soufflant_sdb_quotidien_kwh_um') | float(0) %}
      {% set sv = states('sensor.seche_serviette_sdb_quotidien_kwh_um') | float(0) %}
      {% set cc = states('sensor.clim_chambre_quotidien_kwh_um') | float(0) %}
      {{ (cs + rc + cb + ss + sv + cc) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 5 — MULTIMÉDIA (Box, TV×2, PC×2)                             │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_multimedia_quotidien ---
  - name: "Diag Poste Multimedia Quotidien"
    unique_id: diag_poste_multimedia_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:monitor
    state: >
      {% set bx = states('sensor.prise_box_internet_ikea_quotidien_kwh_um') | float(0) %}
      {% set ts = states('sensor.prise_tv_salon_ikea_quotidien_kwh_um') | float(0) %}
      {% set tc = states('sensor.prise_tv_chambre_nous_quotidien_kwh_um') | float(0) %}
      {% set pg = states('sensor.prise_pc_s_gege_ikea_quotidien_kwh_um') | float(0) %}
      {% set pb = states('sensor.prise_bureau_pc_ikea_quotidien_kwh_um') | float(0) %}
      {{ (bx + ts + tc + pg + pb) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 6 — ÉCLAIRAGE (Total appartement)                            │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_eclairage_quotidien ---
  - name: "Diag Poste Eclairage Quotidien"
    unique_id: diag_poste_eclairage_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:lightbulb
    state: >
      {{ states('sensor.eclairage_total_group_quotidien_kwh_um') | float(0) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 7 — AUTRE (Veilles, Têtes de lit, Chargeurs, Horloge)        │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_autre_quotidien ---
  - name: "Diag Poste Autre Quotidien"
    unique_id: diag_poste_autre_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    icon: mdi:plus-circle
    state: >
      {% set vs = states('sensor.all_standby_quotidien_kwh_um') | float(0) %}
      {% set tl = states('sensor.prise_tete_de_lit_chambre_quotidien_kwh_um') | float(0) %}
      {% set ch = states('sensor.prise_salon_chargeur_nous_quotidien_kwh_um') | float(0) %}
      {% set hr = states('sensor.prise_horloge_ikea_quotidien_kwh_um') | float(0) %}
      {{ (vs + tl + ch + hr) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    MAX DYNAMIQUE (axe Y des barres + 0.5 kWh buffer)                 │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_max_poste_quotidien ---
  - name: "Diag Max Poste Quotidien Dynamique"
    unique_id: diag_max_poste_quotidien_dynamique
    unit_of_measurement: "kWh"
    device_class: energy
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_quotidien') | float(0),
        states('sensor.diag_poste_cuisine_quotidien') | float(0),
        states('sensor.diag_poste_froid_quotidien') | float(0),
        states('sensor.diag_poste_chauffage_quotidien') | float(0),
        states('sensor.diag_poste_multimedia_quotidien') | float(0),
        states('sensor.diag_poste_eclairage_quotidien') | float(0),
        states('sensor.diag_poste_autre_quotidien') | float(0)
      ] %}
      {{ (poles | max + 0.5) | round(2) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    TOTAL IDENTIFIÉ (somme des 7 pôles)                               │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_total_identifie_quotidien ---
  - name: "Diag Total Identifie Quotidien"
    unique_id: diag_total_identifie_quotidien
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_quotidien') | float(0),
        states('sensor.diag_poste_cuisine_quotidien') | float(0),
        states('sensor.diag_poste_froid_quotidien') | float(0),
        states('sensor.diag_poste_chauffage_quotidien') | float(0),
        states('sensor.diag_poste_multimedia_quotidien') | float(0),
        states('sensor.diag_poste_eclairage_quotidien') | float(0),
        states('sensor.diag_poste_autre_quotidien') | float(0)
      ] %}
      {{ (poles | sum) | round(2) }}

# annotations_log:
# [L33,48,62,74,90,105,116,150] state_class: total_increasing → measurement
# [L77-82] P1 UM Pôle 4 Chauffage : _quotidien_um → _quotidien_kwh_um (×6)

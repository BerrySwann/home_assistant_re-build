# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PÔLE 0. TEMPLATES : DIAGNOSTIC CONSO — SEMAINE EN COURS (7 PÔLES)       │
# ╰──────────────────────────────────────────────────────────────────────────╯
#
# ## 📝 DESCRIPTION :
# Neuf capteurs templates calculant la consommation hebdomadaire identifiée
# par pôle fonctionnel (7 pôles), plus un capteur de maximum dynamique (pour
# les graphiques en barres) et un capteur de total identifié. Même logique
# que diag_conso_jour_en_cours.yaml et diag_conso_mois_en_cours.yaml,
# mais sur le cycle hebdomadaire AMHQ (remise à zéro chaque lundi à minuit).
#
# ## 🧮 CALCUL & SOURCES :
# - Pôle 1 Hygiène     : lave_linge + lave_vaisselle + fer_a_repasser (P2 UM Hebdomadaire)
# - Pôle 2 Cuisine     : four_mo + petit_dej + airfryer + four_plaque (P2 UM Hebdomadaire)
# - Pôle 3 Froid       : frigo + congelateur (P2 UM Hebdomadaire)
# - Pôle 4 Chauffage   : clim_salon + radiateur + clim_bureau + soufflant + seche_serv + clim_chambre (P1 UM Hebdomadaire)
# - Pôle 5 Multimédia  : box_internet + tv_salon + tv_chambre + pc_gege + pc_bureau (P2 UM Hebdomadaire)
# - Pôle 6 Éclairage   : eclairage_total_group (P3 UM Hebdomadaire)
# - Pôle 7 Autre       : all_standby + tete_de_lit + chargeur_salon + horloge (P2 UM Hebdomadaire)
# - Max dynamique      : max(pôle1..7) + 2 kWh buffer (échelle hebdomadaire)
# - Total identifié    : somme des 7 pôles
#
# ## ⚠️ IMPORTANT (PIÈGES) :
# - Les UM P1 (chauffage) n'utilisent PAS le suffixe `_kwh_um` — attention
#   à la nomenclature (ex: sensor.clim_salon_hebdomadaire_um sans _kwh_).
# - Les UM P2 utilisent le suffixe `_kwh_um`.
# - Le buffer max est 2 kWh (vs 0.5 kWh journalier, 10 kWh mensuel).
# - Cycle hebdomadaire : remise à zéro chaque lundi à 00h00 (isoweek).
# - state_class: total_increasing pour compatibilité graphique énergie.
#
# ## 🖥️ TABLEAU DE BORD (VIGNETTES PRINCIPALES) :
# - L2C1 Conso Énergie Générale (graphique répartition par pôle — hebdomadaire).
# - Tab "HEBDOMADAIRE" de page_energie_home.yaml (bar-card + donut).

- sensor:
  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 1 — HYGIÈNE (Lave-linge, Lave-vaisselle, Fer)                │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_hygiene_hebdomadaire ---
  - name: "Diag Poste Hygiene Hebdomadaire"
    unique_id: diag_poste_hygiene_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:washing-machine
    state: >
      {% set ll = states('sensor.prise_lave_linge_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set lv = states('sensor.prise_lave_vaisselle_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set fr = states('sensor.prise_bureau_fer_a_repasser_nous_hebdomadaire_kwh_um') | float(0) %}
      {{ (ll + lv + fr) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 2 — CUISINE (Micro-ondes, Petit-dej, AirFryer, Four/Plaque)  │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_cuisine_hebdomadaire ---
  - name: "Diag Poste Cuisine Hebdomadaire"
    unique_id: diag_poste_cuisine_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:stove
    state: >
      {% set mo = states('sensor.prise_four_micro_ondes_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set pd = states('sensor.prise_petit_dejeune_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set af = states('sensor.prise_airfryer_ninja_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set fp = states('sensor.four_et_plaque_de_cuisson_hebdomadaire_kwh_um') | float(0) %}
      {{ (mo + pd + af + fp) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 3 — FROID (Frigo, Congélateur)                               │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_froid_hebdomadaire ---
  - name: "Diag Poste Froid Hebdomadaire"
    unique_id: diag_poste_froid_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:fridge
    state: >
      {% set fr = states('sensor.prise_frigo_cuisine_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set cg = states('sensor.prise_congelateur_cuisine_nous_hebdomadaire_kwh_um') | float(0) %}
      {{ (fr + cg) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 4 — CHAUFFAGE/CLIM (Salon, Cuisine, Bureau, SDB, Chambre)    │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_chauffage_hebdomadaire ---
  - name: "Diag Poste Chauffage Hebdomadaire"
    unique_id: diag_poste_chauffage_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:fire
    state: >
      {% set cs = states('sensor.clim_salon_hebdomadaire_um') | float(0) %}
      {% set rc = states('sensor.radiateur_elec_cuisine_hebdomadaire_um') | float(0) %}
      {% set cb = states('sensor.clim_bureau_hebdomadaire_um') | float(0) %}
      {% set ss = states('sensor.soufflant_sdb_hebdomadaire_um') | float(0) %}
      {% set sv = states('sensor.seche_serviette_sdb_hebdomadaire_um') | float(0) %}
      {% set cc = states('sensor.clim_chambre_hebdomadaire_um') | float(0) %}
      {{ (cs + rc + cb + ss + sv + cc) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 5 — MULTIMÉDIA (Box, TV×2, PC×2)                             │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_multimedia_hebdomadaire ---
  - name: "Diag Poste Multimedia Hebdomadaire"
    unique_id: diag_poste_multimedia_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:monitor
    state: >
      {% set bx = states('sensor.prise_box_internet_ikea_hebdomadaire_kwh_um') | float(0) %}
      {% set ts = states('sensor.prise_tv_salon_ikea_hebdomadaire_kwh_um') | float(0) %}
      {% set tc = states('sensor.prise_tv_chambre_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set pg = states('sensor.prise_pc_s_gege_ikea_hebdomadaire_kwh_um') | float(0) %}
      {% set pb = states('sensor.prise_bureau_pc_ikea_hebdomadaire_kwh_um') | float(0) %}
      {{ (bx + ts + tc + pg + pb) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 6 — ÉCLAIRAGE (Total appartement)                            │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_eclairage_hebdomadaire ---
  - name: "Diag Poste Eclairage Hebdomadaire"
    unique_id: diag_poste_eclairage_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:lightbulb
    state: >
      {{ states('sensor.eclairage_total_group_hebdomadaire_kwh_um') | float(0) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    PÔLE 7 — AUTRE (Veilles, Têtes de lit, Chargeurs, Horloge)        │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_poste_autre_hebdomadaire ---
  - name: "Diag Poste Autre Hebdomadaire"
    unique_id: diag_poste_autre_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    icon: mdi:plus-circle
    state: >
      {% set vs = states('sensor.all_standby_hebdomadaire_kwh_um') | float(0) %}
      {% set tl = states('sensor.prise_tete_de_lit_chambre_hebdomadaire_kwh_um') | float(0) %}
      {% set ch = states('sensor.prise_salon_chargeur_nous_hebdomadaire_kwh_um') | float(0) %}
      {% set hr = states('sensor.prise_horloge_ikea_hebdomadaire_kwh_um') | float(0) %}
      {{ (vs + tl + ch + hr) | round(3) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    MAX DYNAMIQUE (axe Y des barres + 2 kWh buffer hebdomadaire)      │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_max_poste_hebdomadaire ---
  - name: "Diag Max Poste Hebdomadaire Dynamique"
    unique_id: diag_max_poste_hebdomadaire_dynamique
    unit_of_measurement: "kWh"
    device_class: energy
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_hebdomadaire') | float(0),
        states('sensor.diag_poste_cuisine_hebdomadaire') | float(0),
        states('sensor.diag_poste_froid_hebdomadaire') | float(0),
        states('sensor.diag_poste_chauffage_hebdomadaire') | float(0),
        states('sensor.diag_poste_multimedia_hebdomadaire') | float(0),
        states('sensor.diag_poste_eclairage_hebdomadaire') | float(0),
        states('sensor.diag_poste_autre_hebdomadaire') | float(0)
      ] %}
      {{ (poles | max + 2) | round(2) }}

  # ╭──────────────────────────────────────────────────────────────────────╮
  # │    TOTAL IDENTIFIÉ (somme des 7 pôles)                               │
  # ╰──────────────────────────────────────────────────────────────────────╯
  # --- diag_total_identifie_hebdomadaire ---
  - name: "Diag Total Identifie Hebdomadaire"
    unique_id: diag_total_identifie_hebdomadaire
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    state: >
      {% set poles = [
        states('sensor.diag_poste_hygiene_hebdomadaire') | float(0),
        states('sensor.diag_poste_cuisine_hebdomadaire') | float(0),
        states('sensor.diag_poste_froid_hebdomadaire') | float(0),
        states('sensor.diag_poste_chauffage_hebdomadaire') | float(0),
        states('sensor.diag_poste_multimedia_hebdomadaire') | float(0),
        states('sensor.diag_poste_eclairage_hebdomadaire') | float(0),
        states('sensor.diag_poste_autre_hebdomadaire') | float(0)
      ] %}
      {{ (poles | sum) | round(2) }}

# annotations_log:
# - [Création] 2026-03-15 : Fichier créé par transposition de diag_conso_mois_en_cours.yaml.
# - [Convention] Suffixe _mensuel_ → _hebdomadaire_ sur tous les capteurs UM.
# - [P1 Chauffage] Pas de suffixe _kwh_ : sensor.clim_salon_hebdomadaire_um (cohérent avec mensuel).
# - [P2 Prises] Suffixe _kwh_um conservé : sensor.prise_*_hebdomadaire_kwh_um.
# - [Buffer max] 2 kWh (vs 0.5 kWh/jour, 10 kWh/mois) — échelle hebdomadaire intermédiaire.
# - [Cycle] Remise à zéro chaque lundi 00h00 (isoweek, cohérent avec P*_UM_AMHQ.yaml).